<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>포켓몬고 레이드 일정</title>

<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0}

body{
  font-family:'Pretendard',sans-serif;
  background:#eef3fb;
  color:#1f2f46;
}

/* ===== HERO (상단) ===== */
.hero{
  background:linear-gradient(135deg,#4f7fff,#7b63ff);
  color:#fff;
  border-radius:32px;
  padding:40px 32px 34px;
  margin:20px;
  box-shadow:0 24px 60px rgba(60,80,180,.2);
}

.hero-title{
  font-size:38px;
  font-weight:900;
  letter-spacing:-0.5px;
}

.hero-updated{
  margin-top:14px;
  font-size:14px;
  opacity:.9;
  font-weight:700;
}

/* ===== SECTION ===== */
.section{
  background:#f8fbff;
  border:1px solid #dbe6f4;
  border-radius:28px;
  margin:20px;
  overflow:hidden;
}

.section-head{
  padding:24px 28px;
  border-bottom:1px solid #e4edf8;
}

.section-title{
  font-size:26px;
  font-weight:900;
}

.section-body{
  padding:18px;
}

/* ===== 캘린더 ===== */
.calendar-head-row{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:14px;
  padding:0 6px 12px;
}

.weekday{
  text-align:center;
  font-weight:900;
  color:#7f8faa;
}

.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:14px;
}

.day-cell{
  background:#fff;
  border:1.5px solid #dbe6f4;
  border-radius:22px;
  padding:14px;
  min-height:180px;
  position:relative;
  cursor:pointer;
  transition:.2s;
}

.day-cell:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 24px rgba(60,80,140,.08);
}

.day-num{
  font-weight:900;
  font-size:18px;
  margin-bottom:12px;
}

.day-items{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.day-pill{
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 12px;
  border-radius:16px;
  font-size:13px;
  font-weight:900;
  line-height:1.3;
}

.day-pill.blue{background:#e8f0ff;color:#3567d7;}
.day-pill.purple{background:#efe8ff;color:#7c58e9;}
.day-pill.pink{background:#ffe8f0;color:#d85b85;}
.day-pill.yellow{background:#fff3cf;color:#b88818;}
.day-pill.green{background:#e8f6ee;color:#4aa86f;}

.day-pill img{
  width:18px;
  height:18px;
}

.day-avatar{
  position:absolute;
  right:10px;
  bottom:10px;
  width:44px;
  height:44px;
  border-radius:14px;
  background:#f2f6ff;
  display:flex;
  align-items:center;
  justify-content:center;
}

.day-avatar img{
  width:34px;
}

/* ===== 모달 ===== */
.modal{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.4);
}

.modal.show{display:flex;}

.modal-box{
  background:#fff;
  border-radius:24px;
  padding:20px;
  width:90%;
  max-width:600px;
}

.detail-item{
  margin-bottom:16px;
  padding:14px;
  border-radius:16px;
  border:1px solid #e3ebf7;
}

</style>
</head>

<body>

<!-- ===== 상단 ===== -->
<div class="hero">
  <div class="hero-title">3월 마지막 주 + 4월 레이드 일정</div>
  <div class="hero-updated">마지막 업데이트 : 2026.03.25</div>
</div>

<!-- ===== 캘린더 ===== -->
<div class="section">
  <div class="section-head">
    <div class="section-title">4월 캘린더</div>
  </div>

  <div class="section-body">
    <div class="calendar-head-row">
      <div class="weekday">일</div>
      <div class="weekday">월</div>
      <div class="weekday">화</div>
      <div class="weekday">수</div>
      <div class="weekday">목</div>
      <div class="weekday">금</div>
      <div class="weekday">토</div>
    </div>

    <div class="calendar-grid" id="calendarGrid"></div>
  </div>
</div>

<!-- ===== 모달 ===== -->
<div class="modal" id="modal">
  <div class="modal-box" id="modalContent"></div>
</div>

<script>
const IMG = {
  kyogre:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/382.png',
  groudon:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/383.png',
  regidrago:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/895.png'
};

const data = {
  1:[{name:'레이드 아워',type:'yellow',img:IMG.regidrago}],
  4:[{name:'레이드 데이',type:'yellow',img:IMG.kyogre}],
  8:[{name:'레이드 아워',type:'yellow',img:IMG.kyogre}],
  11:[{name:'커뮤니티 데이',type:'green',img:IMG.kyogre}],
  15:[{name:'레이드 아워',type:'yellow',img:IMG.groudon}],
  22:[{name:'레이드 아워',type:'yellow',img:IMG.groudon}],
};

function render(){
  const grid = document.getElementById('calendarGrid');
  let html = '';

  const firstDay = 3; // 4월 1일 수요일

  for(let i=0;i<firstDay;i++){
    html += `<div></div>`;
  }

  for(let d=1; d<=30; d++){
    const items = data[d] || [];

    html += `
      <div class="day-cell" onclick="openModal(${d})">
        <div class="day-num">${d}</div>

        <div class="day-items">
          ${
            items.length
            ? items.map(i=>`
              <div class="day-pill ${i.type}">
                <img src="${i.img}">
                ${i.name}
              </div>
            `).join('')
            : `<div style="font-size:12px;color:#aaa;">-</div>`
          }
        </div>

        ${items[0] ? `<div class="day-avatar"><img src="${items[0].img}"></div>` : ''}
      </div>
    `;
  }

  grid.innerHTML = html;
}

function openModal(day){
  const modal = document.getElementById('modal');
  const box = document.getElementById('modalContent');

  const items = data[day] || [];

  box.innerHTML = items.length
    ? items.map(i=>`
      <div class="detail-item">
        <b>${i.name}</b><br/>
        시간: 06:00 AM ~ 10:00 PM
      </div>
    `).join('')
    : '일정 없음';

  modal.classList.add('show');
}

document.getElementById('modal').onclick = e=>{
  if(e.target.id==='modal') e.target.classList.remove('show');
}

render();
</script>

</body>
</html>
