<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pokémon GO Raid Planner</title>

<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0}

body{
  font-family:'Pretendard',sans-serif;
  background:#edf3fb;
  color:#1f2f46;
}

.wrap{
  max-width:1180px;
  margin:0 auto;
  padding:16px 14px 110px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:16px;
}

.topbar-title{
  font-size:28px;
  font-weight:900;
}

.topbar-sub{
  margin-top:6px;
  font-size:13px;
  color:#7c8da7;
  font-weight:800;
}

.quick-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin-bottom:16px;
}

.quick-card{
  background:#fff;
  border:1px solid #d8e3f2;
  border-radius:20px;
  padding:16px;
  text-decoration:none;
  color:inherit;
}

.quick-title{
  font-size:20px;
  font-weight:900;
}

.quick-desc{
  font-size:13px;
  margin-top:6px;
  color:#7c8da7;
}

.section{
  background:#fff;
  border:1px solid #d8e3f2;
  border-radius:24px;
  margin-bottom:16px;
}

.section-head{
  padding:16px;
  border-bottom:1px solid #e5edf8;
}

.section-title{
  font-size:18px;
  font-weight:900;
}

.section-body{
  padding:16px;
}

/* 요일 이벤트 */
.weekday-top{
  display:flex;
  gap:16px;
}

.weekday-info{
  flex:1;
}

.weekday-day{
  font-size:12px;
  font-weight:900;
  color:#3567d7;
}

.weekday-title{
  font-size:22px;
  font-weight:900;
  margin-top:6px;
}

.weekday-summary{
  margin-top:6px;
  font-size:13px;
  color:#6f819e;
}

.weekday-visual{
  width:120px;
  height:120px;
  border-radius:20px;
  overflow:hidden;
  background:#f3f7ff;
}

.weekday-visual img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.weekday-points{
  margin-top:12px;
  display:grid;
  gap:8px;
}

.weekday-point{
  background:#f6f9ff;
  padding:10px;
  border-radius:12px;
  font-size:12px;
}

.weekday-tabs{
  display:flex;
  gap:6px;
  margin-top:12px;
  flex-wrap:wrap;
}

.weekday-tab{
  padding:6px 10px;
  border-radius:999px;
  border:1px solid #d8e3f2;
  background:#fff;
  font-size:12px;
  cursor:pointer;
}

.weekday-tab.active{
  background:#edf4ff;
  color:#3567d7;
}

.now-row{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

.now-card{
  background:#f9fbff;
  border:1px solid #d8e3f2;
  border-radius:18px;
  padding:12px;
}

.now-name{
  font-weight:900;
}

.now-meta{
  font-size:12px;
  color:#7c8da7;
  margin-top:6px;
}

.bottom-nav{
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  max-width:600px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
  background:#fff;
  border-radius:20px;
  padding:10px;
  border:1px solid #d8e3f2;
}

.nav-item{
  text-align:center;
  font-size:12px;
}

</style>
</head>

<body>

<div class="wrap">

<div class="topbar">
  <div>
    <div class="topbar-title">레이드 일정</div>
    <div class="topbar-sub" id="dateText"></div>
  </div>
</div>

<!-- 빠른 이동 -->
<div class="quick-grid">
  <a href="./raid-now.html" class="quick-card">
    <div class="quick-title">지금 레이드</div>
    <div class="quick-desc">현재 진행 중 보스</div>
  </a>
  <a href="./weekly.html" class="quick-card">
    <div class="quick-title">주간 일정</div>
    <div class="quick-desc">7일 흐름</div>
  </a>
  <a href="./monthly.html" class="quick-card">
    <div class="quick-title">월간 일정</div>
    <div class="quick-desc">전체 캘린더</div>
  </a>
</div>

<!-- 요일 이벤트 -->
<div class="section">
  <div class="section-head">
    <div class="section-title">오늘의 이벤트</div>
  </div>

  <div class="section-body">

    <div class="weekday-top">
      <div class="weekday-info">
        <div class="weekday-day" id="day"></div>
        <div class="weekday-title" id="title"></div>
        <div class="weekday-summary" id="summary"></div>
      </div>

      <div class="weekday-visual">
        <img id="image">
      </div>
    </div>

    <div class="weekday-points" id="points"></div>

    <div class="weekday-tabs" id="tabs"></div>

  </div>
</div>

<!-- 지금 레이드 -->
<div class="section">
  <div class="section-head">
    <div class="section-title">지금 레이드</div>
  </div>
  <div class="section-body">
    <div class="now-row" id="now"></div>
  </div>
</div>

</div>

<nav class="bottom-nav">
  <div class="nav-item">메인</div>
  <div class="nav-item">레이드</div>
  <div class="nav-item">주간</div>
  <div class="nav-item">월간</div>
</nav>

<script>

const WEEK = {
0:{day:"일요일",title:"루어 선데이",img:"/images/weekday/sunday.png",summary:"루어 지속 2배",points:["향로 증가","루어 2배"]},
1:{day:"월요일",title:"패스 & 맥스",img:"/images/weekday/monday.png",summary:"GO포인트 2배",points:["GO패스 2배","맥스배틀"]},
2:{day:"화요일",title:"쇼케이스",img:"/images/weekday/tuesday.png",summary:"쇼케이스 진행",points:["최대 20개","10~20시"]},
3:{day:"수요일",title:"레이드 아워",img:"/images/weekday/wednesday.png",summary:"18~19시",points:["전설 등장"]},
4:{day:"목요일",title:"배틀리그",img:"/images/weekday/thursday.png",summary:"별모래 증가",points:["4배","10세트"]},
5:{day:"금요일",title:"우정 프라이데이",img:"/images/weekday/friday.png",summary:"교환 보너스",points:["특교 2회"]},
6:{day:"토요일",title:"일반 이벤트",img:"/images/weekday/saturday.png",summary:"기본 이벤트",points:["별도 없음"]}
};

function render(day){
  const d=WEEK[day];
  document.getElementById("day").innerText=d.day;
  document.getElementById("title").innerText=d.title;
  document.getElementById("summary").innerText=d.summary;
  document.getElementById("image").src=d.img;

  document.getElementById("points").innerHTML=
    d.points.map(p=>`<div class="weekday-point">${p}</div>`).join("");

  const tabs=["일","월","화","수","목","금","토"];
  document.getElementById("tabs").innerHTML=
    tabs.map((t,i)=>`<button class="weekday-tab ${i===day?"active":""}" onclick="render(${i})">${t}</button>`).join("");
}

const today=new Date().getDay();
render(today);

document.getElementById("dateText").innerText=new Date().toLocaleDateString("ko-KR");

</script>

</body>
</html>
