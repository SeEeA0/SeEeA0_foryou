<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pokémon GO Calendar</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:#eef3f8;
    color:#243147;
  }

  :root{
    --bg:#f7f9fc;
    --card:#f9fbff;
    --line:#d8e2ef;
    --muted:#7b88a1;
    --blue:#3567d7;
    --blue-bg:#dfe8f8;
    --purple:#7c58e9;
    --purple-bg:#ece2fa;
    --yellow:#8a6a00;
    --yellow-bg:#f7e9be;
    --green:#698814;
    --green-bg:#e4edc8;
    --pink:#d85b85;
    --pink-bg:#f8dfe7;
    --sun:#ef6b7a;
    --sat:#4b7cf0;
  }

  .wrap{
    max-width:1320px;
    margin:24px auto;
    padding:0 14px 30px;
  }

  .section{
    background:var(--bg);
    border:1px solid var(--line);
    border-radius:28px;
    overflow:hidden;
    margin-bottom:18px;
  }

  .section-head{
    padding:24px 28px 18px;
    border-bottom:1px solid var(--line);
    background:#f8fbff;
  }

  .section-title{
    font-size:28px;
    font-weight:900;
    letter-spacing:-0.3px;
  }

  .section-sub{
    margin-top:8px;
    font-size:14px;
    color:var(--muted);
    font-weight:700;
  }

  .section-body{
    padding:18px;
  }

  .chip{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:10px 14px;
    border-radius:999px;
    font-size:14px;
    font-weight:900;
    white-space:nowrap;
  }
  .chip.blue{background:var(--blue-bg);color:var(--blue)}
  .chip.purple{background:var(--purple-bg);color:var(--purple)}
  .chip.yellow{background:var(--yellow-bg);color:var(--yellow)}
  .chip.green{background:var(--green-bg);color:var(--green)}
  .chip.pink{background:var(--pink-bg);color:var(--pink)}

  .raid-now-list{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:14px;
  }

  .raid-card{
    background:var(--card);
    border:1.5px solid var(--line);
    border-radius:22px;
    padding:14px;
    display:flex;
    gap:12px;
    align-items:center;
    min-height:100px;
  }

  .raid-card img{
    width:64px;
    height:64px;
    object-fit:contain;
    border-radius:16px;
    background:#f3f6fb;
    border:1px solid var(--line);
    padding:6px;
  }

  .raid-name{
    font-size:18px;
    font-weight:900;
    line-height:1.2;
  }

  .raid-time{
    margin-top:8px;
    font-size:13px;
    color:#61738f;
    font-weight:800;
  }

  .empty-box{
    border:1.5px dashed var(--line);
    background:#fbfdff;
    border-radius:20px;
    padding:22px;
    text-align:center;
    color:var(--muted);
    font-weight:800;
  }

  .weekly-table{
    display:grid;
    grid-template-columns:repeat(7, minmax(160px,1fr));
    gap:14px;
    overflow-x:auto;
  }

  .week-day{
    min-width:160px;
    background:var(--card);
    border:1.5px solid var(--line);
    border-radius:24px;
    padding:14px;
  }

  .week-date{
    font-size:18px;
    font-weight:900;
    margin-bottom:4px;
  }

  .week-date.sun{color:var(--sun)}
  .week-date.sat{color:var(--sat)}

  .week-dayname{
    font-size:13px;
    color:var(--muted);
    font-weight:800;
    margin-bottom:12px;
  }

  .week-events{
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .time-item{
    border:1px solid var(--line);
    background:#fff;
    border-radius:18px;
    padding:10px;
  }

  .time-item-top{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:8px;
  }

  .time-item-top img{
    width:34px;
    height:34px;
    object-fit:contain;
    border-radius:10px;
    background:#f4f7fb;
    border:1px solid var(--line);
    padding:4px;
  }

  .time-item-name{
    font-size:14px;
    font-weight:900;
    line-height:1.2;
  }

  .time-item-time{
    font-size:12px;
    color:#60718d;
    font-weight:800;
  }

  .calendar-head-row{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:14px;
    padding:0 6px 12px;
  }

  .weekday{
    text-align:center;
    font-weight:900;
    color:#7b88a1;
    padding:6px 0;
  }

  .calendar-grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:14px;
  }

  .day-cell{
    position:relative;
    min-height:170px;
    padding:14px;
    border:2px solid var(--line);
    border-radius:26px;
    background:#fbfdff;
    cursor:pointer;
    transition:.18s ease;
  }

  .day-cell:hover{
    transform:translateY(-2px);
    border-color:#c2d3e8;
  }

  .day-cell.empty{
    background:transparent;
    border:none;
    cursor:default;
  }

  .day-number{
    font-size:16px;
    font-weight:900;
    color:#677892;
    margin-bottom:14px;
  }

  .day-number.sun{color:var(--sun)}
  .day-number.sat{color:var(--sat)}

  .day-events{
    display:flex;
    flex-direction:column;
    gap:8px;
    padding-right:40px;
  }

  .day-icon{
    position:absolute;
    right:12px;
    bottom:12px;
    width:42px;
    height:42px;
    border-radius:50%;
    overflow:hidden;
    background:#f2f6fb;
    border:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .day-icon img{
    width:28px;
    height:28px;
    object-fit:contain;
  }

  @media (max-width:1100px){
    .weekly-table,.calendar-head-row,.calendar-grid{
      min-width:1100px;
    }
    .section-body{
      overflow-x:auto;
    }
  }
</style>
</head>
<body>
<div class="wrap">

  <section class="section">
    <div class="section-head">
      <div class="section-title">지금 레이드</div>
      <div class="section-sub">오늘 기준으로 현재 진행 중인 레이드가 자동으로 표시됩니다.</div>
    </div>
    <div class="section-body">
      <div class="raid-now-list" id="raidNowList"></div>
    </div>
  </section>

  <section class="section">
    <div class="section-head">
      <div class="section-title">주간 타임테이블</div>
      <div class="section-sub">오늘부터 7일간의 레이드가 날짜별로 자동 정리됩니다.</div>
    </div>
    <div class="section-body">
      <div class="weekly-table" id="weeklyTable"></div>
    </div>
  </section>

  <section class="section">
    <div class="section-head">
      <div class="section-title">2026년 4월 캘린더</div>
      <div class="section-sub">날짜를 누르면 해당 일자 상세 페이지로 이동할 수 있게 연결하면 됩니다.</div>
    </div>
    <div class="section-body">
      <div class="calendar-head-row">
        <div class="weekday">일</div>
        <div class="weekday">월</div>
        <div class="weekday">화</div>
        <div class="weekday">수</div>
        <div class="weekday">목</div>
        <div class="weekday">금</div>
        <div class="weekday">토</div>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>
  </section>

</div>

<script>
  const DEFAULT_START = '06:00 AM';
  const DEFAULT_END = '10:00 PM';

  const raids = [
    {
      name:'레지드래고',
      type:'blue',
      image:'./images/regidrago.png',
      startDate:'2026-04-01',
      endDate:'2026-04-07'
    },
    {
      name:'그림자 라티오스',
      type:'pink',
      image:'./images/latios-shadow.png',
      startDate:'2026-04-01',
      endDate:'2026-04-06'
    },
    {
      name:'가이오가',
      type:'blue',
      image:'./images/kyogre.png',
      startDate:'2026-04-08',
      endDate:'2026-04-14'
    },
    {
      name:'메가프테라',
      type:'purple',
      image:'./images/aerodactyl-mega.png',
      startDate:'2026-04-08',
      endDate:'2026-04-13'
    },
    {
      name:'그란돈',
      type:'blue',
      image:'./images/groudon.png',
      startDate:'2026-04-15',
      endDate:'2026-04-21'
    },
    {
      name:'메가후딘',
      type:'purple',
      image:'./images/alakazam-mega.png',
      startDate:'2026-04-15',
      endDate:'2026-04-19',
      startTime:'11:00 AM',
      endTime:'08:00 PM'
    },
    {
      name:'카푸꼬꼬꼭',
      type:'blue',
      image:'./images/tapu-koko.png',
      startDate:'2026-04-22',
      endDate:'2026-04-28'
    },
    {
      name:'메가샤크니아',
      type:'purple',
      image:'./images/sharpedo-mega.png',
      startDate:'2026-04-22',
      endDate:'2026-04-27'
    },
    {
      name:'카푸나비나',
      type:'blue',
      image:'./images/tapu-lele.png',
      startDate:'2026-04-29',
      endDate:'2026-04-30'
    },
    {
      name:'메가다크펫',
      type:'purple',
      image:'./images/banette-mega.png',
      startDate:'2026-04-29',
      endDate:'2026-04-30'
    },
    {
      name:'패션 레이드 데이',
      type:'yellow',
      image:'./images/event-fashion.png',
      startDate:'2026-04-04',
      endDate:'2026-04-04',
      startTime:'02:00 PM',
      endTime:'05:00 PM'
    }
  ];

  function pad(n){
    return String(n).padStart(2,'0');
  }

  function parseDate(str){
    const [y,m,d] = str.split('-').map(Number);
    return new Date(y, m-1, d, 0, 0, 0, 0);
  }

  function formatDateKey(date){
    return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}`;
  }

  function formatTimeRange(raid){
    return `${raid.startTime || DEFAULT_START} ~ ${raid.endTime || DEFAULT_END}`;
  }

  function isDateInRange(target, start, end){
    const t = parseDate(formatDateKey(target)).getTime();
    const s = parseDate(start).getTime();
    const e = parseDate(end).getTime();
    return t >= s && t <= e;
  }

  function getRaidsForDate(date){
    return raids.filter(raid => isDateInRange(date, raid.startDate, raid.endDate));
  }

  function getTypeClass(type){
    return type || 'blue';
  }

  function getWeekdayKor(idx){
    return ['일','월','화','수','목','금','토'][idx];
  }

  function renderNowRaids(baseDate){
    const wrap = document.getElementById('raidNowList');
    const items = getRaidsForDate(baseDate);

    if(!items.length){
      wrap.innerHTML = `<div class="empty-box">오늘 진행 중인 레이드가 없습니다.</div>`;
      return;
    }

    wrap.innerHTML = items.map(item => `
      <div class="raid-card">
        <img src="${item.image}" alt="${item.name}">
        <div>
          <div class="chip ${getTypeClass(item.type)}">${item.name}</div>
          <div class="raid-time">${formatTimeRange(item)}</div>
        </div>
      </div>
    `).join('');
  }

  function renderWeeklyTable(baseDate){
    const wrap = document.getElementById('weeklyTable');
    const days = [];

    for(let i=0;i<7;i++){
      const d = new Date(baseDate);
      d.setDate(baseDate.getDate()+i);
      days.push(d);
    }

    wrap.innerHTML = days.map(date => {
      const raidsToday = getRaidsForDate(date);
      const dayClass = date.getDay() === 0 ? 'sun' : date.getDay() === 6 ? 'sat' : '';

      return `
        <div class="week-day">
          <div class="week-date ${dayClass}">${date.getMonth()+1}.${date.getDate()}</div>
          <div class="week-dayname">${getWeekdayKor(date.getDay())}요일</div>
          <div class="week-events">
            ${
              raidsToday.length
                ? raidsToday.map(item => `
                  <div class="time-item">
                    <div class="time-item-top">
                      <img src="${item.image}" alt="${item.name}">
                      <div class="time-item-name">${item.name}</div>
                    </div>
                    <div class="time-item-time">${formatTimeRange(item)}</div>
                  </div>
                `).join('')
                : `<div class="empty-box" style="padding:14px;font-size:13px;">일정 없음</div>`
            }
          </div>
        </div>
      `;
    }).join('');
  }

  function renderMonthlyCalendar(year, month){
    const grid = document.getElementById('calendarGrid');
    const firstDay = new Date(year, month-1, 1).getDay();
    const lastDate = new Date(year, month, 0).getDate();
    let html = '';

    for(let i=0;i<firstDay;i++){
      html += `<div class="day-cell empty"></div>`;
    }

    for(let day=1; day<=lastDate; day++){
      const date = new Date(year, month-1, day);
      const items = getRaidsForDate(date);
      const dayClass = date.getDay() === 0 ? 'sun' : date.getDay() === 6 ? 'sat' : '';
      const preview = items.slice(0,2);

      html += `
        <a class="day-cell" href="./detail-${year}-${pad(month)}-${pad(day)}.html" style="text-decoration:none;color:inherit;">
          <div class="day-number ${dayClass}">${day}</div>
          <div class="day-events">
            ${preview.map(item => `<span class="chip ${getTypeClass(item.type)}">${item.name}</span>`).join('')}
            ${!preview.length ? `<span style="font-size:13px;color:#94a1b6;font-weight:800;">일정 없음</span>` : ''}
          </div>
          ${
            items[0]
              ? `<div class="day-icon"><img src="${items[0].image}" alt="${items[0].name}"></div>`
              : ``
          }
        </a>
      `;
    }

    grid.innerHTML = html;
  }

  // 테스트용 기준 날짜
  // 실제 자동으로 오늘 기준 쓰려면 아래 한 줄만 사용
  // const today = new Date();

  const today = new Date();

  renderNowRaids(today);
  renderWeeklyTable(today);
  renderMonthlyCalendar(2026, 4);
</script>
</body>
</html>
