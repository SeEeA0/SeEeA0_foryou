<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pokémon GO Raid Planner</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#edf3fb;
    color:#1f2f46;
  }

  :root{
    --bg:#edf3fb;
    --card:#ffffff;
    --line:#d8e3f2;
    --text:#1f2f46;
    --muted:#7486a3;

    --blue:#3567d7;
    --blue-soft:#e7f0ff;

    --purple:#7c58e9;
    --purple-soft:#efe7ff;

    --pink:#d85b85;
    --pink-soft:#ffe8f0;

    --yellow:#b88818;
    --yellow-soft:#fff1c9;

    --green:#49a66b;
    --green-soft:#e7f5eb;

    --gray:#67768f;
    --gray-soft:#f2f5fa;

    --shadow:0 14px 32px rgba(43,67,110,.08);
    --shadow-hover:0 18px 36px rgba(43,67,110,.14);
  }

  .wrap{
    max-width:1180px;
    margin:0 auto;
    padding:16px 14px 110px;
  }

  .fade-up{
    opacity:0;
    transform:translateY(10px);
    animation:fadeUp .55s ease forwards;
  }

  .delay-1{animation-delay:.05s}
  .delay-2{animation-delay:.12s}
  .delay-3{animation-delay:.19s}
  .delay-4{animation-delay:.26s}
  .delay-5{animation-delay:.33s}

  @keyframes fadeUp{
    from{
      opacity:0;
      transform:translateY(10px);
    }
    to{
      opacity:1;
      transform:translateY(0);
    }
  }

  @keyframes softFloat{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-4px)}
  }

  @keyframes pulseRing{
    0%{box-shadow:0 0 0 0 rgba(83,123,221,.16)}
    70%{box-shadow:0 0 0 10px rgba(83,123,221,0)}
    100%{box-shadow:0 0 0 0 rgba(83,123,221,0)}
  }

  .topbar{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:12px;
    margin-bottom:16px;
  }

  .topbar-title{
    font-size:30px;
    font-weight:900;
    letter-spacing:-.04em;
    line-height:1.05;
  }

  .topbar-sub{
    margin-top:8px;
    color:var(--muted);
    font-size:14px;
    font-weight:800;
  }

  .topbar-date{
    flex-shrink:0;
    min-height:48px;
    padding:0 16px;
    border-radius:16px;
    background:rgba(255,255,255,.92);
    border:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:13px;
    font-weight:900;
    color:#617899;
    box-shadow:var(--shadow);
  }

  .quick-grid{
    display:grid;
    grid-template-columns:repeat(3,minmax(0,1fr));
    gap:12px;
    margin-bottom:16px;
  }

  .quick-card{
    background:rgba(255,255,255,.92);
    border:1px solid var(--line);
    border-radius:24px;
    padding:18px;
    box-shadow:var(--shadow);
    text-decoration:none;
    color:inherit;
    min-height:122px;
    display:flex;
    align-items:center;
    gap:14px;
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    position:relative;
    overflow:hidden;
  }

  .quick-card::after{
    content:"";
    position:absolute;
    inset:auto -30px -30px auto;
    width:90px;
    height:90px;
    border-radius:50%;
    background:linear-gradient(135deg, rgba(120,148,255,.18), rgba(123,99,255,.05));
    pointer-events:none;
  }

  .quick-card:hover{
    transform:translateY(-4px);
    box-shadow:var(--shadow-hover);
    border-color:#c7d7ec;
  }

  .quick-icon{
    width:56px;
    height:56px;
    border-radius:18px;
    background:#f3f7ff;
    border:1px solid #dce6f4;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    flex-shrink:0;
    animation:softFloat 3.2s ease-in-out infinite;
  }

  .quick-title{
    font-size:22px;
    font-weight:900;
    letter-spacing:-.03em;
  }

  .quick-desc{
    margin-top:6px;
    color:var(--muted);
    font-size:13px;
    line-height:1.45;
    font-weight:800;
  }

  .section{
    background:rgba(255,255,255,.9);
    border:1px solid var(--line);
    border-radius:26px;
    box-shadow:var(--shadow);
    overflow:hidden;
    margin-bottom:16px;
  }

  .section-head{
    padding:18px 18px 14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    border-bottom:1px solid #e6eef8;
  }

  .section-title{
    font-size:20px;
    font-weight:900;
    letter-spacing:-.03em;
  }

  .section-sub{
    margin-top:6px;
    font-size:13px;
    color:var(--muted);
    font-weight:800;
  }

  .head-link{
    min-height:38px;
    padding:0 14px;
    border-radius:999px;
    background:#f3f7ff;
    border:1px solid var(--line);
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:900;
    color:#5c7395;
    text-decoration:none;
    white-space:nowrap;
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }

  .head-link:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(43,67,110,.08);
    border-color:#c7d7ec;
  }

  .section-body{
    padding:14px;
  }

  .weekday-card{
    background:linear-gradient(180deg,#ffffff 0%, #f8fbff 100%);
    border:1.5px solid var(--line);
    border-radius:24px;
    padding:18px;
    position:relative;
    overflow:hidden;
  }

  .weekday-card::before{
    content:"";
    position:absolute;
    right:-30px;
    top:-30px;
    width:140px;
    height:140px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(104,135,255,.18) 0%, rgba(104,135,255,0) 70%);
    pointer-events:none;
  }

  .weekday-top{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:16px;
  }

  .weekday-day{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:30px;
    padding:0 12px;
    border-radius:999px;
    background:#edf4ff;
    color:#3567d7;
    font-size:12px;
    font-weight:900;
  }

  .weekday-title{
    margin-top:12px;
    font-size:24px;
    font-weight:900;
    letter-spacing:-.03em;
    line-height:1.15;
  }

  .weekday-summary{
    margin-top:8px;
    font-size:14px;
    color:#6d7f9e;
    line-height:1.55;
    font-weight:800;
  }

  .weekday-visual{
    width:128px;
    height:128px;
    border-radius:24px;
    background:#f3f7ff;
    border:1px solid #dce6f4;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    flex-shrink:0;
    box-shadow:0 10px 24px rgba(43,67,110,.08);
    animation:softFloat 3.8s ease-in-out infinite;
  }

  .weekday-visual img{
    width:100%;
    height:100%;
    object-fit:cover;
  }

  .weekday-points{
    margin-top:14px;
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:10px;
  }

  .weekday-point{
    background:#f6f9ff;
    border:1px solid #dde7f5;
    border-radius:16px;
    padding:12px 14px;
    font-size:13px;
    line-height:1.45;
    color:#33465f;
    font-weight:800;
    transition:transform .18s ease, box-shadow .18s ease;
  }

  .weekday-point:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 16px rgba(43,67,110,.06);
  }

  .weekday-note{
    margin-top:12px;
    padding:12px 14px;
    border-radius:16px;
    background:#fbfdff;
    border:1px dashed #d7e2f1;
    font-size:12px;
    line-height:1.5;
    color:#7a8ca8;
    font-weight:800;
  }

  .weekday-tabs{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:14px;
  }

  .weekday-tab{
    min-height:36px;
    padding:0 14px;
    border-radius:999px;
    border:1px solid #d7e2f0;
    background:#fff;
    color:#6c7f9f;
    font-size:12px;
    font-weight:900;
    cursor:pointer;
    transition:.15s ease;
  }

  .weekday-tab:hover{
    transform:translateY(-1px);
    border-color:#c7d7ec;
  }

  .weekday-tab.active{
    background:#edf4ff;
    color:#3567d7;
    border-color:#cdddf5;
    animation:pulseRing 1.8s infinite;
  }

  .now-row{
    display:grid;
    grid-template-columns:repeat(3,minmax(0,1fr));
    gap:12px;
  }

  .now-card{
    background:linear-gradient(180deg,#fff 0%, #f9fbff 100%);
    border:1.5px solid var(--line);
    border-radius:22px;
    padding:14px;
    min-height:144px;
    text-decoration:none;
    color:inherit;
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    position:relative;
    overflow:hidden;
  }

  .now-card:hover{
    transform:translateY(-4px);
    box-shadow:var(--shadow-hover);
    border-color:#c7d7ec;
  }

  .now-chip{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:28px;
    padding:0 10px;
    border-radius:999px;
    font-size:11px;
    font-weight:900;
    line-height:1;
  }

  .chip.blue{background:var(--blue-soft);color:var(--blue)}
  .chip.purple{background:var(--purple-soft);color:var(--purple)}
  .chip.pink{background:var(--pink-soft);color:var(--pink)}
  .chip.yellow{background:var(--yellow-soft);color:var(--yellow)}
  .chip.green{background:var(--green-soft);color:var(--green)}
  .chip.gray{background:var(--gray-soft);color:var(--gray)}

  .now-main{
    display:grid;
    grid-template-columns:64px 1fr;
    gap:12px;
    align-items:center;
    margin-top:12px;
  }

  .now-thumb{
    width:64px;
    height:64px;
    border-radius:18px;
    background:#f3f7ff;
    border:1px solid #dce6f5;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    animation:softFloat 3.8s ease-in-out infinite;
  }

  .now-thumb img{
    width:50px;
    height:50px;
    object-fit:contain;
  }

  .now-name{
    font-size:18px;
    font-weight:900;
    line-height:1.12;
    letter-spacing:-.03em;
  }

  .now-meta{
    margin-top:6px;
    font-size:12px;
    color:#7b8ca8;
    font-weight:800;
    line-height:1.35;
  }

  .week-grid{
    display:grid;
    grid-template-columns:repeat(7,minmax(0,1fr));
    gap:10px;
  }

  .week-day{
    min-height:136px;
    background:linear-gradient(180deg,#fff 0%, #f9fbff 100%);
    border:1.5px solid var(--line);
    border-radius:20px;
    padding:12px;
    transition:transform .18s ease, box-shadow .18s ease;
  }

  .week-day:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(43,67,110,.08);
  }

  .week-day.today{
    border-color:#abc3ff;
    background:linear-gradient(180deg,#ffffff 0%, #f4f8ff 100%);
  }

  .week-top{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:8px;
    margin-bottom:10px;
  }

  .week-date{
    font-size:20px;
    font-weight:900;
    letter-spacing:-.03em;
  }

  .week-date.sun{color:#ef6b7a}
  .week-date.sat{color:#4b7cf0}

  .week-dayname{
    margin-top:2px;
    font-size:12px;
    color:#8090aa;
    font-weight:800;
  }

  .today-pill{
    min-height:24px;
    padding:0 8px;
    border-radius:999px;
    background:#e9f1ff;
    color:#4e7deb;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:10px;
    font-weight:900;
    white-space:nowrap;
  }

  .week-items{
    display:flex;
    flex-direction:column;
    gap:6px;
  }

  .week-pill{
    display:flex;
    align-items:center;
    gap:6px;
    min-height:30px;
    padding:6px 8px;
    border-radius:12px;
    font-size:11px;
    font-weight:900;
    line-height:1.2;
    white-space:normal;
    word-break:keep-all;
    transition:transform .15s ease;
  }

  .week-pill:hover{
    transform:translateX(2px);
  }

  .week-pill.blue{background:var(--blue-soft);color:var(--blue)}
  .week-pill.purple{background:var(--purple-soft);color:var(--purple)}
  .week-pill.pink{background:var(--pink-soft);color:var(--pink)}
  .week-pill.yellow{background:var(--yellow-soft);color:var(--yellow)}
  .week-pill.green{background:var(--green-soft);color:var(--green)}
  .week-pill.gray{background:var(--gray-soft);color:var(--gray)}

  .week-pill img{
    width:14px;
    height:14px;
    object-fit:contain;
    flex-shrink:0;
  }

  .month-grid{
    display:grid;
    grid-template-columns:repeat(7,minmax(0,1fr));
    gap:10px;
  }

  .month-day{
    min-height:126px;
    background:linear-gradient(180deg,#fff 0%, #f9fbff 100%);
    border:1.5px solid var(--line);
    border-radius:18px;
    padding:12px;
    text-decoration:none;
    color:inherit;
    position:relative;
    overflow:hidden;
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }

  .month-day:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(43,67,110,.08);
    border-color:#c7d7ec;
  }

  .month-num{
    font-size:17px;
    font-weight:900;
    margin-bottom:8px;
  }

  .month-items{
    display:flex;
    flex-direction:column;
    gap:6px;
    padding-right:24px;
  }

  .month-pill{
    display:flex;
    align-items:center;
    gap:6px;
    min-height:28px;
    padding:6px 8px;
    border-radius:11px;
    font-size:10px;
    font-weight:900;
    line-height:1.2;
    white-space:normal;
    word-break:keep-all;
  }

  .month-pill.blue{background:var(--blue-soft);color:var(--blue)}
  .month-pill.purple{background:var(--purple-soft);color:var(--purple)}
  .month-pill.pink{background:var(--pink-soft);color:var(--pink)}
  .month-pill.yellow{background:var(--yellow-soft);color:var(--yellow)}
  .month-pill.green{background:var(--green-soft);color:var(--green)}
  .month-pill.gray{background:var(--gray-soft);color:var(--gray)}

  .month-pill img{
    width:14px;
    height:14px;
    object-fit:contain;
    flex-shrink:0;
  }

  .month-avatar{
    position:absolute;
    right:8px;
    bottom:8px;
    width:30px;
    height:30px;
    border-radius:10px;
    background:#f3f7ff;
    border:1px solid #dce6f4;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    animation:softFloat 3.4s ease-in-out infinite;
  }

  .month-avatar img{
    width:22px;
    height:22px;
    object-fit:contain;
  }

  .empty-box{
    border:1px dashed #d9e4f2;
    background:#fbfdff;
    border-radius:14px;
    padding:14px 10px;
    text-align:center;
    color:#97a5ba;
    font-size:12px;
    font-weight:800;
  }

  .bottom-nav{
    position:fixed;
    left:50%;
    bottom:14px;
    transform:translateX(-50%);
    width:min(980px, calc(100% - 24px));
    background:rgba(255,255,255,.94);
    border:1px solid var(--line);
    border-radius:24px;
    box-shadow:0 18px 36px rgba(42,59,97,.12);
    backdrop-filter:blur(10px);
    padding:10px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    z-index:30;
  }

  .nav-item{
    min-height:64px;
    border-radius:16px;
    text-decoration:none;
    color:#6f819e;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:6px;
    font-size:12px;
    font-weight:900;
    transition:.18s ease;
    background:#f8fbff;
    border:1px solid transparent;
  }

  .nav-item:hover{
    background:#f3f7ff;
    color:#486995;
    border-color:#d6e3f3;
    transform:translateY(-1px);
  }

  .nav-item.active{
    background:#edf4ff;
    color:#3567d7;
    border-color:#cdddf5;
  }

  .nav-icon{
    font-size:18px;
    line-height:1;
  }

  @media (max-width:1100px){
    .quick-grid,
    .now-row{
      grid-template-columns:1fr;
    }

    .weekday-points{
      grid-template-columns:1fr;
    }

    .week-grid,
    .month-grid{
      min-width:980px;
    }

    .section-body{
      overflow-x:auto;
    }
  }

  @media (max-width:768px){
    .wrap{
      padding:14px 12px 120px;
    }

    .topbar{
      flex-direction:column;
      align-items:flex-start;
    }

    .topbar-title{
      font-size:28px;
    }

    .section-head{
      padding:16px 16px 12px;
      flex-direction:column;
      align-items:flex-start;
    }

    .section-body{
      padding:12px;
    }

    .weekday-top{
      flex-direction:column;
      align-items:flex-start;
    }

    .weekday-title{
      font-size:22px;
    }

    .weekday-visual{
      width:100%;
      height:180px;
      border-radius:20px;
    }

    .now-main{
      grid-template-columns:56px 1fr;
    }

    .now-thumb{
      width:56px;
      height:56px;
    }

    .now-thumb img{
      width:44px;
      height:44px;
    }
  }

  @media (prefers-reduced-motion: reduce){
    *{
      animation:none !important;
      transition:none !important;
      scroll-behavior:auto !important;
    }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar fade-up">
    <div>
      <div class="topbar-title">레이드 일정</div>
      <div class="topbar-sub" id="topbarSub">한국 시간 기준 로딩 중...</div>
    </div>
    <div class="topbar-date" id="monthBadge">3월</div>
  </div>

  <section class="quick-grid fade-up delay-1">
    <a class="quick-card" href="./raid-now.html">
      <div class="quick-icon">⚔️</div>
      <div>
        <div class="quick-title">지금 레이드</div>
        <div class="quick-desc">현재 진행 중인 보스를 바로 확인</div>
      </div>
    </a>

    <a class="quick-card" href="./weekly.html">
      <div class="quick-icon">🗓️</div>
      <div>
        <div class="quick-title">주간 일정</div>
        <div class="quick-desc">이번 주 레이드와 이벤트 흐름 보기</div>
      </div>
    </a>

    <a class="quick-card" href="./monthly.html">
      <div class="quick-icon">📆</div>
      <div>
        <div class="quick-title">월간 일정</div>
        <div class="quick-desc">한 달 전체 캘린더와 날짜별 상세 이동</div>
      </div>
    </a>
  </section>

  <section class="section fade-up delay-2">
    <div class="section-head">
      <div>
        <div class="section-title">오늘의 요일 이벤트</div>
        <div class="section-sub" id="weekdaySub">오늘 기준 자동 표시</div>
      </div>
      <span class="head-link" id="weekdayMiniLabel">DAY BONUS</span>
    </div>
    <div class="section-body">
      <div class="weekday-card">
        <div class="weekday-top">
          <div>
            <div class="weekday-day" id="weekdayDayBadge">월요일</div>
            <div class="weekday-title" id="weekdayTitle">패스트패스 먼데이</div>
            <div class="weekday-summary" id="weekdaySummary"></div>
          </div>

          <div class="weekday-visual">
            <img id="weekdayImage" src="" alt="요일 이벤트 이미지">
          </div>
        </div>

        <div class="weekday-points" id="weekdayPoints"></div>

        <div class="weekday-note" id="weekdayNote" style="display:none;"></div>

        <div class="weekday-tabs" id="weekdayTabs"></div>
      </div>
    </div>
  </section>

  <section class="section fade-up delay-3">
    <div class="section-head">
      <div>
        <div class="section-title">지금 레이드</div>

<script>
  const STORAGE_KEY = 'pogoRaidAdminData';

  const WEEKDAY_EVENTS = {
    0: {

      points: [

        '루어모듈 / 아이스 / 허브 / 마그네틱 / 레이니 루어모듈 지속 시간 최대 2배'
      ],
      note: ''
    },
    1: {

      title: '패스트패스 먼데이 · 맥스 먼데이',

      summary: 'GO패스 포인트 보너스와 파워스폿 관련 보너스가 적용되는 날입니다.',
      points: [
        'GO패스와 이벤트 GO패스 태스크 완료 시 GO포인트 2배',
        '파워스폿 갱신 간격 단축 및 월요일에 더 많은 파워스폿 등장',
        '맥스배틀 로테이션에 다른 다이맥스 포켓몬 등장',
        '맥스배틀 이용 가능 시간: 한국시간 06:00 ~ 21:00'
      ],
      note: '파워스폿 수는 맥스 먼데이·맥스배틀 데이가 아닐 때 더 적어질 수 있습니다.'
    },
    2: {
      day: '화요일',
      title: '쇼케이스 투스데이',
      image: '/images/weekday/tuesday.png',
      summary: '화요일에는 다양한 포켓스톱 쇼케이스가 열립니다.',
      points: [

      ],

    },
    3: {
      day: '수요일',

      summary: '전설 레이드배틀과 메가 레이드 보스가 돌아가며 바뀌는 핵심 요일입니다.',
      points: [
        '매주 하루 시작 시 전설 / 메가 레이드 보스 로테이션 변경',
        '한국시간 18:00 ~ 19:00 레이드 아워 진행',
        '레이드 아워에는 전설 레이드배틀 보스 포켓몬이 등장'
      ],
      note: ''
    },
    4: {
      day: '목요일',
      title: 'GO배틀리그 썰스데이',
      image: '/images/weekday/thursday.png',
      summary: '배틀리그 보상과 플레이 가능 횟수가 늘어나는 날입니다.',
      points: [
        '배틀 승리 리워드 별의모래 최대 4배 (세트 종료 시 리워드 제외)',
        '하루 최대 플레이 횟수 5세트 → 10세트',
        '총 50세트 플레이 가능'
      ],
      note: ''
    },
    5: {
      day: '금요일',
      title: '우정 프라이데이',
      image: '/images/weekday/friday.png',
      summary: '교환 관련 보너스가 집중되는 날입니다.',
      points: [
        '특별한 교환 최대 2회 가능',
        '모든 교환이 반짝반짝 교환이 될 확률 증가',
        '교환에 필요한 별의모래 최대 10% 감소',
        '트레이너 레벨 31 이상: 교환 시 포켓몬의 사탕XL 2개 확정'
      ],
      note: '위 보너스는 대면 교환에만 적용됩니다.'
    },
    6: {
      day: '토요일',
      title: '정기 요일 이벤트 없음',
      image: '/images/weekday/saturday.png',
      summary: '토요일은 별도 고정 요일 이벤트 안내가 없습니다.',
      points: [
        '진행 중인 이벤트 / 레이드 일정 중심으로 확인해 주세요.'
      ],
      note: '단, 글로벌 Pokémon GO Fest / Pokémon GO 와일드 에리어 / Pokémon GO Tour 주간에는 데일리 디스커버리가 진행되지 않을 수 있습니다.'
    }
  };

  function getKoreaNow(){
    const now = new Date();
    const koreaString = now.toLocaleString('en-US', { timeZone: 'Asia/Seoul' });
    return new Date(koreaString);
  }

  function getKoreaToday(){
    const koreaNow = getKoreaNow();
    koreaNow.setHours(0, 0, 0, 0);
    return koreaNow;
  }

  function pad(n){
    return String(n).padStart(2, '0');
  }

  function toDate(str){
    if(!str) return null;
    const [y,m,d] = str.split('-').map(Number);
    return new Date(y, m - 1, d, 0, 0, 0, 0);
  }

  function toKey(date){
    return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}`;
  }

  function getDayKor(day){
    return ['일','월','화','수','목','금','토'][day];
  }

  function formatKoreanDate(date){
    return `${date.getFullYear()}년 ${date.getMonth()+1}월 ${date.getDate()}일 ${getDayKor(date.getDay())}요일`;
  }

  function formatRange(start, end){
    return `${start.getFullYear()}.${pad(start.getMonth()+1)}.${pad(start.getDate())} - ${end.getFullYear()}.${pad(end.getMonth()+1)}.${pad(end.getDate())}`;
  }

  function inRange(date, startStr, endStr){
    const start = toDate(startStr);
    const end = toDate(endStr);
    if(!start || !end) return false;
    const t = toDate(toKey(date)).getTime();
    return t >= start.getTime() && t <= end.getTime();
  }

  function loadRecords(){
    try{
      const saved = localStorage.getItem(STORAGE_KEY);
      const parsed = saved ? JSON.parse(saved) : [];
      return Array.isArray(parsed) ? parsed : [];
    }catch(e){
      return [];
    }
  }

  function isAllowed(item, page){
    return Array.isArray(item.showPages) && item.showPages.includes(page);
  }

  function chipClass(item){
    return item.type || (
      item.label === '5성' ? 'blue' :
      item.label === '메가' ? 'purple' :
      item.label === '그림자' ? 'pink' :
      item.label === '3성' ? 'yellow' :
      item.label === '1성' ? 'green' :
      item.label === '레이드 아워' || item.label === '레이드 데이' ? 'yellow' :
      item.label === '이벤트' || item.label === '커뮤니티 데이' ? 'green' : 'gray'
    );
  }

  function typeClass(item){
    const map = {
      '1성':0,
      '3성':1,
      '5성':2,
      '메가':3,
      '그림자':4,
      '레이드 아워':5,
      '레이드 데이':6,
      '이벤트':7,
      '커뮤니티 데이':8
    };
    return map[item.label] ?? 99;
  }

  function sortItems(items){
    return items.sort((a,b) => {
      const diff = typeClass(a) - typeClass(b);
      if(diff !== 0) return diff;
      return (a.name || '').localeCompare(b.name || '', 'ko');
    });
  }

  function getIndexItemsForDate(records, date){
    return sortItems(
      records.filter(item =>
        isAllowed(item, 'index') &&
        item.startDate &&
        item.endDate &&
        inRange(date, item.startDate, item.endDate)
      )
    );
  }

  function getRaidNowItems(records, today){
    return sortItems(
      records.filter(item =>
        (isAllowed(item, 'index') || isAllowed(item, 'raid-now')) &&
        ['1성','3성','5성','메가','그림자'].includes(item.label) &&
        item.startDate &&
        item.endDate &&
        inRange(today, item.startDate, item.endDate)
      )
    );
  }

  function renderTop(today){
    document.getElementById('topbarSub').textContent = formatKoreanDate(today);
    document.getElementById('monthBadge').textContent = `${today.getMonth()+1}월`;
  }

  function renderWeekdayTabs(selectedDay){
    const wrap = document.getElementById('weekdayTabs');
    const names = ['일','월','화','수','목','금','토'];

    wrap.innerHTML = names.map((name, idx) => `
      <button class="weekday-tab ${idx === selectedDay ? 'active' : ''}" data-day="${idx}">
        ${name}요일
      </button>
    `).join('');

    wrap.querySelectorAll('.weekday-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        const day = Number(btn.dataset.day);
        renderWeekdayCard(day);
      });
    });
  }

  function renderWeekdayCard(dayIndex){
    const data = WEEKDAY_EVENTS[dayIndex] || WEEKDAY_EVENTS[6];

    document.getElementById('weekdayDayBadge').textContent = data.day;
    document.getElementById('weekdayTitle').textContent = data.title;
    document.getElementById('weekdaySummary').textContent = data.summary;
    document.getElementById('weekdaySub').textContent = `${data.day} 기준 반복 보너스 안내`;
    document.getElementById('weekdayMiniLabel').textContent = data.day;
    document.getElementById('weekdayImage').src = data.image || '';
    document.getElementById('weekdayImage').alt = data.title || '요일 이벤트 이미지';

    const pointsWrap = document.getElementById('weekdayPoints');
    pointsWrap.innerHTML = (data.points || []).map(text => `
      <div class="weekday-point">${text}</div>
    `).join('');

    const noteEl = document.getElementById('weekdayNote');
    if(data.note){
      noteEl.style.display = 'block';
      noteEl.textContent = data.note;
    }else{
      noteEl.style.display = 'none';
      noteEl.textContent = '';
    }

    renderWeekdayTabs(dayIndex);
  }

  function renderNowSection(records, today){
    const wrap = document.getElementById('nowGrid');
    const items = getRaidNowItems(records, today);

    if(!items.length){
      wrap.innerHTML = `<div class="empty-box">현재 진행 중인 레이드가 없습니다.</div>`;
      return;
    }

    wrap.innerHTML = items.slice(0,3).map(item => `
      <a href="./raid-now.html" class="now-card">
        <span class="now-chip chip ${chipClass(item)}">${item.label || '-'}</span>
        <div class="now-main">
          <div class="now-thumb">
            ${
              item.image
                ? `<img src="${item.image}" alt="${item.name || ''}">`
                : `<span style="font-size:24px;">🖼️</span>`
            }
          </div>
          <div>
            <div class="now-name">${item.name || '-'}</div>
            <div class="now-meta">${item.cp || '-'}<br>${(item.startDate || '').replaceAll('-', '.')} - ${(item.endDate || '').replaceAll('-', '.')}</div>
          </div>
        </div>
      </a>
    `).join('');
  }

  function renderWeekSection(records, today){
    const wrap = document.getElementById('weekPreview');
    const end = new Date(today);
    end.setDate(today.getDate() + 6);
    document.getElementById('weekSectionSub').textContent = formatRange(today, end);

    const days = [];
    for(let i=0; i<7; i++){
      const d = new Date(today);
      d.setDate(today.getDate() + i);
      days.push(d);
    }

    wrap.innerHTML = days.map(date => {
      const items = getIndexItemsForDate(records, date);
      const dayClass = date.getDay() === 0 ? 'sun' : date.getDay() === 6 ? 'sat' : '';
      const isToday = toKey(date) === toKey(today);

      return `
        <div class="week-day">
          <div class="week-top">
            <div>
              <div class="week-date ${dayClass}">${date.getDate()}</div>
              <div class="week-dayname">${getDayKor(date.getDay())}</div>
            </div>
            ${isToday ? `<div class="today-pill">TODAY</div>` : ``}
          </div>

          <div class="week-items">
            ${
              items.length
                ? items.slice(0,3).map(item => `
                  <div class="week-pill ${chipClass(item)}">
                    ${
                      item.image
                        ? `<img src="${item.image}" alt="${item.name || ''}">`
                        : `<span style="width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;">•</span>`
                    }
                    <span>${['1성','3성','5성','메가','그림자'].includes(item.label) ? item.name : item.label}</span>
                  </div>
                `).join('')
                : `<div class="empty-box">일정 없음</div>`
            }
          </div>
        </div>
      `;
    }).join('');
  }

  function renderMonthSection(records, today){
    const wrap = document.getElementById('miniCalendar');
    const year = today.getFullYear();
    const month = today.getMonth() + 1;
    document.getElementById('monthSectionSub').textContent = `${year}년 ${month}월`;

    const lastDate = new Date(year, month, 0).getDate();
    const previewEnd = Math.min(lastDate, 7);
    const previewDates = [];

    for(let day=1; day<=previewEnd; day++){
      previewDates.push(new Date(year, month - 1, day));
    }

    wrap.innerHTML = previewDates.map(date => {
      const items = getIndexItemsForDate(records, date);

      return `
        <a href="./detail.html?date=${toKey(date)}" class="month-day">
          <div class="month-num">${date.getDate()}</div>
          <div class="month-items">
            ${
              items.length
                ? items.slice(0,2).map(item => `
                  <div class="month-pill ${chipClass(item)}">
                    ${
                      item.image
                        ? `<img src="${item.image}" alt="${item.name || ''}">`
                        : `<span style="width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;">•</span>`
                    }
                    <span>${['1성','3성','5성','메가','그림자'].includes(item.label) ? item.name : item.label}</span>
                  </div>
                `).join('')
                : `<div class="empty-box">없음</div>`
            }
          </div>
          ${
            items[0] && items[0].image
              ? `<div class="month-avatar"><img src="${items[0].image}" alt="${items[0].name || ''}"></div>`
              : ``
          }
        </a>
      `;
    }).join('');
  }

  function init(){
    const records = loadRecords();
    const today = getKoreaToday();

    renderTop(today);
    renderWeekdayCard(today.getDay());
    renderNowSection(records, today);
    renderWeekSection(records, today);
    renderMonthSection(records, today);
  }

  init();
</script>
