<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pokémon GO Raid Planner</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#edf3fb;
    color:#1f2f46;
  }

  :root{
    --bg:#edf3fb;
    --card:#ffffff;
    --line:#d8e3f2;
    --text:#1f2f46;
    --muted:#7486a3;

    --blue:#3567d7;
    --blue-soft:#e7f0ff;

    --purple:#7c58e9;
    --purple-soft:#efe7ff;

    --pink:#d85b85;
    --pink-soft:#ffe8f0;

    --yellow:#b88818;
    --yellow-soft:#fff1c9;

    --green:#49a66b;
    --green-soft:#e7f5eb;

    --gray:#67768f;
    --gray-soft:#f2f5fa;

    --shadow:0 14px 32px rgba(43,67,110,.08);
  }

  .wrap{
    max-width:1180px;
    margin:0 auto;
    padding:16px 14px 110px;
  }

  .topbar{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:12px;
    margin-bottom:16px;
  }

  .topbar-title{
    font-size:32px;
    font-weight:900;
    letter-spacing:-.04em;
    line-height:1.05;
  }

  .topbar-sub{
    margin-top:8px;
    color:var(--muted);
    font-size:14px;
    font-weight:800;
  }

  .topbar-date{
    flex-shrink:0;
    min-height:52px;
    padding:0 16px;
    border-radius:18px;
    background:rgba(255,255,255,.88);
    border:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:13px;
    font-weight:900;
    color:#617899;
    box-shadow:var(--shadow);
  }

  .summary-grid{
    display:grid;
    grid-template-columns:repeat(3,minmax(0,1fr));
    gap:12px;
    margin-bottom:16px;
  }

  .summary-card{
    background:rgba(255,255,255,.9);
    border:1px solid var(--line);
    border-radius:22px;
    padding:18px;
    box-shadow:var(--shadow);
    text-decoration:none;
    color:inherit;
  }

  .summary-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }

  .summary-label{
    font-size:13px;
    color:#7587a5;
    font-weight:900;
  }

  .summary-icon{
    width:40px;
    height:40px;
    border-radius:14px;
    background:#f3f7ff;
    border:1px solid #dce6f4;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
  }

  .summary-value{
    margin-top:12px;
    font-size:30px;
    font-weight:900;
    letter-spacing:-.04em;
    line-height:1;
  }

  .summary-desc{
    margin-top:10px;
    font-size:13px;
    color:var(--muted);
    font-weight:800;
    line-height:1.4;
  }

  .section{
    background:rgba(255,255,255,.88);
    border:1px solid var(--line);
    border-radius:26px;
    box-shadow:var(--shadow);
    overflow:hidden;
    margin-bottom:16px;
  }

  .section-head{
    padding:18px 18px 14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    border-bottom:1px solid #e6eef8;
  }

  .section-title{
    font-size:20px;
    font-weight:900;
    letter-spacing:-.03em;
  }

  .section-sub{
    margin-top:6px;
    font-size:13px;
    color:var(--muted);
    font-weight:800;
  }

  .head-link{
    min-height:38px;
    padding:0 14px;
    border-radius:999px;
    background:#f3f7ff;
    border:1px solid var(--line);
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:900;
    color:#5c7395;
    text-decoration:none;
    white-space:nowrap;
  }

  .section-body{
    padding:14px;
  }

  .now-row{
    display:grid;
    grid-template-columns:repeat(3,minmax(0,1fr));
    gap:12px;
  }

  .now-card{
    background:linear-gradient(180deg,#fff 0%, #f9fbff 100%);
    border:1.5px solid var(--line);
    border-radius:22px;
    padding:14px;
    min-height:144px;
    text-decoration:none;
    color:inherit;
  }

  .now-chip{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:28px;
    padding:0 10px;
    border-radius:999px;
    font-size:11px;
    font-weight:900;
    line-height:1;
  }

  .chip.blue{background:var(--blue-soft);color:var(--blue)}
  .chip.purple{background:var(--purple-soft);color:var(--purple)}
  .chip.pink{background:var(--pink-soft);color:var(--pink)}
  .chip.yellow{background:var(--yellow-soft);color:var(--yellow)}
  .chip.green{background:var(--green-soft);color:var(--green)}
  .chip.gray{background:var(--gray-soft);color:var(--gray)}

  .now-main{
    display:grid;
    grid-template-columns:64px 1fr;
    gap:12px;
    align-items:center;
    margin-top:12px;
  }

  .now-thumb{
    width:64px;
    height:64px;
    border-radius:18px;
    background:#f3f7ff;
    border:1px solid #dce6f5;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }

  .now-thumb img{
    width:50px;
    height:50px;
    object-fit:contain;
  }

  .now-name{
    font-size:18px;
    font-weight:900;
    line-height:1.12;
    letter-spacing:-.03em;
  }

  .now-meta{
    margin-top:6px;
    font-size:12px;
    color:#7b8ca8;
    font-weight:800;
    line-height:1.35;
  }

  .week-grid{
    display:grid;
    grid-template-columns:repeat(7,minmax(0,1fr));
    gap:10px;
  }

  .week-day{
    min-height:136px;
    background:linear-gradient(180deg,#fff 0%, #f9fbff 100%);
    border:1.5px solid var(--line);
    border-radius:20px;
    padding:12px;
  }

  .week-day.today{
    border-color:#abc3ff;
    background:linear-gradient(180deg,#ffffff 0%, #f4f8ff 100%);
  }

  .week-top{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:8px;
    margin-bottom:10px;
  }

  .week-date{
    font-size:20px;
    font-weight:900;
    letter-spacing:-.03em;
  }

  .week-date.sun{color:#ef6b7a}
  .week-date.sat{color:#4b7cf0}

  .week-dayname{
    margin-top:2px;
    font-size:12px;
    color:#8090aa;
    font-weight:800;
  }

  .today-pill{
    min-height:24px;
    padding:0 8px;
    border-radius:999px;
    background:#e9f1ff;
    color:#4e7deb;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:10px;
    font-weight:900;
    white-space:nowrap;
  }

  .week-items{
    display:flex;
    flex-direction:column;
    gap:6px;
  }

  .week-pill{
    display:flex;
    align-items:center;
    gap:6px;
    min-height:30px;
    padding:6px 8px;
    border-radius:12px;
    font-size:11px;
    font-weight:900;
    line-height:1.2;
    white-space:normal;
    word-break:keep-all;
  }

  .week-pill.blue{background:var(--blue-soft);color:var(--blue)}
  .week-pill.purple{background:var(--purple-soft);color:var(--purple)}
  .week-pill.pink{background:var(--pink-soft);color:var(--pink)}
  .week-pill.yellow{background:var(--yellow-soft);color:var(--yellow)}
  .week-pill.green{background:var(--green-soft);color:var(--green)}
  .week-pill.gray{background:var(--gray-soft);color:var(--gray)}

  .week-pill img{
    width:14px;
    height:14px;
    object-fit:contain;
    flex-shrink:0;
  }

  .month-grid{
    display:grid;
    grid-template-columns:repeat(7,minmax(0,1fr));
    gap:10px;
  }

  .month-day{
    min-height:126px;
    background:linear-gradient(180deg,#fff 0%, #f9fbff 100%);
    border:1.5px solid var(--line);
    border-radius:18px;
    padding:12px;
    text-decoration:none;
    color:inherit;
    position:relative;
    overflow:hidden;
  }

  .month-num{
    font-size:17px;
    font-weight:900;
    margin-bottom:8px;
  }

  .month-items{
    display:flex;
    flex-direction:column;
    gap:6px;
    padding-right:24px;
  }

  .month-pill{
    display:flex;
    align-items:center;
    gap:6px;
    min-height:28px;
    padding:6px 8px;
    border-radius:11px;
    font-size:10px;
    font-weight:900;
    line-height:1.2;
    white-space:normal;
    word-break:keep-all;
  }

  .month-pill.blue{background:var(--blue-soft);color:var(--blue)}
  .month-pill.purple{background:var(--purple-soft);color:var(--purple)}
  .month-pill.pink{background:var(--pink-soft);color:var(--pink)}
  .month-pill.yellow{background:var(--yellow-soft);color:var(--yellow)}
  .month-pill.green{background:var(--green-soft);color:var(--green)}
  .month-pill.gray{background:var(--gray-soft);color:var(--gray)}

  .month-pill img{
    width:14px;
    height:14px;
    object-fit:contain;
    flex-shrink:0;
  }

  .month-avatar{
    position:absolute;
    right:8px;
    bottom:8px;
    width:30px;
    height:30px;
    border-radius:10px;
    background:#f3f7ff;
    border:1px solid #dce6f4;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }

  .month-avatar img{
    width:22px;
    height:22px;
    object-fit:contain;
  }

  .empty-box{
    border:1px dashed #d9e4f2;
    background:#fbfdff;
    border-radius:14px;
    padding:14px 10px;
    text-align:center;
    color:#97a5ba;
    font-size:12px;
    font-weight:800;
  }

  .bottom-nav{
    position:fixed;
    left:50%;
    bottom:14px;
    transform:translateX(-50%);
    width:min(980px, calc(100% - 24px));
    background:rgba(255,255,255,.94);
    border:1px solid var(--line);
    border-radius:24px;
    box-shadow:0 18px 36px rgba(42,59,97,.12);
    backdrop-filter:blur(10px);
    padding:10px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    z-index:30;
  }

  .nav-item{
    min-height:64px;
    border-radius:16px;
    text-decoration:none;
    color:#6f819e;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:6px;
    font-size:12px;
    font-weight:900;
    transition:.18s ease;
    background:#f8fbff;
    border:1px solid transparent;
  }

  .nav-item.active{
    background:#edf4ff;
    color:#3567d7;
    border-color:#cdddf5;
  }

  .nav-icon{
    font-size:18px;
    line-height:1;
  }

  @media (max-width:1100px){
    .summary-grid,
    .now-row{
      grid-template-columns:1fr;
    }

    .week-grid,
    .month-grid{
      min-width:980px;
    }

    .section-body{
      overflow-x:auto;
    }
  }

  @media (max-width:768px){
    .wrap{
      padding:14px 12px 120px;
    }

    .topbar{
      flex-direction:column;
      align-items:flex-start;
    }

    .topbar-title{
      font-size:28px;
    }

    .section-head{
      padding:16px 16px 12px;
      flex-direction:column;
      align-items:flex-start;
    }

    .section-body{
      padding:12px;
    }

    .now-main{
      grid-template-columns:56px 1fr;
    }

    .now-thumb{
      width:56px;
      height:56px;
    }

    .now-thumb img{
      width:44px;
      height:44px;
    }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div>
      <div class="topbar-title">레이드 일정</div>
      <div class="topbar-sub" id="topbarSub">한국 시간 기준 로딩 중...</div>
    </div>
    <div class="topbar-date" id="monthBadge">3월</div>
  </div>

  <section class="summary-grid">
    <a class="summary-card" href="./raid-now.html">
      <div class="summary-top">
        <div class="summary-label">현재 진행 중</div>
        <div class="summary-icon">⚔️</div>
      </div>
      <div class="summary-value" id="liveCount">0</div>
      <div class="summary-desc">지금 진행 중인 보스</div>
    </a>

    <a class="summary-card" href="./weekly.html">
      <div class="summary-top">
        <div class="summary-label">주간 일정</div>
        <div class="summary-icon">🗓️</div>
      </div>
      <div class="summary-value" id="weekCount">0</div>
      <div class="summary-desc">7일 안의 일정 수</div>
    </a>

    <a class="summary-card" href="./monthly.html">
      <div class="summary-top">
        <div class="summary-label">이번 달</div>
        <div class="summary-icon">📆</div>
      </div>
      <div class="summary-value" id="monthCount">0</div>
      <div class="summary-desc">이번 달 표시 일정 수</div>
    </a>
  </section>

  <section class="section">
    <div class="section-head">
      <div>
        <div class="section-title">지금 레이드</div>
        <div class="section-sub">현재 진행 중인 보스만 간단히 표시</div>
      </div>
      <a class="head-link" href="./raid-now.html">전체 보기</a>
    </div>
    <div class="section-body">
      <div class="now-row" id="nowGrid"></div>
    </div>
  </section>

  <section class="section">
    <div class="section-head">
      <div>
        <div class="section-title">주간 일정</div>
        <div class="section-sub" id="weekSectionSub">오늘부터 7일</div>
      </div>
      <a class="head-link" href="./weekly.html">전체 보기</a>
    </div>
    <div class="section-body">
      <div class="week-grid" id="weekPreview"></div>
    </div>
  </section>

  <section class="section">
    <div class="section-head">
      <div>
        <div class="section-title">월간 일정</div>
        <div class="section-sub" id="monthSectionSub">이번 달 미리보기</div>
      </div>
      <a class="head-link" href="./monthly.html">전체 보기</a>
    </div>
    <div class="section-body">
      <div class="month-grid" id="miniCalendar"></div>
    </div>
  </section>

</div>

<nav class="bottom-nav">
  <a href="./index.html" class="nav-item active">
    <div class="nav-icon">🏠</div>
    <div>메인</div>
  </a>
  <a href="./raid-now.html" class="nav-item">
    <div class="nav-icon">⚔️</div>
    <div>지금 레이드</div>
  </a>
  <a href="./weekly.html" class="nav-item">
    <div class="nav-icon">🗓️</div>
    <div>주간 일정표</div>
  </a>
  <a href="./monthly.html" class="nav-item">
    <div class="nav-icon">📆</div>
    <div>월간 일정</div>
  </a>
</nav>

<script>
  const STORAGE_KEY = 'pogoRaidAdminData';

  function getKoreaNow(){
    const now = new Date();
    const koreaString = now.toLocaleString('en-US', { timeZone: 'Asia/Seoul' });
    return new Date(koreaString);
  }

  function getKoreaToday(){
    const koreaNow = getKoreaNow();
    koreaNow.setHours(0, 0, 0, 0);
    return koreaNow;
  }

  function pad(n){
    return String(n).padStart(2, '0');
  }

  function toDate(str){
    if(!str) return null;
    const [y,m,d] = str.split('-').map(Number);
    return new Date(y, m - 1, d, 0, 0, 0, 0);
  }

  function toKey(date){
    return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}`;
  }

  function getDayKor(day){
    return ['일','월','화','수','목','금','토'][day];
  }

  function formatKoreanDate(date){
    return `${date.getFullYear()}년 ${date.getMonth()+1}월 ${date.getDate()}일 ${getDayKor(date.getDay())}요일`;
  }

  function formatRange(start, end){
    return `${start.getFullYear()}.${pad(start.getMonth()+1)}.${pad(start.getDate())} - ${end.getFullYear()}.${pad(end.getMonth()+1)}.${pad(end.getDate())}`;
  }

  function inRange(date, startStr, endStr){
    const start = toDate(startStr);
    const end = toDate(endStr);
    if(!start || !end) return false;
    const t = toDate(toKey(date)).getTime();
    return t >= start.getTime() && t <= end.getTime();
  }

  function loadRecords(){
    try{
      const saved = localStorage.getItem(STORAGE_KEY);
      const parsed = saved ? JSON.parse(saved) : [];
      return Array.isArray(parsed) ? parsed : [];
    }catch(e){
      return [];
    }
  }

  function isAllowed(item, page){
    return Array.isArray(item.showPages) && item.showPages.includes(page);
  }

  function chipClass(item){
    return item.type || (
      item.label === '5성' ? 'blue' :
      item.label === '메가' ? 'purple' :
      item.label === '그림자' ? 'pink' :
      item.label === '3성' ? 'yellow' :
      item.label === '1성' ? 'green' :
      item.label === '레이드 아워' || item.label === '레이드 데이' ? 'yellow' :
      item.label === '이벤트' || item.label === '커뮤니티 데이' ? 'green' : 'gray'
    );
  }

  function typeClass(item){
    const map = {
      '1성':0,
      '3성':1,
      '5성':2,
      '메가':3,
      '그림자':4,
      '레이드 아워':5,
      '레이드 데이':6,
      '이벤트':7,
      '커뮤니티 데이':8
    };
    return map[item.label] ?? 99;
  }

  function sortItems(items){
    return items.sort((a,b) => {
      const diff = typeClass(a) - typeClass(b);
      if(diff !== 0) return diff;
      return (a.name || '').localeCompare(b.name || '', 'ko');
    });
  }

  function getIndexItemsForDate(records, date){
    return sortItems(
      records.filter(item =>
        isAllowed(item, 'index') &&
        item.startDate &&
        item.endDate &&
        inRange(date, item.startDate, item.endDate)
      )
    );
  }

  function getRaidNowItems(records, today){
    return sortItems(
      records.filter(item =>
        (isAllowed(item, 'index') || isAllowed(item, 'raid-now')) &&
        ['1성','3성','5성','메가','그림자'].includes(item.label) &&
        item.startDate &&
        item.endDate &&
        inRange(today, item.startDate, item.endDate)
      )
    );
  }

  function countWeekItems(records, today){
    let count = 0;
    for(let i=0; i<7; i++){
      const d = new Date(today);
      d.setDate(today.getDate() + i);
      count += getIndexItemsForDate(records, d).length;
    }
    return count;
  }

  function countMonthItems(records, year, month){
    const last = new Date(year, month, 0).getDate();
    let count = 0;
    for(let day=1; day<=last; day++){
      const d = new Date(year, month - 1, day);
      count += getIndexItemsForDate(records, d).length;
    }
    return count;
  }

  function renderTop(records, today){
    document.getElementById('topbarSub').textContent = formatKoreanDate(today);
    document.getElementById('monthBadge').textContent = `${today.getMonth()+1}월`;

    const liveItems = getRaidNowItems(records, today);
    document.getElementById('liveCount').textContent = liveItems.length;
    document.getElementById('weekCount').textContent = countWeekItems(records, today);
    document.getElementById('monthCount').textContent = countMonthItems(records, today.getFullYear(), today.getMonth()+1);
  }

  function renderNowSection(records, today){
    const wrap = document.getElementById('nowGrid');
    const items = getRaidNowItems(records, today);

    if(!items.length){
      wrap.innerHTML = `<div class="empty-box">현재 진행 중인 레이드가 없습니다.</div>`;
      return;
    }

    wrap.innerHTML = items.slice(0,3).map(item => `
      <a href="./raid-now.html" class="now-card">
        <span class="now-chip chip ${chipClass(item)}">${item.label || '-'}</span>
        <div class="now-main">
          <div class="now-thumb">
            ${
              item.image
                ? `<img src="${item.image}" alt="${item.name || ''}">`
                : `<span style="font-size:24px;">🖼️</span>`
            }
          </div>
          <div>
            <div class="now-name">${item.name || '-'}</div>
            <div class="now-meta">${item.cp || '-'}<br>${(item.startDate || '').replaceAll('-', '.')} - ${(item.endDate || '').replaceAll('-', '.')}</div>
          </div>
        </div>
      </a>
    `).join('');
  }

  function renderWeekSection(records, today){
    const wrap = document.getElementById('weekPreview');
    const end = new Date(today);
    end.setDate(today.getDate() + 6);
    document.getElementById('weekSectionSub').textContent = formatRange(today, end);

    const days = [];
    for(let i=0; i<7; i++){
      const d = new Date(today);
      d.setDate(today.getDate() + i);
      days.push(d);
    }

    wrap.innerHTML = days.map(date => {
      const items = getIndexItemsForDate(records, date);
      const dayClass = date.getDay() === 0 ? 'sun' : date.getDay() === 6 ? 'sat' : '';
      const isToday = toKey(date) === toKey(today);

      return `
        <div class="week-day ${isToday ? 'today' : ''}">
          <div class="week-top">
            <div>
              <div class="week-date ${dayClass}">${date.getDate()}</div>
              <div class="week-dayname">${getDayKor(date.getDay())}</div>
            </div>
            ${isToday ? `<div class="today-pill">TODAY</div>` : ``}
          </div>

          <div class="week-items">
            ${
              items.length
                ? items.slice(0,3).map(item => `
                  <div class="week-pill ${chipClass(item)}">
                    ${
                      item.image
                        ? `<img src="${item.image}" alt="${item.name || ''}">`
                        : `<span style="width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;">•</span>`
                    }
                    <span>${['1성','3성','5성','메가','그림자'].includes(item.label) ? item.name : item.label}</span>
                  </div>
                `).join('')
                : `<div class="empty-box">일정 없음</div>`
            }
          </div>
        </div>
      `;
    }).join('');
  }

  function renderMonthSection(records, today){
    const wrap = document.getElementById('miniCalendar');
    const year = today.getFullYear();
    const month = today.getMonth() + 1;
    document.getElementById('monthSectionSub').textContent = `${year}년 ${month}월`;

    const lastDate = new Date(year, month, 0).getDate();
    const previewEnd = Math.min(lastDate, 7);
    const previewDates = [];

    for(let day=1; day<=previewEnd; day++){
      previewDates.push(new Date(year, month - 1, day));
    }

    wrap.innerHTML = previewDates.map(date => {
      const items = getIndexItemsForDate(records, date);

      return `
        <a href="./detail.html?date=${toKey(date)}" class="month-day">
          <div class="month-num">${date.getDate()}</div>
          <div class="month-items">
            ${
              items.length
                ? items.slice(0,2).map(item => `
                  <div class="month-pill ${chipClass(item)}">
                    ${
                      item.image
                        ? `<img src="${item.image}" alt="${item.name || ''}">`
                        : `<span style="width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;">•</span>`
                    }
                    <span>${['1성','3성','5성','메가','그림자'].includes(item.label) ? item.name : item.label}</span>
                  </div>
                `).join('')
                : `<div class="empty-box">없음</div>`
            }
          </div>
          ${
            items[0] && items[0].image
              ? `<div class="month-avatar"><img src="${items[0].image}" alt="${items[0].name || ''}"></div>`
              : ``
          }
        </a>
      `;
    }).join('');
  }

  function init(){
    const records = loadRecords();
    const today = getKoreaToday();

    renderTop(records, today);
    renderNowSection(records, today);
    renderWeekSection(records, today);
    renderMonthSection(records, today);
  }

  init();
</script>
</body>
</html>
