<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>현재 진행 중인 레이드</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#edf3fb;
    color:#1f2f46;
  }

  :root{
    --bg:#edf3fb;
    --card:#ffffff;
    --card-soft:#f8fbff;
    --line:#d8e3f2;
    --text:#1f2f46;
    --muted:#7486a3;

    --blue:#3567d7;
    --blue-soft:#e7f0ff;

    --purple:#7c58e9;
    --purple-soft:#efe7ff;

    --pink:#d85b85;
    --pink-soft:#ffe8f0;

    --yellow:#b88818;
    --yellow-soft:#fff1c9;

    --green:#49a66b;
    --green-soft:#e7f5eb;

    --gray:#67768f;
    --gray-soft:#f2f5fa;

    --shadow:0 18px 40px rgba(43,67,110,.08);
    --ease:cubic-bezier(.22,.61,.36,1);
  }

  .wrap{
    max-width:1320px;
    margin:0 auto;
    padding:20px 16px 110px;
  }

  .section{
    background:rgba(255,255,255,.82);
    border:1px solid var(--line);
    border-radius:30px;
    overflow:hidden;
    box-shadow:var(--shadow);
    margin-bottom:18px;
    animation:sectionFade .75s var(--ease) both;
  }

  .section-head{
    padding:24px 26px 18px;
    border-bottom:1px solid #e4edf8;
    background:
      linear-gradient(180deg,#fbfdff 0%, #f6faff 100%);
    position:relative;
  }

  .section-head::after{
    content:'';
    position:absolute;
    inset:auto 24px 0 auto;
    width:140px;
    height:140px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(112,161,255,.12) 0%, rgba(112,161,255,0) 70%);
    pointer-events:none;
  }

  .section-title{
    font-size:26px;
    font-weight:900;
    letter-spacing:-.03em;
  }

  .section-sub{
    margin-top:8px;
    font-size:14px;
    color:var(--muted);
    font-weight:700;
    line-height:1.5;
  }

  .section-body{
    padding:18px;
  }

  .group-wrap{
    display:flex;
    flex-direction:column;
    gap:24px;
  }

  .raid-group{
    display:flex;
    flex-direction:column;
    gap:14px;
    opacity:0;
    transform:translateY(18px);
    animation:fadeUp .65s var(--ease) forwards;
    animation-delay:calc(var(--group-index, 0) * .08s);
  }

  .group-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:0 4px;
  }

  .group-title{
    font-size:20px;
    font-weight:900;
    letter-spacing:-.03em;
    display:flex;
    align-items:center;
    gap:10px;
  }

  .group-count{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:30px;
    padding:0 12px;
    border-radius:999px;
    font-size:12px;
    font-weight:900;
    background:#f3f7ff;
    border:1px solid #dce6f4;
    color:#617799;
    transition:transform .18s ease, box-shadow .18s ease;
  }

  .raid-group:hover .group-count{
    transform:translateY(-1px);
    box-shadow:0 6px 14px rgba(53,103,215,.08);
  }

  .raid-grid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:16px;
  }

  .raid-card{
    background:linear-gradient(180deg,#ffffff 0%, #f8fbff 100%);
    border:1.5px solid var(--line);
    border-radius:26px;
    overflow:hidden;
    box-shadow:0 10px 28px rgba(52,74,119,.05);
    opacity:0;
    transform:translateY(22px) scale(.985);
    animation:cardIn .62s var(--ease) forwards;
    animation-delay:calc(var(--card-index, 0) * .055s);
    transition:
      transform .22s ease,
      box-shadow .22s ease,
      border-color .22s ease;
    position:relative;
    will-change:transform;
  }

  .raid-card::after{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(135deg, rgba(255,255,255,.24), rgba(255,255,255,0) 48%);
    pointer-events:none;
  }

  .raid-card:hover{
    transform:translateY(-4px);
    box-shadow:0 18px 34px rgba(52,74,119,.11);
    border-color:#cbdcf0;
  }

  .raid-card-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    padding:18px 18px 16px;
    border-bottom:1px solid #e5edf8;
    background:#fbfdff;
  }

  .chip{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:34px;
    padding:0 14px;
    border-radius:999px;
    font-size:12px;
    font-weight:900;
    line-height:1;
    white-space:nowrap;
    transition:transform .2s ease, box-shadow .2s ease;
  }

  .raid-card:hover .chip{
    transform:translateY(-1px);
    box-shadow:0 8px 18px rgba(56,92,150,.08);
  }

  .chip.blue{background:var(--blue-soft);color:var(--blue)}
  .chip.purple{background:var(--purple-soft);color:var(--purple)}
  .chip.pink{background:var(--pink-soft);color:var(--pink)}
  .chip.yellow{background:var(--yellow-soft);color:var(--yellow)}
  .chip.green{background:var(--green-soft);color:var(--green)}
  .chip.gray{background:var(--gray-soft);color:var(--gray)}

  .raid-date{
    font-size:13px;
    font-weight:900;
    color:#667a98;
    white-space:nowrap;
  }

  .raid-card-body{
    padding:18px;
  }

  .raid-name{
    font-size:24px;
    font-weight:900;
    line-height:1.12;
    letter-spacing:-.03em;
  }

  .raid-desc{
    margin-top:8px;
    font-size:14px;
    color:#7b8ca8;
    font-weight:700;
  }

  .raid-main{
    margin-top:16px;
    display:grid;
    grid-template-columns:108px 1fr;
    gap:16px;
    align-items:start;
  }

  .raid-thumb{
    width:108px;
    height:108px;
    border-radius:26px;
    background:#f3f7ff;
    border:1px solid #dce6f5;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    position:relative;
    transition:transform .22s ease, box-shadow .22s ease;
  }

  .raid-thumb::before{
    content:'';
    position:absolute;
    width:64px;
    height:64px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(114,145,255,.16) 0%, rgba(114,145,255,0) 72%);
    opacity:.9;
    pointer-events:none;
  }

  .raid-card:hover .raid-thumb{
    transform:translateY(-3px);
    box-shadow:0 14px 26px rgba(70,97,155,.08);
  }

  .raid-thumb img{
    width:86px;
    height:86px;
    object-fit:contain;
    position:relative;
    z-index:1;
    animation:floatY 3.2s ease-in-out infinite;
    transform-origin:center;
  }

  .stat-grid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:10px;
    margin-top:12px;
  }

  .stat-box{
    background:#f6f9ff;
    border:1px solid #dde7f5;
    border-radius:18px;
    padding:12px 14px;
    transition:transform .2s ease, border-color .2s ease, box-shadow .2s ease;
  }

  .raid-card:hover .stat-box{
    transform:translateY(-2px);
    border-color:#d1def1;
    box-shadow:0 8px 18px rgba(74,99,148,.05);
  }

  .stat-label{
    font-size:12px;
    color:#7386a3;
    font-weight:900;
  }

  .stat-value{
    margin-top:6px;
    font-size:17px;
    color:#31435d;
    font-weight:900;
    line-height:1.2;
    letter-spacing:-.02em;
  }

  .boost-list{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:6px;
  }

  .boost-pill{
    display:inline-flex;
    align-items:center;
    gap:8px;
    min-height:36px;
    padding:6px 12px 6px 6px;
    border-radius:999px;
    background:#fff;
    border:1px solid #dbe5f3;
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }

  .boost-pill:hover{
    transform:translateY(-2px);
    border-color:#cfddf0;
    box-shadow:0 10px 16px rgba(74,99,148,.06);
  }

  .boost-icon{
    width:28px;
    height:28px;
    border-radius:50%;
    background:#eef3ff;
    border:1px solid #d9e4f3;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    flex-shrink:0;
  }

  .boost-icon img{
    width:18px;
    height:18px;
    object-fit:contain;
  }

  .boost-name{
    font-size:13px;
    color:#31435d;
    font-weight:900;
    line-height:1;
  }

  .strategy-box{
    margin-top:12px;
    background:#f6f9ff;
    border:1px solid #dde7f5;
    border-radius:18px;
    padding:12px 14px;
    transition:transform .2s ease, border-color .2s ease, box-shadow .2s ease;
  }

  .raid-card:hover .strategy-box{
    transform:translateY(-2px);
    border-color:#d1def1;
    box-shadow:0 8px 18px rgba(74,99,148,.05);
  }

  .strategy-label{
    font-size:12px;
    color:#7386a3;
    font-weight:900;
  }

  .strategy-types{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:10px;
  }

  .strategy-item{
    display:inline-flex;
    align-items:center;
    gap:8px;
    min-height:36px;
    padding:6px 10px 6px 6px;
    border-radius:999px;
    background:#fff;
    border:1px solid #dbe5f3;
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }

  .strategy-item:hover{
    transform:translateY(-2px);
    border-color:#cfddf0;
    box-shadow:0 10px 16px rgba(74,99,148,.06);
  }

  .strategy-type-icon{
    width:26px;
    height:26px;
    border-radius:50%;
    background:#f3f7ff;
    border:1px solid #dce6f4;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    flex-shrink:0;
  }

  .strategy-type-icon img{
    width:16px;
    height:16px;
    object-fit:contain;
  }

  .strategy-type-name{
    font-size:13px;
    color:#31435d;
    font-weight:900;
    line-height:1;
  }

  .empty-state{
    background:#fbfdff;
    border:1px dashed #dce7f4;
    border-radius:20px;
    padding:28px 18px;
    text-align:center;
    color:#8293ad;
    font-size:14px;
    font-weight:800;
    animation:fadeUp .55s var(--ease) both;
  }

  .bottom-nav{
    position:fixed;
    left:50%;
    bottom:14px;
    transform:translateX(-50%);
    width:min(1180px, calc(100% - 24px));
    background:rgba(255,255,255,.92);
    border:1px solid var(--line);
    border-radius:26px;
    box-shadow:0 18px 36px rgba(42,59,97,.12);
    backdrop-filter:blur(10px);
    padding:10px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    z-index:30;
    animation:navUp .65s var(--ease) both;
  }

  .nav-item{
    min-height:68px;
    border-radius:18px;
    text-decoration:none;
    color:#6f819e;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:6px;
    font-size:13px;
    font-weight:900;
    transition:.18s ease;
    background:#f8fbff;
    border:1px solid transparent;
  }

  .nav-item:hover{
    background:#f3f7ff;
    color:#486995;
    border-color:#d6e3f3;
    transform:translateY(-2px);
  }

  .nav-item.active{
    background:#edf4ff;
    color:#3567d7;
    border-color:#cdddf5;
    box-shadow:0 10px 20px rgba(53,103,215,.08);
  }

  .nav-icon{
    font-size:20px;
    line-height:1;
    animation:navBob 3.2s ease-in-out infinite;
  }

  .nav-item:nth-child(2) .nav-icon{ animation-delay:.15s; }
  .nav-item:nth-child(3) .nav-icon{ animation-delay:.3s; }
  .nav-item:nth-child(4) .nav-icon{ animation-delay:.45s; }

  @keyframes sectionFade{
    from{opacity:0; transform:translateY(14px)}
    to{opacity:1; transform:translateY(0)}
  }

  @keyframes fadeUp{
    from{
      opacity:0;
      transform:translateY(18px);
    }
    to{
      opacity:1;
      transform:translateY(0);
    }
  }

  @keyframes cardIn{
    from{
      opacity:0;
      transform:translateY(22px) scale(.985);
    }
    to{
      opacity:1;
      transform:translateY(0) scale(1);
    }
  }

  @keyframes floatY{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-4px); }
  }

  @keyframes navUp{
    from{
      opacity:0;
      transform:translateX(-50%) translateY(14px);
    }
    to{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }
  }

  @keyframes navBob{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-2px); }
  }

  @media (prefers-reduced-motion: reduce){
    *,
    *::before,
    *::after{
      animation:none !important;
      transition:none !important;
      scroll-behavior:auto !important;
    }
  }

  @media (max-width:1100px){
    .raid-grid{
      grid-template-columns:1fr;
    }
  }

  @media (max-width:768px){
    .wrap{
      padding-bottom:120px;
    }

    .section-head{
      padding:22px 20px 16px;
    }

    .section-body{
      padding:16px;
    }

    .section-title{
      font-size:22px;
    }

    .group-head{
      align-items:flex-start;
      flex-direction:column;
    }

    .raid-card-top{
      flex-direction:column;
      align-items:flex-start;
    }

    .raid-main{
      grid-template-columns:1fr;
    }

    .raid-thumb{
      width:92px;
      height:92px;
    }

    .raid-thumb img{
      width:74px;
      height:74px;
    }

    .stat-grid{
      grid-template-columns:1fr;
    }
  }
 
 .raid-thumb.shadow-thumb{
  position:relative;
  overflow:hidden;
}

.raid-thumb.shadow-thumb::after{
  content:'';
  position:absolute;
  inset:-8px;
  background-image:url('./purple_vector_transparent.png');
  background-repeat:no-repeat;
  background-position:center;
  background-size:88%;
  opacity:.5;
  z-index:0;
  pointer-events:none;
  animation:shadowFlameFloat 4s ease-in-out infinite;
}

.raid-thumb.shadow-thumb img,
.raid-thumb.shadow-thumb span{
  position:relative;
  z-index:1;
}

@keyframes shadowFlameFloat{
  0%,100%{
    transform:translateY(0) scale(1);
  }
  50%{
    transform:translateY(-3px) scale(1.02);
  }
}
 
</style>
</head>
<body>
<div class="wrap">

  <section class="section">
    <div class="section-head">
      <div class="section-title">현재 진행 중 보스</div>
      <div class="section-sub" id="rangeText">한국 시간 기준으로 오늘 진행 중인 일정만 표시됩니다.</div>
    </div>

    <div class="section-body">
      <div class="group-wrap" id="raidGroupWrap"></div>
    </div>
  </section>

</div>

<nav class="bottom-nav">
  <a href="./index.html" class="nav-item">
    <div class="nav-icon">🏠</div>
    <div>메인</div>
  </a>
  <a href="./raid-now.html" class="nav-item active">
    <div class="nav-icon">⚔️</div>
    <div>지금 레이드</div>
  </a>
  <a href="./weekly.html" class="nav-item">
    <div class="nav-icon">🗓️</div>
    <div>주간 일정표</div>
  </a>
  <a href="./monthly.html" class="nav-item">
    <div class="nav-icon">📆</div>
    <div>월간 일정</div>
  </a>
</nav>

<script>
  const STORAGE_KEY = 'pogoRaidAdminData';

  function getKoreaToday(){
    const now = new Date();
    const koreaString = now.toLocaleString('en-US', { timeZone: 'Asia/Seoul' });
    const koreaNow = new Date(koreaString);
    koreaNow.setHours(0, 0, 0, 0);
    return koreaNow;
  }

  function pad(n){
    return String(n).padStart(2, '0');
  }

  function toDate(str){
    if(!str) return null;
    const [y, m, d] = str.split('-').map(Number);
    return new Date(y, m - 1, d, 0, 0, 0, 0);
  }

  function toKey(date){
    return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
  }

  function formatDateRange(startDate, endDate){
    return `${startDate.replaceAll('-', '.')} - ${endDate.replaceAll('-', '.')}`;
  }

  function toAmpm(time24){
    if(!time24) return '';
    const [hh, mm] = time24.split(':').map(Number);
    const suffix = hh >= 12 ? 'PM' : 'AM';
    const h12 = hh % 12 === 0 ? 12 : hh % 12;
    return `${String(h12).padStart(2, '0')}:${String(mm).padStart(2, '0')} ${suffix}`;
  }

  function getDisplayTime(item){
    const start = item.startTime ? toAmpm(item.startTime) : '06:00 AM';
    const end = item.endTime ? toAmpm(item.endTime) : '10:00 PM';
    return `${start} ~ ${end}`;
  }

  function inRange(date, startStr, endStr){
    const start = toDate(startStr);
    const end = toDate(endStr);
    if(!start || !end) return false;
    const t = toDate(toKey(date)).getTime();
    return t >= start.getTime() && t <= end.getTime();
  }

  function loadRecords(){
    try{
      const saved = localStorage.getItem(STORAGE_KEY);
      const parsed = saved ? JSON.parse(saved) : [];
      return Array.isArray(parsed) ? parsed : [];
    }catch(e){
      return [];
    }
  }

  function isRaidNowAllowed(item){
    return Array.isArray(item.showPages) && item.showPages.includes('raid-now');
  }

  function isRaidNowType(item){
    return ['1성', '3성', '5성', '메가', '그림자'].includes(item.label);
  }

  function getCurrentItems(records, today){
    return records
      .filter(item =>
        isRaidNowAllowed(item) &&
        isRaidNowType(item) &&
        item.startDate &&
        item.endDate &&
        inRange(today, item.startDate, item.endDate)
      );
  }

  function chipClass(item){
    return item.type || (
      item.label === '5성' ? 'blue' :
      item.label === '메가' ? 'purple' :
      item.label === '그림자' ? 'pink' :
      item.label === '3성' ? 'yellow' :
      item.label === '1성' ? 'green' : 'gray'
    );
  }

  function renderRangeText(items, today){
    const el = document.getElementById('rangeText');
    const todayKey = toKey(today);

    if(!items.length){
      el.textContent = `한국 시간 기준 ${todayKey.replaceAll('-', '.')} 현재 진행 중인 일정이 없습니다.`;
      return;
    }

    const starts = items.map(item => item.startDate).sort();
    const ends = items.map(item => item.endDate).sort();
    el.textContent = `한국 시간 기준 ${todayKey.replaceAll('-', '.')} · 현재 구간 ${starts[0].replaceAll('-', '.')} - ${ends[ends.length - 1].replaceAll('-', '.')}`;
  }

  function getGroupedItems(items){
    const groupOrder = ['1성', '3성', '5성', '메가', '그림자'];
    const grouped = {};

    groupOrder.forEach(label => grouped[label] = []);

    items.forEach(item => {
      if(grouped[item.label]){
        grouped[item.label].push(item);
      }
    });

    groupOrder.forEach(label => {
      grouped[label].sort((a, b) => (a.name || '').localeCompare(b.name || '', 'ko'));
    });

    return { groupOrder, grouped };
  }

  function renderBoosts(item){
    const boosts = Array.isArray(item.boosts) ? item.boosts : [];

    if(!boosts.length){
      return `<div class="strategy-type-name" style="color:#8a98af;">부스트 날씨 없음</div>`;
    }

    return boosts.map(boost => `
      <div class="boost-pill">
        <div class="boost-icon">
          ${
            boost.icon
              ? `<img src="${boost.icon}" alt="${boost.weather || ''}">`
              : `<span style="font-size:11px;">☁️</span>`
          }
        </div>
        <div class="boost-name">${boost.weather || '날씨'}</div>
      </div>
    `).join('');
  }

  function renderStrategies(item){
    if(!(Array.isArray(item.strategyTypes) && item.strategyTypes.length)){
      return `<div class="strategy-type-name" style="color:#8a98af;">공략 타입 없음</div>`;
    }

    return item.strategyTypes.map(type => `
      <div class="strategy-item">
        <div class="strategy-type-icon">
          ${
            type.icon
              ? `<img src="${type.icon}" alt="${type.name || ''}">`
              : `<span style="font-size:10px;">?</span>`
          }
        </div>
        <div class="strategy-type-name">${type.name || '타입'}</div>
      </div>
    `).join('');
  }

  function renderCard(item, index){
    return `
      <article class="raid-card" style="--card-index:${index};">
        <div class="raid-card-top">
          <span class="chip ${chipClass(item)}">LIVE · ${item.label}</span>
          <div class="raid-date">${formatDateRange(item.startDate, item.endDate)}</div>
        </div>

        <div class="raid-card-body">
          <div class="raid-name">${item.name || '-'}</div>
          <div class="raid-desc">${item.desc || '현재 진행 중인 일정'}</div>

          <div class="raid-main">
            <div class="raid-thumb ${item.label === '그림자' || item.bossType === 'shadow' ? 'shadow-thumb' : ''}">
              ${
                item.image
                  ? `<img src="${item.image}" alt="${item.name || ''}">`
                  : `<span style="font-size:34px;">🖼️</span>`
              }
            </div>

            <div>
              <div class="stat-grid">
                <div class="stat-box">
                  <div class="stat-label">일반 CP</div>
                  <div class="stat-value">${item.cp || '-'}</div>
                </div>

                <div class="stat-box">
                  <div class="stat-label">부스트 CP</div>
                  <div class="stat-value">${item.boostCp || '-'}</div>
                </div>
              </div>

              <div class="strategy-box">
                <div class="strategy-label">부스트 날씨</div>
                <div class="boost-list">
                  ${renderBoosts(item)}
                </div>
              </div>

              <div class="strategy-box">
                <div class="strategy-label">공략</div>
                <div class="strategy-types">
                  ${renderStrategies(item)}
                </div>
              </div>

              <div class="raid-desc" style="margin-top:12px;">${getDisplayTime(item)}</div>
              ${item.note ? `<div class="raid-desc" style="margin-top:6px;">${item.note}</div>` : ``}
            </div>
          </div>
        </div>
      </article>
    `;
  }

  function renderCards(){
    const wrap = document.getElementById('raidGroupWrap');
    const records = loadRecords();
    const today = getKoreaToday();
    const items = getCurrentItems(records, today);

    renderRangeText(items, today);

    if(!items.length){
      wrap.innerHTML = `
        <div class="empty-state">
          현재 진행 중인 레이드가 없습니다.<br>
          admin.html에서 일정 저장 후 다시 확인해 주세요.
        </div>
      `;
      return;
    }

    const { groupOrder, grouped } = getGroupedItems(items);

    let globalCardIndex = 0;

    wrap.innerHTML = groupOrder
      .filter(label => grouped[label].length)
      .map((label, groupIndex) => `
        <section class="raid-group" style="--group-index:${groupIndex};">
          <div class="group-head">
            <div class="group-title">${label} 레이드</div>
            <div class="group-count">${grouped[label].length}마리</div>
          </div>

          <div class="raid-grid">
            ${grouped[label].map(item => renderCard(item, globalCardIndex++)).join('')}
          </div>
        </section>
      `)
      .join('');
  }

  renderCards();
</script>
</body>
</html>
