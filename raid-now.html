<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pokémon GO Raid Planner | 지금 레이드</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#edf3fb;
    color:#1f2f46;
  }

  :root{
    --bg:#edf3fb;
    --card:#ffffff;
    --line:#d8e3f2;
    --text:#1f2f46;
    --muted:#7486a3;

    --blue:#3567d7;
    --blue-soft:#e7f0ff;

    --purple:#7c58e9;
    --purple-soft:#efe7ff;

    --pink:#d85b85;
    --pink-soft:#ffe8f0;

    --yellow:#b88818;
    --yellow-soft:#fff1c9;

    --green:#49a66b;
    --green-soft:#e7f5eb;

    --gray:#67768f;
    --gray-soft:#f2f5fa;

    --shadow:0 14px 32px rgba(43,67,110,.08);
    --shadow-hover:0 18px 36px rgba(43,67,110,.14);
  }

  .wrap{
    max-width:1180px;
    margin:0 auto;
    padding:16px 14px 110px;
  }

  .fade-up{
    opacity:0;
    transform:translateY(10px);
    animation:fadeUp .55s ease forwards;
  }
  .delay-1{animation-delay:.05s}
  .delay-2{animation-delay:.12s}
  .delay-3{animation-delay:.19s}

  @keyframes fadeUp{
    from{opacity:0;transform:translateY(10px)}
    to{opacity:1;transform:translateY(0)}
  }

  @keyframes softFloat{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-4px)}
  }

  @keyframes pulseRing{
    0%{box-shadow:0 0 0 0 rgba(83,123,221,.16)}
    70%{box-shadow:0 0 0 10px rgba(83,123,221,0)}
    100%{box-shadow:0 0 0 0 rgba(83,123,221,0)}
  }

  .topbar{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:12px;
    margin-bottom:16px;
  }

  .topbar-title{
    font-size:30px;
    font-weight:900;
    letter-spacing:-.04em;
    line-height:1.05;
  }

  .topbar-sub{
    margin-top:8px;
    color:var(--muted);
    font-size:14px;
    font-weight:800;
  }

  .topbar-date{
    flex-shrink:0;
    min-height:48px;
    padding:0 16px;
    border-radius:16px;
    background:rgba(255,255,255,.92);
    border:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:13px;
    font-weight:900;
    color:#617899;
    box-shadow:var(--shadow);
  }

  .hero{
    background:linear-gradient(180deg,#ffffff 0%, #f8fbff 100%);
    border:1px solid var(--line);
    border-radius:28px;
    box-shadow:var(--shadow);
    padding:22px 20px;
    position:relative;
    overflow:hidden;
    margin-bottom:16px;
  }

  .hero::before{
    content:"";
    position:absolute;
    right:-50px;
    top:-50px;
    width:180px;
    height:180px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(104,135,255,.18) 0%, rgba(104,135,255,0) 70%);
    pointer-events:none;
  }

  .hero-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:18px;
  }

  .hero-badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:32px;
    padding:0 12px;
    border-radius:999px;
    background:#edf4ff;
    color:#3567d7;
    font-size:12px;
    font-weight:900;
    margin-bottom:12px;
  }

  .hero-title{
    font-size:28px;
    line-height:1.12;
    font-weight:900;
    letter-spacing:-.04em;
  }

  .hero-desc{
    margin-top:10px;
    color:#6f819e;
    font-size:14px;
    line-height:1.6;
    font-weight:800;
  }

  .hero-side{
    min-width:170px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .mini-stat{
    background:#fff;
    border:1px solid #dde7f5;
    border-radius:18px;
    padding:14px;
    box-shadow:0 10px 24px rgba(43,67,110,.06);
  }

  .mini-stat-label{
    font-size:12px;
    font-weight:900;
    color:#7b8ca8;
  }

  .mini-stat-value{
    margin-top:8px;
    font-size:22px;
    line-height:1;
    font-weight:900;
    color:#24374c;
  }

  .section{
    background:rgba(255,255,255,.9);
    border:1px solid var(--line);
    border-radius:26px;
    box-shadow:var(--shadow);
    overflow:hidden;
    margin-bottom:16px;
  }

  .section-head{
    padding:18px 18px 14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    border-bottom:1px solid #e6eef8;
  }

  .section-title{
    font-size:20px;
    font-weight:900;
    letter-spacing:-.03em;
  }

  .section-sub{
    margin-top:6px;
    font-size:13px;
    color:var(--muted);
    font-weight:800;
  }

  .section-body{
    padding:14px;
  }

  .filter-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  .filter-btn{
    min-height:38px;
    padding:0 14px;
    border-radius:999px;
    border:1px solid #d7e2f0;
    background:#fff;
    color:#6c7f9f;
    font-size:12px;
    font-weight:900;
    cursor:pointer;
    transition:.15s ease;
  }

  .filter-btn:hover{
    transform:translateY(-1px);
    border-color:#c7d7ec;
  }

  .filter-btn.active{
    background:#edf4ff;
    color:#3567d7;
    border-color:#cdddf5;
    animation:pulseRing 1.8s infinite;
  }

  .raid-grid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:14px;
  }

  .raid-card{
    background:linear-gradient(180deg,#fff 0%, #f9fbff 100%);
    border:1.5px solid var(--line);
    border-radius:24px;
    padding:16px;
    position:relative;
    overflow:hidden;
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    min-height:220px;
  }

  .raid-card::after{
    content:"";
    position:absolute;
    right:-35px;
    bottom:-35px;
    width:110px;
    height:110px;
    border-radius:50%;
    background:linear-gradient(135deg, rgba(120,148,255,.14), rgba(123,99,255,.04));
    pointer-events:none;
  }

  .raid-card:hover{
    transform:translateY(-4px);
    box-shadow:var(--shadow-hover);
    border-color:#c7d7ec;
  }

  .raid-card.shadow-theme{
    background:linear-gradient(180deg,#f5f0ff 0%, #efe7ff 100%);
    border-color:#d7c8ff;
    box-shadow:0 16px 34px rgba(98,67,168,.14);
  }

  .raid-card.shadow-theme::after{
    background:radial-gradient(circle, rgba(124,88,233,.22) 0%, rgba(124,88,233,0) 68%);
  }

  .raid-head{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:12px;
  }

  .raid-chip{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:30px;
    padding:0 11px;
    border-radius:999px;
    font-size:11px;
    font-weight:900;
    line-height:1;
  }

  .chip-blue{background:var(--blue-soft);color:var(--blue)}
  .chip-yellow{background:var(--yellow-soft);color:var(--yellow)}
  .chip-green{background:var(--green-soft);color:var(--green)}
  .chip-purple{background:var(--purple-soft);color:var(--purple)}
  .chip-pink{background:var(--pink-soft);color:var(--pink)}
  .chip-gray{background:var(--gray-soft);color:var(--gray)}

  .raid-period{
    font-size:12px;
    color:#7b8ca8;
    font-weight:900;
    text-align:right;
    line-height:1.35;
  }

  .raid-main{
    display:grid;
    grid-template-columns:88px 1fr;
    gap:14px;
    align-items:center;
    margin-top:14px;
  }

  .raid-thumb{
    width:88px;
    height:88px;
    border-radius:22px;
    background:#f3f7ff;
    border:1px solid #dce6f5;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    box-shadow:0 10px 24px rgba(43,67,110,.08);
    animation:softFloat 3.8s ease-in-out infinite;
  }

  .raid-card.shadow-theme .raid-thumb{
    background:#f4eeff;
    border-color:#d8ccff;
  }

  .raid-thumb img{
    width:72px;
    height:72px;
    object-fit:contain;
  }

  .raid-name{
    font-size:24px;
    line-height:1.1;
    font-weight:900;
    letter-spacing:-.03em;
  }

  .raid-desc{
    margin-top:8px;
    font-size:13px;
    color:#7183a0;
    line-height:1.5;
    font-weight:800;
  }

  .meta-row{
    margin-top:14px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  .meta-pill{
    min-height:34px;
    padding:0 12px;
    border-radius:999px;
    border:1px solid #d9e3f2;
    background:#fff;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:900;
    color:#607897;
  }

  .raid-card.shadow-theme .meta-pill{
    background:rgba(255,255,255,.82);
    border-color:#ddcffd;
  }

  .action-row{
    margin-top:14px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  .action-btn{
    min-height:38px;
    padding:0 14px;
    border-radius:999px;
    border:1px solid #d7e2f0;
    background:#fff;
    color:#597392;
    font-size:12px;
    font-weight:900;
    cursor:pointer;
    transition:.16s ease;
  }

  .action-btn:hover{
    transform:translateY(-1px);
    border-color:#c7d7ec;
    box-shadow:0 10px 18px rgba(43,67,110,.07);
  }

  .cp-panel{
    margin-top:12px;
    display:none;
    padding:14px;
    border-radius:18px;
    background:#fbfdff;
    border:1px dashed #d7e2f1;
    font-size:13px;
    color:#405674;
    line-height:1.6;
    font-weight:800;
  }

  .cp-panel.show{
    display:block;
    animation:fadeUp .24s ease forwards;
  }

  .raid-card.shadow-theme .cp-panel{
    background:rgba(255,255,255,.74);
    border-color:#dacdfa;
  }

  .empty-box{
    border:1px dashed #d9e4f2;
    background:#fbfdff;
    border-radius:18px;
    padding:18px 14px;
    text-align:center;
    color:#97a5ba;
    font-size:13px;
    font-weight:800;
  }

  .bottom-nav{
    position:fixed;
    left:50%;
    bottom:14px;
    transform:translateX(-50%);
    width:min(980px, calc(100% - 24px));
    background:rgba(255,255,255,.94);
    border:1px solid var(--line);
    border-radius:24px;
    box-shadow:0 18px 36px rgba(42,59,97,.12);
    backdrop-filter:blur(10px);
    padding:10px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    z-index:30;
  }

  .nav-item{
    min-height:64px;
    border-radius:16px;
    text-decoration:none;
    color:#6f819e;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:6px;
    font-size:12px;
    font-weight:900;
    transition:.18s ease;
    background:#f8fbff;
    border:1px solid transparent;
  }

  .nav-item:hover{
    background:#f3f7ff;
    color:#486995;
    border-color:#d6e3f3;
    transform:translateY(-1px);
  }

  .nav-item.active{
    background:#edf4ff;
    color:#3567d7;
    border-color:#cdddf5;
  }

  .nav-icon{
    font-size:18px;
    line-height:1;
  }

  @media (max-width:980px){
    .raid-grid{
      grid-template-columns:1fr;
    }
  }

  @media (max-width:768px){
    .wrap{
      padding:14px 12px 120px;
    }

    .topbar{
      flex-direction:column;
      align-items:flex-start;
    }

    .topbar-title{
      font-size:28px;
    }

    .hero-row{
      flex-direction:column;
    }

    .hero-side{
      min-width:0;
      width:100%;
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
    }

    .section-head{
      padding:16px 16px 12px;
      flex-direction:column;
      align-items:flex-start;
    }

    .section-body{
      padding:12px;
    }

    .raid-main{
      grid-template-columns:72px 1fr;
    }

    .raid-thumb{
      width:72px;
      height:72px;
      border-radius:18px;
    }

    .raid-thumb img{
      width:58px;
      height:58px;
    }

    .raid-name{
      font-size:21px;
    }
  }

  @media (prefers-reduced-motion: reduce){
    *{
      animation:none !important;
      transition:none !important;
      scroll-behavior:auto !important;
    }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar fade-up">
    <div>
      <div class="topbar-title">지금 레이드</div>
      <div class="topbar-sub" id="topbarSub">한국 시간 기준 로딩 중...</div>
    </div>
    <div class="topbar-date" id="monthBadge">3월</div>
  </div>

  <section class="hero fade-up delay-1">
    <div class="hero-row">
      <div>
        <div class="hero-badge">LIVE RAID STATUS</div>
        <div class="hero-title">현재 진행 중인<br>레이드 보스 목록</div>
        <div class="hero-desc">
          raid-data.json에 업로드된 데이터 중 오늘 날짜에 해당하는 레이드만 자동 표시됩니다.<br>
          정렬은 5성 → 3성 → 1성 → 메가 → 그림자 순서로 고정됩니다.
        </div>
      </div>

      <div class="hero-side">
        <div class="mini-stat">
          <div class="mini-stat-label">현재 진행 중</div>
          <div class="mini-stat-value" id="activeCount">0</div>
        </div>
        <div class="mini-stat">
          <div class="mini-stat-label">오늘 날짜</div>
          <div class="mini-stat-value" id="todayMini" style="font-size:18px;">-</div>
        </div>
      </div>
    </div>
  </section>

  <section class="section fade-up delay-2">
    <div class="section-head">
      <div>
        <div class="section-title">레이드 타입 필터</div>
        <div class="section-sub">원하는 타입만 골라서 볼 수 있습니다</div>
      </div>
    </div>
    <div class="section-body">
      <div class="filter-row" id="filterRow"></div>
    </div>
  </section>

  <section class="section fade-up delay-3">
    <div class="section-head">
      <div>
        <div class="section-title">진행 중인 보스</div>
        <div class="section-sub">cp 값이 있으면 CP 보기 버튼이 자동으로 나타납니다</div>
      </div>
    </div>
    <div class="section-body">
      <div class="raid-grid" id="raidGrid"></div>
    </div>
  </section>

</div>

<nav class="bottom-nav">
  <a href="./index.html" class="nav-item">
    <div class="nav-icon">🏠</div>
    <div>메인</div>
  </a>
  <a href="./raid-now.html" class="nav-item active">
    <div class="nav-icon">⚔️</div>
    <div>지금 레이드</div>
  </a>
  <a href="./weekly.html" class="nav-item">
    <div class="nav-icon">🗓️</div>
    <div>주간 일정표</div>
  </a>
  <a href="./monthly.html" class="nav-item">
    <div class="nav-icon">📆</div>
    <div>월간 일정</div>
  </a>
</nav>

<script>
  const DATA_URL = './raid-data.json';

  const FILTERS = ['전체', '5성', '3성', '1성', '메가', '그림자'];
  let currentFilter = '전체';
  let currentItems = [];

  function getKoreaNow(){
    const now = new Date();
    const koreaString = now.toLocaleString('en-US', { timeZone: 'Asia/Seoul' });
    return new Date(koreaString);
  }

  function getKoreaToday(){
    const koreaNow = getKoreaNow();
    koreaNow.setHours(0, 0, 0, 0);
    return koreaNow;
  }

  function pad(n){
    return String(n).padStart(2, '0');
  }

  function toDate(str){
    if(!str) return null;
    const [y,m,d] = str.split('-').map(Number);
    return new Date(y, m - 1, d, 0, 0, 0, 0);
  }

  function toKey(date){
    return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}`;
  }

  function formatKoreanDate(date){
    const days = ['일','월','화','수','목','금','토'];
    return `${date.getFullYear()}년 ${date.getMonth()+1}월 ${date.getDate()}일 ${days[date.getDay()]}요일`;
  }

  function inRange(date, startStr, endStr){
    const start = toDate(startStr);
    const end = toDate(endStr);
    if(!start || !end) return false;
    const t = toDate(toKey(date)).getTime();
    return t >= start.getTime() && t <= end.getTime();
  }

  async function loadRecords(){
    try{
      const res = await fetch(DATA_URL, { cache: 'no-store' });
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const parsed = await res.json();

      if(Array.isArray(parsed)) return parsed;
      if(Array.isArray(parsed.records)) return parsed.records;
      if(Array.isArray(parsed.items)) return parsed.items;

      return [];
    }catch(error){
      console.error('raid-data.json 불러오기 실패:', error);
      return [];
    }
  }

  function isAllowed(item, page){
    return Array.isArray(item.showPages) && item.showPages.includes(page);
  }

  function sortPriority(label){
    const order = {
      '5성': 0,
      '3성': 1,
      '1성': 2,
      '메가': 3,
      '그림자': 4
    };
    return order[label] ?? 99;
  }

  function chipClass(label){
    if(label === '5성') return 'chip-blue';
    if(label === '3성') return 'chip-yellow';
    if(label === '1성') return 'chip-green';
    if(label === '메가') return 'chip-purple';
    if(label === '그림자') return 'chip-pink';
    return 'chip-gray';
  }

  function getTodayRaidItems(records, today){
    return records
      .filter(item =>
        (isAllowed(item, 'raid-now') || isAllowed(item, 'index')) &&
        ['1성','3성','5성','메가','그림자'].includes(item.label) &&
        item.startDate &&
        item.endDate &&
        inRange(today, item.startDate, item.endDate)
      )
      .sort((a,b) => {
        const diff = sortPriority(a.label) - sortPriority(b.label);
        if(diff !== 0) return diff;
        return (a.name || '').localeCompare((b.name || ''), 'ko');
      });
  }

  function renderTop(today){
    document.getElementById('topbarSub').textContent = formatKoreanDate(today);
    document.getElementById('monthBadge').textContent = `${today.getMonth()+1}월`;
    document.getElementById('todayMini').textContent = `${today.getMonth()+1}.${today.getDate()}`;
  }

  function renderFilters(){
    const wrap = document.getElementById('filterRow');
    wrap.innerHTML = FILTERS.map(label => `
      <button class="filter-btn ${label === currentFilter ? 'active' : ''}" data-filter="${label}">
        ${label}
      </button>
    `).join('');

    wrap.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentFilter = btn.dataset.filter;
        renderFilters();
        renderRaidGrid();
      });
    });
  }

  function getFilteredItems(){
    if(currentFilter === '전체') return currentItems;
    return currentItems.filter(item => item.label === currentFilter);
  }

  function createMetaPills(item){
    const pills = [];

    if(item.boost) pills.push(`<span class="meta-pill">부스트 ${escapeHtml(item.boost)}</span>`);
    if(item.boost2) pills.push(`<span class="meta-pill">부스트 ${escapeHtml(item.boost2)}</span>`);
    if(item.startDate) pills.push(`<span class="meta-pill">시작 ${escapeHtml(item.startDate.replaceAll('-', '.'))}</span>`);
    if(item.endDate) pills.push(`<span class="meta-pill">종료 ${escapeHtml(item.endDate.replaceAll('-', '.'))}</span>`);

    return pills.join('');
  }

  function hasCpValue(item){
    return !!String(item.cp || '').trim();
  }

  function escapeHtml(value){
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function renderRaidGrid(){
    const wrap = document.getElementById('raidGrid');
    const items = getFilteredItems();

    document.getElementById('activeCount').textContent = items.length;

    if(!items.length){
      wrap.innerHTML = `<div class="empty-box">현재 조건에 맞는 진행 중 레이드가 없습니다.</div>`;
      return;
    }

    wrap.innerHTML = items.map((item, index) => {
      const shadowTheme = item.label === '그림자' ? 'shadow-theme' : '';
      const chip = chipClass(item.label);
      const cpId = `cp-panel-${index}`;

      return `
        <article class="raid-card ${shadowTheme}">
          <div class="raid-head">
            <span class="raid-chip ${chip}">${escapeHtml(item.label || '-')}</span>
            <div class="raid-period">
              ${(item.startDate || '').replaceAll('-', '.')}<br>
              ${(item.endDate || '').replaceAll('-', '.')}
            </div>
          </div>

          <div class="raid-main">
            <div class="raid-thumb">
              ${
                item.image
                  ? `<img src="${escapeHtml(item.image)}" alt="${escapeHtml(item.name || '')}">`
                  : `<span style="font-size:28px;">🖼️</span>`
              }
            </div>

            <div>
              <div class="raid-name">${escapeHtml(item.name || '-')}</div>
              <div class="raid-desc">
                ${
                  item.label === '그림자'
                    ? '그림자 레이드로 보라색 테마가 자동 적용됩니다.'
                    : '현재 진행 중인 레이드 정보입니다.'
                }
              </div>
            </div>
          </div>

          <div class="meta-row">
            ${createMetaPills(item)}
          </div>

          <div class="action-row">
            ${
              hasCpValue(item)
                ? `<button class="action-btn" type="button" data-cp-target="${cpId}">CP 보기</button>`
                : ``
            }
            <a class="action-btn" href="./detail.html?name=${encodeURIComponent(item.name || '')}" style="text-decoration:none;display:inline-flex;align-items:center;justify-content:center;">상세 보기</a>
          </div>

          ${
            hasCpValue(item)
              ? `<div class="cp-panel" id="${cpId}">CP 정보: ${escapeHtml(item.cp)}</div>`
              : ``
          }
        </article>
      `;
    }).join('');

    wrap.querySelectorAll('[data-cp-target]').forEach(btn => {
      btn.addEventListener('click', () => {
        const panel = document.getElementById(btn.dataset.cpTarget);
        if(!panel) return;

        const isOpen = panel.classList.contains('show');
        panel.classList.toggle('show', !isOpen);
        btn.textContent = isOpen ? 'CP 보기' : 'CP 닫기';
      });
    });
  }

  async function init(){
    const today = getKoreaToday();
    renderTop(today);

    const records = await loadRecords();
    currentItems = getTodayRaidItems(records, today);

    renderFilters();
    renderRaidGrid();
  }

  init();
</script>
</body>
</html>
