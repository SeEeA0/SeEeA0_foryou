<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:
      radial-gradient(circle at top left, rgba(124,88,233,.05), transparent 28%),
      linear-gradient(180deg,#eff4fb 0%, #edf3fb 100%);
    color:#1f2f46;
  }

  :root{
    --bg:#edf3fb;
    --card:#ffffff;
    --line:#dce5f3;
    --line-soft:#e8eef8;
    --text:#1f2f46;
    --muted:#7486a3;
    --blue:#3567d7;
    --shadow:0 14px 32px rgba(43,67,110,.08);
    --shadow-soft:0 8px 22px rgba(43,67,110,.05);
  }

  .wrap{
    max-width:1180px;
    margin:0 auto;
    padding:12px 12px 110px;
  }

  .section{
    background:rgba(255,255,255,.97);
    border:1px solid var(--line);
    border-radius:24px;
    box-shadow:var(--shadow);
    overflow:hidden;
    margin-bottom:14px;
    backdrop-filter:blur(10px);
  }

  .section-head{
    padding:16px 16px 12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    border-bottom:1px solid var(--line-soft);
  }

  .section-title{
    font-size:18px;
    font-weight:900;
    letter-spacing:-.03em;
  }

  .section-sub{
    margin-top:6px;
    font-size:12px;
    color:var(--muted);
    font-weight:800;
    line-height:1.5;
  }

  .section-body{
    padding:12px;
  }

  .boss-tabs{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding-bottom:2px;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .boss-tabs::-webkit-scrollbar{display:none}

  .boss-tab{
    min-width:120px;
    border-radius:18px;
    border:1.5px solid #dce6f4;
    background:linear-gradient(180deg,#fff 0%, #f8fbff 100%);
    padding:10px;
    text-align:center;
    cursor:pointer;
    transition:.18s ease;
    flex-shrink:0;
    box-shadow:0 8px 20px rgba(43,67,110,.05);
  }

  .boss-tab.active{
    border-color:#bfd2ef;
    box-shadow:0 0 0 2px rgba(83,123,221,.12);
  }

  .boss-tab img{
    width:56px;
    height:56px;
    object-fit:contain;
    display:block;
    margin:0 auto 8px;
  }

  .boss-tab-name{
    font-size:14px;
    font-weight:900;
    letter-spacing:-.02em;
    line-height:1.2;
  }

  .boss-tab-sub{
    margin-top:4px;
    font-size:11px;
    color:#7486a3;
    font-weight:800;
  }

  .boss-hero{
    background:linear-gradient(180deg,#fff 0%, #f8fbff 100%);
    border:1.5px solid #dce6f4;
    border-radius:20px;
    overflow:hidden;
  }

  .boss-hero-top{
    padding:18px 16px 14px;
    text-align:center;
    border-bottom:1px solid #e7eef8;
  }

  .boss-name-ko{
    font-size:18px;
    font-weight:900;
    letter-spacing:-.03em;
    line-height:1.2;
  }

  .boss-name-en{
    margin-top:4px;
    font-size:13px;
    color:#6f81a0;
    font-weight:800;
  }

  .boss-hero-image{
    padding:14px 12px;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:160px;
    background:#fbfdff;
    flex-direction:column;
    gap:10px;
  }

  .boss-hero-image img{
    max-width:100%;
    max-height:150px;
    object-fit:contain;
    display:block;
  }

  .boss-cp{
    font-size:13px;
    font-weight:900;
    color:#6b7f9b;
    text-align:center;
  }

  .boss-info-table{
    border-top:1px solid #e7eef8;
  }

  .boss-info-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    border-top:1px solid #f0f4fa;
  }
  .boss-info-row:first-child{border-top:0}

  .boss-info-cell{
    min-height:46px;
    padding:10px 12px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-size:13px;
    font-weight:900;
    color:#334863;
  }

  .boss-info-cell.label{
    background:#faf2f4;
  }

  .boss-info-wide{
    border-top:1px solid #f0f4fa;
    padding:12px 14px;
    text-align:center;
  }

  .boss-info-wide.label{
    background:#faf2f4;
    font-size:13px;
    font-weight:900;
    color:#334863;
  }

  .boss-info-wide.value{
    font-size:14px;
    font-weight:900;
    color:#334863;
  }

  .weakness-grid{
    display:grid;
    grid-template-columns:92px 68px 1fr;
    border-top:1px solid #f0f4fa;
  }

  .weakness-grid > div{
    min-height:50px;
    padding:9px 8px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-size:13px;
    font-weight:900;
    color:#334863;
    border-top:1px solid #f0f4fa;
  }

  .weakness-grid > div:nth-child(1),
  .weakness-grid > div:nth-child(2),
  .weakness-grid > div:nth-child(3){
    border-top:0;
  }

  .weakness-side{
    background:#faf2f4;
    grid-row:span 2;
  }

  .moves-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
  }

  .move-card{
    min-height:78px;
    border-top:1px solid #f0f4fa;
    border-right:1px solid #f0f4fa;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:10px;
  }

  .move-card:nth-child(2n){
    border-right:0;
  }

  .move-name{
    font-size:14px;
    font-weight:900;
    line-height:1.2;
  }

  .move-title{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    flex-wrap:wrap;
  }

  .move-type-icon{
    width:16px;
    height:16px;
    object-fit:contain;
    display:block;
    flex-shrink:0;
  }

  .move-rank{
    margin-top:4px;
    font-size:12px;
    font-weight:900;
  }

  .danger{color:#ef4b4b}
  .normal{color:#ff8a1f}
  .easy{color:#29b86f}

  .recommend-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:14px;
    margin-top:14px;
  }

  .role-card{
    background:linear-gradient(180deg,#fff 0%, #f9fbff 100%);
    border:1.5px solid #dce6f4;
    border-radius:20px;
    overflow:hidden;
  }

  .role-head{
    padding:14px 12px;
    border-bottom:1px solid #e8eef8;
    text-align:center;
    font-size:18px;
    font-weight:900;
    letter-spacing:-.03em;
  }

  .role-list{
    display:grid;
    grid-template-columns:1fr;
  }

  .poke-card{
    position:relative;
    border-top:1px solid #eef3fa;
    padding:14px 12px 0;
    background:linear-gradient(180deg,#ffffff 0%, #fbfdff 100%);

  .poke-card:first-child{border-top:0}

  .poke-rank{
    position:absolute;
    top:12px;
    left:12px;
    font-size:15px;
    font-weight:900;
    color:#3d73dd;
    line-height:1;
  }

  .poke-name{

    font-size:20px;
    font-weight:900;
    letter-spacing:-.03em;
    line-height:1.25;

  .poke-image-wrap{

    display:flex;

    justify-content:center;
    padding:8px 0 12px;
  }

  .poke-image{
    width:88px;
    height:88px;
    object-fit:contain;
    display:block;
  }

  .poke-skill-table{
    margin-top:2px;
    border-top:1px solid #dfe7f4;
    background:#fff;
    display:grid;
    grid-template-columns:1fr 1fr;
  }

  .poke-skill-col{
    border-left:1px solid #e5edf8;
  }
  .poke-skill-col:first-child{border-left:0}

  .poke-skill-head{
    min-height:38px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:8px 6px;
    font-size:12px;
    font-weight:900;
    color:#314761;
    background:#f5f8fd;
    border-bottom:1px solid #e5edf8;
  }

  .poke-skill-body{
    min-height:64px;
    padding:10px 8px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    gap:8px;
  }

  .skill-chip{
    display:inline-flex;
    align-items:center;
    gap:5px;
    min-height:32px;
    padding:6px 10px;
    border-radius:999px;
    background:#f4f8ff;
    border:1px solid #dce6f4;
    font-size:13px;
    line-height:1.2;
    color:#435b77;
    font-weight:900;
    word-break:keep-all;
  }

  .skill-chip img{
    width:16px;
    height:16px;
    object-fit:contain;
    display:block;
    flex-shrink:0;
  }

  .skill-empty{
    font-size:14px;
    font-weight:900;
    color:#9aa9bd;

  }

  .tip-box{
    margin-top:14px;
    background:#faf4f5;
    border:1px solid #f0dfe3;
    border-radius:18px;
    padding:16px 14px;
    text-align:center;
    font-size:14px;
    line-height:1.7;
    font-weight:900;
    color:#314761;
    word-break:keep-all;
  }

  .tip-box small{
    display:block;
    margin-top:6px;
    font-size:12px;
    font-weight:800;
    color:#6f81a0;
  }

  .bottom-nav{
    position:fixed;
    left:50%;
    bottom:14px;
    transform:translateX(-50%);
    width:min(1080px, calc(100% - 24px));
    background:rgba(255,255,255,.94);
    border:1px solid var(--line);
    border-radius:24px;
    box-shadow:0 18px 36px rgba(42,59,97,.12);
    backdrop-filter:blur(10px);
    padding:8px;

    gap:8px;
    z-index:30;
  }

  .nav-item{

    border-radius:16px;
    text-decoration:none;
    color:#6f819e;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:6px;
    font-size:11px;
    font-weight:900;
    transition:.18s ease;
    background:#f8fbff;
    border:1px solid transparent;
  }

  .nav-item.active{
    background:#edf4ff;
    color:#3567d7;
    border-color:#cdddf5;
  }

  .nav-icon{
    font-size:18px;
    line-height:1;
  }

  .type-chip-list,
  .weakness-type-wrap{
    display:flex;
    align-items:center;
    justify-content:center;
    flex-wrap:wrap;
    gap:8px;
  }

  .type-chip{
    display:inline-flex;
    align-items:center;
    gap:5px;
    padding:3px 7px;
    border-radius:999px;
    background:#f4f8ff;
    border:1px solid #dce6f4;
    line-height:1;
  }

  .type-chip img{
    width:16px;
    height:16px;
    object-fit:contain;
    display:block;
  }

  .type-chip span{
    font-size:12px;
    font-weight:900;
    color:#334863;
    white-space:nowrap;
  }

  @media (min-width: 860px){
    .recommend-grid{
      grid-template-columns:1fr 1fr;

      grid-template-columns:1fr 1fr;

    .poke-name{

    .poke-image{

  }

  @media (min-width: 1200px){
    .wrap{
      padding:16px 14px 110px;

    .boss-tab img{

    }

    .poke-card{
      padding:12px 10px 0;
    }

    .poke-name{
      font-size:16px;

      padding:0 32px;
    }

    .poke-rank{
      font-size:14px;
    }

    .poke-image-wrap{
      min-height:92px;
      padding:6px 0 10px;
    }

    .poke-image{
      width:70px;
      height:70px;
    }

    .poke-skill-head{
      font-size:11px;
      min-height:34px;
    }

    .poke-skill-body{
      min-height:58px;
      padding:8px 6px;
      gap:6px;
    }

    .skill-chip{
      font-size:12px;

    }

  }

  @media (prefers-reduced-motion: reduce){
    *{
      animation:none !important;
      transition:none !important;
      scroll-behavior:auto !important;

</style>

<script>
  function getPokemonImage(id, isGmax = false) {
    return isGmax
      ? `https://cdn.leekduck.com/assets/img/pokemon_icons/pm${id}.fGIGANTAMAX.icon.png`
      : `https://cdn.leekduck.com/assets/img/pokemon_icons/pm${id}.icon.png`;
  }

  const TYPE_ICON_MAP = {
    '노말': 1,
    '불': 2,
    '불꽃': 2,
    '물': 3,
    '전기': 4,
    '풀': 5,
    '얼음': 6,
    '격투': 7,
    '독': 8,
    '땅': 9,
    '비행': 10,
    '페어리': 11,
    '벌레': 12,
    '바위': 13,
    '고스트': 14,
    '드래곤': 15,
    '드레곤': 15,
    '악': 16,
    '강철': 17,
    '에스퍼': 18
  };

  function normalizeTypeName(type) {
    if (!type) return '';
    const cleaned = String(type).trim();
    if (cleaned === '불꽃') return '불';
    if (cleaned === '드레곤') return '드래곤';
    return cleaned;
  }

  function getTypeIcon(type) {
    const normalized = normalizeTypeName(type);
    const num = TYPE_ICON_MAP[normalized];
    return num ? `icons/${num}.png` : '';
  }

  function renderTypeChip(type) {
    const normalized = normalizeTypeName(type);
    const icon = getTypeIcon(normalized);
    if (!normalized) return '';
    return `
      <span class="type-chip">
        ${icon ? `<img src="${icon}" alt="${normalized}">` : ''}
        <span>${normalized}</span>
      </span>
    `;
  }

  function renderTypeList(types) {
    return `
      <div class="type-chip-list">
        ${types.map(type => renderTypeChip(type)).join('')}
      </div>
    `;
  }

  function renderWeaknessTypes(types) {
    if (!types || !types.length) return '';
    return `
      <div class="weakness-type-wrap">
        ${types.map(type => renderTypeChip(type)).join('')}
      </div>
    `;
  }

  function renderMoveName(move) {
    const type = normalizeTypeName(move.type);
    const icon = getTypeIcon(type);
    return `
      <div class="move-title">
        ${icon ? `<img class="move-type-icon" src="${icon}" alt="${type}">` : ''}
        <span>${move.name}</span>
      </div>
    `;
  }

  function inferSkillType(skillName) {
    const name = String(skillName || '').trim();

    const map = {
      '막치기': '노말',
      '메탈크로우': '강철',
      '물대포': '물',
      '사이코웨이브': '에스퍼',
      '머드샷': '땅',
      '사념의박치기': '에스퍼',
      '불릿펀치': '강철',
      '전기쇼크': '전기',
      '차지빔': '전기',
      '볼트체인지': '전기',
      '회오리불꽃': '불꽃',
      '날개치기': '비행',
      '에어슬래시': '비행',
      '강철날개': '강철',

  function splitSkills(skillText) {
    const lines = String(skillText || '').split('\\n').map(v => v.trim()).filter(Boolean);
    const normal = [];
    const special = [];

    lines.forEach((line, lineIndex) => {
      const parts = line.split('/').map(v => v.trim()).filter(Boolean);
      if (lineIndex === 0) normal.push(...parts);
      else special.push(...parts);
    });

    return { normal, special };
  }

  function renderSkillChips(skills) {
    if (!skills.length) return `<div class="skill-empty">-</div>`;

    return skills.map(skill => {
      const type = inferSkillType(skill);
      const icon = getTypeIcon(type);
      return `
        <span class="skill-chip">
          ${icon ? `<img src="${icon}" alt="${type}">` : ''}
          <span>${skill}</span>
        </span>
      `;
    }).join('');
  }

  function renderBossTabs() {
    const wrap = document.getElementById('bossTabs');
    wrap.innerHTML = Object.values(BOSSES).map((boss, index) => `
      <button class="boss-tab ${index === 0 ? 'active' : ''}" data-boss="${boss.key}">
        <img src="${getPokemonImage(boss.imageId, true)}" alt="${boss.nameKo}">
        <div class="boss-tab-name">${boss.tabName}</div>
        <div class="boss-tab-sub">${boss.tabSub}</div>
      </button>
    `).join('');
  }

  function renderMoves(moves) {
    const wrap = document.getElementById('bossMoves');
    const safeMoves = [...moves];
    if (safeMoves.length % 2 === 1) {
      safeMoves.push({ name: '', rank: '', cls: '', type: '' });
    }

    wrap.innerHTML = safeMoves.map(move => {
      if (!move.name) return `<div class="move-card"></div>`;
      return `
        <div class="move-card">
          <div>
            <div class="move-name">${renderMoveName(move)}</div>
            <div class="move-rank ${move.cls}">${move.rank}</div>
          </div>
        </div>
      `;
    }).join('');
  }

  function renderPokemonCard(key, index) {
    const p = MAX_POKEMON[key];
    const rank = index + 1;
    const skills = splitSkills(p.skill);

    return `
      <div class="poke-card">
        <div class="poke-rank">${rank}위</div>
        <div class="poke-name">${p.gmax ? `거다이맥스 ${p.name}` : p.name}</div>

        <div class="poke-image-wrap">
          <img class="poke-image" src="${getPokemonImage(p.id, !!p.gmax)}" alt="${p.name}">
        </div>

        <div class="poke-skill-table">
          <div class="poke-skill-col">
            <div class="poke-skill-head">노말기술</div>
            <div class="poke-skill-body">
              ${renderSkillChips(skills.normal)}
            </div>
          </div>

          <div class="poke-skill-col">
            <div class="poke-skill-head">스페셜기술</div>
            <div class="poke-skill-body">
              ${renderSkillChips(skills.special)}
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function renderRoleList(targetId, keys) {
    const wrap = document.getElementById(targetId);
    wrap.innerHTML = keys.map((key, index) => renderPokemonCard(key, index)).join('');
  }

  function renderBoss(key) {
    const boss = BOSSES[key];
    if (!boss) return;

    document.getElementById('bossNameKo').textContent = boss.nameKo;
    document.getElementById('bossNameEn').textContent = boss.nameEn;
    document.getElementById('bossMainImage').src = getPokemonImage(boss.imageId, true);
    document.getElementById('bossMainImage').alt = boss.nameKo;
    document.getElementById('bossCp').textContent = boss.cp || '';
    document.getElementById('bossShiny').textContent = boss.shiny;

    document.getElementById('bossTypes').innerHTML = renderTypeList(boss.types);
    document.getElementById('bossWeaknessRate1').textContent = boss.weakness[0]?.rate || '';
    document.getElementById('bossWeaknessTypes1').innerHTML = renderWeaknessTypes(boss.weakness[0]?.types || []);
    document.getElementById('bossWeaknessRate2').textContent = boss.weakness[1]?.rate || '';

    renderRoleList('tankList', boss.tank);

    document.getElementById('bossTip').innerHTML = boss.tip;

      tab.classList.toggle('active', tab.dataset.boss === key);
    });
