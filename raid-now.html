<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>현재 진행 중인 레이드</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#edf3fb;
    color:#1f2f46;
  }

  :root{
    --bg:#edf3fb;
    --card:#ffffff;
    --card-soft:#f8fbff;
    --line:#d8e3f2;
    --line-strong:#c9d8eb;
    --text:#1f2f46;
    --muted:#7486a3;

    --blue:#3567d7;
    --blue-soft:#e7f0ff;

    --purple:#7c58e9;
    --purple-soft:#efe7ff;

    --pink:#d85b85;
    --pink-soft:#ffe8f0;

    --yellow:#b88818;
    --yellow-soft:#fff1c9;

    --green:#49a66b;
    --green-soft:#e7f5eb;

    --gray:#67768f;
    --gray-soft:#f2f5fa;

    --shadow:0 18px 40px rgba(43,67,110,.08);
  }

  .wrap{
    max-width:1320px;
    margin:0 auto;
    padding:20px 16px 110px;
  }

  .hero{
    background:rgba(255,255,255,.82);
    border:1px solid var(--line);
    border-radius:30px;
    overflow:hidden;
    box-shadow:var(--shadow);
    margin-bottom:18px;
  }

  .hero-head{
    padding:26px 28px 18px;
    border-bottom:1px solid #e4edf8;
    background:linear-gradient(180deg,#fbfdff 0%, #f6faff 100%);
  }

  .hero-title{
    font-size:30px;
    font-weight:900;
    letter-spacing:-.03em;
  }

  .hero-sub{
    margin-top:10px;
    font-size:14px;
    line-height:1.55;
    color:var(--muted);
    font-weight:700;
  }

  .hero-tags{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:18px;
  }

  .hero-tag{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:40px;
    padding:0 16px;
    border-radius:999px;
    background:#f3f7ff;
    border:1px solid var(--line);
    color:#58719a;
    font-size:13px;
    font-weight:900;
    white-space:nowrap;
  }

  .hero-tag.active{
    background:#eaf2ff;
    color:#3567d7;
    border-color:#cfe0f6;
  }

  .section{
    background:rgba(255,255,255,.82);
    border:1px solid var(--line);
    border-radius:30px;
    overflow:hidden;
    box-shadow:var(--shadow);
    margin-bottom:18px;
  }

  .section-head{
    padding:24px 26px 18px;
    border-bottom:1px solid #e4edf8;
    background:linear-gradient(180deg,#fbfdff 0%, #f6faff 100%);
  }

  .section-title{
    font-size:26px;
    font-weight:900;
    letter-spacing:-.03em;
  }

  .section-sub{
    margin-top:8px;
    font-size:14px;
    color:var(--muted);
    font-weight:700;
    line-height:1.5;
  }

  .section-body{
    padding:18px;
  }

  .raid-grid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:16px;
  }

  .raid-card{
    background:linear-gradient(180deg,#ffffff 0%, #f8fbff 100%);
    border:1.5px solid var(--line);
    border-radius:26px;
    overflow:hidden;
    box-shadow:0 10px 28px rgba(52,74,119,.05);
  }

  .raid-card-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    padding:18px 18px 16px;
    border-bottom:1px solid #e5edf8;
    background:#fbfdff;
  }

  .chip{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:34px;
    padding:0 14px;
    border-radius:999px;
    font-size:12px;
    font-weight:900;
    line-height:1;
    white-space:nowrap;
  }

  .chip.blue{background:var(--blue-soft);color:var(--blue)}
  .chip.purple{background:var(--purple-soft);color:var(--purple)}
  .chip.pink{background:var(--pink-soft);color:var(--pink)}
  .chip.yellow{background:var(--yellow-soft);color:var(--yellow)}
  .chip.green{background:var(--green-soft);color:var(--green)}
  .chip.gray{background:var(--gray-soft);color:var(--gray)}

  .raid-date{
    font-size:13px;
    font-weight:900;
    color:#667a98;
    white-space:nowrap;
  }

  .raid-card-body{
    padding:18px;
  }

  .raid-name{
    font-size:24px;
    font-weight:900;
    line-height:1.12;
    letter-spacing:-.03em;
  }

  .raid-desc{
    margin-top:8px;
    font-size:14px;
    color:#7b8ca8;
    font-weight:700;
  }

  .raid-main{
    margin-top:16px;
    display:grid;
    grid-template-columns:108px 1fr;
    gap:16px;
    align-items:start;
  }

  .raid-thumb{
    width:108px;
    height:108px;
    border-radius:26px;
    background:#f3f7ff;
    border:1px solid #dce6f5;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }

  .raid-thumb img{
    width:86px;
    height:86px;
    object-fit:contain;
  }

  .raid-types{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  .stat-grid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:10px;
    margin-top:12px;
  }

  .stat-box{
    background:#f6f9ff;
    border:1px solid #dde7f5;
    border-radius:18px;
    padding:12px 14px;
  }

  .stat-label{
    font-size:12px;
    color:#7386a3;
    font-weight:900;
  }

  .stat-value{
    margin-top:6px;
    font-size:17px;
    color:#31435d;
    font-weight:900;
    line-height:1.2;
    letter-spacing:-.02em;
  }

  .weather-row{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:12px;
  }

  .quick-grid{
    display:grid;
    grid-template-columns:repeat(3,minmax(0,1fr));
    gap:14px;
  }

  .quick-card{
    background:linear-gradient(180deg,#fff 0%, #f9fbff 100%);
    border:1.5px solid var(--line);
    border-radius:22px;
    padding:14px 16px;
    display:flex;
    align-items:center;
    gap:14px;
    text-decoration:none;
    color:inherit;
    transition:.18s ease;
    min-height:96px;
  }

  .quick-card:hover{
    transform:translateY(-2px);
    border-color:#bfd1ea;
    box-shadow:0 12px 28px rgba(62,85,131,.08);
  }

  .quick-icon{
    width:52px;
    height:52px;
    border-radius:16px;
    background:#f3f7ff;
    border:1px solid #dce6f4;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    flex-shrink:0;
  }

  .quick-title{
    font-size:16px;
    font-weight:900;
    letter-spacing:-.02em;
  }

  .quick-desc{
    margin-top:5px;
    color:var(--muted);
    font-size:12px;
    line-height:1.45;
    font-weight:700;
  }

  .bottom-nav{
    position:fixed;
    left:50%;
    bottom:14px;
    transform:translateX(-50%);
    width:min(1180px, calc(100% - 24px));
    background:rgba(255,255,255,.92);
    border:1px solid var(--line);
    border-radius:26px;
    box-shadow:0 18px 36px rgba(42,59,97,.12);
    backdrop-filter:blur(10px);
    padding:10px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    z-index:30;
  }

  .nav-item{
    min-height:68px;
    border-radius:18px;
    text-decoration:none;
    color:#6f819e;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:6px;
    font-size:13px;
    font-weight:900;
    transition:.18s ease;
    background:#f8fbff;
    border:1px solid transparent;
  }

  .nav-item:hover{
    background:#f3f7ff;
    color:#486995;
    border-color:#d6e3f3;
  }

  .nav-item.active{
    background:#edf4ff;
    color:#3567d7;
    border-color:#cdddf5;
  }

  .nav-icon{
    font-size:20px;
    line-height:1;
  }

  @media (max-width:1100px){
    .raid-grid,
    .quick-grid{
      grid-template-columns:1fr;
    }
  }

  @media (max-width:768px){
    .wrap{
      padding-bottom:120px;
    }

    .hero-head,
    .section-head{
      padding:22px 20px 16px;
    }

    .section-body{
      padding:16px;
    }

    .hero-title{
      font-size:26px;
    }

    .section-title{
      font-size:22px;
    }

    .raid-card-top{
      flex-direction:column;
      align-items:flex-start;
    }

    .raid-main{
      grid-template-columns:1fr;
    }

    .raid-thumb{
      width:92px;
      height:92px;
    }

    .raid-thumb img{
      width:74px;
      height:74px;
    }

    .stat-grid{
      grid-template-columns:1fr;
    }
  }
</style>
</head>
<body>
<div class="wrap">

  <section class="hero">
    <div class="hero-head">
      <div class="hero-title">현재 진행 중인 레이드</div>

    <div class="section-body">

          <div class="quick-icon">📆</div>
          <div>
            <div class="quick-title">월간 일정</div>
            <div class="quick-desc">한 달 전체 흐름 확인</div>
          </div>
        </a>
      </div>
    </div>
  </section>

</div>

<nav class="bottom-nav">
  <a href="./index.html" class="nav-item">
    <div class="nav-icon">🏠</div>
    <div>메인</div>
  </a>
  <a href="./raid-now.html" class="nav-item active">
    <div class="nav-icon">⚔️</div>

  <a href="./weekly.html" class="nav-item">

</nav>

<script>
  const IMG = {
    regieleki:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/894.png',
    regidrago:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/895.png',
    kyogre:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/382.png',
    groudon:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/383.png',
    tapuKoko:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/785.png',
    tapuLele:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/786.png',
    latias:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/380.png',
    latios:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/381.png',
    houndoom:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/229.png',
    manectric:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/310.png',
    aerodactyl:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/142.png',
    alakazam:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/65.png',
    sharpedo:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/319.png',
    banette:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/354.png'
  };

  const raidRanges = [
    { name:'레지에레키', label:'5성', type:'blue', image:IMG.regieleki, startDate:'2026-03-25', endDate:'2026-03-31', cp:'1939 - 2015', boostCp:'2424 - 2519', weather:'Windy', desc:'현재 5성 레이드 메인 보스', types:['Electric'] },
    { name:'메가 헬가', label:'메가', type:'purple', image:IMG.houndoom, startDate:'2026-03-25', endDate:'2026-03-31', cp:'1888 - 1973', boostCp:'2360 - 2466', weather:'Fog', desc:'현재 메가 레이드 보스', types:['Dark','Fire'] },

    { name:'레지드래고', label:'5성', type:'blue', image:IMG.regidrago, startDate:'2026-04-01', endDate:'2026-04-07', cp:'1614 - 1699', boostCp:'2017 - 2124', weather:'Windy', desc:'현재 5성 레이드 메인 보스', types:['Dragon'] },
    { name:'메가썬더볼트', label:'메가', type:'purple', image:IMG.manectric, startDate:'2026-04-01', endDate:'2026-04-07', cp:'1267 - 1337', boostCp:'1585 - 1672', weather:'Rainy', desc:'현재 메가 레이드 보스', types:['Electric'] },

    { name:'가이오가', label:'5성', type:'blue', image:IMG.kyogre, startDate:'2026-04-08', endDate:'2026-04-14', cp:'2260 - 2351', boostCp:'2825 - 2939', weather:'Rainy', desc:'현재 5성 레이드 메인 보스', types:['Water'] },
    { name:'메가프테라', label:'메가', type:'purple', image:IMG.aerodactyl, startDate:'2026-04-08', endDate:'2026-04-14', cp:'1801 - 1888', boostCp:'2251 - 2360', weather:'Windy', desc:'현재 메가 레이드 보스', types:['Rock','Flying'] },

    { name:'그란돈', label:'5성', type:'blue', image:IMG.groudon, startDate:'2026-04-15', endDate:'2026-04-21', cp:'2260 - 2351', boostCp:'2825 - 2939', weather:'Sunny', desc:'현재 5성 레이드 메인 보스', types:['Ground'] },
    { name:'메가후딘', label:'메가', type:'purple', image:IMG.alakazam, startDate:'2026-04-15', endDate:'2026-04-21', cp:'1843 - 1938', boostCp:'2304 - 2423', weather:'Windy', desc:'현재 메가 레이드 보스', types:['Psychic'] },

    { name:'카푸꼬꼬꼭', label:'5성', type:'blue', image:IMG.tapuKoko, startDate:'2026-04-22', endDate:'2026-04-28', cp:'1730 - 1810', boostCp:'2162 - 2262', weather:'Rainy', desc:'현재 5성 레이드 메인 보스', types:['Electric','Fairy'] },
    { name:'메가샤크니아', label:'메가', type:'purple', image:IMG.sharpedo, startDate:'2026-04-22', endDate:'2026-04-28', cp:'1817 - 1907', boostCp:'2271 - 2384', weather:'Rainy', desc:'현재 메가 레이드 보스', types:['Water','Dark'] },

    { name:'카푸나비나', label:'5성', type:'blue', image:IMG.tapuLele, startDate:'2026-04-29', endDate:'2026-04-30', cp:'1730 - 1810', boostCp:'2162 - 2262', weather:'Windy', desc:'현재 5성 레이드 메인 보스', types:['Psychic','Fairy'] },
    { name:'메가다크펫', label:'메가', type:'purple', image:IMG.banette, startDate:'2026-04-29', endDate:'2026-04-30', cp:'1794 - 1886', boostCp:'2243 - 2358', weather:'Fog', desc:'현재 메가 레이드 보스', types:['Ghost'] }
  ];

  const weekendShadow = [
    { name:'그림자 라티아스', label:'그림자', type:'pink', image:IMG.latias, startDate:'2026-03-29', endDate:'2026-03-31', weather:'Windy', desc:'그림자 5성 레이드 진행 중', types:['Dragon','Psychic'] },
    { name:'그림자 라티오스', label:'그림자', type:'pink', image:IMG.latios, startDate:'2026-04-01', endDate:'2026-04-05', weather:'Windy', desc:'그림자 5성 레이드 진행 중', types:['Dragon','Psychic'] },
    { name:'그림자 라티오스', label:'그림자', type:'pink', image:IMG.latios, startDate:'2026-04-11', endDate:'2026-04-12', weather:'Windy', desc:'그림자 5성 레이드 진행 중', types:['Dragon','Psychic'] },
    { name:'그림자 라티오스', label:'그림자', type:'pink', image:IMG.latios, startDate:'2026-04-18', endDate:'2026-04-19', weather:'Windy', desc:'그림자 5성 레이드 진행 중', types:['Dragon','Psychic'] },
    { name:'그림자 라티오스', label:'그림자', type:'pink', image:IMG.latios, startDate:'2026-04-25', endDate:'2026-04-26', weather:'Windy', desc:'그림자 5성 레이드 진행 중', types:['Dragon','Psychic'] }
  ];

  const today = new Date('2026-04-01T00:00:00');
  // 실제 운영시에는 아래 한 줄만 쓰면 됩니다.
  // const today = new Date();

  function pad(n){ return String(n).padStart(2,'0'); }

  function toDate(str){
    const [y,m,d] = str.split('-').map(Number);
    return new Date(y, m - 1, d, 0, 0, 0, 0);
  }

  function toKey(date){
    return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}`;
  }

  function inRange(date, startStr, endStr){
    const t = toDate(toKey(date)).getTime();
    const s = toDate(startStr).getTime();
    const e = toDate(endStr).getTime();
    return t >= s && t <= e;
  }

  function formatDateRange(startDate, endDate){
    return `${startDate.replaceAll('-','.')} - ${endDate.replaceAll('-','.')}`;
  }

  function getCurrentItems(date){
    return [
      ...raidRanges.filter(item => inRange(date, item.startDate, item.endDate)),
      ...weekendShadow.filter(item => inRange(date, item.startDate, item.endDate))
    ];
  }

  function typeChipClass(typeName){
    const lower = typeName.toLowerCase();
    if(lower.includes('dragon') || lower.includes('water') || lower.includes('ground')) return 'blue';
    if(lower.includes('psychic') || lower.includes('fairy') || lower.includes('ghost')) return 'pink';
    if(lower.includes('electric') || lower.includes('rock') || lower.includes('fire')) return 'yellow';
    if(lower.includes('dark')) return 'gray';
    return 'green';
  }

  function renderRangeText(items){
    const el = document.getElementById('rangeText');
    if(!items.length){
      el.textContent = '현재 진행 중인 일정이 없습니다.';
      return;
    }

    const starts = items.map(item => item.startDate).sort();
    const ends = items.map(item => item.endDate).sort();
    const start = starts[0];
    const end = ends[ends.length - 1];

    el.textContent = `예시 기준: ${start.replaceAll('-','.')} - ${end.replaceAll('-','.')}`;
  }

  function renderCards(){
    const grid = document.getElementById('raidGrid');
    const items = getCurrentItems(today);

    renderRangeText(items);

    if(!items.length){
      grid.innerHTML = `<div class="raid-card"><div class="raid-card-body">현재 진행 중인 레이드가 없습니다.</div></div>`;
      return;
    }

    grid.innerHTML = items.map(item => `
      <article class="raid-card">
        <div class="raid-card-top">
          <span class="chip ${item.type}">LIVE · ${item.label}</span>
          <div class="raid-date">${formatDateRange(item.startDate, item.endDate)}</div>
        </div>

        <div class="raid-card-body">
          <div class="raid-name">${item.name}</div>
          <div class="raid-desc">${item.desc}</div>

          <div class="raid-main">
            <div class="raid-thumb">
              <img src="${item.image}" alt="${item.name}">
            </div>

            <div>
              <div class="raid-types">
                ${(item.types || []).map(typeName => `
                  <span class="chip ${typeChipClass(typeName)}">${typeName}</span>
                `).join('')}
              </div>

              <div class="stat-grid">
                ${
                  item.cp
                  ? `
                    <div class="stat-box">
                      <div class="stat-label">일반 CP</div>
                      <div class="stat-value">${item.cp}</div>
                    </div>
                    <div class="stat-box">
                      <div class="stat-label">부스트 CP</div>
                      <div class="stat-value">${item.boostCp}</div>
                    </div>
                  `
                  : `
                    <div class="stat-box">
                      <div class="stat-label">진행 구간</div>
                      <div class="stat-value">${item.startDate.slice(5).replace('-','.')} - ${item.endDate.slice(5).replace('-','.')}</div>
                    </div>
                    <div class="stat-box">
                      <div class="stat-label">레이드 등급</div>
                      <div class="stat-value">5-Star</div>
                    </div>
                  `
                }
              </div>

              <div class="weather-row">
                <span class="chip gray">${item.weather || 'Windy'}</span>
              </div>
            </div>
          </div>
        </div>
      </article>
    `).join('');
  }

  renderCards();
</script>
</body>
</html>
