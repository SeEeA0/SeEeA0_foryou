<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pokémon GO Raid Planner | 거다이맥스</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Pretendard',sans-serif;
  background:#edf3fb;
  color:#1f2f46;
}

.wrap{
  max-width:1100px;
  margin:auto;
  padding:16px 12px 100px;
}

/* 🔥 상단 (최종 미니멀) */
.hero{
  background:#fff;
  border-radius:24px;
  padding:18px 16px;
  box-shadow:0 10px 25px rgba(0,0,0,.05);
  margin-bottom:14px;
}

.hero-title{
  font-size:28px;
  font-weight:900;
}

.hero-date{
  margin-top:8px;
  font-size:13px;
  font-weight:800;
  color:#6f81a0;
}

/* 카드 */
.section{
  background:#fff;
  border-radius:22px;
  padding:14px;
  margin-bottom:14px;
  box-shadow:0 10px 25px rgba(0,0,0,.05);
}

.section-title{
  font-weight:900;
  margin-bottom:10px;
}

/* 이벤트 */
.event-point{
  background:#f6f9ff;
  border-radius:12px;
  padding:10px;
  margin-bottom:6px;
  font-size:13px;
}

/* 탭 */
.boss-tabs{
  display:flex;
  gap:10px;
  overflow-x:auto;
}

.boss-tab{
  min-width:110px;
  background:#fff;
  border-radius:16px;
  padding:10px;
  text-align:center;
  border:1px solid #e2ebf7;
  cursor:pointer;
}

.boss-tab.active{
  border:2px solid #3567d7;
}

.boss-tab img{
  width:60px;
}

/* 타입 */
.type-chip{
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:4px 8px;
  border-radius:999px;
  background:#f3f7ff;
  margin:2px;
}

.type-chip img{
  width:16px;
}

/* 하단 네비 */
.bottom-nav{
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  display:grid;
  grid-template-columns:repeat(4,1fr);
  width:90%;
  background:#fff;
  border-radius:18px;
  padding:8px;
  box-shadow:0 10px 25px rgba(0,0,0,.1);
}

.nav-item{
  text-align:center;
  font-size:12px;
}
</style>
</head>

<body>
<div class="wrap">

<!-- ✅ 상단 -->
<section class="hero">
  <div class="hero-title">거다이맥스 배틀</div>
  <div class="hero-date">4/25 14:00 ~ 17:00</div>
</section>

<!-- ✅ 이벤트 -->
<section class="section">
  <div class="section-title">이벤트 핵심 정보</div>

  <div class="event-point">파워스폿에서 거다이맥스 배틀 등장</div>
  <div class="event-point">맥스 파티클 8배</div>
  <div class="event-point">특별 교환 최대 3회</div>
  <div class="event-point">다이버섯 → 데미지 2배</div>

</section>

<!-- ✅ 보스 선택 -->
<section class="section">
  <div class="section-title">보스 선택</div>
  <div class="boss-tabs" id="bossTabs"></div>
</section>

<!-- ✅ 상세 -->
<section class="section">
  <div id="bossDetail"></div>
</section>

</div>

<!-- 하단 -->
<nav class="bottom-nav">
  <a href="./index.html" class="nav-item">메인</a>
  <a href="./raid-now.html" class="nav-item">거다이맥스</a>
  <a href="./weekly.html" class="nav-item">주간</a>
  <a href="./monthly.html" class="nav-item">월간</a>
</nav>

<script>
const TYPE_MAP={
'불':2,'물':3,'전기':4,'풀':5,'얼음':6,'격투':7,'독':8,'땅':9,
'비행':10,'페어리':11,'벌레':12,'바위':13,'고스트':14,
'드래곤':15,'악':16,'강철':17,'에스퍼':18
}

function typeChip(t){
 return `<span class="type-chip">
 <img src="icons/${TYPE_MAP[t]}.png">${t}</span>`
}

const BOSSES={
charizard:{
name:'리자몽',
types:['불','비행'],
weak:['바위','전기','물'],
img:6
},
blastoise:{
name:'거북왕',
types:['물'],
weak:['전기','풀'],
img:9
}
}

function renderTabs(){
document.getElementById('bossTabs').innerHTML=
Object.entries(BOSSES).map(([k,v])=>`
<div class="boss-tab" onclick="render('${k}')">
<img src="https://cdn.leekduck.com/assets/img/pokemon_icons/pm${v.img}.fGIGANTAMAX.icon.png">
<div>${v.name}</div>
</div>
`).join('')
}

function render(k){
const b=BOSSES[k]

document.getElementById('bossDetail').innerHTML=`
<h2>${b.name}</h2>
<div>${b.types.map(typeChip).join('')}</div>
<div>약점: ${b.weak.map(typeChip).join('')}</div>
`
}

renderTabs()
render('charizard')
</script>

</body>
</html>
