<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pokémon GO Raid Planner | 지금 레이드</title>

<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#edf3fb;
    color:#1f2f46;
  }

  :root{
    --bg:#edf3fb;
    --card:#ffffff;
    --line:#d8e3f2;
    --text:#1f2f46;
    --muted:#7486a3;

    --blue:#3567d7;
    --blue-soft:#e7f0ff;

    --purple:#7c58e9;
    --purple-soft:#efe7ff;

    --pink:#d85b85;
    --pink-soft:#ffe8f0;

    --yellow:#b88818;
    --yellow-soft:#fff1c9;

    --green:#49a66b;
    --green-soft:#e7f5eb;

    --gray:#67768f;
    --gray-soft:#f2f5fa;

    --shadow:0 14px 32px rgba(43,67,110,.08);
    --shadow-hover:0 18px 36px rgba(43,67,110,.14);
  }

  .wrap{
    max-width:1180px;
    margin:0 auto;
    padding:16px 14px 110px;
  }

  .fade-up{
    opacity:0;
    transform:translateY(10px);
    animation:fadeUp .55s ease forwards;
  }
  .delay-1{animation-delay:.05s}
  .delay-2{animation-delay:.1s}

  @keyframes fadeUp{
    from{opacity:0;transform:translateY(10px)}
    to{opacity:1;transform:translateY(0)}
  }

  @keyframes softFloat{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-4px)}
  }

  @keyframes pulseRing{
    0%{box-shadow:0 0 0 0 rgba(83,123,221,.16)}
    70%{box-shadow:0 0 0 10px rgba(83,123,221,0)}
    100%{box-shadow:0 0 0 0 rgba(83,123,221,0)}
  }

  @keyframes smokeFloat{
    0%{
      transform:translate(-50%, -50%) scale(1) rotate(0deg);
      opacity:.62;
    }
    25%{
      transform:translate(-50%, -50%) scale(1.02) rotate(-0.6deg);
      opacity:.7;
    }
    50%{
      transform:translate(-50%, -50%) scale(1.04) rotate(0.6deg);
      opacity:.74;
    }
    75%{
      transform:translate(-50%, -50%) scale(1.02) rotate(-0.4deg);
      opacity:.68;
    }
    100%{
      transform:translate(-50%, -50%) scale(1) rotate(0deg);
      opacity:.62;
    }
  }

  .section{
    background:rgba(255,255,255,.9);
    border:1px solid var(--line);
    border-radius:26px;
    box-shadow:var(--shadow);
    overflow:hidden;
    margin-bottom:16px;
  }

  .section-head{
    padding:18px 18px 14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    border-bottom:1px solid #e6eef8;
  }

  .section-title{
    font-size:20px;
    font-weight:900;
    letter-spacing:-.03em;
  }

  .section-sub{
    margin-top:6px;
    font-size:13px;
    color:var(--muted);
    font-weight:800;
  }

  .section-body{
    padding:14px;
  }

  .filter-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  .filter-btn{
    min-height:38px;
    padding:0 14px;
    border-radius:999px;
    border:1px solid #d7e2f0;
    background:#fff;
    color:#6c7f9f;
    font-size:12px;
    font-weight:900;
    cursor:pointer;
    transition:.15s ease;
  }

  .filter-btn:hover{
    transform:translateY(-1px);
    border-color:#c7d7ec;
  }

  .filter-btn.active{
    background:#edf4ff;
    color:#3567d7;
    border-color:#cdddf5;
    animation:pulseRing 1.8s infinite;
  }

  .raid-grid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:14px;
  }

  .group-section + .group-section{
    margin-top:14px;
  }

  .group-head{
    margin-bottom:12px;
  }

  .group-title{
    font-size:18px;
    font-weight:900;
    letter-spacing:-.03em;
  }

  .group-sub{
    margin-top:6px;
    font-size:12px;
    color:#7b8ca8;
    font-weight:800;
  }

  .raid-card{
    background:linear-gradient(180deg,#fff 0%, #f9fbff 100%);
    border:1.5px solid var(--line);
    border-radius:24px;
    padding:18px;
    position:relative;
    overflow:hidden;
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    min-height:340px;
    display:flex;
    flex-direction:column;
  }

  .raid-card::after{
    content:"";
    position:absolute;
    right:-35px;
    bottom:-35px;
    width:110px;
    height:110px;
    border-radius:50%;
    background:linear-gradient(135deg, rgba(120,148,255,.14), rgba(123,99,255,.04));
    pointer-events:none;
  }

  .raid-card:hover{
    transform:translateY(-4px);
    box-shadow:var(--shadow-hover);
    border-color:#c7d7ec;
  }

  .raid-card.shadow-theme{
    background:linear-gradient(180deg,#f3f3f5 0%, #e5e5e9 100%);
    border-color:#2b2b31;
    box-shadow:
      0 14px 30px rgba(0,0,0,.12),
      inset 0 0 0 1px rgba(255,255,255,.18);
  }

  .raid-card.shadow-theme::after{
    right:-18px;
    bottom:-18px;
    width:96px;
    height:96px;
    background:radial-gradient(circle, rgba(0,0,0,.08) 0%, rgba(0,0,0,0) 68%);
  }

  .raid-head{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:12px;
  }

  .raid-chip{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:30px;
    padding:0 11px;
    border-radius:999px;
    font-size:11px;
    font-weight:900;
    line-height:1;
    flex-shrink:0;
  }

  .chip-blue{background:var(--blue-soft);color:var(--blue)}
  .chip-yellow{background:var(--yellow-soft);color:var(--yellow)}
  .chip-green{background:var(--green-soft);color:var(--green)}
  .chip-purple{background:var(--purple-soft);color:var(--purple)}
  .chip-gray{background:var(--gray-soft);color:var(--gray)}
  .chip-shadow{
    background:#e7e7ea;
    color:#2d3138;
    border:1px solid #bfc4cc;
  }

  .raid-period{
    font-size:12px;
    color:#7b8ca8;
    font-weight:900;
    text-align:right;
    line-height:1.35;
    letter-spacing:-.01em;
  }

  .raid-card.shadow-theme .raid-period{
    color:#5f6670;
    position:relative;
    z-index:3;
  }

  .raid-main{
    display:grid;
    grid-template-columns:88px 1fr;
    gap:16px;
    align-items:center;
    margin-top:16px;
  }

  .raid-thumb{
    width:88px;
    height:88px;
    border-radius:22px;
    background:#f3f7ff;
    border:1px solid #dce6f5;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    box-shadow:0 10px 24px rgba(43,67,110,.08);
    animation:softFloat 3.8s ease-in-out infinite;
    position:relative;
    isolation:isolate;
  }

  .raid-card.shadow-theme .raid-thumb{
    background:linear-gradient(180deg,#efeff2 0%, #dcdce2 100%);
    border-color:#2d2f35;
    box-shadow:
      0 10px 20px rgba(0,0,0,.12),
      inset 0 1px 0 rgba(255,255,255,.25);
    overflow:visible;
  }

  .shadow-flame{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%, -50%);
    width:76px;
    height:76px;
    object-fit:contain;
    opacity:.7;
    pointer-events:none;
    z-index:1;
    filter:drop-shadow(0 0 8px rgba(130, 92, 220, .22));
    animation:smokeFloat 3.8s ease-in-out infinite;
  }

  .pokemon-img{
    position:relative;
    z-index:2;
    width:72px;
    height:72px;
    object-fit:contain;
  }

  .rocket-badge{
    position:absolute;
    right:18px;
    bottom:18px;
    width:70px;
    height:70px;
    object-fit:contain;
    z-index:2;
    opacity:.92;
    filter:drop-shadow(0 3px 6px rgba(0,0,0,.12));
    pointer-events:none;
  }

  .raid-name{
    font-size:24px;
    line-height:1.12;
    font-weight:900;
    letter-spacing:-.03em;
    word-break:keep-all;
  }

  .raid-desc{
    margin-top:8px;
    font-size:13px;
    color:#7183a0;
    line-height:1.5;
    font-weight:800;
  }

  .raid-card.shadow-theme .raid-desc{
    color:#636a74;
  }

  .raid-content{
    display:flex;
    flex-direction:column;
    flex:1;
    min-height:0;
  }

  .info-stack{
    margin-top:16px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .type-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  .type-pill{
    min-height:36px;
    padding:0 13px;
    border-radius:999px;
    border:1px solid #d9e3f2;
    background:#fff;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:7px;
    font-size:12px;
    font-weight:900;
    color:#607897;
  }

  .raid-card.shadow-theme .type-pill,
  .raid-card.shadow-theme .meta-pill,
  .raid-card.shadow-theme .boost-pill{
    background:rgba(255,255,255,.82);
    border-color:#b8bcc5;
    color:#464c55;
  }

  .type-icon{
    width:18px;
    height:18px;
    object-fit:contain;
    display:block;
    flex-shrink:0;
  }

  .meta-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  .meta-pill{
    min-height:36px;
    padding:0 13px;
    border-radius:999px;
    border:1px solid #d9e3f2;
    background:#fff;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:900;
    color:#607897;
  }

  .boost-row{
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    gap:8px;
  }

  .boost-pill{
    min-height:36px;
    padding:0 13px;
    border-radius:999px;
    border:1px solid #d9e3f2;
    background:#fff;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:7px;
    font-size:12px;
    font-weight:900;
    color:#607897;
  }

  .boost-icon{
    width:16px;
    height:16px;
    object-fit:contain;
    display:block;
    flex-shrink:0;
  }

  .card-bottom{
    margin-top:auto;
    padding-top:14px;
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:12px;
  }

  .action-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  .action-btn{
    min-height:38px;
    padding:0 14px;
    border-radius:999px;
    border:1px solid #d7e2f0;
    background:#fff;
    color:#597392;
    font-size:12px;
    font-weight:900;
    cursor:pointer;
    transition:.16s ease;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    justify-content:center;
  }

  .action-btn:hover{
    transform:translateY(-1px);
    border-color:#c7d7ec;
    box-shadow:0 10px 18px rgba(43,67,110,.07);
  }

  .action-btn.primary{
    background:#edf4ff;
    color:#3567d7;
    border-color:#cdddf5;
  }

  .cp-table-panel{
    margin-top:12px;
    display:none;
    padding:14px;
    border-radius:18px;
    background:#fbfdff;
    border:1px dashed #d7e2f1;
  }

  .cp-table-panel.show{
    display:block;
    animation:fadeUp .24s ease forwards;
  }

  .cp-table-panel img{
    width:100%;
    max-width:420px;
    display:block;
    margin:0 auto;
    border-radius:12px;
    box-shadow:0 10px 24px rgba(43,67,110,.08);
  }

  .raid-card.shadow-theme .cp-table-panel{
    background:rgba(255,255,255,.74);
    border-color:#aeb3be;
  }

  .empty-box{
    border:1px dashed #d9e4f2;
    background:#fbfdff;
    border-radius:18px;
    padding:18px 14px;
    text-align:center;
    color:#97a5ba;
    font-size:13px;
    font-weight:800;
  }

  .bottom-nav{
    position:fixed;
    left:50%;
    bottom:14px;
    transform:translateX(-50%);
    width:min(980px, calc(100% - 24px));
    background:rgba(255,255,255,.94);
    border:1px solid var(--line);
    border-radius:24px;
    box-shadow:0 18px 36px rgba(42,59,97,.12);
    backdrop-filter:blur(10px);
    padding:10px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    z-index:30;
  }

  .nav-item{
    min-height:64px;
    border-radius:16px;
    text-decoration:none;
    color:#6f819e;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:6px;
    font-size:12px;
    font-weight:900;
    transition:.18s ease;
    background:#f8fbff;
    border:1px solid transparent;
  }

  .nav-item:hover{
    background:#f3f7ff;
    color:#486995;
    border-color:#d6e3f3;
    transform:translateY(-1px);
  }

  .nav-item.active{
    background:#edf4ff;
    color:#3567d7;
    border-color:#cdddf5;
  }

  .nav-icon{
    font-size:18px;
    line-height:1;
  }

  @media (max-width:980px){
    .raid-grid{
      grid-template-columns:1fr;
    }
  }

  @media (max-width:768px){
    .wrap{
      padding:14px 12px 120px;
    }

    .section-head{
      padding:16px 16px 12px;
      flex-direction:column;
      align-items:flex-start;
    }

    .section-body{
      padding:12px;
    }

    .raid-card{
      min-height:auto;
      padding:16px;
    }

    .raid-main{
      grid-template-columns:72px 1fr;
      gap:14px;
    }

    .raid-thumb{
      width:72px;
      height:72px;
      border-radius:18px;
    }

    .shadow-flame{
      width:62px;
      height:62px;
    }

    .pokemon-img{
      width:58px;
      height:58px;
    }

    .rocket-badge{
      right:14px;
      bottom:14px;
      width:55px;
      height:55px;
    }

    .raid-name{
      font-size:21px;
    }

    .card-bottom{
      align-items:flex-start;
    }

    .raid-period{
      font-size:11px;
    }
  }

  @media (prefers-reduced-motion: reduce){
    *{
      animation:none !important;
      transition:none !important;
      scroll-behavior:auto !important;
    }
  }
</style>
</head>
<body>
<div class="wrap">

  <section class="section fade-up">
    <div class="section-head">
      <div>
        <div class="section-title">레이드 타입 필터</div>
        <div class="section-sub">원하는 타입만 골라서 볼 수 있습니다</div>
      </div>
    </div>
    <div class="section-body">
      <div class="filter-row" id="filterRow"></div>
    </div>
  </section>

  <section class="section fade-up delay-1">
    <div class="section-head">
      <div>
        <div class="section-title">진행 중인 레이드</div>
        <div class="section-sub">오늘날짜 기반 자동 업데이트 됩니다</div>
      </div>
    </div>
    <div class="section-body">
      <div class="group-section">
        <div class="group-head">
          <div class="group-title">일반 레이드</div>
          <div class="group-sub"></div>
        </div>
        <div class="raid-grid" id="normalRaidGrid"></div>
      </div>

      <div class="group-section">
        <div class="group-head">
          <div class="group-title">그림자 레이드</div>
          <div class="group-sub">/div>
        </div>
        <div class="raid-grid" id="shadowRaidGrid"></div>
      </div>
    </div>
  </section>

</div>

<nav class="bottom-nav">
  <a href="./index.html" class="nav-item">
    <div class="nav-icon">🏠</div>
    <div>메인</div>
  </a>
  <a href="./raid-now.html" class="nav-item active">
    <div class="nav-icon">⚔️</div>
    <div>지금 레이드</div>
  </a>
  <a href="./weekly.html" class="nav-item">
    <div class="nav-icon">🗓️</div>
    <div>주간 일정표</div>
  </a>
  <a href="./monthly.html" class="nav-item">
    <div class="nav-icon">📆</div>
    <div>월간 일정</div>
  </a>
</nav>

<script type="module" src="./js/raid-now.js"></script>
</body>
</html>
