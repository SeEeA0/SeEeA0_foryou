<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>현재 진행 중 레이드</title>

<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:'Pretendard',sans-serif;
  background:#edf3fb;
  color:#1f2f46;
}

.wrap{
  max-width:1200px;
  margin:0 auto;
  padding:20px 16px 100px;
}

.title{
  font-size:28px;
  font-weight:900;
  margin-bottom:16px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
}

.card{
  background:#fff;
  border-radius:22px;
  padding:18px;
  border:1px solid #dbe5f3;
}

.top{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.badge{
  background:#e7f0ff;
  color:#3567d7;
  padding:6px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
}

.name{
  font-size:22px;
  font-weight:900;
}

.row{
  display:flex;
  gap:14px;
  margin-top:14px;
}

.thumb{
  width:100px;
  height:100px;
  border-radius:20px;
  background:#f3f7ff;
  display:flex;
  align-items:center;
  justify-content:center;
}

.thumb img{
  width:80px;
}

.info{
  flex:1;
}

.stat{
  background:#f6f9ff;
  border-radius:14px;
  padding:10px;
  margin-top:8px;
  font-size:14px;
  font-weight:900;
}

/* 🔥 부스트 영역 */
.boost-box{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:10px;
}

.boost-icon{
  width:34px;
  height:34px;
  border-radius:10px;
  background:#eef3ff;
  display:flex;
  align-items:center;
  justify-content:center;
}

.boost-icon img{
  width:22px;
}

.boost-text{
  font-size:13px;
  font-weight:900;
}

/* 🔥 공략 영역 */
.strategy{
  margin-top:14px;
}

.strategy-title{
  font-size:13px;
  font-weight:900;
  margin-bottom:6px;
}

.type-row{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.type{
  display:flex;
  align-items:center;
  gap:6px;
  background:#f1f6ff;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
}

.type img{
  width:16px;
}

@media(max-width:900px){
  .grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="wrap">

  <div class="title">현재 진행 중 레이드</div>

  <div class="grid" id="grid"></div>

</div>

<script>
const IMG = {
  regidrago:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/895.png',
  kyogre:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/382.png'
}

/* 🔥 여기만 수정하면 됨 */
const DATA = [
  {
    name:'레지드래고',
    label:'5성',
    image:IMG.regidrago,
    cp:'1614 - 1699',
    boostCp:'2017 - 2124',
    boost:'강풍',
    boostIcon:'/icons/weather-windy.png', // 🔥 여기 아이콘 넣으세요
    types:[
      {name:'드래곤', icon:'/icons/type-dragon.png'},
      {name:'얼음', icon:'/icons/type-ice.png'},
      {name:'페어리', icon:'/icons/type-fairy.png'}
    ]
  },

  {
    name:'가이오가',
    label:'5성',
    image:IMG.kyogre,
    cp:'2260 - 2351',
    boostCp:'2825 - 2939',
    boost:'비',
    boostIcon:'/icons/weather-rain.png',
    types:[
      {name:'전기', icon:'/icons/type-electric.png'},
      {name:'풀', icon:'/icons/type-grass.png'}
    ]
  }
];

function render(){
  const el = document.getElementById('grid');

  el.innerHTML = DATA.map(d=>`
    <div class="card">

      <div class="top">
        <div class="badge">${d.label}</div>
      </div>

      <div class="name">${d.name}</div>

      <div class="row">
        <div class="thumb">
          <img src="${d.image}">
        </div>

        <div class="info">
          <div class="stat">CP ${d.cp}</div>

          <div class="stat">부스트 CP ${d.boostCp}</div>

          <!-- 🔥 부스트 영역 -->
          <div class="boost-box">
            <div class="boost-icon">
              <img src="${d.boostIcon}">
            </div>
            <div class="boost-text">
              ${d.boost} 날씨 부스트
            </div>
          </div>

        </div>
      </div>

      <!-- 🔥 공략 -->
      <div class="strategy">
        <div class="strategy-title">공략</div>

        <div class="type-row">
          ${d.types.map(t=>`
            <div class="type">
              <img src="${t.icon}">
              ${t.name}
            </div>
          `).join('')}
        </div>
      </div>

    </div>
  `).join('');
}

render();
</script>

</body>
</html>
