<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pokémon GO Raid Planner | 주간 일정</title>

<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#edf3fb;
    color:#1f2f46;
  }

  :root{
    --bg:#edf3fb;
    --card:#ffffff;
    --line:#d8e3f2;
    --text:#1f2f46;
    --muted:#7486a3;

    --blue:#3567d7;
    --blue-soft:#e7f0ff;

    --purple:#7c58e9;
    --purple-soft:#efe7ff;

    --pink:#d85b85;
    --pink-soft:#ffe8f0;

    --yellow:#b88818;
    --yellow-soft:#fff6d8;

    --green:#49a66b;
    --green-soft:#e7f5eb;

    --gray:#67768f;
    --gray-soft:#f2f5fa;

    --shadow-bg:#2e323b;
    --shadow-soft:#3b404c;

    --shadow:0 14px 32px rgba(43,67,110,.08);
    --shadow-hover:0 18px 36px rgba(43,67,110,.14);
  }

  .wrap{
    max-width:1180px;
    margin:0 auto;
    padding:16px 14px 110px;
  }

  .fade-up{
    opacity:0;
    transform:translateY(10px);
    animation:fadeUp .55s ease forwards;
  }

  @keyframes fadeUp{
    from{opacity:0;transform:translateY(10px)}
    to{opacity:1;transform:translateY(0)}
  }

  @keyframes softFloat{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-4px)}
  }

  @keyframes pulseRing{
    0%{box-shadow:0 0 0 0 rgba(83,123,221,.16)}
    70%{box-shadow:0 0 0 10px rgba(83,123,221,0)}
    100%{box-shadow:0 0 0 0 rgba(83,123,221,0)}
  }

  @keyframes smokeFloat{
    0%{
      transform:translate(-50%, -50%) scale(1) rotate(0deg);
      opacity:.62;
    }
    25%{
      transform:translate(-50%, -50%) scale(1.02) rotate(-0.6deg);
      opacity:.72;
    }
    50%{
      transform:translate(-50%, -50%) scale(1.05) rotate(0.6deg);
      opacity:.78;
    }
    75%{
      transform:translate(-50%, -50%) scale(1.02) rotate(-0.4deg);
      opacity:.7;
    }
    100%{
      transform:translate(-50%, -50%) scale(1) rotate(0deg);
      opacity:.62;
    }
  }

  .section{
    background:rgba(255,255,255,.9);
    border:1px solid var(--line);
    border-radius:26px;
    box-shadow:var(--shadow);
    overflow:hidden;
    margin-bottom:16px;
  }

  .section-head{
    padding:18px 18px 14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    border-bottom:1px solid #e6eef8;
  }

  .section-title{
    font-size:20px;
    font-weight:900;
    letter-spacing:-.03em;
  }

  .section-sub{
    margin-top:6px;
    font-size:13px;
    color:var(--muted);
    font-weight:800;
    line-height:1.45;
  }

  .section-body{
    padding:14px;
  }

  .date-toolbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:14px;
    flex-wrap:wrap;
  }

  .date-current{
    min-height:54px;
    padding:0 16px;
    border-radius:18px;
    background:#fff;
    border:1px solid var(--line);
    box-shadow:0 10px 24px rgba(43,67,110,.06);
    display:flex;
    align-items:center;
  }

  .date-current-inner{
    display:flex;
    align-items:center;
    gap:12px;
  }

  .date-current-weekday{
    min-width:52px;
    height:32px;
    padding:0 10px;
    border-radius:999px;
    background:#edf4ff;
    color:#3567d7;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:900;
  }

  .date-current-day{
    font-size:28px;
    line-height:1;
    font-weight:900;
    letter-spacing:-.04em;
  }

  .date-current-full{
    font-size:13px;
    color:#6f82a0;
    font-weight:800;
  }

  .date-nav{
    display:flex;
    align-items:center;
    gap:8px;
  }

  .date-nav-btn{
    min-width:42px;
    height:42px;
    border-radius:14px;
    border:1px solid #d7e2f0;
    background:#fff;
    color:#5c7395;
    font-size:16px;
    font-weight:900;
    cursor:pointer;
    transition:.16s ease;
  }

  .date-nav-btn:hover:not(:disabled){
    transform:translateY(-1px);
    box-shadow:0 10px 18px rgba(43,67,110,.07);
    border-color:#c7d7ec;
  }

  .date-nav-btn:disabled{
    opacity:.45;
    cursor:not-allowed;
  }

  .week-dots{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:14px;
  }

  .week-dot{
    width:18px;
    height:18px;
    border-radius:50%;
    border:1px solid #d0ddf0;
    background:#fff;
    cursor:pointer;
    transition:.16s ease;
  }

  .week-dot:hover{
    transform:translateY(-1px);
    border-color:#b6cae8;
  }

  .week-dot.today{
    background:#eef4ff;
    border-color:#cdddf5;
  }

  .week-dot.active{
    background:#3567d7;
    border-color:#3567d7;
    animation:pulseRing 1.8s infinite;
  }

  .selected-day-wrap{
    display:block;
  }

  .day-card{
    background:linear-gradient(180deg,#ffffff 0%, #f8fbff 100%);
    border:1.5px solid var(--line);
    border-radius:24px;
    padding:18px;
    position:relative;
    overflow:hidden;
  }

  .day-card::before{
    content:"";
    position:absolute;
    right:-30px;
    top:-30px;
    width:140px;
    height:140px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(104,135,255,.16) 0%, rgba(104,135,255,0) 70%);
    pointer-events:none;
  }

  .day-head{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:16px;
    margin-bottom:18px;
  }

  .day-left{
    display:flex;
    align-items:center;
    gap:14px;
  }

  .day-badge{
    width:76px;
    height:76px;
    border-radius:22px;
    background:#f3f7ff;
    border:1px solid #dce6f4;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    box-shadow:0 10px 24px rgba(43,67,110,.08);
    animation:softFloat 3.8s ease-in-out infinite;
    flex-shrink:0;
  }

  .day-num{
    font-size:28px;
    line-height:1;
    font-weight:900;
    letter-spacing:-.04em;
  }

  .day-week{
    margin-top:4px;
    font-size:12px;
    color:#7083a0;
    font-weight:900;
  }

  .day-title{
    font-size:24px;
    font-weight:900;
    letter-spacing:-.03em;
    line-height:1.2;
  }

  .day-chip{
    min-height:34px;
    padding:0 12px;
    border-radius:999px;
    background:#edf4ff;
    border:1px solid #cdddf5;
    color:#3567d7;
    font-size:12px;
    font-weight:900;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    white-space:nowrap;
  }

  .tier-section + .tier-section{
    margin-top:16px;
  }

  .tier-section{
    border-radius:24px;
    overflow:hidden;
    border:1px solid #dde7f4;
    background:#fff;
    box-shadow:0 8px 20px rgba(43,67,110,.05);
  }

  .tier-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    padding:14px 16px;
    border-bottom:1px solid rgba(0,0,0,.04);
  }

  .tier-left{
    display:flex;
    align-items:center;
    gap:12px;
    min-width:0;
  }

  .tier-egg-wrap{
    position:relative;
    width:54px;
    height:54px;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .tier-egg{
    width:44px;
    height:44px;
    object-fit:contain;
    position:relative;
    z-index:2;
  }

  .tier-shadow-flame{
    position:absolute;
    left:50%;
    top:50%;
    width:56px;
    height:56px;
    transform:translate(-50%, -50%);
    object-fit:contain;
    z-index:1;
    opacity:.85;
    pointer-events:none;
    animation:smokeFloat 3.8s ease-in-out infinite;
  }

  .tier-title-wrap{
    min-width:0;
  }

  .tier-title{
    font-size:22px;
    line-height:1.1;
    font-weight:900;
    letter-spacing:-.03em;
    word-break:keep-all;
  }

  .tier-sub{
    margin-top:5px;
    font-size:12px;
    font-weight:800;
    color:rgba(31,47,70,.58);
  }

  .tier-right{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    flex-shrink:0;
  }

  .boss-icons{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    padding-right:4px;
  }

  .boss-icon{
    width:26px;
    height:26px;
    object-fit:contain;
    border-radius:50%;
    background:rgba(255,255,255,.8);
    box-shadow:0 4px 10px rgba(0,0,0,.08);
  }

  .boss-icon + .boss-icon{
    margin-left:-7px;
  }

  .tier-body{
    padding:16px;
  }

  .tier-1 .tier-header{
    background:linear-gradient(180deg,#fff1f5 0%, #ffe8f0 100%);
    border-top:6px solid #e67d9a;
  }

  .tier-3 .tier-header{
    background:linear-gradient(180deg,#fffdf3 0%, #fff6d8 100%);
    border-top:6px solid #d6b541;
  }

  .tier-5 .tier-header{
    background:linear-gradient(180deg,#eef5ff 0%, #e2eeff 100%);
    border-top:6px solid #5f92f0;
  }

  .tier-mega .tier-header{
    background:linear-gradient(180deg,#f5f0ff 0%, #efe7ff 100%);
    border-top:6px solid #9874ef;
  }

  .tier-shadow .tier-header{
    background:linear-gradient(180deg,#424854 0%, #343943 100%);
    border-top:6px solid #a276ff;
    color:#fff;
  }

  .tier-shadow .tier-sub{
    color:rgba(255,255,255,.72);
  }

  .raid-grid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:14px;
  }

  .raid-card{
    background:linear-gradient(180deg,#fff 0%, #f9fbff 100%);
    border:1.5px solid var(--line);
    border-radius:24px;
    padding:18px;
    position:relative;
    overflow:hidden;
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    min-height:340px;
    display:flex;
    flex-direction:column;
  }

  .raid-card::after{
    content:"";
    position:absolute;
    right:-35px;
    bottom:-35px;
    width:110px;
    height:110px;
    border-radius:50%;
    background:linear-gradient(135deg, rgba(120,148,255,.14), rgba(123,99,255,.04));
    pointer-events:none;
  }

  .raid-card:hover{
    transform:translateY(-4px);
    box-shadow:0 18px 36px rgba(43,67,110,.14);
    border-color:#c7d7ec;
  }

  .raid-card.shadow-theme{
    background:linear-gradient(180deg,#f3f3f5 0%, #e5e5e9 100%);
    border-color:#2b2b31;
    box-shadow:
      0 14px 30px rgba(0,0,0,.12),
      inset 0 0 0 1px rgba(255,255,255,.18);
  }

  .raid-card.shadow-theme::after{
    right:-18px;
    bottom:-18px;
    width:96px;
    height:96px;
    background:radial-gradient(circle, rgba(0,0,0,.08) 0%, rgba(0,0,0,0) 68%);
  }

  .raid-head{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:12px;
  }

  .raid-chip{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:30px;
    padding:0 11px;
    border-radius:999px;
    font-size:11px;
    font-weight:900;
    line-height:1;
    flex-shrink:0;
  }

  .chip-blue{background:#e7f0ff;color:#3567d7}
  .chip-yellow{background:#fff1c9;color:#b88818}
  .chip-green{background:#e7f5eb;color:#49a66b}
  .chip-purple{background:#efe7ff;color:#7c58e9}
  .chip-gray{background:#f2f5fa;color:#67768f}
  .chip-shadow{
    background:#e7e7ea;
    color:#2d3138;
    border:1px solid #bfc4cc;
  }

  .raid-period{
    font-size:12px;
    color:#7b8ca8;
    font-weight:900;
    text-align:right;
    line-height:1.35;
    letter-spacing:-.01em;
  }

  .raid-card.shadow-theme .raid-period{
    color:#5f6670;
    position:relative;
    z-index:3;
  }

  .raid-main{
    display:grid;
    grid-template-columns:88px 1fr;
    gap:16px;
    align-items:center;
    margin-top:16px;
  }

  .raid-thumb{
    width:88px;
    height:88px;
    border-radius:22px;
    background:#f3f7ff;
    border:1px solid #dce6f5;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    box-shadow:0 10px 24px rgba(43,67,110,.08);
    animation:softFloat 3.8s ease-in-out infinite;
    position:relative;
    isolation:isolate;
  }

  .raid-card.shadow-theme .raid-thumb{
    background:linear-gradient(180deg,#efeff2 0%, #dcdce2 100%);
    border-color:#2d2f35;
    box-shadow:
      0 10px 20px rgba(0,0,0,.12),
      inset 0 1px 0 rgba(255,255,255,.25);
    overflow:visible;
  }

  .shadow-flame{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%, -50%);
    width:76px;
    height:76px;
    object-fit:contain;
    opacity:.7;
    pointer-events:none;
    z-index:1;
    filter:drop-shadow(0 0 8px rgba(130, 92, 220, .22));
    animation:smokeFloat 3.8s ease-in-out infinite;
  }

  .pokemon-img{
    position:relative;
    z-index:2;
    width:72px;
    height:72px;
    object-fit:contain;
  }

  .rocket-badge{
    position:absolute;
    right:18px;
    bottom:18px;
    width:70px;
    height:70px;
    object-fit:contain;
    z-index:2;
    opacity:.92;
    filter:drop-shadow(0 3px 6px rgba(0,0,0,.12));
    pointer-events:none;
  }

  .raid-name{
    font-size:24px;
    line-height:1.12;
    font-weight:900;
    letter-spacing:-.03em;
    word-break:keep-all;
  }

  .raid-desc{
    margin-top:8px;
    font-size:13px;
    color:#7183a0;
    line-height:1.5;
    font-weight:800;
  }

  .raid-card.shadow-theme .raid-desc{
    color:#636a74;
  }

  .raid-content{
    display:flex;
    flex-direction:column;
    flex:1;
    min-height:0;
  }

  .info-stack{
    margin-top:16px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .type-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  .type-pill{
    min-height:36px;
    padding:0 13px;
    border-radius:999px;
    border:1px solid #d9e3f2;
    background:#fff;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:7px;
    font-size:12px;
    font-weight:900;
    color:#607897;
  }

  .raid-card.shadow-theme .type-pill,
  .raid-card.shadow-theme .meta-pill,
  .raid-card.shadow-theme .boost-pill{
    background:rgba(255,255,255,.82);
    border-color:#b8bcc5;
    color:#464c55;
  }

  .type-icon{
    width:18px;
    height:18px;
    object-fit:contain;
    display:block;
    flex-shrink:0;
  }

  .meta-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  .meta-pill{
    min-height:36px;
    padding:0 13px;
    border-radius:999px;
    border:1px solid #d9e3f2;
    background:#fff;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:900;
    color:#607897;
  }

  .boost-row{
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    gap:8px;
  }

  .boost-pill{
    min-height:36px;
    padding:0 13px;
    border-radius:999px;
    border:1px solid #d9e3f2;
    background:#fff;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:7px;
    font-size:12px;
    font-weight:900;
    color:#607897;
  }

  .boost-icon{
    width:16px;
    height:16px;
    object-fit:contain;
    display:block;
    flex-shrink:0;
  }

  .card-bottom{
    margin-top:auto;
    padding-top:14px;
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:12px;
  }

  .action-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  .action-btn{
    min-height:38px;
    padding:0 14px;
    border-radius:999px;
    border:1px solid #d7e2f0;
    background:#fff;
    color:#597392;
    font-size:12px;
    font-weight:900;
    cursor:pointer;
    transition:.16s ease;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    justify-content:center;
  }

  .action-btn:hover{
    transform:translateY(-1px);
    border-color:#c7d7ec;
    box-shadow:0 10px 18px rgba(43,67,110,.07);
  }

  .action-btn.primary{
    background:#edf4ff;
    color:#3567d7;
    border-color:#cdddf5;
  }

  .cp-table-panel{
    margin-top:12px;
    display:none;
    padding:14px;
    border-radius:18px;
    background:#fbfdff;
    border:1px dashed #d7e2f1;
  }

  .cp-table-panel.show{
    display:block;
    animation:fadeUp .24s ease forwards;
  }

  .cp-table-panel img{
    width:100%;
    max-width:420px;
    display:block;
    margin:0 auto;
    border-radius:12px;
    box-shadow:0 10px 24px rgba(43,67,110,.08);
  }

  .raid-card.shadow-theme .cp-table-panel{
    background:rgba(255,255,255,.74);
    border-color:#aeb3be;
  }

  .empty-box{
    border:1px dashed #d9e4f2;
    background:#fbfdff;
    border-radius:18px;
    padding:18px 14px;
    text-align:center;
    color:#97a5ba;
    font-size:13px;
    font-weight:800;
  }

  .bottom-nav{
    position:fixed;
    left:50%;
    bottom:14px;
    transform:translateX(-50%);
    width:min(980px, calc(100% - 24px));
    background:rgba(255,255,255,.94);
    border:1px solid var(--line);
    border-radius:24px;
    box-shadow:0 18px 36px rgba(42,59,97,.12);
    backdrop-filter:blur(10px);
    padding:10px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    z-index:30;
  }

  .nav-item{
    min-height:64px;
    border-radius:16px;
    text-decoration:none;
    color:#6f819e;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:6px;
    font-size:12px;
    font-weight:900;
    transition:.18s ease;
    background:#f8fbff;
    border:1px solid transparent;
  }

  .nav-item:hover{
    background:#f3f7ff;
    color:#486995;
    border-color:#d6e3f3;
    transform:translateY(-1px);
  }

  .nav-item.active{
    background:#edf4ff;
    color:#3567d7;
    border-color:#cdddf5;
  }

  .nav-icon{
    font-size:18px;
    line-height:1;
  }

  @media (max-width:980px){
    .raid-grid{
      grid-template-columns:1fr;
    }
  }

  @media (max-width:768px){
    .wrap{
      padding:14px 12px 120px;
    }

    .section-head{
      padding:16px 16px 12px;
      flex-direction:column;
      align-items:flex-start;
    }

    .section-body{
      padding:12px;
    }

    .date-toolbar{
      align-items:flex-start;
      flex-direction:column;
    }

    .date-current{
      width:100%;
    }

    .date-current-inner{
      flex-wrap:wrap;
    }

    .day-head{
      flex-direction:column;
      align-items:flex-start;
    }

    .day-left{
      align-items:flex-start;
    }

    .day-title{
      font-size:22px;
    }

    .tier-header{
      padding:13px 14px;
      align-items:flex-start;
    }

    .tier-title{
      font-size:19px;
    }

    .tier-egg-wrap{
      width:48px;
      height:48px;
    }

    .tier-egg{
      width:38px;
      height:38px;
    }

    .tier-shadow-flame{
      width:50px;
      height:50px;
    }

    .boss-icon{
