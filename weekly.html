<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>주간 일정</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#edf3fb;
    color:#1f2f46;
  }

  :root{
    --bg:#edf3fb;
    --card:#ffffff;
    --card-soft:#f8fbff;
    --line:#d8e3f2;
    --line-strong:#c9d8eb;
    --text:#1f2f46;
    --muted:#7486a3;

    --blue:#3567d7;
    --blue-soft:#e7f0ff;

    --purple:#7c58e9;
    --purple-soft:#efe7ff;

    --pink:#d85b85;
    --pink-soft:#ffe8f0;

    --yellow:#b88818;
    --yellow-soft:#fff1c9;

    --green:#49a66b;
    --green-soft:#e7f5eb;

    --shadow:0 18px 40px rgba(43,67,110,.08);
  }

  .wrap{
    max-width:1600px;
    margin:0 auto;
    padding:20px 0 112px;
  }

  .section{
    background:rgba(255,255,255,.82);
    border:1px solid var(--line);
    border-radius:30px;
    overflow:hidden;
    box-shadow:var(--shadow);
    margin:0 16px;
  }

  .section-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:16px;
    padding:24px 28px 18px;
    border-bottom:1px solid #e4edf8;
    background:linear-gradient(180deg,#fbfdff 0%, #f6faff 100%);
  }

  .section-title{
    font-size:30px;
    font-weight:900;
    letter-spacing:-.04em;
  }

  .section-sub{
    margin-top:10px;
    font-size:14px;
    color:var(--muted);
    font-weight:800;
    line-height:1.45;
  }

  .week-scroller{
    overflow-x:auto;
    overflow-y:hidden;
    padding:18px 18px 22px;
    -webkit-overflow-scrolling:touch;
    cursor:grab;
    scroll-snap-type:x proximity;
    scrollbar-width:none;
  }

  .week-scroller::-webkit-scrollbar{
    display:none;
  }

  .week-scroller.dragging{
    cursor:grabbing;
    user-select:none;
  }

  .week-grid{
    display:grid;
    grid-auto-flow:column;
    grid-auto-columns:minmax(230px, 230px);
    gap:14px;
    min-width:max-content;
  }

  .week-card{
    min-height:650px;
    background:linear-gradient(180deg,#ffffff 0%, #f8fbff 100%);
    border:2px solid #d9e4f3;
    border-radius:34px;
    padding:18px 14px 16px;
    display:flex;
    flex-direction:column;
    scroll-snap-align:start;
  }

  .week-card.today{
    border-color:#9db8ff;
    box-shadow:0 14px 30px rgba(90,124,220,.12);
  }

  .week-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
    margin-bottom:14px;
    padding:2px 2px 0;
  }

  .week-date{
    font-size:38px;
    font-weight:900;
    line-height:1;
    letter-spacing:-.05em;
    color:#20314b;
  }

  .week-date.sun{color:#ec6d7c}
  .week-date.sat{color:#4d7cf0}

  .week-dayname{
    margin-top:10px;
    font-size:15px;
    color:#7f8faa;
    font-weight:900;
    letter-spacing:-.02em;
  }

  .today-pill{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:42px;
    padding:0 18px;
    border-radius:999px;
    background:#eaf1ff;
    color:#4f7ded;
    font-size:16px;
    font-weight:900;
    white-space:nowrap;
  }

  .week-items{
    display:flex;
    flex-direction:column;
    gap:14px;
    flex:1;
  }

  .timeline-item{
    background:#fff;
    border:1.5px solid #dfe8f5;
    border-radius:28px;
    padding:18px 14px 16px;
    min-height:162px;
  }

  .timeline-top{
    display:flex;
    align-items:flex-start;
    gap:12px;
  }

  .timeline-thumb{
    width:58px;
    height:58px;
    border-radius:18px;
    background:#f3f7ff;
    border:1px solid #dce6f4;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    flex-shrink:0;
  }

  .timeline-thumb img{
    width:38px;
    height:38px;
    object-fit:contain;
  }

  .timeline-name{
    min-width:0;
    flex:1;
    font-size:18px;
    font-weight:900;
    line-height:1.2;
    letter-spacing:-.03em;
    color:#20314b;
    word-break:keep-all;
  }

  .timeline-time{
    margin-top:14px;
    font-size:16px;
    color:#6f809a;
    font-weight:900;
    line-height:1.35;
    letter-spacing:-.02em;
  }

  .timeline-meta{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:14px;
  }

  .chip{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:40px;
    padding:0 16px;
    border-radius:999px;
    font-size:14px;
    font-weight:900;
    line-height:1;
    white-space:nowrap;
    letter-spacing:-.02em;
  }

  .chip.blue{background:var(--blue-soft);color:var(--blue)}
  .chip.purple{background:var(--purple-soft);color:var(--purple)}
  .chip.pink{background:var(--pink-soft);color:var(--pink)}
  .chip.yellow{background:var(--yellow-soft);color:var(--yellow)}
  .chip.green{background:var(--green-soft);color:var(--green)}

  .empty-box{
    border:1px dashed #d9e4f2;
    background:#fbfdff;
    border-radius:22px;
    padding:24px 12px;
    text-align:center;
    color:#97a5ba;
    font-size:14px;
    font-weight:800;
  }

  .bottom-nav{
    position:fixed;
    left:50%;
    bottom:14px;
    transform:translateX(-50%);
    width:min(1180px, calc(100% - 24px));
    background:rgba(255,255,255,.92);
    border:1px solid var(--line);
    border-radius:26px;
    box-shadow:0 18px 36px rgba(42,59,97,.12);
    backdrop-filter:blur(10px);
    padding:10px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    z-index:30;
  }

  .nav-item{
    min-height:68px;
    border-radius:18px;
    text-decoration:none;
    color:#6f819e;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:6px;
    font-size:13px;
    font-weight:900;
    transition:.18s ease;
    background:#f8fbff;
    border:1px solid transparent;
  }

  .nav-item:hover{
    background:#f3f7ff;
    color:#486995;
    border-color:#d6e3f3;
  }

  .nav-item.active{
    background:#edf4ff;
    color:#3567d7;
    border-color:#cdddf5;
  }

  .nav-icon{
    font-size:20px;
    line-height:1;
  }

  @media (max-width:768px){
    .wrap{
      padding-bottom:120px;
    }

    .section{
      border-radius:26px;
      margin:0 10px;
    }

    .section-head{
      padding:20px 20px 14px;
    }

    .section-title{
      font-size:24px;
    }

    .section-sub{
      font-size:13px;
    }

    .week-scroller{
      padding:14px 14px 18px;
    }

    .week-grid{
      grid-auto-columns:minmax(210px, 210px);
    }

    .week-card{
      min-height:600px;
      border-radius:30px;
      padding:16px 12px 14px;
    }

    .week-date{
      font-size:32px;
    }

    .today-pill{
      min-height:36px;
      padding:0 14px;
      font-size:14px;
    }

    .timeline-item{
      min-height:152px;
      border-radius:24px;
      padding:16px 12px 14px;
    }

    .timeline-name{
      font-size:16px;
    }

    .timeline-time{
      font-size:15px;
    }

    .chip{
      min-height:36px;
      padding:0 14px;
      font-size:13px;
    }
  }
</style>
</head>
<body>
<div class="wrap">

  <section class="section">
    <div class="section-head">
      <div>
        <div class="section-title">이번 주 일정</div>
        <div class="section-sub" id="weekRangeText">기준 날짜: 2026.04.01 - 2026.04.07</div>
      </div>
    </div>

    <div class="week-scroller" id="weekScroller">
      <div class="week-grid" id="weekGrid"></div>
    </div>
  </section>

</div>

<nav class="bottom-nav">
  <a href="./index.html" class="nav-item">
    <div class="nav-icon">🏠</div>
    <div>메인</div>
  </a>
  <a href="./raid-now.html" class="nav-item">
    <div class="nav-icon">⚔️</div>
    <div>지금 레이드</div>
  </a>
  <a href="./weekly.html" class="nav-item active">
    <div class="nav-icon">🗓️</div>
    <div>주간 일정표</div>
  </a>
  <a href="./monthly.html" class="nav-item">
    <div class="nav-icon">📆</div>
    <div>월간 일정</div>
  </a>
</nav>

<script>
  const DEFAULT_START = '06:00 AM';
  const DEFAULT_END = '10:00 PM';

  const IMG = {
    regieleki:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/894.png',
    regidrago:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/895.png',
    kyogre:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/382.png',
    groudon:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/383.png',
    tapuKoko:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/785.png',
    tapuLele:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/786.png',
    latias:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/380.png',
    latios:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/381.png',
    houndoom:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/229.png',
    manectric:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/310.png',
    aerodactyl:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/142.png',
    alakazam:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/65.png',
    sharpedo:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/319.png',
    banette:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/354.png',
    pikachu:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png',
    tinkatink:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/957.png'
  };

  const raidRanges = [
    { name:'레지드래고', label:'5성 레이드', type:'blue', image:IMG.regidrago, startDate:'2026-04-01', endDate:'2026-04-07' },
    { name:'메가썬더볼트', label:'메가 레이드', type:'purple', image:IMG.manectric, startDate:'2026-04-01', endDate:'2026-04-07' },

    { name:'가이오가', label:'5성 레이드', type:'blue', image:IMG.kyogre, startDate:'2026-04-08', endDate:'2026-04-14' },
    { name:'메가프테라', label:'메가 레이드', type:'purple', image:IMG.aerodactyl, startDate:'2026-04-08', endDate:'2026-04-14' },

    { name:'그란돈', label:'5성 레이드', type:'blue', image:IMG.groudon, startDate:'2026-04-15', endDate:'2026-04-21' },
    { name:'메가후딘', label:'메가 레이드', type:'purple', image:IMG.alakazam, startDate:'2026-04-15', endDate:'2026-04-21' },

    { name:'카푸꼬꼬꼭', label:'5성 레이드', type:'blue', image:IMG.tapuKoko, startDate:'2026-04-22', endDate:'2026-04-28' },
    { name:'메가샤크니아', label:'메가 레이드', type:'purple', image:IMG.sharpedo, startDate:'2026-04-22', endDate:'2026-04-28' },

    { name:'카푸나비나', label:'5성 레이드', type:'blue', image:IMG.tapuLele, startDate:'2026-04-29', endDate:'2026-04-30' },
    { name:'메가다크펫', label:'메가 레이드', type:'purple', image:IMG.banette, startDate:'2026-04-29', endDate:'2026-04-30' }
  ];

  const oneDayEvents = [
    { name:'레지드래고', label:'레이드 아워', type:'yellow', image:IMG.regidrago, date:'2026-04-01', startTime:'06:00 PM', endTime:'07:00 PM' },
    { name:'패션 레이드 데이', label:'레이드 데이', type:'yellow', image:IMG.pikachu, date:'2026-04-04', startTime:'02:00 PM', endTime:'05:00 PM' },

    { name:'가이오가', label:'레이드 아워', type:'yellow', image:IMG.kyogre, date:'2026-04-08', startTime:'06:00 PM', endTime:'07:00 PM' },
    { name:'두드리짱', label:'커뮤니티 데이', type:'green', image:IMG.tinkatink, date:'2026-04-11', startTime:'02:00 PM', endTime:'05:00 PM' },

    { name:'지속가능성 위크', label:'이벤트', type:'green', image:IMG.aerodactyl, date:'2026-04-14', startTime:'10:00 AM', endTime:'08:00 PM' },
    { name:'그란돈', label:'레이드 아워', type:'yellow', image:IMG.groudon, date:'2026-04-15', startTime:'06:00 PM', endTime:'07:00 PM' },

    { name:'카푸꼬꼬꼭', label:'레이드 아워', type:'yellow', image:IMG.tapuKoko, date:'2026-04-22', startTime:'06:00 PM', endTime:'07:00 PM' },
    { name:'강철의 의지', label:'이벤트', type:'green', image:IMG.banette, date:'2026-04-28', startTime:'10:00 AM', endTime:'08:00 PM' },
    { name:'카푸나비나', label:'레이드 아워', type:'yellow', image:IMG.tapuLele, date:'2026-04-29', startTime:'06:00 PM', endTime:'07:00 PM' }
  ];

  const weekendShadow = [
    { name:'그림자 라티오스', label:'그림자', type:'pink', image:IMG.latios, startDate:'2026-04-01', endDate:'2026-04-05' },
    { name:'그림자 라티오스', label:'그림자', type:'pink', image:IMG.latios, startDate:'2026-04-11', endDate:'2026-04-12' },
    { name:'그림자 라티오스', label:'그림자', type:'pink', image:IMG.latios, startDate:'2026-04-18', endDate:'2026-04-19' },
    { name:'그림자 라티오스', label:'그림자', type:'pink', image:IMG.latios, startDate:'2026-04-25', endDate:'2026-04-26' }
  ];

  const today = new Date('2026-04-01T00:00:00');
  // 실제 운영시에는 아래 한 줄만 쓰면 됩니다.
  // const today = new Date();

  function pad(n){ return String(n).padStart(2,'0'); }

  function toDate(str){
    const [y,m,d] = str.split('-').map(Number);
    return new Date(y, m - 1, d, 0, 0, 0, 0);
  }

  function toKey(date){
    return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}`;
  }

  function getDayKor(day){
    return ['일','월','화','수','목','금','토'][day];
  }

  function inRange(date, startStr, endStr){
    const t = toDate(toKey(date)).getTime();
    const s = toDate(startStr).getTime();
    const e = toDate(endStr).getTime();
    return t >= s && t <= e;
  }

  function getDisplayTime(item){
    return `${item.startTime || DEFAULT_START} ~ ${item.endTime || DEFAULT_END}`;
  }

  function breakName(name){
    const custom = {
      '레지드래고':'레지<br>드래고',
      '메가썬더볼트':'메가<br>썬더볼트',
      '그림자 라티오스':'그림자<br>라티오스',
      '패션 레이드 데이':'패션<br>레이드<br>데이',
      '가이오가':'가이오가',
      '메가프테라':'메가<br>프테라',
      '그란돈':'그란돈',
      '메가후딘':'메가<br>후딘',
      '카푸꼬꼬꼭':'카푸<br>꼬꼬꼭',
      '메가샤크니아':'메가<br>샤크니아',
      '카푸나비나':'카푸<br>나비나',
      '메가다크펫':'메가<br>다크펫',
      '두드리짱':'두드리짱',
      '지속가능성 위크':'지속가능성<br>위크',
      '강철의 의지':'강철의<br>의지'
    };
    return custom[name] || name;
  }

  function getAllItemsForDate(date){
    return [
      ...raidRanges.filter(item => inRange(date, item.startDate, item.endDate)),
      ...weekendShadow.filter(item => inRange(date, item.startDate, item.endDate)),
      ...oneDayEvents.filter(item => item.date === toKey(date))
    ];
  }

  function formatWeekRange(start, end){
    return `${start.getFullYear()}.${pad(start.getMonth()+1)}.${pad(start.getDate())} - ${end.getFullYear()}.${pad(end.getMonth()+1)}.${pad(end.getDate())}`;
  }

  function renderWeekRangeText(){
    const start = new Date(today);
    const end = new Date(today);
    end.setDate(today.getDate() + 6);
    document.getElementById('weekRangeText').textContent = `기준 날짜: ${formatWeekRange(start, end)}`;
  }

  function renderWeekGrid(){
    const wrap = document.getElementById('weekGrid');
    const days = [];

    for(let i=0;i<7;i++){
      const d = new Date(today);
      d.setDate(today.getDate() + i);
      days.push(d);
    }

    wrap.innerHTML = days.map(date => {
      const items = getAllItemsForDate(date);
      const isToday = toKey(date) === toKey(today);
      const dayClass = date.getDay() === 0 ? 'sun' : date.getDay() === 6 ? 'sat' : '';

      return `
        <div class="week-card ${isToday ? 'today' : ''}">
          <div class="week-top">
            <div>
              <div class="week-date ${dayClass}">${date.getMonth()+1}.${date.getDate()}</div>
              <div class="week-dayname">${getDayKor(date.getDay())}요일</div>
            </div>
            ${isToday ? `<div class="today-pill">TODAY</div>` : ``}
          </div>

          <div class="week-items">
            ${
              items.length
                ? items.map(item => `
                  <div class="timeline-item">
                    <div class="timeline-top">
                      <div class="timeline-thumb">
                        <img src="${item.image}" alt="${item.name}">
                      </div>
                      <div class="timeline-name">${breakName(item.name)}</div>
                    </div>
                    <div class="timeline-time">${getDisplayTime(item)}</div>
                    <div class="timeline-meta">
                      <span class="chip ${item.type}">${item.label}</span>
                    </div>
                  </div>
                `).join('')
                : `<div class="empty-box">일정 없음</div>`
            }
          </div>
        </div>
      `;
    }).join('');
  }

  function enableDragScroll(){
    const scroller = document.getElementById('weekScroller');
    let isDown = false;
    let startX = 0;
    let scrollLeft = 0;

    scroller.addEventListener('mousedown', (e) => {
      isDown = true;
      scroller.classList.add('dragging');
      startX = e.pageX - scroller.offsetLeft;
      scrollLeft = scroller.scrollLeft;
    });

    scroller.addEventListener('mouseleave', () => {
      isDown = false;
      scroller.classList.remove('dragging');
    });

    scroller.addEventListener('mouseup', () => {
      isDown = false;
      scroller.classList.remove('dragging');
    });

    scroller.addEventListener('mousemove', (e) => {
      if(!isDown) return;
      e.preventDefault();
      const x = e.pageX - scroller.offsetLeft;
      const walk = (x - startX) * 1.2;
      scroller.scrollLeft = scrollLeft - walk;
    });
  }

  renderWeekRangeText();
  renderWeekGrid();
  enableDragScroll();
</script>
</body>
</html>
