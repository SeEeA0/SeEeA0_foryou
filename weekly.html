<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>주간 일정표</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#edf3fb;
    color:#1f2f46;
  }

  :root{
    --bg:#edf3fb;
    --card:#ffffff;
    --line:#d8e3f2;
    --text:#1f2f46;
    --muted:#7486a3;

    --blue:#3567d7;
    --blue-soft:#e7f0ff;

    --purple:#7c58e9;
    --purple-soft:#efe7ff;

    --pink:#d85b85;
    --pink-soft:#ffe8f0;

    --yellow:#b88818;
    --yellow-soft:#fff1c9;

    --green:#49a66b;
    --green-soft:#e7f5eb;

    --gray:#67768f;
    --gray-soft:#f2f5fa;

    --shadow:0 18px 40px rgba(43,67,110,.08);
  }

  .wrap{
    max-width:1320px;
    margin:0 auto;
    padding:20px 16px 110px;
  }

  .section{
    background:rgba(255,255,255,.84);
    border:1px solid var(--line);
    border-radius:30px;
    overflow:hidden;
    box-shadow:var(--shadow);
    margin-bottom:18px;
  }

  .section-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:18px;
    padding:24px 26px 18px;
    border-bottom:1px solid #e4edf8;
    background:linear-gradient(180deg,#fbfdff 0%, #f6faff 100%);
  }

  .section-title{
    font-size:26px;
    font-weight:900;
    letter-spacing:-.03em;
  }

  .section-sub{
    margin-top:8px;
    font-size:14px;
    color:var(--muted);
    font-weight:700;
    line-height:1.5;
  }

  .section-body{
    padding:18px;
  }

  .tiny-badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:42px;
    padding:0 14px;
    border-radius:999px;
    background:#f1f6ff;
    border:1px solid var(--line);
    color:#58719a;
    font-size:13px;
    font-weight:900;
    white-space:nowrap;
  }

  .week-grid{
    display:grid;
    grid-template-columns:repeat(7,minmax(0,1fr));
    gap:14px;
  }

  .week-card{
    min-height:420px;
    background:linear-gradient(180deg,#ffffff 0%, #f8fbff 100%);
    border:1.5px solid var(--line);
    border-radius:24px;
    padding:14px;
    display:flex;
    flex-direction:column;
  }

  .week-card.today{
    border-color:#a8c1ff;
    box-shadow:0 12px 28px rgba(90,124,220,.10);
    background:linear-gradient(180deg,#ffffff 0%, #f4f8ff 100%);
  }

  .week-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
    margin-bottom:12px;
  }

  .week-date{
    font-size:24px;
    font-weight:900;
    letter-spacing:-.03em;
  }

  .week-date.sun{color:#ef6b7a}
  .week-date.sat{color:#4b7cf0}

  .week-dayname{
    margin-top:4px;
    font-size:13px;
    color:#7f8faa;
    font-weight:800;
  }

  .today-pill{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:28px;
    padding:0 10px;
    border-radius:999px;
    background:#e9f1ff;
    color:#4e7deb;
    font-size:11px;
    font-weight:900;
    white-space:nowrap;
  }

  .week-items{
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .timeline-item{
    background:#fff;
    border:1px solid #e3ebf7;
    border-radius:18px;
    padding:11px;
  }

  .timeline-top{
    display:flex;
    align-items:center;
    gap:8px;
  }

  .timeline-thumb{
    width:34px;
    height:34px;
    border-radius:12px;
    background:#f3f7ff;
    border:1px solid #dde7f5;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    flex-shrink:0;
  }

  .timeline-thumb img{
    width:24px;
    height:24px;
    object-fit:contain;
  }

  .timeline-name{
    min-width:0;
    flex:1;
    font-size:13px;
    font-weight:900;
    line-height:1.25;
    word-break:keep-all;
  }

  .timeline-time{
    margin-top:8px;
    font-size:12px;
    color:#6f809a;
    font-weight:800;
    line-height:1.4;
  }

  .timeline-meta{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:8px;
  }

  .chip{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:30px;
    padding:0 12px;
    border-radius:999px;
    font-size:11px;
    font-weight:900;
    line-height:1;
    white-space:nowrap;
  }

  .chip.blue{background:var(--blue-soft);color:var(--blue)}
  .chip.purple{background:var(--purple-soft);color:var(--purple)}
  .chip.pink{background:var(--pink-soft);color:var(--pink)}
  .chip.yellow{background:var(--yellow-soft);color:var(--yellow)}
  .chip.green{background:var(--green-soft);color:var(--green)}
  .chip.gray{background:var(--gray-soft);color:var(--gray)}

  .empty-box{
    border:1px dashed #d9e4f2;
    background:#fbfdff;
    border-radius:18px;
    padding:18px 12px;
    text-align:center;
    color:#97a5ba;
    font-size:13px;
    font-weight:800;
  }

  .bottom-nav{
    position:fixed;
    left:50%;
    bottom:14px;
    transform:translateX(-50%);
    width:min(1180px, calc(100% - 24px));
    background:rgba(255,255,255,.92);
    border:1px solid var(--line);
    border-radius:26px;
    box-shadow:0 18px 36px rgba(42,59,97,.12);
    backdrop-filter:blur(10px);
    padding:10px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    z-index:30;
  }

  .nav-item{
    min-height:68px;
    border-radius:18px;
    text-decoration:none;
    color:#6f819e;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:6px;
    font-size:13px;
    font-weight:900;
    transition:.18s ease;
    background:#f8fbff;
    border:1px solid transparent;
  }

  .nav-item:hover{
    background:#f3f7ff;
    color:#486995;
    border-color:#d6e3f3;
  }

  .nav-item.active{
    background:#edf4ff;
    color:#3567d7;
    border-color:#cdddf5;
  }

  .nav-icon{
    font-size:20px;
    line-height:1;
  }

  @media (max-width:1180px){
    .week-grid{
      min-width:1100px;
    }
    .section-body{
      overflow-x:auto;
    }
  }

  @media (max-width:768px){
    .wrap{
      padding-bottom:120px;
    }

    .section-head{
      padding:22px 20px 16px;
      flex-direction:column;
      align-items:flex-start;
    }

    .section-body{
      padding:16px;
    }

    .section-title{
      font-size:22px;
    }
  }
</style>
</head>
<body>
<div class="wrap">

  <section class="section">
    <div class="section-head">
      <div>
        <div class="section-title">주간 일정표</div>
        <div class="section-sub" id="weekRangeText">한국 시간 기준 오늘부터 7일</div>
      </div>
      <div class="tiny-badge">7 DAYS</div>
    </div>

    <div class="section-body">
      <div class="week-grid" id="weekGrid"></div>
    </div>
  </section>

</div>

<nav class="bottom-nav">
  <a href="./index.html" class="nav-item">
    <div class="nav-icon">🏠</div>
    <div>메인</div>
  </a>
  <a href="./raid-now.html" class="nav-item">
    <div class="nav-icon">⚔️</div>
    <div>지금 레이드</div>
  </a>
  <a href="./weekly.html" class="nav-item active">
    <div class="nav-icon">🗓️</div>
    <div>주간 일정표</div>
  </a>
  <a href="./monthly.html" class="nav-item">
    <div class="nav-icon">📆</div>
    <div>월간 일정</div>
  </a>
</nav>

<script>
  const STORAGE_KEY = 'pogoRaidAdminData';

  function getKoreaNow(){
    const now = new Date();
    const koreaString = now.toLocaleString('en-US', { timeZone: 'Asia/Seoul' });
    return new Date(koreaString);
  }

  function getKoreaToday(){
    const koreaNow = getKoreaNow();
    koreaNow.setHours(0, 0, 0, 0);
    return koreaNow;
  }

  function pad(n){
    return String(n).padStart(2, '0');
  }

  function toDate(str){
    if(!str) return null;
    const [y, m, d] = str.split('-').map(Number);
    return new Date(y, m - 1, d, 0, 0, 0, 0);
  }

  function toKey(date){
    return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
  }

  function getDayKor(day){
    return ['일','월','화','수','목','금','토'][day];
  }

  function toAmpm(time24){
    if(!time24) return '';
    const [hh, mm] = time24.split(':').map(Number);
    const suffix = hh >= 12 ? 'PM' : 'AM';
    const h12 = hh % 12 === 0 ? 12 : hh % 12;
    return `${String(h12).padStart(2, '0')}:${String(mm).padStart(2, '0')} ${suffix}`;
  }

  function getDisplayTime(item){
    const start = item.startTime ? toAmpm(item.startTime) : '06:00 AM';
    const end = item.endTime ? toAmpm(item.endTime) : '10:00 PM';
    return `${start} ~ ${end}`;
  }

  function inRange(date, startStr, endStr){
    const start = toDate(startStr);
    const end = toDate(endStr);
    if(!start || !end) return false;
    const t = toDate(toKey(date)).getTime();
    return t >= start.getTime() && t <= end.getTime();
  }

  function loadRecords(){
    try{
      const saved = localStorage.getItem(STORAGE_KEY);
      const parsed = saved ? JSON.parse(saved) : [];
      return Array.isArray(parsed) ? parsed : [];
    }catch(e){
      return [];
    }
  }

  function isWeeklyAllowed(item){
    return Array.isArray(item.showPages) && item.showPages.includes('weekly');
  }

  function getItemsForDate(records, date){
    return records
      .filter(item =>
        isWeeklyAllowed(item) &&
        item.startDate &&
        item.endDate &&
        inRange(date, item.startDate, item.endDate)
      )
      .sort((a, b) => {
        const order = {
          '전설': 0,
          '메가': 1,
          '그림자': 2,
          '레이드 아워': 3,
          '레이드 데이': 4,
          '이벤트': 5,
          '커뮤니티 데이': 6
        };
        const aOrder = order[a.label] ?? 99;
        const bOrder = order[b.label] ?? 99;
        if(aOrder !== bOrder) return aOrder - bOrder;
        return (a.name || '').localeCompare(b.name || '', 'ko');
      });
  }

  function chipClass(item){
    return item.type || (
      item.label === '전설' ? 'blue' :
      item.label === '메가' ? 'purple' :
      item.label === '그림자' ? 'pink' :
      item.label === '레이드 아워' || item.label === '레이드 데이' ? 'yellow' :
      item.label === '이벤트' || item.label === '커뮤니티 데이' ? 'green' : 'gray'
    );
  }

  function formatRangeText(start, end){
    return `${start.getFullYear()}.${pad(start.getMonth()+1)}.${pad(start.getDate())} - ${end.getFullYear()}.${pad(end.getMonth()+1)}.${pad(end.getDate())}`;
  }

  function renderWeekRangeText(today){
    const end = new Date(today);
    end.setDate(today.getDate() + 6);
    document.getElementById('weekRangeText').textContent = `한국 시간 기준 ${formatRangeText(today, end)}`;
  }

  function renderWeekGrid(){
    const wrap = document.getElementById('weekGrid');
    const records = loadRecords();
    const today = getKoreaToday();

    renderWeekRangeText(today);

    const days = [];
    for(let i = 0; i < 7; i++){
      const d = new Date(today);
      d.setDate(today.getDate() + i);
      days.push(d);
    }

    wrap.innerHTML = days.map(date => {
      const items = getItemsForDate(records, date);
      const isToday = toKey(date) === toKey(today);
      const dayClass = date.getDay() === 0 ? 'sun' : date.getDay() === 6 ? 'sat' : '';

      return `
        <div class="week-card ${isToday ? 'today' : ''}">
          <div class="week-top">
            <div>
              <div class="week-date ${dayClass}">${date.getMonth()+1}.${date.getDate()}</div>
              <div class="week-dayname">${getDayKor(date.getDay())}요일</div>
            </div>
            ${isToday ? `<div class="today-pill">TODAY</div>` : ``}
          </div>

          <div class="week-items">
            ${
              items.length
                ? items.map(item => `
                  <div class="timeline-item">
                    <div class="timeline-top">
                      <div class="timeline-thumb">
                        ${
                          item.image
                            ? `<img src="${item.image}" alt="${item.name || ''}">`
                            : `<span style="font-size:14px;">🖼️</span>`
                        }
                      </div>
                      <div class="timeline-name">${item.name || '-'}</div>
                    </div>

                    <div class="timeline-time">${getDisplayTime(item)}</div>

                    <div class="timeline-meta">
                      <span class="chip ${chipClass(item)}">${item.label || '-'}</span>
                      ${item.boostWeather ? `<span class="chip gray">${item.boostWeather}</span>` : ``}
                    </div>
                  </div>
                `).join('')
                : `<div class="empty-box">일정 없음</div>`
            }
          </div>
        </div>
      `;
    }).join('');
  }

  renderWeekGrid();
</script>
</body>
</html>
