<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pokémon GO Raid Planner | 주간 일정</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#edf3fb;
    color:#1f2f46;
  }

  :root{
    --bg:#edf3fb;
    --card:#ffffff;
    --line:#d8e3f2;
    --text:#1f2f46;
    --muted:#7486a3;

    --blue:#3567d7;
    --blue-soft:#e7f0ff;

    --purple:#7c58e9;
    --purple-soft:#efe7ff;

    --pink:#d85b85;
    --pink-soft:#ffe8f0;

    --yellow:#b88818;
    --yellow-soft:#fff1c9;

    --green:#49a66b;
    --green-soft:#e7f5eb;

    --gray:#67768f;
    --gray-soft:#f2f5fa;

    --shadow:0 14px 32px rgba(43,67,110,.08);
    --shadow-hover:0 18px 36px rgba(43,67,110,.14);
  }

  .wrap{
    max-width:1180px;
    margin:0 auto;
    padding:16px 14px 110px;
  }

  .fade-up{
    opacity:0;
    transform:translateY(10px);
    animation:fadeUp .55s ease forwards;
  }
  .delay-1{animation-delay:.05s}

  @keyframes fadeUp{
    from{opacity:0;transform:translateY(10px)}
    to{opacity:1;transform:translateY(0)}
  }

  @keyframes contentSwap{
    from{opacity:0;transform:translateY(8px)}
    to{opacity:1;transform:translateY(0)}
  }

  @keyframes softFloat{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-4px)}
  }

  @keyframes pulseRing{
    0%{box-shadow:0 0 0 0 rgba(83,123,221,.16)}
    70%{box-shadow:0 0 0 10px rgba(83,123,221,0)}
    100%{box-shadow:0 0 0 0 rgba(83,123,221,0)}
  }

  @keyframes shadowGlow{
    0%,100%{
      box-shadow:
        0 0 0 4px #d9d9d9,
        0 16px 34px rgba(98,67,168,.18),
        0 0 0 0 rgba(124,88,233,.16);
    }
    50%{
      box-shadow:
        0 0 0 4px #d9d9d9,
        0 18px 38px rgba(98,67,168,.24),
        0 0 0 8px rgba(124,88,233,.08);
    }
  }

  .section{
    background:rgba(255,255,255,.9);
    border:1px solid var(--line);
    border-radius:26px;
    box-shadow:var(--shadow);
    overflow:hidden;
    margin-bottom:16px;
  }

  .section-head{
    padding:18px 18px 14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    border-bottom:1px solid #e6eef8;
  }

  .section-title{
    font-size:20px;
    font-weight:900;
    letter-spacing:-.03em;
  }

  .section-sub{
    margin-top:6px;
    font-size:13px;
    color:var(--muted);
    font-weight:800;
  }

  .section-body{
    padding:14px;
  }

  .date-switcher-wrap{
    position:sticky;
    top:10px;
    z-index:25;
  }

  .date-switcher{
    display:grid;
    grid-template-columns:64px 1fr 64px;
    gap:10px;
    align-items:stretch;
  }

  .date-nav-btn{
    border:1px solid #d8e3f2;
    background:#f8fbff;
    color:#355fbb;
    border-radius:18px;
    min-height:96px;
    cursor:pointer;
    font-size:24px;
    font-weight:900;
    transition:.16s ease;
    box-shadow:0 10px 18px rgba(43,67,110,.05);
  }

  .date-nav-btn:hover:not(:disabled){
    transform:translateY(-2px);
    border-color:#c7d7ec;
    box-shadow:0 14px 22px rgba(43,67,110,.08);
  }

  .date-nav-btn:disabled{
    opacity:.42;
    cursor:default;
  }

  .date-current{
    background:#edf4ff;
    border:1px solid #cdddf5;
    border-radius:22px;
    min-height:96px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:12px;
    animation:pulseRing 1.8s infinite;
    box-shadow:0 12px 24px rgba(43,67,110,.06);
  }

  .date-current-inner{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }

  .date-current-weekday{
    font-size:16px;
    font-weight:900;
    color:#7b8ca8;
    line-height:1;
  }

  .date-current-day{
    margin-top:8px;
    font-size:32px;
    font-weight:900;
    color:#24374c;
    line-height:1;
    letter-spacing:-.03em;
  }

  .date-current-full{
    margin-top:8px;
    font-size:13px;
    font-weight:800;
    color:#6f819e;
  }

  .week-dots{
    margin-top:12px;
    display:flex;
    justify-content:center;
    gap:8px;
    flex-wrap:wrap;
  }

  .week-dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#d6e3f3;
    border:none;
    padding:0;
    cursor:pointer;
    transition:.16s ease;
  }

  .week-dot.active{
    width:28px;
    border-radius:999px;
    background:#3567d7;
  }

  .week-dot.today:not(.active){
    background:#8cb0f0;
  }

  .selected-day-wrap{
    animation:contentSwap .22s ease;
  }

  .day-card{
    background:linear-gradient(180deg,#fff 0%, #f9fbff 100%);
    border:1.5px solid var(--line);
    border-radius:24px;
    padding:16px;
    box-shadow:0 10px 24px rgba(43,67,110,.05);
  }

  .day-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    margin-bottom:14px;
  }

  .day-left{
    display:flex;
    align-items:center;
    gap:12px;
  }

  .day-badge{
    min-width:64px;
    height:64px;
    border-radius:20px;
    background:#edf4ff;
    border:1px solid #d8e6f6;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    box-shadow:0 10px 20px rgba(43,67,110,.06);
  }

  .day-badge .day-num{
    font-size:22px;
    font-weight:900;
    line-height:1;
    color:#2f58ba;
  }

  .day-badge .day-week{
    margin-top:4px;
    font-size:11px;
    font-weight:900;
    color:#6f87a7;
  }

  .day-title{
    font-size:22px;
    font-weight:900;
    letter-spacing:-.03em;
    line-height:1.1;
  }

  .day-chip{
    min-height:34px;
    padding:0 14px;
    border-radius:999px;
    border:1px solid #d7e2f0;
    background:#fff;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:900;
    color:#607897;
  }

  .group-stack{
    display:flex;
    flex-direction:column;
    gap:18px;
  }

  .raid-group{
    border:1px solid #d9e4f2;
    border-radius:22px;
    background:linear-gradient(180deg,#ffffff 0%, #f8fbff 100%);
    box-shadow:0 10px 24px rgba(43,67,110,.05);
    overflow:hidden;
  }

  .raid-group.shadow-group{
    border-color:#d6c8ff;
    background:linear-gradient(180deg,#fbf8ff 0%, #f4efff 100%);
  }

  .raid-group-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:14px 16px;
    border-bottom:1px solid #e6eef8;
    background:linear-gradient(180deg,#fdfefe 0%, #f4f8ff 100%);
  }

  .raid-group.shadow-group .raid-group-head{
    background:linear-gradient(180deg,#f6f0ff 0%, #efe7ff 100%);
    border-bottom-color:#e1d5ff;
  }

  .raid-group-title{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:16px;
    font-weight:900;
    letter-spacing:-.02em;
    color:#24374c;
  }

  .raid-group-title-badge{
    min-width:34px;
    height:34px;
    padding:0 10px;
    border-radius:999px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:900;
    border:1px solid transparent;
  }

  .raid-group-count{
    font-size:12px;
    font-weight:900;
    color:#70829f;
  }

  .group-badge-1{
    background:#e7f5eb;
    color:#2f8d57;
    border-color:#cfe8d8;
  }
  .group-badge-3{
    background:#fff1c9;
    color:#a17200;
    border-color:#f1dfad;
  }
  .group-badge-5{
    background:#e7f0ff;
    color:#3567d7;
    border-color:#cdddf5;
  }
  .group-badge-mega{
    background:#efe7ff;
    color:#7c58e9;
    border-color:#d8c9ff;
  }
  .group-badge-shadow{
    background:#ece8f8;
    color:#5b40b4;
    border-color:#d6c8ff;
  }

  .raid-group-body{
    padding:14px;
  }

  .raid-grid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:12px;
  }

  .raid-card{
    background:linear-gradient(180deg,#fff 0%, #fbfdff 100%);
    border:1.5px solid #dde7f4;
    border-radius:22px;
    padding:14px;
    position:relative;
    overflow:hidden;
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    min-height:260px;
  }

  .raid-card::after{
    content:"";
    position:absolute;
    right:-30px;
    bottom:-30px;
    width:100px;
    height:100px;
    border-radius:50%;
    background:linear-gradient(135deg, rgba(120,148,255,.14), rgba(123,99,255,.04));
    pointer-events:none;
  }

  .raid-card:hover{
    transform:translateY(-4px);
    box-shadow:var(--shadow-hover);
    border-color:#c7d7ec;
  }

  .raid-card.shadow-theme{
    background:linear-gradient(180deg,#f3edff 0%, #e8dcff 100%);
    border:2px solid #111;
    box-shadow:
      0 0 0 4px #d9d9d9,
      0 16px 34px rgba(98,67,168,.18);
    animation:shadowGlow 2.2s ease-in-out infinite;
  }

  .raid-card.shadow-theme::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(135deg, rgba(124,88,233,.10), rgba(255,255,255,0));
    pointer-events:none;
    z-index:0;
  }

  .raid-card.shadow-theme::after{
    background:radial-gradient(circle, rgba(124,88,233,.26) 0%, rgba(124,88,233,0) 68%);
  }

  .raid-head,
  .raid-main,
  .meta-row,
  .action-row,
  .cp-table-panel{
    position:relative;
    z-index:1;
  }

  .raid-head{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
  }

  .raid-chip{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:30px;
    padding:0 11px;
    border-radius:999px;
    font-size:11px;
    font-weight:900;
    line-height:1;
  }

  .chip-blue{background:var(--blue-soft);color:var(--blue)}
  .chip-yellow{background:var(--yellow-soft);color:var(--yellow)}
  .chip-green{background:var(--green-soft);color:var(--green)}
  .chip-purple{background:var(--purple-soft);color:var(--purple)}
  .chip-pink{background:#efe6ff;color:#6a44d3}
  .chip-gray{background:var(--gray-soft);color:var(--gray)}

  .top-boosts{
    display:flex;
    flex-wrap:wrap;
    justify-content:flex-end;
    gap:6px;
    max-width:55%;
  }

  .top-boost-badge{
    min-height:30px;
    padding:4px 10px 4px 7px;
    border-radius:999px;
    border:1px solid #d9e3f2;
    background:#fff;
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:11px;
    font-weight:900;
    color:#607897;
  }

  .top-boost-badge img{
    width:16px;
    height:16px;
    object-fit:contain;
    border-radius:50%;
    background:#f4f7fd;
    flex-shrink:0;
  }

  .raid-card.shadow-theme .top-boost-badge{
    background:rgba(255,255,255,.88);
    border-color:#ddcffd;
  }

  .raid-main{
    display:grid;
    grid-template-columns:74px 1fr;
    gap:12px;
    align-items:center;
    margin-top:12px;
  }

  .raid-thumb{
    width:74px;
    height:74px;
    border-radius:20px;
    background:#f3f7ff;
    border:1px solid #dce6f5;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    box-shadow:0 10px 24px rgba(43,67,110,.08);
    animation:softFloat 3.8s ease-in-out infinite;
  }

  .raid-card.shadow-theme .raid-thumb{
    background:#f4eeff;
    border-color:#d8ccff;
    box-shadow:
      0 12px 28px rgba(98,67,168,.2),
      0 0 18px rgba(124,88,233,.15);
  }

  .raid-thumb img{
    width:60px;
    height:60px;
    object-fit:contain;
  }

  .raid-name{
    font-size:20px;
    line-height:1.1;
    font-weight:900;
    letter-spacing:-.03em;
  }

  .raid-desc{
    margin-top:7px;
    font-size:12px;
    color:#7183a0;
    line-height:1.5;
    font-weight:800;
  }

  .type-row{
    margin-top:10px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  .type-badge{
    min-height:30px;
    padding:4px 10px 4px 8px;
    border-radius:999px;
    border:1px solid #d9e3f2;
    background:#fff;
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:12px;
    font-weight:900;
    color:#607897;
  }

  .type-badge img{
    width:16px;
    height:16px;
    object-fit:contain;
    flex-shrink:0;
  }

  .raid-card.shadow-theme .type-badge{
    background:rgba(255,255,255,.88);
    border-color:#ddcffd;
  }

  .meta-row{
    margin-top:12px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  .meta-pill{
    min-height:32px;
    padding:0 12px;
    border-radius:999px;
    border:1px solid #d9e3f2;
    background:#fff;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:900;
    color:#607897;
  }

  .raid-card.shadow-theme .meta-pill{
    background:rgba(255,255,255,.88);
    border-color:#ddcffd;
  }

  .action-row{
    margin-top:12px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  .action-btn{
    min-height:36px;
    padding:0 14px;
    border-radius:999px;
    border:1px solid #d7e2f0;
    background:#fff;
    color:#597392;
    font-size:12px;
    font-weight:900;
    cursor:pointer;
    transition:.16s ease;
    display:inline-flex;
    align-items:center;
    justify-content:center;
  }

  .action-btn.primary{
    background:#edf4ff;
    color:#3567d7;
    border-color:#cdddf5;
  }

  .cp-table-panel{
    margin-top:12px;
    display:none;
    padding:14px;
    border-radius:18px;
    background:#fbfdff;
    border:1px dashed #d7e2f1;
  }

  .cp-table-panel.show{
    display:block;
    animation:fadeUp .24s ease forwards;
  }

  .cp-table-panel img{
    width:100%;
    max-width:420px;
    display:block;
    margin:0 auto;
    border-radius:12px;
    box-shadow:0 10px 24px rgba(43,67,110,.08);
  }

  .raid-card.shadow-theme .cp-table-panel{
    background:rgba(255,255,255,.76);
    border-color:#dacdfa;
  }

  .group-empty{
    padding:18px 16px;
    color:#98a6bb;
    font-size:13px;
    font-weight:800;
  }

  .empty-box{
    border:1px dashed #d9e4f2;
    background:#fbfdff;
    border-radius:18px;
    padding:18px 14px;
    text-align:center;
    color:#97a5ba;
    font-size:13px;
    font-weight:800;
  }

  .shadow-r-icon{
    position:absolute;
    right:12px;
    bottom:12px;
    width:28px;
    height:28px;
    border-radius:50%;
    background:#111;
    color:#fff;
    font-size:15px;
    font-weight:900;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 6px 14px rgba(0,0,0,.28);
    z-index:2;
  }

  .bottom-nav{
    position:fixed;
    left:50%;
    bottom:14px;
    transform:translateX(-50%);
    width:min(980px, calc(100% - 24px));
    background:rgba(255,255,255,.94);
    border:1px solid var(--line);
    border-radius:24px;
    box-shadow:0 18px 36px rgba(42,59,97,.12);
    backdrop-filter:blur(10px);
    padding:10px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    z-index:30;
  }

  .nav-item{
    min-height:64px;
    border-radius:16px;
    text-decoration:none;
    color:#6f819e;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:6px;
    font-size:12px;
    font-weight:900;
    transition:.18s ease;
    background:#f8fbff;
    border:1px solid transparent;
  }

  .nav-item:hover{
    background:#f3f7ff;
    color:#486995;
    border-color:#d6e3f3;
    transform:translateY(-1px);
  }

  .nav-item.active{
    background:#edf4ff;
    color:#3567d7;
    border-color:#cdddf5;
  }

  .nav-icon{
    font-size:18px;
    line-height:1;
  }

  @media (max-width:980px){
    .raid-grid{
      grid-template-columns:1fr;
    }
  }

  @media (max-width:768px){
    .wrap{
      padding:14px 12px 120px;
    }

    .section-head{
      padding:16px 16px 12px;
      flex-direction:column;
      align-items:flex-start;
    }

    .section-body{
      padding:12px;
    }

    .date-switcher{
      grid-template-columns:56px 1fr 56px;
      gap:8px;
    }

    .date-nav-btn{
      min-height:84px;
      border-radius:16px;
      font-size:22px;
    }

    .date-current{
      min-height:84px;
      border-radius:18px;
      padding:10px;
    }

    .date-current-weekday{
      font-size:15px;
    }

    .date-current-day{
      font-size:28px;
    }

    .date-current-full{
      font-size:12px;
      margin-top:7px;
    }

    .day-head{
      flex-direction:column;
      align-items:flex-start;
    }

    .top-boosts{
      max-width:100%;
      justify-content:flex-start;
    }

    .raid-main{
      grid-template-columns:64px 1fr;
    }

    .raid-thumb{
      width:64px;
      height:64px;
      border-radius:18px;
    }

    .raid-thumb img{
      width:50px;
      height:50px;
    }

    .raid-name{
      font-size:18px;
    }

    .raid-group-head{
      padding:12px 14px;
      align-items:flex-start;
      flex-direction:column;
    }
  }

  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto}
    *{
      animation:none !important;
      transition:none !important;
      scroll-behavior:auto !important;
    }
  }
</style>
</head>
<body>
<div class="wrap">

  <section class="section fade-up">
    <div class="section-head">
      <div>
        <div class="section-title">주간 요약</div>
        <div class="section-sub"></div>
      </div>
    </div>
    <div class="section-body">
      <div class="date-switcher-wrap">
        <div class="date-switcher">
          <button type="button" class="date-nav-btn" id="prevDateBtn" aria-label="이전 날짜">‹</button>

          <div class="date-current" id="dateCurrent"></div>

          <button type="button" class="date-nav-btn" id="nextDateBtn" aria-label="다음 날짜">›</button>
        </div>

        <div class="week-dots" id="weekDots"></div>
      </div>
    </div>
  </section>

  <section class="section fade-up delay-1">
    <div class="section-head">
      <div>
        <div class="section-title">날짜별 레이드</div>
        <div class="section-sub"></div>
      </div>
    </div>
    <div class="section-body">
      <div id="weekList"></div>
    </div>
  </section>

</div>

<nav class="bottom-nav">
  <a href="./index.html" class="nav-item">
    <div class="nav-icon">🏠</div>
    <div>메인</div>
  </a>
  <a href="./dynamax.html" class="nav-item">
    <div class="nav-icon">⚡</div>
    <div>거다이맥스</div>
  </a>
  <a href="./weekly.html" class="nav-item active">
    <div class="nav-icon">🗓️</div>
    <div>주간 일정표</div>
  </a>
  <a href="./monthly.html" class="nav-item">
    <div class="nav-icon">📆</div>
    <div>월간 일정</div>
  </a>
</nav>

<script>
  const DATA_URL = './raid-data.json';

  const BOOST_ICON_MAP = {
    '맑음': '/images/boost/sunny.png',
    '쾌청': '/images/boost/sunny.png',
    '비': '/images/boost/rainy.png',
    '눈': '/images/boost/snow.png',
    '안개': '/images/boost/fog.png',
    '흐림': '/images/boost/cloudy.png',
    '강풍': '/images/boost/windy.png',
    '바람': '/images/boost/windy.png',
    'windy': '/images/boost/windy.png',
    'fog': '/images/boost/fog.png',
    'sunny': '/images/boost/sunny.png',
    'rainy': '/images/boost/rainy.png',
    'snow': '/images/boost/snow.png',
    'cloudy': '/images/boost/cloudy.png'
  };

  const TYPE_ICON_NUMBER_MAP = {
    '노말': 1,
    '불': 2,
    '물': 3,
    '전기': 4,
    '풀': 5,
    '얼음': 6,
    '격투': 7,
    '독': 8,
    '땅': 9,
    '비행': 10,
    '페어리': 11,
    '벌레': 12,
    '바위': 13,
    '고스트': 14,
    '드래곤': 15,
    '드레곤': 15,
    '악': 16,
    '강철': 17,
    '에스퍼': 18
  };

  const RAID_GROUPS = [
    { key:'tier1', title:'1성 레이드', badge:'1성', badgeClass:'group-badge-1', label:'1성', shadow:false },
    { key:'tier3', title:'3성 레이드', badge:'3성', badgeClass:'group-badge-3', label:'3성', shadow:false },
    { key:'tier5', title:'5성 레이드', badge:'5성', badgeClass:'group-badge-5', label:'5성', shadow:false },
    { key:'mega', title:'메가 레이드', badge:'메가', badgeClass:'group-badge-mega', label:'메가', shadow:false },
    { key:'shadow1', title:'그림자 1성', badge:'그림자 1성', badgeClass:'group-badge-shadow', label:'1성', shadow:true },
    { key:'shadow3', title:'그림자 3성', badge:'그림자 3성', badgeClass:'group-badge-shadow', label:'3성', shadow:true },
    { key:'shadow5', title:'그림자 5성', badge:'그림자 5성', badgeClass:'group-badge-shadow', label:'5성', shadow:true }
  ];

  let weekDates = [];
  let records = [];
  let selectedIndex = 0;

  function getKoreaNow(){
    const now = new Date();
    const koreaString = now.toLocaleString('en-US', { timeZone: 'Asia/Seoul' });
    return new Date(koreaString);
  }

  function getKoreaToday(){
    const koreaNow = getKoreaNow();
    koreaNow.setHours(0, 0, 0, 0);
    return koreaNow;
  }

  function pad(n){
    return String(n).padStart(2, '0');
  }

  function toDate(str){
    if(!str) return null;
    const [y,m,d] = str.split('-').map(Number);
    return new Date(y, m - 1, d, 0, 0, 0, 0);
  }

  function toKey(date){
    return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}`;
  }

  function inRange(date, startStr, endStr){
    const start = toDate(startStr);
    const end = toDate(endStr);
    if(!start || !end) return false;
    const t = toDate(toKey(date)).getTime();
    return t >= start.getTime() && t <= end.getTime();
  }

  function escapeHtml(value){
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  async function loadRecords(){
    try{
      const res = await fetch(DATA_URL, { cache: 'no-store' });
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const parsed = await res.json();

      if(Array.isArray(parsed)) return parsed;
      if(Array.isArray(parsed.records)) return parsed.records;
      if(Array.isArray(parsed.items)) return parsed.items;

      return [];
    }catch(error){
      console.error('raid-data.json 불러오기 실패:', error);
      return [];
    }
  }

  function isAllowed(item, page){
    return Array.isArray(item.showPages) && item.showPages.includes(page);
  }

  function normalizeTierLabel(label){
    const text = String(label || '').trim();
    if(text === '1성') return '1성';
    if(text === '3성') return '3성';
    if(text === '5성') return '5성';
    if(text === '메가') return '메가';

    if(text.includes('그림자 1성')) return '1성';
    if(text.includes('그림자 3성')) return '3성';
    if(text.includes('그림자 5성')) return '5성';

    if(text.includes('1성')) return '1성';
    if(text.includes('3성')) return '3성';
    if(text.includes('5성')) return '5성';

    return text;
  }

  function isShadowItem(item){
    if(item?.isShadow === true) return true;

    const label = String(item?.label || '').trim();
    const name = String(item?.name || '').trim();
    const shadowBg = String(item?.shadowBg || '').trim().toLowerCase();

    return (
      label.includes('그림자') ||
      name.includes('그림자') ||
      shadowBg === 'true' ||
      shadowBg === '1' ||
      shadowBg === 'shadow' ||
      shadowBg === 'yes'
    );
  }

  function chipClass(label, shadow){
    if(shadow) return 'chip-pink';
    if(label === '5성') return 'chip-blue';
    if(label === '3성') return 'chip-yellow';
    if(label === '1성') return 'chip-green';
    if(label === '메가') return 'chip-purple';
    return 'chip-gray';
  }

  function resolveBoostIcon(text, explicitIcon){
    if(explicitIcon && String(explicitIcon).trim()) return explicitIcon;
    const key = String(text || '').trim().toLowerCase();
    return BOOST_ICON_MAP[key] || BOOST_ICON_MAP[String(text || '').trim()] || '';
  }

  function createTopBoostBadge(text, explicitIcon){
    if(!text) return '';
    const icon = resolveBoostIcon(text, explicitIcon);

    return `
      <div class="top-boost-badge">
        ${icon ? `<img src="${escapeHtml(icon)}" alt="${escapeHtml(text)}">` : ``}
        <span>${escapeHtml(text)}</span>
      </div>
    `;
  }

  function getTypeIconPath(typeText, explicitIcon){
    if(explicitIcon && String(explicitIcon).trim()) return explicitIcon;
    const number = TYPE_ICON_NUMBER_MAP[String(typeText || '').trim()];
    return number ? `icons/${number}.png` : '';
  }

  function createTypeBadge(typeText, explicitIcon){
    if(!typeText) return '';
    const icon = getTypeIconPath(typeText, explicitIcon);

    return `
      <div class="type-badge">
        ${icon ? `<img src="${escapeHtml(icon)}" alt="${escapeHtml(typeText)}">` : ``}
        <span>${escapeHtml(typeText)}</span>
      </div>
    `;
  }

  function getWeekStart(today){
    const d = new Date(today);
    const day = d.getDay();
    d.setDate(d.getDate() - day);
    d.setHours(0,0,0,0);
    return d;
  }

  function getWeekDates(today){
    const start = getWeekStart(today);
    const dates = [];
    for(let i=0; i<7; i++){
      const d = new Date(start);
      d.setDate(start.getDate() + i);
      dates.push(d);
    }
    return dates;
  }

  function canShowOnWeekly(item){
    const pages = Array.isArray(item?.showPages) ? item.showPages : [];
    if(pages.length === 0) return true;
    return ['weekly','index','raid-now'].some(page => pages.includes(page));
  }

  function getDayItems(records, date){
    return records
      .filter(item =>
        canShowOnWeekly(item) &&
        item.startDate &&
        item.endDate &&
        inRange(date, item.startDate, item.endDate)
      )
      .map(item => {
        const shadow = isShadowItem(item);
        const normalizedLabel = normalizeTierLabel(item.label);

        return {
          ...item,
          __shadow: shadow,
          __normalizedLabel: normalizedLabel
        };
      })
      .filter(item => {
        if(item.__shadow){
          return ['1성','3성','5성'].includes(item.__normalizedLabel);
        }
        return ['1성','3성','5성','메가'].includes(item.__normalizedLabel);
      })
      .sort((a,b) => {
        const orderMap = {
          '1성': 0,
          '3성': 1,
          '5성': 2,
          '메가': 3
        };

        const aKey = `${a.__shadow ? '1' : '0'}-${orderMap[a.__normalizedLabel] ?? 99}`;
        const bKey = `${b.__shadow ? '1' : '0'}-${orderMap[b.__normalizedLabel] ?? 99}`;

        if(aKey < bKey) return -1;
        if(aKey > bKey) return 1;

        return (a.name || '').localeCompare((b.name || ''), 'ko');
      });
  }

  function getGroupItems(items, group){
    return items.filter(item => {
      if(group.shadow !== item.__shadow) return false;
      return item.__normalizedLabel === group.label;
    });
  }

  function renderDateCurrent(){
    const days = ['일','월','화','수','목','금','토'];
    const selectedDate = weekDates[selectedIndex];
    const dateCurrent = document.getElementById('dateCurrent');

    dateCurrent.innerHTML = `
      <div class="date-current-inner">
        <div class="date-current-weekday">${days[selectedDate.getDay()]}</div>
        <div class="date-current-day">${selectedDate.getDate()}</div>
        <div class="date-current-full">${selectedDate.getMonth()+1}월 ${selectedDate.getDate()}일</div>
      </div>
    `;
  }

  function renderWeekDots(today){
    const wrap = document.getElementById('weekDots');

    wrap.innerHTML = weekDates.map((date, index) => {
      const isToday = toKey(date) === toKey(today);
      const isActive = index === selectedIndex;

      return `
        <button
          type="button"
          class="week-dot ${isToday ? 'today' : ''} ${isActive ? 'active' : ''}"
          data-index="${index}"
          aria-label="${date.getMonth()+1}월 ${date.getDate()}일 선택"
        ></button>
      `;
    }).join('');

    wrap.querySelectorAll('[data-index]').forEach(btn => {
      btn.addEventListener('click', () => {
        selectedIndex = Number(btn.dataset.index);
        updateSelectedDay(today);
      });
    });
  }

  function renderNavButtons(){
    const prevBtn = document.getElementById('prevDateBtn');
    const nextBtn = document.getElementById('nextDateBtn');

    prevBtn.disabled = selectedIndex <= 0;
    nextBtn.disabled = selectedIndex >= weekDates.length - 1;
  }

  function getDisplayChipText(item){
    if(item.__shadow){
      return `그림자 ${item.__normalizedLabel}`;
    }
    return item.__normalizedLabel || '-';
  }

  function createRaidCard(item, selectedDate, itemIndex){
    const shadowTheme = item.__shadow ? 'shadow-theme' : '';
    const chip = chipClass(item.__normalizedLabel, item.__shadow);

    const topBoosts = [
      createTopBoostBadge(item.boost, item.boostIcon),
      createTopBoostBadge(item.boost2, item.boostIcon2)
    ].join('');

    const typeBadges = [
      createTypeBadge(item.type, item.typeIcon),
      createTypeBadge(item.type2, item.typeIcon2)
    ].join('');

    const cpTableId = `cp-table-${toKey(selectedDate)}-${itemIndex}-${escapeHtml(item.name || 'raid')}`;

    return `
      <article class="raid-card ${shadowTheme}">
        <div class="raid-head">
          <span class="raid-chip ${chip}">${escapeHtml(getDisplayChipText(item))}</span>
          <div class="top-boosts">${topBoosts}</div>
        </div>

        <div class="raid-main">
          <div class="raid-thumb">
            ${
              item.image
                ? `<img src="${escapeHtml(item.image)}" alt="${escapeHtml(item.name || '')}">`
                : `<span style="font-size:26px;">🖼️</span>`
            }
          </div>

          <div>
            <div class="raid-name">${escapeHtml(item.name || '-')}</div>
            <div class="raid-desc">
              ${
                item.__shadow
                  ? '이 날짜에 진행 중인 그림자 레이드입니다.'
                  : '이 날짜에 진행 중인 레이드입니다.'
              }
            </div>
            ${typeBadges ? `<div class="type-row">${typeBadges}</div>` : ``}
          </div>
        </div>

        <div class="meta-row">
          ${
            (item.cpMin || item.cpMax)
              ? `<span class="meta-pill">CP ${escapeHtml(item.cpMin || '-')} ~ ${escapeHtml(item.cpMax || '-')}</span>`
              : ``
          }
          ${
            (item.boostedCpMin || item.boostedCpMax)
              ? `<span class="meta-pill">부스트 ${escapeHtml(item.boostedCpMin || '-')} ~ ${escapeHtml(item.boostedCpMax || '-')}</span>`
              : ``
          }
        </div>

        ${
          item.cpTableImage
            ? `
              <div class="action-row">
                <button class="action-btn primary" type="button" data-cptable-target="${cpTableId}">CP표 보기</button>
              </div>
              <div class="cp-table-panel" id="${cpTableId}">
                <img src="${escapeHtml(item.cpTableImage)}" alt="${escapeHtml(item.name || '')} CP표">
              </div>
            `
            : ``
        }

        ${item.__shadow ? `<div class="shadow-r-icon">R</div>` : ``}
      </article>
    `;
  }

  function renderSelectedDay(){
    const daysKor = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
    const selectedDate = weekDates[selectedIndex];
    const wrap = document.getElementById('weekList');
    const items = getDayItems(records, selectedDate);

    const content = items.length
      ? `
        <div class="group-stack">
          ${RAID_GROUPS.map((group, groupIndex) => {
            const groupItems = getGroupItems(items, group);
            const isShadowGroup = group.shadow ? 'shadow-group' : '';

            return `
              <section class="raid-group ${isShadowGroup}">
                <div class="raid-group-head">
                  <div class="raid-group-title">
                    <span class="raid-group-title-badge ${group.badgeClass}">${escapeHtml(group.badge)}</span>
                    <span>${escapeHtml(group.title)}</span>
                  </div>
                  <div class="raid-group-count">${groupItems.length}마리</div>
                </div>
                <div class="raid-group-body">
                  ${
                    groupItems.length
                      ? `
                        <div class="raid-grid">
                          ${groupItems.map((item, itemIndex) => createRaidCard(item, selectedDate, `${groupIndex}-${itemIndex}`)).join('')}
                        </div>
                      `
                      : `<div class="group-empty">이 구간에는 진행 중인 레이드가 없습니다.</div>`
                  }
                </div>
              </section>
            `;
          }).join('')}
        </div>
      `
      : `<div class="empty-box">이 날짜에는 진행 중인 레이드가 없습니다.</div>`;

    wrap.innerHTML = `
      <div class="selected-day-wrap">
        <section class="day-card">
          <div class="day-head">
            <div class="day-left">
              <div class="day-badge">
                <div class="day-num">${selectedDate.getDate()}</div>
                <div class="day-week">${daysKor[selectedDate.getDay()].replace('요일','')}</div>
              </div>
              <div>
                <div class="day-title">${selectedDate.getMonth()+1}월 ${selectedDate.getDate()}일 ${daysKor[selectedDate.getDay()]}</div>
              </div>
            </div>
            <div class="day-chip">${escapeHtml(toKey(selectedDate))}</div>
          </div>
          ${content}
        </section>
      </div>
    `;

    wrap.querySelectorAll('[data-cptable-target]').forEach(btn => {
      btn.addEventListener('click', () => {
        const panel = document.getElementById(btn.dataset.cptableTarget);
        if(!panel) return;
        const isOpen = panel.classList.contains('show');
        panel.classList.toggle('show', !isOpen);
        btn.textContent = isOpen ? 'CP표 보기' : 'CP표 닫기';
      });
    });
  }

  function updateSelectedDay(today){
    renderDateCurrent();
    renderWeekDots(today);
    renderNavButtons();
    renderSelectedDay();
  }

  function bindNavButtons(today){
    const prevBtn = document.getElementById('prevDateBtn');
    const nextBtn = document.getElementById('nextDateBtn');

    prevBtn.addEventListener('click', () => {
      if(selectedIndex <= 0) return;
      selectedIndex -= 1;
      updateSelectedDay(today);
    });

    nextBtn.addEventListener('click', () => {
      if(selectedIndex >= weekDates.length - 1) return;
      selectedIndex += 1;
      updateSelectedDay(today);
    });
  }

  async function init(){
    const today = getKoreaToday();
    weekDates = getWeekDates(today);
    records = await loadRecords();

    const todayIndex = weekDates.findIndex(date => toKey(date) === toKey(today));
    selectedIndex = todayIndex >= 0 ? todayIndex : 0;

    bindNavButtons(today);
    updateSelectedDay(today);
  }

  init();
</script>
</body>
</html>
