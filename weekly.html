<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pokémon GO Raid Planner | 주간 일정</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#edf3fb;
    color:#1f2f46;
  }

  :root{
    --bg:#edf3fb;
    --card:#ffffff;
    --line:#d8e3f2;
    --text:#1f2f46;
    --muted:#7486a3;

    --blue:#3567d7;
    --blue-soft:#e7f0ff;

    --purple:#7c58e9;
    --purple-soft:#efe7ff;

    --pink:#d85b85;
    --pink-soft:#ffe8f0;

    --yellow:#b88818;
    --yellow-soft:#fff1c9;

    --green:#49a66b;
    --green-soft:#e7f5eb;

    --gray:#67768f;
    --gray-soft:#f2f5fa;

    --shadow:0 14px 32px rgba(43,67,110,.08);
    --shadow-hover:0 18px 36px rgba(43,67,110,.14);
  }

  .wrap{
    max-width:1180px;
    margin:0 auto;
    padding:16px 14px 110px;
  }

  .fade-up{
    opacity:0;
    transform:translateY(10px);
    animation:fadeUp .55s ease forwards;
  }
  .delay-1{animation-delay:.05s}

  @keyframes fadeUp{
    from{opacity:0;transform:translateY(10px)}
    to{opacity:1;transform:translateY(0)}
  }

  @keyframes softFloat{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-4px)}
  }

  @keyframes pulseRing{
    0%{box-shadow:0 0 0 0 rgba(83,123,221,.16)}
    70%{box-shadow:0 0 0 10px rgba(83,123,221,0)}
    100%{box-shadow:0 0 0 0 rgba(83,123,221,0)}
  }

  @keyframes shadowGlow{
    0%,100%{
      box-shadow:
        0 16px 34px rgba(98,67,168,.18),
        0 0 0 0 rgba(124,88,233,.18);
    }
    50%{
      box-shadow:
        0 18px 38px rgba(98,67,168,.24),
        0 0 0 8px rgba(124,88,233,.08);
    }
  }

  .section{
    background:rgba(255,255,255,.9);
    border:1px solid var(--line);
    border-radius:26px;
    box-shadow:var(--shadow);
    overflow:hidden;
    margin-bottom:16px;
  }

  .section-head{
    padding:18px 18px 14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    border-bottom:1px solid #e6eef8;
  }

  .section-title{
    font-size:20px;
    font-weight:900;
    letter-spacing:-.03em;
  }

  .section-sub{
    margin-top:6px;
    font-size:13px;
    color:var(--muted);
    font-weight:800;
  }

  .section-body{
    padding:14px;
  }

  .weekday-strip{
    display:grid;
    grid-template-columns:repeat(7,minmax(0,1fr));
    gap:10px;
  }

  .weekday-pill{
    background:#f8fbff;
    border:1px solid #dbe6f4;
    border-radius:18px;
    padding:12px 10px;
    text-align:center;
    transition:.18s ease;
    cursor:pointer;
  }

  .weekday-pill:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 18px rgba(43,67,110,.06);
    border-color:#c7d7ec;
  }

  .weekday-pill.today{
    background:#edf4ff;
    border-color:#cdddf5;
    animation:pulseRing 1.8s infinite;
  }

  .weekday-kor{
    font-size:12px;
    font-weight:900;
    color:#7b8ca8;
  }

  .weekday-date{
    margin-top:8px;
    font-size:20px;
    font-weight:900;
    letter-spacing:-.03em;
    color:#24374c;
  }

  .weekday-count{
    margin-top:6px;
    font-size:12px;
    font-weight:800;
    color:#6f819e;
  }

  .week-list{
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .day-card{
    background:linear-gradient(180deg,#fff 0%, #f9fbff 100%);
    border:1.5px solid var(--line);
    border-radius:24px;
    padding:16px;
    box-shadow:0 10px 24px rgba(43,67,110,.05);
    scroll-margin-top:18px;
  }

  .day-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    margin-bottom:14px;
  }

  .day-left{
    display:flex;
    align-items:center;
    gap:12px;
  }

  .day-badge{
    min-width:64px;
    height:64px;
    border-radius:20px;
    background:#edf4ff;
    border:1px solid #d8e6f6;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    box-shadow:0 10px 20px rgba(43,67,110,.06);
  }

  .day-badge .day-num{
    font-size:22px;
    font-weight:900;
    line-height:1;
    color:#2f58ba;
  }

  .day-badge .day-week{
    margin-top:4px;
    font-size:11px;
    font-weight:900;
    color:#6f87a7;
  }

  .day-title{
    font-size:22px;
    font-weight:900;
    letter-spacing:-.03em;
    line-height:1.1;
  }

  .day-sub{
    margin-top:6px;
    font-size:13px;
    font-weight:800;
    color:#7283a0;
  }

  .day-chip{
    min-height:34px;
    padding:0 14px;
    border-radius:999px;
    border:1px solid #d7e2f0;
    background:#fff;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:900;
    color:#607897;
  }

  .raid-grid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:12px;
  }

  .raid-card{
    background:linear-gradient(180deg,#fff 0%, #fbfdff 100%);
    border:1.5px solid #dde7f4;
    border-radius:22px;
    padding:14px;
    position:relative;
    overflow:hidden;
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    min-height:260px;
  }

  .raid-card::after{
    content:"";
    position:absolute;
    right:-30px;
    bottom:-30px;
    width:100px;
    height:100px;
    border-radius:50%;
    background:linear-gradient(135deg, rgba(120,148,255,.14), rgba(123,99,255,.04));
    pointer-events:none;
  }

  .raid-card:hover{
    transform:translateY(-4px);
    box-shadow:var(--shadow-hover);
    border-color:#c7d7ec;
  }

  .raid-card.shadow-theme{
    background:linear-gradient(180deg,#f5f0ff 0%, #efe7ff 100%);
    border-color:#d7c8ff;
    animation:shadowGlow 2.2s ease-in-out infinite;
  }

  .raid-card.shadow-theme::after{
    background:radial-gradient(circle, rgba(124,88,233,.26) 0%, rgba(124,88,233,0) 68%);
  }

  .raid-head{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
  }

  .raid-chip{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:30px;
    padding:0 11px;
    border-radius:999px;
    font-size:11px;
    font-weight:900;
    line-height:1;
  }

  .chip-blue{background:var(--blue-soft);color:var(--blue)}
  .chip-yellow{background:var(--yellow-soft);color:var(--yellow)}
  .chip-green{background:var(--green-soft);color:var(--green)}
  .chip-purple{background:var(--purple-soft);color:var(--purple)}
  .chip-pink{background:var(--pink-soft);color:var(--pink)}
  .chip-gray{background:var(--gray-soft);color:var(--gray)}

  .top-boosts{
    display:flex;
    flex-wrap:wrap;
    justify-content:flex-end;
    gap:6px;
    max-width:55%;
  }

  .top-boost-badge{
    min-height:30px;
    padding:4px 10px 4px 7px;
    border-radius:999px;
    border:1px solid #d9e3f2;
    background:#fff;
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:11px;
    font-weight:900;
    color:#607897;
  }

  .top-boost-badge img{
    width:16px;
    height:16px;
    object-fit:contain;
    border-radius:50%;
    background:#f4f7fd;
    flex-shrink:0;
  }

  .raid-card.shadow-theme .top-boost-badge{
    background:rgba(255,255,255,.84);
    border-color:#ddcffd;
  }

  .raid-main{
    display:grid;
    grid-template-columns:74px 1fr;
    gap:12px;
    align-items:center;
    margin-top:12px;
  }

  .raid-thumb{
    width:74px;
    height:74px;
    border-radius:20px;
    background:#f3f7ff;
    border:1px solid #dce6f5;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    box-shadow:0 10px 24px rgba(43,67,110,.08);
    animation:softFloat 3.8s ease-in-out infinite;
  }

  .raid-card.shadow-theme .raid-thumb{
    background:#f4eeff;
    border-color:#d8ccff;
    box-shadow:
      0 12px 28px rgba(98,67,168,.2),
      0 0 18px rgba(124,88,233,.15);
  }

  .raid-thumb img{
    width:60px;
    height:60px;
    object-fit:contain;
  }

  .raid-name{
    font-size:20px;
    line-height:1.1;
    font-weight:900;
    letter-spacing:-.03em;
  }

  .raid-desc{
    margin-top:7px;
    font-size:12px;
    color:#7183a0;
    line-height:1.5;
    font-weight:800;
  }

  .meta-row{
    margin-top:12px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  .meta-pill{
    min-height:32px;
    padding:0 12px;
    border-radius:999px;
    border:1px solid #d9e3f2;
    background:#fff;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:900;
    color:#607897;
  }

  .raid-card.shadow-theme .meta-pill{
    background:rgba(255,255,255,.84);
    border-color:#ddcffd;
  }

  .action-row{
    margin-top:12px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  .action-btn{
    min-height:36px;
    padding:0 14px;
    border-radius:999px;
    border:1px solid #d7e2f0;
    background:#fff;
    color:#597392;
    font-size:12px;
    font-weight:900;
    cursor:pointer;
    transition:.16s ease;
    display:inline-flex;
    align-items:center;
    justify-content:center;
  }

  .action-btn.primary{
    background:#edf4ff;
    color:#3567d7;
    border-color:#cdddf5;
  }

  .cp-table-panel{
    margin-top:12px;
    display:none;
    padding:14px;
    border-radius:18px;
    background:#fbfdff;
    border:1px dashed #d7e2f1;
  }

  .cp-table-panel.show{
    display:block;
    animation:fadeUp .24s ease forwards;
  }

  .cp-table-panel img{
    width:100%;
    max-width:420px;
    display:block;
    margin:0 auto;
    border-radius:12px;
    box-shadow:0 10px 24px rgba(43,67,110,.08);
  }

  .raid-card.shadow-theme .cp-table-panel{
    background:rgba(255,255,255,.74);
    border-color:#dacdfa;
  }

  .empty-box{
    border:1px dashed #d9e4f2;
    background:#fbfdff;
    border-radius:18px;
    padding:18px 14px;
    text-align:center;
    color:#97a5ba;
    font-size:13px;
    font-weight:800;
  }

  .bottom-nav{
    position:fixed;
    left:50%;
    bottom:14px;
    transform:translateX(-50%);
    width:min(980px, calc(100% - 24px));
    background:rgba(255,255,255,.94);
    border:1px solid var(--line);
    border-radius:24px;
    box-shadow:0 18px 36px rgba(42,59,97,.12);
    backdrop-filter:blur(10px);
    padding:10px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    z-index:30;
  }

  .nav-item{
    min-height:64px;
    border-radius:16px;
    text-decoration:none;
    color:#6f819e;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:6px;
    font-size:12px;
    font-weight:900;
    transition:.18s ease;
    background:#f8fbff;
    border:1px solid transparent;
  }

  .nav-item:hover{
    background:#f3f7ff;
    color:#486995;
    border-color:#d6e3f3;
    transform:translateY(-1px);
  }

  .nav-item.active{
    background:#edf4ff;
    color:#3567d7;
    border-color:#cdddf5;
  }

  .nav-icon{
    font-size:18px;
    line-height:1;
  }

  @media (max-width:980px){
    .raid-grid{
      grid-template-columns:1fr;
    }
  }

  @media (max-width:860px){
    .weekday-strip{
      grid-template-columns:repeat(4,minmax(0,1fr));
    }
  }

  @media (max-width:768px){
    .wrap{
      padding:14px 12px 120px;
    }

    .section-head{
      padding:16px 16px 12px;
      flex-direction:column;
      align-items:flex-start;
    }

    .section-body{
      padding:12px;
    }

    .weekday-strip{
      grid-template-columns:repeat(2,minmax(0,1fr));
    }

    .day-head{
      flex-direction:column;
      align-items:flex-start;
    }

    .top-boosts{
      max-width:100%;
      justify-content:flex-start;
    }

    .raid-main{
      grid-template-columns:64px 1fr;
    }

    .raid-thumb{
      width:64px;
      height:64px;
      border-radius:18px;
    }

    .raid-thumb img{
      width:50px;
      height:50px;
    }

    .raid-name{
      font-size:18px;
    }
  }

  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto}
    *{
      animation:none !important;
      transition:none !important;
      scroll-behavior:auto !important;
    }
  }
</style>
</head>
<body>
<div class="wrap">

  <section class="section fade-up">
    <div class="section-head">
      <div>
        <div class="section-title">주간 요약</div>
        <div class="section-sub">오늘 날짜를 기준으로 이번 주 범위를 계산합니다</div>
      </div>
    </div>
    <div class="section-body">
      <div class="weekday-strip" id="weekdayStrip"></div>
    </div>
  </section>

  <section class="section fade-up delay-1">
    <div class="section-head">
      <div>
        <div class="section-title">날짜별 레이드</div>
        <div class="section-sub">카드 우측 상단에 부스트 정보가 표시되고, 하단 상세보기 버튼은 제거되었습니다</div>
      </div>
    </div>
    <div class="section-body">
      <div class="week-list" id="weekList"></div>
    </div>
  </section>

</div>

<nav class="bottom-nav">
  <a href="./index.html" class="nav-item">
    <div class="nav-icon">🏠</div>
    <div>메인</div>
  </a>
  <a href="./raid-now.html" class="nav-item">
    <div class="nav-icon">⚔️</div>
    <div>지금 레이드</div>
  </a>
  <a href="./weekly.html" class="nav-item active">
    <div class="nav-icon">🗓️</div>
    <div>주간 일정표</div>
  </a>
  <a href="./monthly.html" class="nav-item">
    <div class="nav-icon">📆</div>
    <div>월간 일정</div>
  </a>
</nav>

<script>
  const DATA_URL = './raid-data.json';

  const BOOST_ICON_MAP = {
    '맑음': '/images/boost/sunny.png',
    '쾌청': '/images/boost/sunny.png',
    '비': '/images/boost/rainy.png',
    '눈': '/images/boost/snow.png',
    '안개': '/images/boost/fog.png',
    '흐림': '/images/boost/cloudy.png',
    '강풍': '/images/boost/windy.png',
    '바람': '/images/boost/windy.png',
    'windy': '/images/boost/windy.png',
    'fog': '/images/boost/fog.png',
    'sunny': '/images/boost/sunny.png',
    'rainy': '/images/boost/rainy.png',
    'snow': '/images/boost/snow.png',
    'cloudy': '/images/boost/cloudy.png'
  };

  function getKoreaNow(){
    const now = new Date();
    const koreaString = now.toLocaleString('en-US', { timeZone: 'Asia/Seoul' });
    return new Date(koreaString);
  }

  function getKoreaToday(){
    const koreaNow = getKoreaNow();
    koreaNow.setHours(0, 0, 0, 0);
    return koreaNow;
  }

  function pad(n){
    return String(n).padStart(2, '0');
  }

  function toDate(str){
    if(!str) return null;
    const [y,m,d] = str.split('-').map(Number);
    return new Date(y, m - 1, d, 0, 0, 0, 0);
  }

  function toKey(date){
    return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}`;
  }

  function formatShort(date){
    const days = ['일','월','화','수','목','금','토'];
    return `${date.getMonth()+1}.${date.getDate()} (${days[date.getDay()]})`;
  }

  function inRange(date, startStr, endStr){
    const start = toDate(startStr);
    const end = toDate(endStr);
    if(!start || !end) return false;
    const t = toDate(toKey(date)).getTime();
    return t >= start.getTime() && t <= end.getTime();
  }

  function escapeHtml(value){
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  async function loadRecords(){
    try{
      const res = await fetch(DATA_URL, { cache: 'no-store' });
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const parsed = await res.json();

      if(Array.isArray(parsed)) return parsed;
      if(Array.isArray(parsed.records)) return parsed.records;
      if(Array.isArray(parsed.items)) return parsed.items;

      return [];
    }catch(error){
      console.error('raid-data.json 불러오기 실패:', error);
      return [];
    }
  }

  function isAllowed(item, page){
    return Array.isArray(item.showPages) && item.showPages.includes(page);
  }

  function sortPriority(label){
    const order = {
      '5성': 0,
      '3성': 1,
      '1성': 2,
      '메가': 3,
      '그림자': 4
    };
    return order[label] ?? 99;
  }

  function chipClass(label){
    if(label === '5성') return 'chip-blue';
    if(label === '3성') return 'chip-yellow';
    if(label === '1성') return 'chip-green';
    if(label === '메가') return 'chip-purple';
    if(label === '그림자') return 'chip-pink';
    return 'chip-gray';
  }

  function resolveBoostIcon(text, explicitIcon){
    if(explicitIcon && String(explicitIcon).trim()) return explicitIcon;
    const key = String(text || '').trim().toLowerCase();
    return BOOST_ICON_MAP[key] || BOOST_ICON_MAP[String(text || '').trim()] || '';
  }

  function createTopBoostBadge(text, explicitIcon){
    if(!text) return '';
    const icon = resolveBoostIcon(text, explicitIcon);

    return `
      <div class="top-boost-badge">
        ${icon ? `<img src="${escapeHtml(icon)}" alt="${escapeHtml(text)}">` : `<img alt="" src="data:image/gif;base64,R0lGODlhAQABAAAAACw=">`}
        <span>${escapeHtml(text)}</span>
      </div>
    `;
  }

  function getWeekStart(today){
    const d = new Date(today);
    const day = d.getDay();
    d.setDate(d.getDate() - day);
    d.setHours(0,0,0,0);
    return d;
  }

  function getWeekDates(today){
    const start = getWeekStart(today);
    const dates = [];
    for(let i=0; i<7; i++){
      const d = new Date(start);
      d.setDate(start.getDate() + i);
      dates.push(d);
    }
    return dates;
  }

  function getDayItems(records, date){
    return records
      .filter(item =>
        (isAllowed(item, 'weekly') || isAllowed(item, 'index') || isAllowed(item, 'raid-now')) &&
        ['1성','3성','5성','메가','그림자'].includes(item.label) &&
        item.startDate &&
        item.endDate &&
        inRange(date, item.startDate, item.endDate)
      )
      .sort((a,b) => {
        const diff = sortPriority(a.label) - sortPriority(b.label);
        if(diff !== 0) return diff;
        return (a.name || '').localeCompare((b.name || ''), 'ko');
      });
  }

  function renderWeekdayStrip(weekDates, records, today){
    const days = ['일','월','화','수','목','금','토'];
    const wrap = document.getElementById('weekdayStrip');

    wrap.innerHTML = weekDates.map(date => {
      const count = getDayItems(records, date).length;
      const isToday = toKey(date) === toKey(today);
      const targetId = `day-${toKey(date)}`;

      return `
        <button type="button" class="weekday-pill ${isToday ? 'today' : ''}" data-target="${targetId}">
          <div class="weekday-kor">${days[date.getDay()]}요일</div>
          <div class="weekday-date">${date.getDate()}</div>
          <div class="weekday-count">${count}개 보스</div>
        </button>
      `;
    }).join('');

    wrap.querySelectorAll('[data-target]').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = document.getElementById(btn.dataset.target);
        if(target){
          target.scrollIntoView({ behavior:'smooth', block:'start' });
        }
      });
    });
  }

  function renderWeekList(weekDates, records){
    const daysKor = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
    const wrap = document.getElementById('weekList');

    wrap.innerHTML = weekDates.map((date, dayIndex) => {
      const items = getDayItems(records, date);

      const content = items.length
        ? `
          <div class="raid-grid">
            ${items.map((item, itemIndex) => {
              const shadowTheme = item.label === '그림자' ? 'shadow-theme' : '';
              const chip = chipClass(item.label);
              const topBoosts = [
                createTopBoostBadge(item.boost, item.boostIcon),
                createTopBoostBadge(item.boost2, item.boostIcon2)
              ].join('');
              const cpTableId = `cp-table-${dayIndex}-${itemIndex}-${toKey(date)}`;

              return `
                <article class="raid-card ${shadowTheme}">
                  <div class="raid-head">
                    <span class="raid-chip ${chip}">${escapeHtml(item.label || '-')}</span>
                    <div class="top-boosts">${topBoosts}</div>
                  </div>

                  <div class="raid-main">
                    <div class="raid-thumb">
                      ${
                        item.image
                          ? `<img src="${escapeHtml(item.image)}" alt="${escapeHtml(item.name || '')}">`
                          : `<span style="font-size:26px;">🖼️</span>`
                      }
                    </div>

                    <div>
                      <div class="raid-name">${escapeHtml(item.name || '-')}</div>
                      <div class="raid-desc">
                        ${
                          item.label === '그림자'
                            ? '이 날짜에 진행 중인 그림자 레이드입니다.'
                            : '이 날짜에 진행 중인 레이드입니다.'
                        }
                      </div>
                    </div>
                  </div>

                  <div class="meta-row">
                    ${
                      (item.cpMin || item.cpMax)
                        ? `<span class="meta-pill">CP ${escapeHtml(item.cpMin || '-')} ~ ${escapeHtml(item.cpMax || '-')}</span>`
                        : ``
                    }
                    ${
                      (item.boostedCpMin || item.boostedCpMax)
                        ? `<span class="meta-pill">부스트 ${escapeHtml(item.boostedCpMin || '-')} ~ ${escapeHtml(item.boostedCpMax || '-')}</span>`
                        : ``
                    }
                  </div>

                  ${
                    item.cpTableImage
                      ? `
                        <div class="action-row">
                          <button class="action-btn primary" type="button" data-cptable-target="${cpTableId}">CP표 보기</button>
                        </div>
                        <div class="cp-table-panel" id="${cpTableId}">
                          <img src="${escapeHtml(item.cpTableImage)}" alt="${escapeHtml(item.name || '')} CP표">
                        </div>
                      `
                      : ``
                  }
                </article>
              `;
            }).join('')}
          </div>
        `
        : `<div class="empty-box">이 날짜에는 진행 중인 레이드가 없습니다.</div>`;

      return `
        <section class="day-card" id="day-${toKey(date)}">
          <div class="day-head">
            <div class="day-left">
              <div class="day-badge">
                <div class="day-num">${date.getDate()}</div>
                <div class="day-week">${daysKor[date.getDay()].replace('요일','')}</div>
              </div>
              <div>
                <div class="day-title">${date.getMonth()+1}월 ${date.getDate()}일 ${daysKor[date.getDay()]}</div>
                <div class="day-sub">${items.length}개의 보스가 이 날짜에 표시됩니다</div>
              </div>
            </div>
            <div class="day-chip">${escapeHtml(toKey(date))}</div>
          </div>
          ${content}
        </section>
      `;
    }).join('');

    wrap.querySelectorAll('[data-cptable-target]').forEach(btn => {
      btn.addEventListener('click', () => {
        const panel = document.getElementById(btn.dataset.cptableTarget);
        if(!panel) return;
        const isOpen = panel.classList.contains('show');
        panel.classList.toggle('show', !isOpen);
        btn.textContent = isOpen ? 'CP표 보기' : 'CP표 닫기';
      });
    });
  }

  async function init(){
    const today = getKoreaToday();
    const weekDates = getWeekDates(today);
    const records = await loadRecords();

    renderWeekdayStrip(weekDates, records, today);
    renderWeekList(weekDates, records);
  }

  init();
</script>
</body>
</html>
