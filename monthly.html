<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>월간 일정</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#edf3fb;
    color:#1f2f46;
  }

  :root{
    --bg:#edf3fb;
    --card:#ffffff;
    --card-soft:#f8fbff;
    --line:#d8e3f2;
    --text:#1f2f46;
    --muted:#7486a3;

    --blue:#3567d7;
    --blue-soft:#e7f0ff;

    --purple:#7c58e9;
    --purple-soft:#efe7ff;

    --pink:#d85b85;
    --pink-soft:#ffe8f0;

    --yellow:#b88818;
    --yellow-soft:#fff1c9;

    --green:#49a66b;
    --green-soft:#e7f5eb;

    --gray:#67768f;
    --gray-soft:#f2f5fa;

    --shadow:0 18px 40px rgba(43,67,110,.08);
  }

  .wrap{
    max-width:1320px;
    margin:0 auto;
    padding:20px 16px 110px;
  }

  .section{
    background:rgba(255,255,255,.84);
    border:1px solid var(--line);
    border-radius:30px;
    overflow:hidden;
    box-shadow:var(--shadow);
    margin-bottom:18px;
  }

  .section-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:18px;
    padding:24px 26px 18px;
    border-bottom:1px solid #e4edf8;
    background:linear-gradient(180deg,#fbfdff 0%, #f6faff 100%);
  }

  .section-title{
    font-size:26px;
    font-weight:900;
    letter-spacing:-.03em;
  }

  .section-sub{
    margin-top:8px;
    font-size:14px;
    color:var(--muted);
    font-weight:700;
    line-height:1.5;
  }

  .section-body{
    padding:18px;
  }

  .tiny-badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:42px;
    padding:0 14px;
    border-radius:999px;
    background:#f1f6ff;
    border:1px solid var(--line);
    color:#58719a;
    font-size:13px;
    font-weight:900;
    white-space:nowrap;
  }

  .legend{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:12px;
  }

  .chip{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:30px;
    padding:0 12px;
    border-radius:999px;
    font-size:11px;
    font-weight:900;
    line-height:1;
    white-space:nowrap;
  }

  .chip.blue{background:var(--blue-soft);color:var(--blue)}
  .chip.purple{background:var(--purple-soft);color:var(--purple)}
  .chip.pink{background:var(--pink-soft);color:var(--pink)}
  .chip.yellow{background:var(--yellow-soft);color:var(--yellow)}
  .chip.green{background:var(--green-soft);color:var(--green)}
  .chip.gray{background:var(--gray-soft);color:var(--gray)}

  .calendar-head-row{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:14px;
    padding:0 6px 12px;
  }

  .weekday{
    text-align:center;
    font-size:15px;
    font-weight:900;
    color:#7f8faa;
    letter-spacing:-.02em;
  }

  .calendar-grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:14px;
  }

  .day-cell{
    position:relative;
    min-height:228px;
    background:linear-gradient(180deg,#ffffff 0%, #f8fbff 100%);
    border:1.5px solid var(--line);
    border-radius:24px;
    padding:14px;
    cursor:pointer;
    transition:.18s ease;
    overflow:hidden;
  }

  .day-cell:hover{
    transform:translateY(-2px);
    border-color:#bdd0ea;
    box-shadow:0 14px 30px rgba(73,97,150,.08);
  }

  .day-cell.empty{
    background:transparent;
    border:none;
    cursor:default;
    box-shadow:none;
  }

  .day-cell.today{
    border-color:#a8c1ff;
    box-shadow:0 12px 28px rgba(90,124,220,.10);
    background:linear-gradient(180deg,#ffffff 0%, #f4f8ff 100%);
  }

  .day-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
    margin-bottom:12px;
  }

  .day-num{
    font-size:22px;
    font-weight:900;
    line-height:1;
  }

  .day-num.sun{color:#ef6b7a}
  .day-num.sat{color:#4b7cf0}

  .today-pill{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:28px;
    padding:0 10px;
    border-radius:999px;
    background:#e9f1ff;
    color:#4e7deb;
    font-size:11px;
    font-weight:900;
    white-space:nowrap;
  }

  .day-items{
    display:flex;
    flex-direction:column;
    gap:8px;
    padding-right:46px;
  }

  .day-pill{
    display:flex;
    align-items:flex-start;
    gap:8px;
    min-height:46px;
    padding:10px 12px;
    border-radius:16px;
    font-size:12px;
    font-weight:900;
    line-height:1.28;
    white-space:normal;
    word-break:keep-all;
    overflow:visible;
  }

  .day-pill.blue{background:var(--blue-soft);color:var(--blue)}
  .day-pill.purple{background:var(--purple-soft);color:var(--purple)}
  .day-pill.pink{background:var(--pink-soft);color:var(--pink)}
  .day-pill.yellow{background:var(--yellow-soft);color:var(--yellow)}
  .day-pill.green{background:var(--green-soft);color:var(--green)}
  .day-pill.gray{background:var(--gray-soft);color:var(--gray)}

  .day-pill img{
    width:18px;
    height:18px;
    object-fit:contain;
    flex-shrink:0;
    margin-top:1px;
  }

  .day-pill-text{
    display:block;
    min-width:0;
    flex:1;
  }

  .day-pill-label{
    display:block;
    font-size:11px;
    opacity:.9;
    margin-top:2px;
  }

  .day-more{
    font-size:12px;
    color:#8a9ab3;
    font-weight:900;
    padding-left:4px;
  }

  .day-avatar{
    position:absolute;
    right:10px;
    bottom:10px;
    width:42px;
    height:42px;
    border-radius:14px;
    background:#f3f7ff;
    border:1px solid #dce6f4;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }

  .day-avatar img{
    width:30px;
    height:30px;
    object-fit:contain;
  }

  .empty-note{
    font-size:12px;
    color:#9aa8bc;
    font-weight:800;
  }

  .modal{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(17,28,46,.42);
    z-index:60;
    padding:22px;
  }

  .modal.show{display:flex}

  .modal-panel{
    width:min(860px,100%);
    max-height:88vh;
    overflow:auto;
    border-radius:30px;
    background:linear-gradient(180deg,#fbfdff 0%, #f5f9ff 100%);
    border:1px solid #dce7f5;
    box-shadow:0 28px 70px rgba(17,29,56,.24);
  }

  .modal-head{
    position:sticky;
    top:0;
    z-index:2;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:16px;
    padding:24px 24px 18px;
    border-bottom:1px solid #e1ebf7;
    background:rgba(250,252,255,.96);
    backdrop-filter:blur(8px);
  }

  .modal-title{
    font-size:28px;
    font-weight:900;
    letter-spacing:-.03em;
  }

  .modal-sub{
    margin-top:8px;
    color:#8090aa;
    font-size:14px;
    font-weight:700;
    line-height:1.5;
  }

  .close-btn{
    width:44px;
    height:44px;
    border:none;
    border-radius:16px;
    background:#edf3ff;
    color:#4a6697;
    font-size:22px;
    font-weight:900;
    cursor:pointer;
    flex-shrink:0;
  }

  .modal-body{
    padding:20px;
  }

  .detail-list{
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .detail-card{
    display:flex;
    gap:16px;
    align-items:flex-start;
    background:#fff;
    border:1.5px solid #dce7f4;
    border-radius:24px;
    padding:16px;
    box-shadow:0 12px 28px rgba(58,81,127,.04);
  }

  .detail-thumb{
    width:86px;
    height:86px;
    border-radius:22px;
    background:#f3f7ff;
    border:1px solid #e0e8f6;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    flex-shrink:0;
  }

  .detail-thumb img{
    width:68px;
    height:68px;
    object-fit:contain;
  }

  .detail-main{
    flex:1;
    min-width:0;
  }

  .detail-name{
    font-size:22px;
    font-weight:900;
    line-height:1.15;
    letter-spacing:-.03em;
  }

  .detail-meta{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:10px;
  }

  .detail-time{
    margin-top:10px;
    font-size:15px;
    color:#59708f;
    font-weight:900;
  }

  .detail-note{
    margin-top:8px;
    color:#8a98af;
    font-size:13px;
    font-weight:700;
    line-height:1.45;
  }

  .bottom-nav{
    position:fixed;
    left:50%;
    bottom:14px;
    transform:translateX(-50%);
    width:min(1180px, calc(100% - 24px));
    background:rgba(255,255,255,.92);
    border:1px solid var(--line);
    border-radius:26px;
    box-shadow:0 18px 36px rgba(42,59,97,.12);
    backdrop-filter:blur(10px);
    padding:10px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    z-index:30;
  }

  .nav-item{
    min-height:68px;
    border-radius:18px;
    text-decoration:none;
    color:#6f819e;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:6px;
    font-size:13px;
    font-weight:900;
    transition:.18s ease;
    background:#f8fbff;
    border:1px solid transparent;
  }

  .nav-item:hover{
    background:#f3f7ff;
    color:#486995;
    border-color:#d6e3f3;
  }

  .nav-item.active{
    background:#edf4ff;
    color:#3567d7;
    border-color:#cdddf5;
  }

  .nav-icon{
    font-size:20px;
    line-height:1;
  }

  @media (max-width:900px){
    .calendar-head-row,
    .calendar-grid{
      min-width:1100px;
    }
    .section-body{
      overflow-x:auto;
    }
  }

  @media (max-width:768px){
    .wrap{
      padding-bottom:120px;
    }

    .section-head{
      padding:22px 20px 16px;
      flex-direction:column;
      align-items:flex-start;
    }

    .section-body{
      padding:16px;
    }

    .section-title{
      font-size:22px;
    }
  }
</style>
</head>
<body>
<div class="wrap">

  <section class="section">
    <div class="section-head">
      <div>
        <div class="section-title" id="calendarTitle">월간 일정</div>
        <div class="section-sub" id="calendarSub">어드민에서 저장한 일정 중 월간 페이지에 표시되는 데이터만 불러옵니다.</div>
        <div class="legend">
          <span class="chip blue">전설</span>
          <span class="chip purple">메가</span>
          <span class="chip pink">그림자</span>
          <span class="chip yellow">레이드 아워 / 레이드 데이</span>
          <span class="chip green">이벤트 / 커뮤니티 데이</span>
        </div>
      </div>
      <div class="tiny-badge" id="monthBadge">MONTH</div>
    </div>

    <div class="section-body">
      <div class="calendar-head-row">
        <div class="weekday">일</div>
        <div class="weekday">월</div>
        <div class="weekday">화</div>
        <div class="weekday">수</div>
        <div class="weekday">목</div>
        <div class="weekday">금</div>
        <div class="weekday">토</div>
      </div>

      <div class="calendar-grid" id="calendarGrid"></div>
    </div>
  </section>

</div>

<div class="modal" id="detailModal">
  <div class="modal-panel">
    <div class="modal-head">
      <div>
        <div class="modal-title" id="modalTitle">상세 일정</div>
        <div class="modal-sub">시간이 따로 없는 항목은 기본적으로 06:00 AM ~ 10:00 PM 으로 표시됩니다.</div>
      </div>
      <button class="close-btn" id="closeModal" aria-label="닫기">×</button>
    </div>
    <div class="modal-body">
      <div class="detail-list" id="detailList"></div>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="./index.html" class="nav-item">
    <div class="nav-icon">🏠</div>
    <div>메인</div>
  </a>
  <a href="./raid-now.html" class="nav-item">
    <div class="nav-icon">⚔️</div>
    <div>지금 레이드</div>
  </a>
  <a href="./weekly.html" class="nav-item">
    <div class="nav-icon">🗓️</div>
    <div>주간 일정표</div>
  </a>
  <a href="./monthly.html" class="nav-item active">
    <div class="nav-icon">📆</div>
    <div>월간 일정</div>
  </a>
</nav>

<script>
  const STORAGE_KEY = 'pogoRaidAdminData';

  function getKoreaNow(){
    const now = new Date();
    const koreaString = now.toLocaleString('en-US', { timeZone: 'Asia/Seoul' });
    return new Date(koreaString);
  }

  function getKoreaToday(){
    const koreaNow = getKoreaNow();
    koreaNow.setHours(0, 0, 0, 0);
    return koreaNow;
  }

  function pad(n){
    return String(n).padStart(2, '0');
  }

  function toDate(str){
    if(!str) return null;
    const [y, m, d] = str.split('-').map(Number);
    return new Date(y, m - 1, d, 0, 0, 0, 0);
  }

  function toKey(date){
    return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
  }

  function getDayKor(day){
    return ['일','월','화','수','목','금','토'][day];
  }

  function formatKoreanDate(date){
    return `${date.getFullYear()}년 ${date.getMonth()+1}월 ${date.getDate()}일 ${getDayKor(date.getDay())}요일`;
  }

  function toAmpm(time24){
    if(!time24) return '';
    const [hh, mm] = time24.split(':').map(Number);
    const suffix = hh >= 12 ? 'PM' : 'AM';
    const h12 = hh % 12 === 0 ? 12 : hh % 12;
    return `${String(h12).padStart(2, '0')}:${String(mm).padStart(2, '0')} ${suffix}`;
  }

  function getDisplayTime(item){
    const start = item.startTime ? toAmpm(item.startTime) : '06:00 AM';
    const end = item.endTime ? toAmpm(item.endTime) : '10:00 PM';
    return `${start} ~ ${end}`;
  }

  function inRange(date, startStr, endStr){
    const start = toDate(startStr);
    const end = toDate(endStr);
    if(!start || !end) return false;
    const t = toDate(toKey(date)).getTime();
    return t >= start.getTime() && t <= end.getTime();
  }

  function loadRecords(){
    try{
      const saved = localStorage.getItem(STORAGE_KEY);
      const parsed = saved ? JSON.parse(saved) : [];
      return Array.isArray(parsed) ? parsed : [];
    }catch(e){
      return [];
    }
  }

  function isMonthlyAllowed(item){
    return Array.isArray(item.showPages) && item.showPages.includes('monthly');
  }

  function getItemsForDate(records, date){
    return records
      .filter(item =>
        isMonthlyAllowed(item) &&
        item.startDate &&
        item.endDate &&
        inRange(date, item.startDate, item.endDate)
      )
      .sort((a, b) => {
        const order = {
          '전설': 0,
          '메가': 1,
          '그림자': 2,
          '레이드 아워': 3,
          '레이드 데이': 4,
          '이벤트': 5,
          '커뮤니티 데이': 6
        };
        const aOrder = order[a.label] ?? 99;
        const bOrder = order[b.label] ?? 99;
        if(aOrder !== bOrder) return aOrder - bOrder;
        return (a.name || '').localeCompare(b.name || '', 'ko');
      });
  }

  function chipClass(item){
    return item.type || (
      item.label === '전설' ? 'blue' :
      item.label === '메가' ? 'purple' :
      item.label === '그림자' ? 'pink' :
      item.label === '레이드 아워' || item.label === '레이드 데이' ? 'yellow' :
      item.label === '이벤트' || item.label === '커뮤니티 데이' ? 'green' : 'gray'
    );
  }

  function getMonthFromQueryOrToday(){
    const params = new URLSearchParams(location.search);
    const queryMonth = params.get('month');
    if(queryMonth && /^\d{4}-\d{2}$/.test(queryMonth)){
      const [y, m] = queryMonth.split('-').map(Number);
      return { year: y, month: m };
    }
    const today = getKoreaToday();
    return { year: today.getFullYear(), month: today.getMonth() + 1 };
  }

  function renderHeader(year, month){
    document.getElementById('calendarTitle').textContent = `${year}년 ${month}월 월간 일정`;
    document.getElementById('monthBadge').textContent = `${year}.${pad(month)}`;
    document.getElementById('calendarSub').textContent = `어드민에서 저장한 일정 중 월간 페이지(monthly)에 표시되는 데이터만 불러옵니다.`;
  }

  function renderCalendar(){
    const records = loadRecords();
    const { year, month } = getMonthFromQueryOrToday();
    const today = getKoreaToday();

    renderHeader(year, month);

    const grid = document.getElementById('calendarGrid');
    const firstDay = new Date(year, month - 1, 1).getDay();
    const lastDate = new Date(year, month, 0).getDate();
    let html = '';

    for(let i = 0; i < firstDay; i++){
      html += `<div class="day-cell empty"></div>`;
    }

    for(let day = 1; day <= lastDate; day++){
      const date = new Date(year, month - 1, day);
      const items = getItemsForDate(records, date);
      const preview = items.slice(0, 3);
      const dayClass = date.getDay() === 0 ? 'sun' : date.getDay() === 6 ? 'sat' : '';
      const isToday = toKey(date) === toKey(today);

      html += `
        <div class="day-cell ${isToday ? 'today' : ''}" data-date="${toKey(date)}">
          <div class="day-top">
            <div class="day-num ${dayClass}">${day}</div>
            ${isToday ? `<div class="today-pill">TODAY</div>` : ``}
          </div>

          <div class="day-items">
            ${
              preview.length
                ? preview.map(item => `
                  <div class="day-pill ${chipClass(item)}">
                    ${
                      item.image
                        ? `<img src="${item.image}" alt="${item.name || ''}">`
                        : `<span style="width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;">🖼️</span>`
                    }
                    <span class="day-pill-text">
                      ${item.name || '-'}
                      <span class="day-pill-label">${item.label || '-'}</span>
                    </span>
                  </div>
                `).join('')
                : `<div class="empty-note">일정 없음</div>`
            }

            ${items.length > 3 ? `<div class="day-more">+ ${items.length - 3} more</div>` : ``}
          </div>

          ${
            items[0] && items[0].image
              ? `<div class="day-avatar"><img src="${items[0].image}" alt="${items[0].name || ''}"></div>`
              : ``
          }
        </div>
      `;
    }

    grid.innerHTML = html;

    Array.from(grid.querySelectorAll('.day-cell[data-date]')).forEach(cell => {
      cell.addEventListener('click', () => openModal(cell.getAttribute('data-date'), records));
    });
  }

  function openModal(dateKey, records){
    const modal = document.getElementById('detailModal');
    const title = document.getElementById('modalTitle');
    const list = document.getElementById('detailList');
    const date = toDate(dateKey);
    const items = getItemsForDate(records, date);

    title.textContent = `${formatKoreanDate(date)} 상세 일정`;

    if(!items.length){
      list.innerHTML = `
        <div class="detail-card">
          <div class="detail-main">
            <div class="detail-name">등록된 일정이 없습니다.</div>
            <div class="detail-note">해당 날짜에는 별도 일정이 없습니다.</div>
          </div>
        </div>
      `;
    } else {
      list.innerHTML = items.map(item => `
        <div class="detail-card">
          <div class="detail-thumb">
            ${
              item.image
                ? `<img src="${item.image}" alt="${item.name || ''}">`
                : `<span style="font-size:28px;">🖼️</span>`
            }
          </div>
          <div class="detail-main">
            <div class="detail-name">${item.name || '-'}</div>
            <div class="detail-meta">
              <span class="chip ${chipClass(item)}">${item.label || '-'}</span>
              ${item.boostWeather ? `<span class="chip gray">${item.boostWeather}</span>` : ``}
            </div>
            <div class="detail-time">${getDisplayTime(item)}</div>
            <div class="detail-note">${item.note || '시간이 따로 없는 항목은 기본적으로 06:00 AM ~ 10:00 PM 으로 표시됩니다.'}</div>
          </div>
        </div>
      `).join('');
    }

    modal.classList.add('show');
  }

  function closeModal(){
    document.getElementById('detailModal').classList.remove('show');
  }

  document.getElementById('closeModal').addEventListener('click', closeModal);
  document.getElementById('detailModal').addEventListener('click', (e) => {
    if(e.target.id === 'detailModal') closeModal();
  });

  renderCalendar();
</script>
</body>
</html>
