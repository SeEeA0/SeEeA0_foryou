<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pokémon GO Monthly Raid Calendar</title>

<style>
body{font-family:Pretendard;background:#f5f7fb;margin:0}
.wrap{max-width:1200px;margin:0 auto;padding:20px}

.section{background:#fff;border-radius:20px;padding:20px;margin-bottom:16px}

.legend-wrap{display:flex;flex-wrap:wrap;gap:10px}
.legend-item{
  padding:10px 14px;border-radius:999px;border:1px solid #ddd;
  cursor:pointer;font-weight:700;background:#f8fbff
}
.legend-item.active{background:#4f7fff;color:#fff;border:none}

.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
}

.day-cell{
  min-height:120px;border:1px solid #ddd;border-radius:12px;padding:6px
}

.month-raid-item{
  display:block;margin-top:4px;padding:4px 6px;border-radius:8px;
  font-size:12px;font-weight:700
}

.raid-tier-1{background:#e7f5eb;color:#2f9f63}
.raid-tier-3{background:#fff4d6;color:#b88818}
.raid-tier-5{background:#e7f0ff;color:#3567d7}
.raid-tier-mega{background:#efe7ff;color:#7c58e9}
.raid-tier-shadow{background:#ffe8f0;color:#d85b85}
</style>
</head>

<body>

<div class="wrap">

  <div class="section">
    <h2>월간 레이드 캘린더</h2>
    <div id="legendBadge">전체 보기</div>
  </div>

  <div class="section">
    <div class="legend-wrap" id="legendFilters"></div>
  </div>

  <div class="section">
    <div class="calendar-grid" id="calendarGrid"></div>
  </div>

</div>

<script>
const STORAGE_KEY = 'pogoRaidAdminData';

const RAID_FILTERS = [
  { key:'all', label:'전체'},
  { key:'1성', label:'1성'},
  { key:'3성', label:'3성'},
  { key:'5성', label:'5성'},
  { key:'메가', label:'메가'},
  { key:'그림자', label:'그림자'}
];

let activeFilters = [];

const legendFilters = document.getElementById('legendFilters');
const calendarGrid = document.getElementById('calendarGrid');
const legendBadge = document.getElementById('legendBadge');

function loadData(){
  const raw = localStorage.getItem(STORAGE_KEY);
  const data = raw ? JSON.parse(raw) : [];
  console.log('🔥 전체 데이터', data);

  return data.filter(v => (v.showPages||[]).includes('monthly'));
}

function isAll(){ return activeFilters.length===0 }

function toggleFilter(key){
  if(key==='all'){ activeFilters=[]; return }

  if(activeFilters.includes(key)){
    activeFilters = activeFilters.filter(v=>v!==key)
  }else{
    activeFilters.push(key)
  }
}

function getFiltered(data){
  if(isAll()) return data;
  return data.filter(v=>activeFilters.includes(v.label))
}

function renderLegend(){
  legendFilters.innerHTML = RAID_FILTERS.map(f=>{
    const active = f.key==='all' ? isAll() : activeFilters.includes(f.key);
    return `<div class="legend-item ${active?'active':''}" data-key="${f.key}">
      ${f.label}
    </div>`
  }).join('');

  legendBadge.innerText = isAll()
    ? '전체 보기'
    : activeFilters.join(' + ') + ' 표시';

  document.querySelectorAll('.legend-item').forEach(el=>{
    el.onclick=()=>{
      toggleFilter(el.dataset.key);
      renderLegend();
      renderCalendar();
    }
  })
}

function getColor(label){
  return {
    '1성':'raid-tier-1',
    '3성':'raid-tier-3',
    '5성':'raid-tier-5',
    '메가':'raid-tier-mega',
    '그림자':'raid-tier-shadow'
  }[label] || '';
}

function renderCalendar(){
  const data = getFiltered(loadData());

  console.log('🔥 필터 적용 데이터', data);

  let html='';

  for(let i=1;i<=30;i++){
    const date = `2026-04-${String(i).padStart(2,'0')}`;

    const dayData = data.filter(v=> date>=v.startDate && date<=v.endDate);

    html += `
      <div class="day-cell">
        <b>${i}</b>
        ${dayData.map(v=>`
          <div class="month-raid-item ${getColor(v.label)}">
            ${v.name}
          </div>
        `).join('')}
      </div>
    `
  }

  calendarGrid.innerHTML = html;
}

renderLegend();
renderCalendar();
</script>

</body>
</html>
