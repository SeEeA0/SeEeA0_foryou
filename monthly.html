<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>월간 일정</title>

<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:'Pretendard',sans-serif;
  background:#edf3fb;
  color:#1f2f46;
}

/* layout */
.wrap{
  max-width:1400px;
  margin:0 auto;
  padding:20px 16px 40px;
}

.section{
  background:#fff;
  border-radius:28px;
  border:1px solid #dbe6f3;
  padding:18px;
}

/* header */
.section-title{
  font-size:28px;
  font-weight:900;
  margin-bottom:14px;
}

/* calendar */
.calendar-head{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  margin-bottom:10px;
  font-weight:800;
  color:#7f8faa;
  text-align:center;
}

.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:14px;
}

/* day */
.day{
  background:#f8fbff;
  border:1.5px solid #dbe6f3;
  border-radius:22px;
  padding:12px;
  min-height:180px;
  display:flex;
  flex-direction:column;
  position:relative;
}

/* date */
.date{
  font-weight:900;
  font-size:20px;
  margin-bottom:10px;
}

/* raid type badge */
.type-badge{
  position:absolute;
  top:10px;
  right:10px;
  font-size:11px;
  font-weight:900;
  padding:4px 8px;
  border-radius:999px;
}

.type-raid{background:#e7f0ff;color:#3567d7;}
.type-mega{background:#efe7ff;color:#7c58e9;}
.type-shadow{background:#ffe8f0;color:#d85b85;}

/* pokemon list */
.list{
  display:flex;
  flex-direction:column;
  gap:8px;
}

/* pokemon item */
.item{
  display:flex;
  align-items:center;
  gap:8px;

  padding:8px 10px;
  border-radius:14px;

  font-weight:800;
  font-size:13px;

  width:fit-content;
  max-width:100%;
}

/* color per pokemon */
.c1{background:#e7f0ff;color:#3567d7;}
.c2{background:#efe7ff;color:#7c58e9;}
.c3{background:#ffe8f0;color:#d85b85;}
.c4{background:#e7f5eb;color:#49a66b;}
.c5{background:#fff1c9;color:#b88818;}

.item img{
  width:20px;
  height:20px;
}

/* responsive */
@media(max-width:900px){
  .calendar-grid{
    min-width:900px;
  }
  .section{
    overflow-x:auto;
  }
}
</style>
</head>

<body>
<div class="wrap">

  <div class="section">
    <div class="section-title">2026년 4월</div>

    <div class="calendar-head">
      <div>일</div><div>월</div><div>화</div>
      <div>수</div><div>목</div><div>금</div><div>토</div>
    </div>

    <div class="calendar-grid">

      <!-- 예시 DAY -->
      <div class="day">
        <div class="date">1</div>

        <div class="type-badge type-raid">5성</div>

        <div class="list">
          <div class="item c1">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/895.png">
            레지드래고
          </div>

          <div class="item c2">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/310.png">
            메가썬더볼트
          </div>

          <div class="item c3">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/381.png">
            그림자 라티오스
          </div>
        </div>
      </div>

      <!-- 복사해서 계속 사용 -->
      <div class="day">
        <div class="date">2</div>
        <div class="type-badge type-mega">메가</div>

        <div class="list">
          <div class="item c1">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/895.png">
            레지드래고
          </div>
        </div>
      </div>

      <div class="day">
        <div class="date">3</div>
        <div class="type-badge type-shadow">그림자</div>

        <div class="list">
          <div class="item c3">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/381.png">
            그림자 라티오스
          </div>
        </div>
      </div>

    </div>
  </div>

</div>
</body>
</html>
