<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pokémon GO Raid Planner | 월간 일정</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#edf3fb;
    color:#1f2f46;
  }

  :root{
    --bg:#edf3fb;
    --card:#ffffff;
    --line:#d8e3f2;
    --text:#1f2f46;
    --muted:#7486a3;

    --blue:#3567d7;
    --blue-soft:#e7f0ff;

    --purple:#7c58e9;
    --purple-soft:#efe7ff;

    --pink:#d85b85;
    --pink-soft:#ffe8f0;

    --yellow:#b88818;
    --yellow-soft:#fff1c9;

    --green:#49a66b;
    --green-soft:#e7f5eb;

    --gray:#67768f;
    --gray-soft:#f2f5fa;

    --shadow:0 14px 32px rgba(43,67,110,.08);
    --shadow-hover:0 18px 36px rgba(43,67,110,.14);
  }

  .wrap{
    max-width:1180px;
    margin:0 auto;
    padding:16px 14px 110px;
  }

  .fade-up{
    opacity:0;
    transform:translateY(10px);
    animation:fadeUp .55s ease forwards;
  }

  .delay-1{animation-delay:.05s}

  @keyframes fadeUp{
    from{opacity:0;transform:translateY(10px)}
    to{opacity:1;transform:translateY(0)}
  }

  @keyframes softFloat{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-4px)}
  }

  @keyframes shadowGlow{
    0%,100%{
      box-shadow:
        0 16px 34px rgba(98,67,168,.18),
        0 0 0 0 rgba(124,88,233,.18);
    }
    50%{
      box-shadow:
        0 18px 38px rgba(98,67,168,.24),
        0 0 0 8px rgba(124,88,233,.08);
    }
  }

  @keyframes todayPulse{
    0%,100%{box-shadow:0 0 0 0 rgba(83,123,221,.12)}
    50%{box-shadow:0 0 0 6px rgba(83,123,221,.06)}
  }

  .section{
    background:rgba(255,255,255,.92);
    border:1px solid var(--line);
    border-radius:26px;
    box-shadow:var(--shadow);
    overflow:hidden;
    margin-bottom:16px;
  }

  .section-head{
    padding:18px 18px 14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    border-bottom:1px solid #e6eef8;
  }

  .section-title{
    font-size:20px;
    font-weight:900;
    letter-spacing:-.03em;
  }

  .section-sub{
    margin-top:6px;
    font-size:13px;
    color:var(--muted);
    font-weight:800;
    line-height:1.5;
  }

  .section-body{
    padding:14px;
  }

  .month-toolbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin-bottom:14px;
  }

  .month-title{
    font-size:26px;
    font-weight:900;
    letter-spacing:-.04em;
  }

  .month-actions{
    display:flex;
    align-items:center;
    gap:8px;
  }

  .tool-btn{
    min-height:40px;
    padding:0 14px;
    border-radius:999px;
    border:1px solid #d7e2f0;
    background:#fff;
    color:#597392;
    font-size:12px;
    font-weight:900;
    cursor:pointer;
    transition:.16s ease;
  }

  .tool-btn:hover{
    transform:translateY(-1px);
    border-color:#c7d7ec;
    box-shadow:0 10px 18px rgba(43,67,110,.07);
  }

  .calendar-head{
    display:grid;
    grid-template-columns:repeat(7,minmax(0,1fr));
    gap:6px;
    margin-bottom:8px;
  }

  .weekday-name{
    text-align:center;
    padding:10px 4px;
    border-radius:12px;
    background:#f6f9ff;
    border:1px solid #dce7f4;
    font-size:12px;
    font-weight:900;
    color:#6f819e;
  }

  .calendar-grid{
    display:grid;
    grid-template-columns:repeat(7,minmax(0,1fr));
    gap:6px;
  }

  .day-cell{
    aspect-ratio:1 / 1;
    background:#fff;
    border:1.5px solid #dde7f4;
    border-radius:16px;
    padding:6px;
    position:relative;
    overflow:hidden;
    cursor:pointer;
    transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
    align-items:flex-start;
    text-align:left;
  }

  .day-cell:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 18px rgba(43,67,110,.06);
    border-color:#c7d7ec;
  }

  .day-cell.outside{
    opacity:.45;
    background:#f8fbff;
  }

  .day-cell.today{
    border-color:#cdddf5;
    animation:todayPulse 2s ease-in-out infinite;
    background:linear-gradient(180deg,#ffffff 0%, #f8fbff 100%);
  }

  .day-cell.selected{
    border-color:#adc5f0;
    box-shadow:0 0 0 2px rgba(83,123,221,.12), 0 12px 22px rgba(43,67,110,.08);
  }

  .day-number{
    font-size:13px;
    font-weight:900;
    line-height:1;
    color:#2b3d55;
  }

  .day-main{
    margin-top:5px;
    width:100%;
    font-size:10px;
    font-weight:900;
    color:#48617f;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    line-height:1.25;
  }

  .day-more{
    margin-top:2px;
    font-size:10px;
    color:#7a8ca8;
    font-weight:900;
    line-height:1.2;
  }

  .day-count{
    margin-top:auto;
    min-height:20px;
    padding:0 7px;
    border-radius:999px;
    background:#edf4ff;
    color:#3567d7;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:10px;
    font-weight:900;
  }

  .empty-state{
    border:1px dashed #d9e4f2;
    background:#fbfdff;
    border-radius:18px;
    padding:22px 14px;
    text-align:center;
    color:#97a5ba;
    font-size:13px;
    font-weight:800;
  }

  .modal{
    position:fixed;
    inset:0;
    display:none;
    z-index:999;
  }

  .modal.show{
    display:block;
  }

  .modal-bg{
    position:absolute;
    inset:0;
    background:rgba(26,37,56,.46);
  }

  .modal-sheet{
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    background:#fff;
    border-radius:24px 24px 0 0;
    max-height:82vh;
    overflow:auto;
    box-shadow:0 -16px 40px rgba(22,35,58,.18);
    transform:translateY(0);
    transition:transform .22s ease;
    will-change:transform;
    touch-action:none;
  }

  .modal-sheet.dragging{
    transition:none;
  }

  .modal-head{
    position:sticky;
    top:0;
    z-index:2;
    background:rgba(255,255,255,.96);
    backdrop-filter:blur(10px);
    border-bottom:1px solid #e8eef8;
    padding:14px 16px 12px;
  }

  .modal-handle{
    width:42px;
    height:5px;
    border-radius:999px;
    background:#dbe5f3;
    margin:0 auto 12px;
  }

  .modal-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
  }

  .modal-title{
    font-size:22px;
    font-weight:900;
    letter-spacing:-.03em;
    line-height:1.15;
  }

  .modal-sub{
    margin-top:6px;
    font-size:12px;
    color:#7486a3;
    font-weight:800;
  }

  .modal-close{
    min-height:36px;
    padding:0 12px;
    border-radius:999px;
    border:1px solid #d7e2f0;
    background:#fff;
    color:#597392;
    font-size:12px;
    font-weight:900;
    cursor:pointer;
    flex-shrink:0;
  }

  .modal-body{
    padding:14px 14px 18px;
  }

  .modal-list{
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .raid-card{
    background:linear-gradient(180deg,#fff 0%, #fbfdff 100%);
    border:1.5px solid #dde7f4;
    border-radius:22px;
    padding:14px;
    position:relative;
    overflow:hidden;
    min-height:250px;
  }

  .raid-card::after{
    content:"";
    position:absolute;
    right:-30px;
    bottom:-30px;
    width:100px;
    height:100px;
    border-radius:50%;
    background:linear-gradient(135deg, rgba(120,148,255,.14), rgba(123,99,255,.04));
    pointer-events:none;
  }

  .raid-card.shadow-theme{
    background:linear-gradient(180deg,#f5f0ff 0%, #efe7ff 100%);
    border-color:#d7c8ff;
    animation:shadowGlow 2.2s ease-in-out infinite;
  }

  .raid-card.shadow-theme::after{
    background:radial-gradient(circle, rgba(124,88,233,.26) 0%, rgba(124,88,233,0) 68%);
  }

  .raid-head{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
  }

  .raid-chip{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:30px;
    padding:0 11px;
    border-radius:999px;
    font-size:11px;
    font-weight:900;
    line-height:1;
  }

  .chip-blue{background:var(--blue-soft);color:var(--blue)}
  .chip-yellow{background:var(--yellow-soft);color:var(--yellow)}
  .chip-green{background:var(--green-soft);color:var(--green)}
  .chip-purple{background:var(--purple-soft);color:var(--purple)}
  .chip-pink{background:var(--pink-soft);color:var(--pink)}
  .chip-gray{background:var(--gray-soft);color:var(--gray)}

  .raid-date-chip{
    min-height:32px;
    padding:4px 10px 4px 8px;
    border-radius:999px;
    background:#fff;
    border:1px solid #d7e2f0;
    color:#607897;
    font-size:11px;
    font-weight:900;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    max-width:150px;
  }

  .raid-date-chip img{
    width:18px;
    height:18px;
    object-fit:contain;
    border-radius:50%;
    background:#f4f7fd;
    flex-shrink:0;
  }

  .raid-date-chip span{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .raid-main{
    display:grid;
    grid-template-columns:74px 1fr;
    gap:12px;
    align-items:center;
    margin-top:12px;
  }

  .raid-thumb{
    width:74px;
    height:74px;
    border-radius:20px;
    background:#f3f7ff;
    border:1px solid #dce6f5;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    box-shadow:0 10px 24px rgba(43,67,110,.08);
    animation:softFloat 3.8s ease-in-out infinite;
  }

  .raid-card.shadow-theme .raid-thumb{
    background:#f4eeff;
    border-color:#d8ccff;
    box-shadow:
      0 12px 28px rgba(98,67,168,.2),
      0 0 18px rgba(124,88,233,.15);
  }

  .raid-thumb img{
    width:60px;
    height:60px;
    object-fit:contain;
  }

  .raid-name{
    font-size:20px;
    line-height:1.1;
    font-weight:900;
    letter-spacing:-.03em;
  }

  .raid-desc{
    margin-top:7px;
    font-size:12px;
    color:#7183a0;
    line-height:1.5;
    font-weight:800;
  }

  .meta-row{
    margin-top:12px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  .meta-pill{
    min-height:32px;
    padding:0 12px;
    border-radius:999px;
    border:1px solid #d9e3f2;
    background:#fff;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:900;
    color:#607897;
  }

  .raid-card.shadow-theme .meta-pill{
    background:rgba(255,255,255,.84);
    border-color:#ddcffd;
  }

  .boost-row{
    margin-top:12px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  .boost-badge{
    min-height:34px;
    padding:5px 12px 5px 8px;
    border-radius:999px;
    border:1px solid #d9e3f2;
    background:#fff;
    display:inline-flex;
    align-items:center;
    gap:7px;
    font-size:12px;
    font-weight:900;
    color:#607897;
  }

  .boost-badge img{
    width:20px;
    height:20px;
    object-fit:contain;
    border-radius:50%;
    background:#f4f7fd;
    flex-shrink:0;
  }

  .raid-card.shadow-theme .boost-badge{
    background:rgba(255,255,255,.84);
    border-color:#ddcffd;
  }

  .action-row{
    margin-top:12px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  .action-btn{
    min-height:36px;
    padding:0 14px;
    border-radius:999px;
    border:1px solid #d7e2f0;
    background:#fff;
    color:#597392;
    font-size:12px;
    font-weight:900;
    cursor:pointer;
    transition:.16s ease;
    display:inline-flex;
    align-items:center;
    justify-content:center;
  }

  .action-btn.primary{
    background:#edf4ff;
    color:#3567d7;
    border-color:#cdddf5;
  }

  .cp-table-panel{
    margin-top:12px;
    display:none;
    padding:14px;
    border-radius:18px;
    background:#fbfdff;
    border:1px dashed #d7e2f1;
  }

  .cp-table-panel.show{
    display:block;
    animation:fadeUp .24s ease forwards;
  }

  .cp-table-panel img{
    width:100%;
    max-width:420px;
    display:block;
    margin:0 auto;
    border-radius:12px;
    box-shadow:0 10px 24px rgba(43,67,110,.08);
  }

  .raid-card.shadow-theme .cp-table-panel{
    background:rgba(255,255,255,.74);
    border-color:#dacdfa;
  }

  .bottom-nav{
    position:fixed;
    left:50%;
    bottom:14px;
    transform:translateX(-50%);
    width:min(980px, calc(100% - 24px));
    background:rgba(255,255,255,.94);
    border:1px solid var(--line);
    border-radius:24px;
    box-shadow:0 18px 36px rgba(42,59,97,.12);
    backdrop-filter:blur(10px);
    padding:10px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    z-index:30;
  }

  .nav-item{
    min-height:64px;
    border-radius:16px;
    text-decoration:none;
    color:#6f819e;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:6px;
    font-size:12px;
    font-weight:900;
    transition:.18s ease;
    background:#f8fbff;
    border:1px solid transparent;
  }

  .nav-item:hover{
    background:#f3f7ff;
    color:#486995;
    border-color:#d6e3f3;
    transform:translateY(-1px);
  }

  .nav-item.active{
    background:#edf4ff;
    color:#3567d7;
    border-color:#cdddf5;
  }

  .nav-icon{
    font-size:18px;
    line-height:1;
  }

  @media (max-width:768px){
    .wrap{
      padding:14px 10px 120px;
    }

    .section-head{
      padding:16px 14px 12px;
      flex-direction:column;
      align-items:flex-start;
    }

    .section-body{
      padding:10px;
    }

    .month-toolbar{
      flex-direction:column;
      align-items:flex-start;
    }

    .month-title{
      font-size:22px;
    }

    .month-actions{
      width:100%;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
    }

    .tool-btn{
      width:100%;
      padding:0 8px;
      font-size:11px;
    }

    .calendar-head{
      gap:4px;
    }

    .weekday-name{
      padding:8px 2px;
      font-size:10px;
      border-radius:10px;
    }

    .calendar-grid{
      gap:4px;
    }

    .day-cell{
      border-radius:12px;
      padding:5px;
    }

    .day-number{
      font-size:12px;
    }

    .day-main{
      font-size:9px;
      margin-top:4px;
    }

    .day-more{
      font-size:9px;
    }

    .day-count{
      min-height:18px;
      padding:0 6px;
      font-size:9px;
    }

    .modal-sheet{
      max-height:86vh;
      border-radius:20px 20px 0 0;
    }

    .modal-head{
      padding:12px 12px 10px;
    }

    .modal-title{
      font-size:20px;
    }

    .modal-body{
      padding:12px 12px 18px;
    }

    .raid-date-chip{
      max-width:128px;
      font-size:10px;
      padding:4px 8px 4px 7px;
    }

    .raid-date-chip img{
      width:16px;
      height:16px;
    }

    .raid-main{
      grid-template-columns:64px 1fr;
    }

    .raid-thumb{
      width:64px;
      height:64px;
      border-radius:18px;
    }

    .raid-thumb img{
      width:50px;
      height:50px;
    }

    .raid-name{
      font-size:18px;
    }
  }

  @media (prefers-reduced-motion: reduce){
    *{
      animation:none !important;
      transition:none !important;
      scroll-behavior:auto !important;
    }
  }
</style>
</head>
<body>
<div class="wrap">

  <section class="section fade-up">
    <div class="section-head">
      <div>
        <div class="section-title">월간 캘린더</div>
        <div class="section-sub">원하는 날짜를 누르면 그날 레이드 목록을 볼 수 있습니다</div>
      </div>
    </div>
    <div class="section-body">
      <div class="month-toolbar">
        <div class="month-title" id="monthTitle">2026년 4월</div>
        <div class="month-actions">
          <button class="tool-btn" type="button" id="prevMonthBtn">이전 달</button>
          <button class="tool-btn" type="button" id="todayBtn">이번 달</button>
          <button class="tool-btn" type="button" id="nextMonthBtn">다음 달</button>
        </div>
      </div>

      <div class="calendar-head">
        <div class="weekday-name">일</div>
        <div class="weekday-name">월</div>
        <div class="weekday-name">화</div>
        <div class="weekday-name">수</div>
        <div class="weekday-name">목</div>
        <div class="weekday-name">금</div>
        <div class="weekday-name">토</div>
      </div>

      <div class="calendar-grid" id="calendarGrid"></div>
    </div>
  </section>

</div>

<div id="calendarModal" class="modal">
  <div class="modal-bg"></div>
  <div class="modal-sheet">
    <div class="modal-head">
      <div class="modal-handle"></div>
      <div class="modal-top">
        <div>
          <div class="modal-title" id="modalTitle">날짜</div>
          <div class="modal-sub" id="modalSub">레이드 목록</div>
        </div>
        <button type="button" class="modal-close" id="modalClose">닫기</button>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-list" id="modalList"></div>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="./index.html" class="nav-item">
    <div class="nav-icon">🏠</div>
    <div>메인</div>
  </a>
  <a href="./raid-now.html" class="nav-item">
    <div class="nav-icon">⚔️</div>

  </a>
  <a href="./weekly.html" class="nav-item">

  <a href="./monthly.html" class="nav-item active">

    <div>월간 일정</div>
  </a>
</nav>

<script>
  const DATA_URL = './raid-data.json';

  let allRecords = [];
  let viewYear = 0;
  let viewMonth = 0;
  let selectedDateKey = '';

  let dragState = {
    isDragging: false,
    startY: 0,
    currentY: 0,
    deltaY: 0
  };

  const BOOST_ICON_MAP = {
    '맑음': '/images/boost/sunny.png',
    '쾌청': '/images/boost/sunny.png',
    '비': '/images/boost/rainy.png',
    '눈': '/images/boost/snow.png',
    '안개': '/images/boost/fog.png',
    '흐림': '/images/boost/cloudy.png',
    '강풍': '/images/boost/windy.png',
    '바람': '/images/boost/windy.png',
    'windy': '/images/boost/windy.png',
    'fog': '/images/boost/fog.png',
    'sunny': '/images/boost/sunny.png',
    'rainy': '/images/boost/rainy.png',
    'snow': '/images/boost/snow.png',
    'cloudy': '/images/boost/cloudy.png'
  };

  function getKoreaNow(){
    const now = new Date();
    const koreaString = now.toLocaleString('en-US', { timeZone: 'Asia/Seoul' });
    return new Date(koreaString);
  }

  function getKoreaToday(){
    const koreaNow = getKoreaNow();
    koreaNow.setHours(0, 0, 0, 0);
    return koreaNow;
  }

  function pad(n){
    return String(n).padStart(2, '0');
  }

  function toDate(str){
    if(!str) return null;
    const [y,m,d] = str.split('-').map(Number);
    return new Date(y, m - 1, d, 0, 0, 0, 0);
  }

  function toKey(date){
    return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}`;
  }

  function formatShort(date){
    const days = ['일','월','화','수','목','금','토'];
    return `${date.getMonth()+1}월 ${date.getDate()}일 ${days[date.getDay()]}요일`;
  }

  function inRange(date, startStr, endStr){
    const start = toDate(startStr);
    const end = toDate(endStr);
    if(!start || !end) return false;
    const t = toDate(toKey(date)).getTime();
    return t >= start.getTime() && t <= end.getTime();
  }

  function escapeHtml(value){
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  async function loadRecords(){
    try{
      const res = await fetch(DATA_URL, { cache:'no-store' });
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const parsed = await res.json();

      if(Array.isArray(parsed)) return parsed;
      if(Array.isArray(parsed.records)) return parsed.records;
      if(Array.isArray(parsed.items)) return parsed.items;

      return [];
    }catch(error){
      console.error('raid-data.json 불러오기 실패:', error);
      return [];
    }
  }

  function isAllowed(item, page){
    return Array.isArray(item.showPages) && item.showPages.includes(page);
  }

  function sortPriority(label){
    const order = {
      '5성': 0,
      '3성': 1,
      '1성': 2,
      '메가': 3,
      '그림자': 4
    };
    return order[label] ?? 99;
  }

  function chipClass(label){
    if(label === '5성') return 'chip-blue';
    if(label === '3성') return 'chip-yellow';
    if(label === '1성') return 'chip-green';
    if(label === '메가') return 'chip-purple';
    if(label === '그림자') return 'chip-pink';
    return 'chip-gray';
  }

  function resolveBoostIcon(text, explicitIcon){
    if(explicitIcon && String(explicitIcon).trim()) return explicitIcon;
    const key = String(text || '').trim().toLowerCase();
    return BOOST_ICON_MAP[key] || BOOST_ICON_MAP[String(text || '').trim()] || '';
  }

  function createBoostBadge(text, explicitIcon){
    if(!text) return '';
    const icon = resolveBoostIcon(text, explicitIcon);

    return `
      <div class="boost-badge">
        ${icon ? `<img src="${escapeHtml(icon)}" alt="${escapeHtml(text)}">` : `<img alt="" src="data:image/gif;base64,R0lGODlhAQABAAAAACw=">`}
        <span>${escapeHtml(text)}</span>
      </div>
    `;
  }

  function createBoostChip(text, explicitIcon){
    if(!text){
      return `<span class="raid-date-chip"><span>부스트 없음</span></span>`;
    }

    const icon = resolveBoostIcon(text, explicitIcon);

    return `
      <span class="raid-date-chip">
        ${icon ? `<img src="${escapeHtml(icon)}" alt="${escapeHtml(text)}">` : ``}
        <span>${escapeHtml(text)}</span>
      </span>
    `;
  }

  function getDisplayItemsForDate(records, date){
    return records
      .filter(item =>
        (isAllowed(item, 'monthly') || isAllowed(item, 'index') || isAllowed(item, 'raid-now') || isAllowed(item, 'weekly')) &&
        ['1성','3성','5성','메가','그림자'].includes(item.label) &&
        item.startDate &&
        item.endDate &&
        inRange(date, item.startDate, item.endDate)
      )
      .sort((a,b) => {
        const diff = sortPriority(a.label) - sortPriority(b.label);
        if(diff !== 0) return diff;
        return (a.name || '').localeCompare((b.name || ''), 'ko');
      });
  }

  function getMonthMatrix(year, month){
    const first = new Date(year, month, 1);
    const last = new Date(year, month + 1, 0);

    const start = new Date(first);
    start.setDate(first.getDate() - first.getDay());

    const end = new Date(last);
    end.setDate(last.getDate() + (6 - last.getDay()));

    const dates = [];
    const cursor = new Date(start);

    while(cursor <= end){
      dates.push(new Date(cursor));
      cursor.setDate(cursor.getDate() + 1);
    }
    return dates;
  }

  function renderCalendar(){
    const today = getKoreaToday();
    const grid = document.getElementById('calendarGrid');
    const monthDates = getMonthMatrix(viewYear, viewMonth);

    document.getElementById('monthTitle').textContent = `${viewYear}년 ${viewMonth + 1}월`;

    grid.innerHTML = monthDates.map(date => {
      const items = getDisplayItemsForDate(allRecords, date);
      const outside = date.getMonth() !== viewMonth;
      const isToday = toKey(date) === toKey(today);
      const isSelected = toKey(date) === selectedDateKey;

      const visibleItem = items[0];
      const moreCount = items.length - 1;

      return `
        <button
          type="button"
          class="day-cell ${outside ? 'outside' : ''} ${isToday ? 'today' : ''} ${isSelected ? 'selected' : ''}"
          data-date="${toKey(date)}"
        >
          <div class="day-number">${date.getDate()}</div>
          ${visibleItem ? `<div class="day-main">${escapeHtml(visibleItem.name || '-')}</div>` : ``}
          ${moreCount > 0 ? `<div class="day-more">+${moreCount}</div>` : ``}
          ${items.length ? `<div class="day-count">${items.length}개</div>` : ``}
        </button>
      `;
    }).join('');

    grid.querySelectorAll('[data-date]').forEach(btn => {
      btn.addEventListener('click', () => {
        selectedDateKey = btn.dataset.date;
        const selectedDate = toDate(selectedDateKey);

        if(selectedDate.getMonth() !== viewMonth || selectedDate.getFullYear() !== viewYear){
          viewYear = selectedDate.getFullYear();
          viewMonth = selectedDate.getMonth();
        }

        renderCalendar();
        openModal(selectedDate);
      });
    });
  }

  function openModal(date){
    const items = getDisplayItemsForDate(allRecords, date);
    const modal = document.getElementById('calendarModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalSub = document.getElementById('modalSub');
    const modalList = document.getElementById('modalList');
    const modalSheet = modal.querySelector('.modal-sheet');

    modalTitle.textContent = formatShort(date);
    modalSub.textContent = items.length ? `${items.length}개의 레이드가 진행됩니다` : '진행 중인 레이드가 없습니다';

    if(modalSheet){
      modalSheet.style.transform = 'translateY(0px)';
      modalSheet.classList.remove('dragging');
    }

    if(!items.length){
      modalList.innerHTML = `<div class="empty-state">선택한 날짜에는 진행 중인 레이드가 없습니다.</div>`;
      modal.classList.add('show');
      document.body.style.overflow = 'hidden';
      return;
    }

    modalList.innerHTML = items.map((item, index) => {
      const shadowTheme = item.label === '그림자' ? 'shadow-theme' : '';
      const boostBadges = [
        createBoostBadge(item.boost, item.boostIcon),
        createBoostBadge(item.boost2, item.boostIcon2)
      ].join('');
      const cpTableId = `cp-table-${index}-${toKey(date)}`;

      return `
        <article class="raid-card ${shadowTheme}">
          <div class="raid-head">
            <span class="raid-chip ${chipClass(item.label)}">${escapeHtml(item.label || '-')}</span>
            ${createBoostChip(item.boost, item.boostIcon)}
          </div>

          <div class="raid-main">
            <div class="raid-thumb">
              ${
                item.image
                  ? `<img src="${escapeHtml(item.image)}" alt="${escapeHtml(item.name || '')}">`
                  : `<span style="font-size:26px;">🖼️</span>`
              }
            </div>

            <div>
              <div class="raid-name">${escapeHtml(item.name || '-')}</div>
              <div class="raid-desc">
                ${
                  item.label === '그림자'
                    ? '그림자 레이드 · 보라 glow 적용'
                    : '선택한 날짜 기준 진행 중'
                }
              </div>
            </div>
          </div>

          <div class="meta-row">
            ${
              (item.cpMin || item.cpMax)
                ? `<span class="meta-pill">CP ${escapeHtml(item.cpMin || '-')} ~ ${escapeHtml(item.cpMax || '-')}</span>`
                : ``
            }
            ${
              (item.boostedCpMin || item.boostedCpMax)
                ? `<span class="meta-pill">부스트 ${escapeHtml(item.boostedCpMin || '-')} ~ ${escapeHtml(item.boostedCpMax || '-')}</span>`
                : ``
            }
          </div>

          ${boostBadges ? `<div class="boost-row">${boostBadges}</div>` : ``}

          <div class="action-row">
            ${
              item.cpTableImage
                ? `<button class="action-btn primary" type="button" data-cptable-target="${cpTableId}">CP표 보기</button>`
                : ``
            }
          </div>

          ${
            item.cpTableImage
              ? `
                <div class="cp-table-panel" id="${cpTableId}">
                  <img src="${escapeHtml(item.cpTableImage)}" alt="${escapeHtml(item.name || '')} CP표">
                </div>
              `
              : ``
          }
        </article>
      `;
    }).join('');

    modalList.querySelectorAll('[data-cptable-target]').forEach(btn => {
      btn.addEventListener('click', () => {
        const panel = document.getElementById(btn.dataset.cptableTarget);
        if(!panel) return;
        const isOpen = panel.classList.contains('show');
        panel.classList.toggle('show', !isOpen);
        btn.textContent = isOpen ? 'CP표 보기' : 'CP표 닫기';
      });
    });

    modal.classList.add('show');
    document.body.style.overflow = 'hidden';
  }

  function closeModal(){
    const modal = document.getElementById('calendarModal');
    const modalSheet = modal.querySelector('.modal-sheet');

    if(modalSheet){
      modalSheet.classList.remove('dragging');
      modalSheet.style.transform = 'translateY(0px)';
    }

    modal.classList.remove('show');
    document.body.style.overflow = '';
  }

  function bindModalDrag(){
    const modal = document.getElementById('calendarModal');
    const modalSheet = modal.querySelector('.modal-sheet');
    const modalHead = modal.querySelector('.modal-head');

    if(!modalSheet || !modalHead) return;

    const getY = (event) => {
      if(event.touches && event.touches.length) return event.touches[0].clientY;
      if(event.changedTouches && event.changedTouches.length) return event.changedTouches[0].clientY;
      return event.clientY;
    };

    const startDrag = (event) => {
      if(!modal.classList.contains('show')) return;
      dragState.isDragging = true;
      dragState.startY = getY(event);
      dragState.currentY = dragState.startY;
      dragState.deltaY = 0;
      modalSheet.classList.add('dragging');
    };

    const moveDrag = (event) => {
      if(!dragState.isDragging) return;

      dragState.currentY = getY(event);
      dragState.deltaY = Math.max(0, dragState.currentY - dragState.startY);

      modalSheet.style.transform = `translateY(${dragState.deltaY}px)`;

      if(event.cancelable) event.preventDefault();
    };

    const endDrag = () => {
      if(!dragState.isDragging) return;

      dragState.isDragging = false;
      modalSheet.classList.remove('dragging');

      if(dragState.deltaY > 120){
        closeModal();
      }else{
        modalSheet.style.transform = 'translateY(0px)';
      }
    };

    modalHead.addEventListener('touchstart', startDrag, { passive:true });
    modalHead.addEventListener('mousedown', startDrag);

    window.addEventListener('touchmove', moveDrag, { passive:false });
    window.addEventListener('mousemove', moveDrag);

    window.addEventListener('touchend', endDrag);
    window.addEventListener('mouseup', endDrag);
  }

  function moveMonth(step){
    const next = new Date(viewYear, viewMonth + step, 1);
    viewYear = next.getFullYear();
    viewMonth = next.getMonth();

    const firstDay = new Date(viewYear, viewMonth, 1);
    selectedDateKey = toKey(firstDay);

    renderCalendar();
  }

  function bindToolbar(){
    document.getElementById('prevMonthBtn').addEventListener('click', () => moveMonth(-1));
    document.getElementById('nextMonthBtn').addEventListener('click', () => moveMonth(1));
    document.getElementById('todayBtn').addEventListener('click', () => {
      const today = getKoreaToday();
      viewYear = today.getFullYear();
      viewMonth = today.getMonth();
      selectedDateKey = toKey(today);
      renderCalendar();
    });

    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.querySelector('.modal-bg').addEventListener('click', closeModal);
  }

  async function init(){
    const today = getKoreaToday();

    allRecords = await loadRecords();

    viewYear = today.getFullYear();
    viewMonth = today.getMonth();
    selectedDateKey = toKey(today);

    bindToolbar();
    bindModalDrag();
    renderCalendar();
  }

  init();
</script></body>
</html>
