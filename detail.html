<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pokémon GO Raid Planner | 상세 정보</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#edf3fb;
    color:#1f2f46;
  }

  :root{
    --bg:#edf3fb;
    --card:#ffffff;
    --line:#d8e3f2;
    --text:#1f2f46;
    --muted:#7486a3;

    --blue:#3567d7;
    --blue-soft:#e7f0ff;

    --purple:#7c58e9;
    --purple-soft:#efe7ff;

    --pink:#d85b85;
    --pink-soft:#ffe8f0;

    --yellow:#b88818;
    --yellow-soft:#fff1c9;

    --green:#49a66b;
    --green-soft:#e7f5eb;

    --gray:#67768f;
    --gray-soft:#f2f5fa;

    --shadow:0 14px 32px rgba(43,67,110,.08);
    --shadow-hover:0 18px 36px rgba(43,67,110,.14);
  }

  .wrap{
    max-width:1180px;
    margin:0 auto;
    padding:16px 14px 110px;
  }

  .fade-up{
    opacity:0;
    transform:translateY(10px);
    animation:fadeUp .55s ease forwards;
  }
  .delay-1{animation-delay:.05s}
  .delay-2{animation-delay:.12s}
  .delay-3{animation-delay:.19s}
  .delay-4{animation-delay:.26s}

  @keyframes fadeUp{
    from{opacity:0;transform:translateY(10px)}
    to{opacity:1;transform:translateY(0)}
  }

  @keyframes softFloat{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-4px)}
  }

  .section{
    background:rgba(255,255,255,.9);
    border:1px solid var(--line);
    border-radius:26px;
    box-shadow:var(--shadow);
    overflow:hidden;
    margin-bottom:16px;
  }

  .section-head{
    padding:18px 18px 14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    border-bottom:1px solid #e6eef8;
  }

  .section-title{
    font-size:20px;
    font-weight:900;
    letter-spacing:-.03em;
  }

  .section-sub{
    margin-top:6px;
    font-size:13px;
    color:var(--muted);
    font-weight:800;
  }

  .section-body{
    padding:14px;
  }

  .hero{
    background:linear-gradient(180deg,#ffffff 0%, #f8fbff 100%);
    border:1px solid var(--line);
    border-radius:28px;
    box-shadow:var(--shadow);
    padding:22px 20px;
    position:relative;
    overflow:hidden;
    margin-bottom:16px;
  }

  .hero::before{
    content:"";
    position:absolute;
    right:-50px;
    top:-50px;
    width:180px;
    height:180px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(104,135,255,.18) 0%, rgba(104,135,255,0) 70%);
    pointer-events:none;
  }

  .hero.shadow-theme{
    background:linear-gradient(180deg,#f5f0ff 0%, #efe7ff 100%);
    border-color:#d7c8ff;
    box-shadow:0 16px 34px rgba(98,67,168,.14);
  }

  .hero.shadow-theme::before{
    background:radial-gradient(circle, rgba(124,88,233,.22) 0%, rgba(124,88,233,0) 70%);
  }

  .hero-row{
    display:grid;
    grid-template-columns:180px 1fr;
    gap:22px;
    align-items:center;
  }

  .hero-visual{
    width:180px;
    height:180px;
    border-radius:30px;
    background:#f3f7ff;
    border:1px solid #dce6f5;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    box-shadow:0 14px 28px rgba(43,67,110,.08);
    animation:softFloat 3.8s ease-in-out infinite;
  }

  .hero.shadow-theme .hero-visual{
    background:#f4eeff;
    border-color:#d8ccff;
  }

  .hero-visual img{
    width:140px;
    height:140px;
    object-fit:contain;
  }

  .hero-badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:32px;
    padding:0 12px;
    border-radius:999px;
    background:#edf4ff;
    color:#3567d7;
    font-size:12px;
    font-weight:900;
    margin-bottom:12px;
  }

  .hero.shadow-theme .hero-badge{
    background:#efe7ff;
    color:#7c58e9;
  }

  .hero-title{
    font-size:34px;
    line-height:1.08;
    font-weight:900;
    letter-spacing:-.04em;
  }

  .hero-desc{
    margin-top:10px;
    color:#6f819e;
    font-size:14px;
    line-height:1.6;
    font-weight:800;
  }

  .hero-meta{
    margin-top:14px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  .meta-pill{
    min-height:34px;
    padding:0 12px;
    border-radius:999px;
    border:1px solid #d9e3f2;
    background:#fff;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:900;
    color:#607897;
  }

  .hero.shadow-theme .meta-pill{
    background:rgba(255,255,255,.82);
    border-color:#ddcffd;
  }

  .info-grid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:14px;
  }

  .info-card{
    background:linear-gradient(180deg,#fff 0%, #fbfdff 100%);
    border:1.5px solid #dde7f4;
    border-radius:22px;
    padding:16px;
    min-height:132px;
    position:relative;
    overflow:hidden;
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }

  .info-card::after{
    content:"";
    position:absolute;
    right:-30px;
    bottom:-30px;
    width:90px;
    height:90px;
    border-radius:50%;
    background:linear-gradient(135deg, rgba(120,148,255,.12), rgba(123,99,255,.03));
    pointer-events:none;
  }

  .info-card:hover{
    transform:translateY(-3px);
    box-shadow:var(--shadow-hover);
    border-color:#c7d7ec;
  }

  .info-label{
    font-size:12px;
    font-weight:900;
    color:#7b8ca8;
  }

  .info-value{
    margin-top:10px;
    font-size:24px;
    line-height:1.2;
    font-weight:900;
    color:#24374c;
    letter-spacing:-.03em;
  }

  .info-desc{
    margin-top:8px;
    font-size:13px;
    line-height:1.55;
    color:#7183a0;
    font-weight:800;
  }

  .boost-row{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
  }

  .boost-badge{
    min-height:40px;
    padding:6px 12px 6px 8px;
    border-radius:999px;
    border:1px solid #d9e3f2;
    background:#fff;
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-size:12px;
    font-weight:900;
    color:#607897;
  }

  .boost-badge img{
    width:24px;
    height:24px;
    object-fit:contain;
    border-radius:50%;
    background:#f4f7fd;
    flex-shrink:0;
  }

  .action-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  .action-btn{
    min-height:40px;
    padding:0 14px;
    border-radius:999px;
    border:1px solid #d7e2f0;
    background:#fff;
    color:#597392;
    font-size:12px;
    font-weight:900;
    cursor:pointer;
    transition:.16s ease;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    justify-content:center;
  }

  .action-btn:hover{
    transform:translateY(-1px);
    border-color:#c7d7ec;
    box-shadow:0 10px 18px rgba(43,67,110,.07);
  }

  .action-btn.primary{
    background:#edf4ff;
    color:#3567d7;
    border-color:#cdddf5;
  }

  .cp-table-panel{
    margin-top:12px;
    display:none;
    padding:14px;
    border-radius:18px;
    background:#fbfdff;
    border:1px dashed #d7e2f1;
  }

  .cp-table-panel.show{
    display:block;
    animation:fadeUp .24s ease forwards;
  }

  .cp-table-panel img{
    width:100%;
    max-width:420px;
    display:block;
    margin:0 auto;
    border-radius:12px;
    box-shadow:0 10px 24px rgba(43,67,110,.08);
  }

  .guide-box{
    background:linear-gradient(180deg,#fff 0%, #fbfdff 100%);
    border:1.5px solid #dde7f4;
    border-radius:22px;
    padding:18px;
    font-size:14px;
    line-height:1.75;
    color:#405674;
    font-weight:800;
    white-space:pre-wrap;
  }

  .empty-state{
    background:linear-gradient(180deg,#fff 0%, #f9fbff 100%);
    border:1.5px dashed #d9e4f2;
    border-radius:24px;
    padding:34px 18px;
    text-align:center;
    color:#8193ad;
  }

  .empty-state h2{
    margin:0;
    font-size:28px;
    font-weight:900;
    letter-spacing:-.04em;
    color:#2b3d55;
  }

  .empty-state p{
    margin:12px 0 0;
    font-size:14px;
    line-height:1.7;
    font-weight:800;
  }

  .bottom-nav{
    position:fixed;
    left:50%;
    bottom:14px;
    transform:translateX(-50%);
    width:min(980px, calc(100% - 24px));
    background:rgba(255,255,255,.94);
    border:1px solid var(--line);
    border-radius:24px;
    box-shadow:0 18px 36px rgba(42,59,97,.12);
    backdrop-filter:blur(10px);
    padding:10px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    z-index:30;
  }

  .nav-item{
    min-height:64px;
    border-radius:16px;
    text-decoration:none;
    color:#6f819e;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:6px;
    font-size:12px;
    font-weight:900;
    transition:.18s ease;
    background:#f8fbff;
    border:1px solid transparent;
  }

  .nav-item:hover{
    background:#f3f7ff;
    color:#486995;
    border-color:#d6e3f3;
    transform:translateY(-1px);
  }

  .nav-icon{
    font-size:18px;
    line-height:1;
  }

  @media (max-width:980px){
    .info-grid{
      grid-template-columns:1fr;
    }
  }

  @media (max-width:768px){
    .wrap{
      padding:14px 12px 120px;
    }

    .hero-row{
      grid-template-columns:1fr;
    }

    .hero-visual{
      width:100%;
      height:220px;
    }

    .hero-visual img{
      width:160px;
      height:160px;
    }

    .hero-title{
      font-size:28px;
    }

    .section-head{
      padding:16px 16px 12px;
      flex-direction:column;
      align-items:flex-start;
    }

    .section-body{
      padding:12px;
    }
  }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div id="detailContent"></div>
</div>

<nav class="bottom-nav">
  <a href="./index.html" class="nav-item">
    <div class="nav-icon">🏠</div>
    <div>메인</div>
  </a>
  <a href="./raid-now.html" class="nav-item">
    <div class="nav-icon">⚔️</div>
    <div>지금 레이드</div>
  </a>
  <a href="./weekly.html" class="nav-item">
    <div class="nav-icon">🗓️</div>
    <div>주간 일정표</div>
  </a>
  <a href="./monthly.html" class="nav-item">
    <div class="nav-icon">📆</div>
    <div>월간 일정</div>
  </a>
</nav>

<script>
  const DATA_URL = './raid-data.json';

  function toDate(str){
    if(!str) return null;
    const [y,m,d] = str.split('-').map(Number);
    return new Date(y, m - 1, d, 0, 0, 0, 0);
  }

  function pad(n){
    return String(n).padStart(2, '0');
  }

  function toKey(date){
    return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}`;
  }

  function inRange(date, startStr, endStr){
    const start = toDate(startStr);
    const end = toDate(endStr);
    if(!start || !end) return false;
    const t = toDate(toKey(date)).getTime();
    return t >= start.getTime() && t <= end.getTime();
  }

  function formatSimpleDate(dateStr){
    if(!dateStr) return '-';
    return dateStr.replaceAll('-', '.');
  }

  function escapeHtml(value){
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function getQueryParams(){
    const params = new URLSearchParams(location.search);
    return {
      name: params.get('name') || '',
      date: params.get('date') || ''
    };
  }

  async function loadRecords(){
    try{
      const res = await fetch(DATA_URL, { cache: 'no-store' });
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const parsed = await res.json();

      if(Array.isArray(parsed)) return parsed;
      if(Array.isArray(parsed.records)) return parsed.records;
      if(Array.isArray(parsed.items)) return parsed.items;

      return [];
    }catch(error){
      console.error('raid-data.json 불러오기 실패:', error);
      return [];
    }
  }

  function getDetailItem(records, name, date){
    const filtered = records.filter(item => (item.name || '') === name);
    if(!filtered.length) return null;

    if(date){
      const dateObj = toDate(date);
      const matchedByDate = filtered.find(item =>
        item.startDate &&
        item.endDate &&
        dateObj &&
        inRange(dateObj, item.startDate, item.endDate)
      );
      if(matchedByDate) return matchedByDate;
    }

    return filtered[0];
  }

  function createBoostBadge(icon, text){
    if(!text) return '';
    return `
      <div class="boost-badge">
        ${icon ? `<img src="${escapeHtml(icon)}" alt="${escapeHtml(text)}">` : `<img alt="" src="data:image/gif;base64,R0lGODlhAQABAAAAACw=">`}
        <span>${escapeHtml(text)}</span>
      </div>
    `;
  }

  function renderEmpty(){
    document.getElementById('detailContent').innerHTML = `
      <section class="empty-state fade-up">
        <h2>상세 정보를 찾지 못했어요</h2>
        <p>
          name 값이 없거나 raid-data.json 안에 해당 이름의 데이터가 없습니다.
        </p>
        <div class="action-row" style="justify-content:center;margin-top:18px;">
          <a class="action-btn primary" href="./monthly.html">월간 일정으로 이동</a>
          <a class="action-btn" href="./raid-now.html">지금 레이드 보기</a>
        </div>
      </section>
    `;
  }

  function renderDetail(item, queryDate){
    const shadowTheme = item.label === '그림자' ? 'shadow-theme' : '';
    const displayDate = queryDate || '-';
    const boostBadges = [
      createBoostBadge(item.boostIcon, item.boost),
      createBoostBadge(item.boostIcon2, item.boost2)
    ].join('');

    document.getElementById('detailContent').innerHTML = `
      <section class="hero ${shadowTheme} fade-up">
        <div class="hero-row">
          <div class="hero-visual">
            ${
              item.image
                ? `<img src="${escapeHtml(item.image)}" alt="${escapeHtml(item.name || '')}">`
                : `<span style="font-size:56px;">🖼️</span>`
            }
          </div>

          <div>
            <div class="hero-badge">${escapeHtml(item.label || '레이드')}</div>
            <div class="hero-title">${escapeHtml(item.name || '-')}</div>
            <div class="hero-desc">
              ${
                item.label === '그림자'
                  ? '그림자 레이드 상세 정보입니다. 보라색 테마가 자동 적용됩니다.'
                  : '선택한 레이드의 기간, CP, 부스트, 공략, CP표를 한눈에 확인할 수 있습니다.'
              }
            </div>

            <div class="hero-meta">
              <span class="meta-pill">시작 ${escapeHtml(formatSimpleDate(item.startDate))}</span>
              <span class="meta-pill">종료 ${escapeHtml(formatSimpleDate(item.endDate))}</span>
              <span class="meta-pill">선택 날짜 ${escapeHtml(displayDate || '-')}</span>
            </div>
          </div>
        </div>
      </section>

      <section class="section fade-up delay-1">
        <div class="section-head">
          <div>
            <div class="section-title">기본 정보</div>
            <div class="section-sub">레이드 핵심 정보를 카드 형태로 정리했습니다</div>
          </div>
        </div>
        <div class="section-body">
          <div class="info-grid">
            <article class="info-card">
              <div class="info-label">일반 CP</div>
              <div class="info-value">${escapeHtml(item.cpMin || '-')} ~ ${escapeHtml(item.cpMax || '-')}</div>
              <div class="info-desc">기본 상태에서 확인 가능한 일반 CP 범위입니다.</div>
            </article>

            <article class="info-card">
              <div class="info-label">부스트 CP</div>
              <div class="info-value">${escapeHtml(item.boostedCpMin || '-')} ~ ${escapeHtml(item.boostedCpMax || '-')}</div>
              <div class="info-desc">날씨 부스트 적용 시 확인 가능한 CP 범위입니다.</div>
            </article>

            <article class="info-card">
              <div class="info-label">레이드 타입</div>
              <div class="info-value">${escapeHtml(item.label || '-')}</div>
              <div class="info-desc">5성 / 3성 / 1성 / 메가 / 그림자 기준 분류입니다.</div>
            </article>

            <article class="info-card">
              <div class="info-label">진행 기간</div>
              <div class="info-value">${escapeHtml(formatSimpleDate(item.startDate))} - ${escapeHtml(formatSimpleDate(item.endDate))}</div>
              <div class="info-desc">해당 기간 내 날짜에서 자동으로 노출됩니다.</div>
            </article>
          </div>
        </div>
      </section>

      <section class="section fade-up delay-2">
        <div class="section-head">
          <div>
            <div class="section-title">날씨 부스트</div>
            <div class="section-sub">최대 2개의 부스트 타입과 아이콘을 표시합니다</div>
          </div>
        </div>
        <div class="section-body">
          ${
            boostBadges
              ? `<div class="boost-row">${boostBadges}</div>`
              : `<div class="guide-box">등록된 날씨 부스트 정보가 없습니다.</div>`
          }
        </div>
      </section>

      <section class="section fade-up delay-3">
        <div class="section-head">
          <div>
            <div class="section-title">공략</div>
            <div class="section-sub">어드민에 입력한 공략 문구가 여기 표시됩니다</div>
          </div>
        </div>
        <div class="section-body">
          ${
            item.guide
              ? `<div class="guide-box">${escapeHtml(item.guide)}</div>`
              : `<div class="guide-box">등록된 공략 정보가 없습니다.</div>`
          }
        </div>
      </section>

      <section class="section fade-up delay-4">
        <div class="section-head">
          <div>
            <div class="section-title">CP표</div>
            <div class="section-sub">CP표 이미지가 있을 경우에만 버튼이 표시됩니다</div>
          </div>
        </div>
        <div class="section-body">
          <div class="action-row">
            ${
              item.cpTableImage
                ? `<button class="action-btn primary" type="button" id="cpTableToggleBtn">CP표 보기</button>`
                : `<span class="action-btn" style="cursor:default;">CP표 미입력</span>`
            }
            <a class="action-btn" href="./raid-now.html">지금 레이드</a>
            <a class="action-btn" href="./weekly.html">주간 일정</a>
            <a class="action-btn" href="./monthly.html">월간 일정</a>
          </div>

          ${
            item.cpTableImage
              ? `
                <div class="cp-table-panel" id="cpTablePanel">
                  <img src="${escapeHtml(item.cpTableImage)}" alt="${escapeHtml(item.name || '')} CP표">
                </div>
              `
              : ``
          }
        </div>
      </section>
    `;

    const cpTableToggleBtn = document.getElementById('cpTableToggleBtn');
    const cpTablePanel = document.getElementById('cpTablePanel');

    if(cpTableToggleBtn && cpTablePanel){
      cpTableToggleBtn.addEventListener('click', () => {
        const isOpen = cpTablePanel.classList.contains('show');
        cpTablePanel.classList.toggle('show', !isOpen);
        cpTableToggleBtn.textContent = isOpen ? 'CP표 보기' : 'CP표 닫기';
      });
    }
  }

  async function init(){
    const records = await loadRecords();
    const { name, date } = getQueryParams();

    if(!name){
      renderEmpty();
      return;
    }

    const item = getDetailItem(records, name, date);

    if(!item){
      renderEmpty();
      return;
    }

    renderDetail(item, date);
  }

  init();
</script>
</body>
</html>
