<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>상세 일정</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#edf3fb;
    color:#1f2f46;
  }

  :root{
    --bg:#edf3fb;
    --card:#ffffff;
    --card-soft:#f8fbff;
    --line:#d8e3f2;
    --text:#1f2f46;
    --muted:#7486a3;

    --blue:#3567d7;
    --blue-soft:#e7f0ff;

    --purple:#7c58e9;
    --purple-soft:#efe7ff;

    --pink:#d85b85;
    --pink-soft:#ffe8f0;

    --yellow:#b88818;
    --yellow-soft:#fff1c9;

    --green:#49a66b;
    --green-soft:#e7f5eb;

    --gray:#67768f;
    --gray-soft:#f2f5fa;

    --shadow:0 18px 40px rgba(43,67,110,.08);
  }

  .wrap{
    max-width:1120px;
    margin:0 auto;
    padding:20px 16px 110px;
  }

  .section{
    background:rgba(255,255,255,.84);
    border:1px solid var(--line);
    border-radius:30px;
    overflow:hidden;
    box-shadow:var(--shadow);
    margin-bottom:18px;
  }

  .section-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:18px;
    padding:24px 26px 18px;
    border-bottom:1px solid #e4edf8;
    background:linear-gradient(180deg,#fbfdff 0%, #f6faff 100%);
  }

  .section-title{
    font-size:26px;
    font-weight:900;
    letter-spacing:-.03em;
  }

  .section-sub{
    margin-top:8px;
    font-size:14px;
    color:var(--muted);
    font-weight:700;
    line-height:1.5;
  }

  .section-body{
    padding:18px;
  }

  .tiny-badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:42px;
    padding:0 14px;
    border-radius:999px;
    background:#f1f6ff;
    border:1px solid var(--line);
    color:#58719a;
    font-size:13px;
    font-weight:900;
    white-space:nowrap;
  }

  .detail-list{
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .detail-card{
    display:flex;
    gap:16px;
    align-items:flex-start;
    background:#fff;
    border:1.5px solid #dce7f4;
    border-radius:24px;
    padding:16px;
    box-shadow:0 12px 28px rgba(58,81,127,.04);
  }

  .detail-thumb{
    width:96px;
    height:96px;
    border-radius:24px;
    background:#f3f7ff;
    border:1px solid #e0e8f6;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    flex-shrink:0;
  }

  .detail-thumb img{
    width:76px;
    height:76px;
    object-fit:contain;
  }

  .detail-main{
    flex:1;
    min-width:0;
  }

  .detail-name{
    font-size:24px;
    font-weight:900;
    line-height:1.15;
    letter-spacing:-.03em;
  }

  .detail-meta{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:10px;
  }

  .chip{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:32px;
    padding:0 12px;
    border-radius:999px;
    font-size:12px;
    font-weight:900;
    line-height:1;
    white-space:nowrap;
  }

  .chip.blue{background:var(--blue-soft);color:var(--blue)}
  .chip.purple{background:var(--purple-soft);color:var(--purple)}
  .chip.pink{background:var(--pink-soft);color:var(--pink)}
  .chip.yellow{background:var(--yellow-soft);color:var(--yellow)}
  .chip.green{background:var(--green-soft);color:var(--green)}
  .chip.gray{background:var(--gray-soft);color:var(--gray)}

  .info-grid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:10px;
    margin-top:14px;
  }

  .info-box{
    background:#f6f9ff;
    border:1px solid #dde7f5;
    border-radius:18px;
    padding:12px 14px;
  }

  .info-label{
    font-size:12px;
    color:#7386a3;
    font-weight:900;
  }

  .info-value{
    margin-top:6px;
    font-size:15px;
    color:#31435d;
    font-weight:900;
    line-height:1.35;
    word-break:keep-all;
  }

  .boost-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:6px;
  }

  .boost-icon{
    width:26px;
    height:26px;
    border-radius:50%;
    background:#eef3ff;
    border:1px solid #d9e4f3;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    flex-shrink:0;
  }

  .boost-icon img{
    width:16px;
    height:16px;
    object-fit:contain;
  }

  .strategy-box{
    margin-top:14px;
    background:#f6f9ff;
    border:1px solid #dde7f5;
    border-radius:18px;
    padding:12px 14px;
  }

  .strategy-label{
    font-size:12px;
    color:#7386a3;
    font-weight:900;
  }

  .strategy-types{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:10px;
  }

  .strategy-item{
    display:inline-flex;
    align-items:center;
    gap:8px;
    min-height:36px;
    padding:6px 10px 6px 6px;
    border-radius:999px;
    background:#fff;
    border:1px solid #dbe5f3;
  }

  .strategy-type-icon{
    width:26px;
    height:26px;
    border-radius:50%;
    background:#f3f7ff;
    border:1px solid #dce6f4;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    flex-shrink:0;
  }

  .strategy-type-icon img{
    width:16px;
    height:16px;
    object-fit:contain;
  }

  .strategy-type-name{
    font-size:13px;
    color:#31435d;
    font-weight:900;
    line-height:1;
  }

  .detail-note{
    margin-top:12px;
    color:#8a98af;
    font-size:13px;
    font-weight:700;
    line-height:1.5;
  }

  .empty-state{
    background:#fbfdff;
    border:1px dashed #dce7f4;
    border-radius:20px;
    padding:28px 18px;
    text-align:center;
    color:#8293ad;
    font-size:14px;
    font-weight:800;
  }

  .bottom-nav{
    position:fixed;
    left:50%;
    bottom:14px;
    transform:translateX(-50%);
    width:min(1180px, calc(100% - 24px));
    background:rgba(255,255,255,.92);
    border:1px solid var(--line);
    border-radius:26px;
    box-shadow:0 18px 36px rgba(42,59,97,.12);
    backdrop-filter:blur(10px);
    padding:10px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    z-index:30;
  }

  .nav-item{
    min-height:68px;
    border-radius:18px;
    text-decoration:none;
    color:#6f819e;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:6px;
    font-size:13px;
    font-weight:900;
    transition:.18s ease;
    background:#f8fbff;
    border:1px solid transparent;
  }

  .nav-item:hover{
    background:#f3f7ff;
    color:#486995;
    border-color:#d6e3f3;
  }

  .nav-item.active{
    background:#edf4ff;
    color:#3567d7;
    border-color:#cdddf5;
  }

  .nav-icon{
    font-size:20px;
    line-height:1;
  }

  @media (max-width:768px){
    .wrap{
      padding-bottom:120px;
    }

    .section-head{
      padding:22px 20px 16px;
      flex-direction:column;
      align-items:flex-start;
    }

    .section-body{
      padding:16px;
    }

    .section-title{
      font-size:22px;
    }

    .detail-card{
      flex-direction:column;
    }

    .detail-thumb{
      width:88px;
      height:88px;
    }

    .detail-thumb img{
      width:68px;
      height:68px;
    }

    .info-grid{
      grid-template-columns:1fr;
    }
  }
</style>
</head>
<body>
<div class="wrap">

  <section class="section">
    <div class="section-head">
      <div>
        <div class="section-title" id="pageTitle">상세 일정</div>
        <div class="section-sub" id="pageSub">선택한 날짜의 일정만 자세히 확인합니다.</div>
      </div>
      <div class="tiny-badge" id="pageBadge">DETAIL</div>
    </div>

    <div class="section-body">
      <div class="detail-list" id="detailList"></div>
    </div>
  </section>

</div>

<nav class="bottom-nav">
  <a href="./index.html" class="nav-item">
    <div class="nav-icon">🏠</div>
    <div>메인</div>
  </a>
  <a href="./raid-now.html" class="nav-item">
    <div class="nav-icon">⚔️</div>
    <div>지금 레이드</div>
  </a>
  <a href="./weekly.html" class="nav-item">
    <div class="nav-icon">🗓️</div>
    <div>주간 일정표</div>
  </a>
  <a href="./monthly.html" class="nav-item active">
    <div class="nav-icon">📆</div>
    <div>월간 일정</div>
  </a>
</nav>

<script>
  const STORAGE_KEY = 'pogoRaidAdminData';

  function getKoreaNow(){
    const now = new Date();
    const koreaString = now.toLocaleString('en-US', { timeZone: 'Asia/Seoul' });
    return new Date(koreaString);
  }

  function pad(n){
    return String(n).padStart(2, '0');
  }

  function toDate(str){
    if(!str) return null;
    const [y, m, d] = str.split('-').map(Number);
    return new Date(y, m - 1, d, 0, 0, 0, 0);
  }

  function toKey(date){
    return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
  }

  function getDayKor(day){
    return ['일','월','화','수','목','금','토'][day];
  }

  function formatKoreanDate(date){
    return `${date.getFullYear()}년 ${date.getMonth()+1}월 ${date.getDate()}일 ${getDayKor(date.getDay())}요일`;
  }

  function toAmpm(time24){
    if(!time24) return '';
    const [hh, mm] = time24.split(':').map(Number);
    const suffix = hh >= 12 ? 'PM' : 'AM';
    const h12 = hh % 12 === 0 ? 12 : hh % 12;
    return `${String(h12).padStart(2, '0')}:${String(mm).padStart(2, '0')} ${suffix}`;
  }

  function getDisplayTime(item){
    const start = item.startTime ? toAmpm(item.startTime) : '06:00 AM';
    const end = item.endTime ? toAmpm(item.endTime) : '10:00 PM';
    return `${start} ~ ${end}`;
  }

  function inRange(date, startStr, endStr){
    const start = toDate(startStr);
    const end = toDate(endStr);
    if(!start || !end) return false;
    const t = toDate(toKey(date)).getTime();
    return t >= start.getTime() && t <= end.getTime();
  }

  function loadRecords(){
    try{
      const saved = localStorage.getItem(STORAGE_KEY);
      const parsed = saved ? JSON.parse(saved) : [];
      return Array.isArray(parsed) ? parsed : [];
    }catch(e){
      return [];
    }
  }

  function isDetailAllowed(item){
    return Array.isArray(item.showPages) && item.showPages.includes('detail');
  }

  function chipClass(item){
    return item.type || (
      item.label === '전설' ? 'blue' :
      item.label === '메가' ? 'purple' :
      item.label === '그림자' ? 'pink' :
      item.label === '레이드 아워' || item.label === '레이드 데이' ? 'yellow' :
      item.label === '이벤트' || item.label === '커뮤니티 데이' ? 'green' : 'gray'
    );
  }

  function getTargetDate(){
    const params = new URLSearchParams(location.search);
    const queryDate = params.get('date');
    if(queryDate && /^\d{4}-\d{2}-\d{2}$/.test(queryDate)){
      return toDate(queryDate);
    }
    const koreaNow = getKoreaNow();
    koreaNow.setHours(0, 0, 0, 0);
    return koreaNow;
  }

  function getItemsForDate(records, date){
    return records
      .filter(item =>
        isDetailAllowed(item) &&
        item.startDate &&
        item.endDate &&
        inRange(date, item.startDate, item.endDate)
      )
      .sort((a, b) => {
        const order = {
          '전설': 0,
          '메가': 1,
          '그림자': 2,
          '레이드 아워': 3,
          '레이드 데이': 4,
          '이벤트': 5,
          '커뮤니티 데이': 6
        };
        const aOrder = order[a.label] ?? 99;
        const bOrder = order[b.label] ?? 99;
        if(aOrder !== bOrder) return aOrder - bOrder;
        return (a.name || '').localeCompare(b.name || '', 'ko');
      });
  }

  function renderDetailPage(){
    const records = loadRecords();
    const targetDate = getTargetDate();
    const items = getItemsForDate(records, targetDate);

    document.getElementById('pageTitle').textContent = `${formatKoreanDate(targetDate)} 상세 일정`;
    document.getElementById('pageSub').textContent = `어드민에서 저장한 일정 중 상세 페이지(detail)에 표시되는 데이터만 불러옵니다.`;
    document.getElementById('pageBadge').textContent = `${targetDate.getMonth()+1}.${targetDate.getDate()}`;

    const list = document.getElementById('detailList');

    if(!items.length){
      list.innerHTML = `
        <div class="empty-state">
          해당 날짜에는 등록된 일정이 없습니다.<br>
          admin.html에서 detail 노출 체크 후 저장해 주세요.
        </div>
      `;
      return;
    }

    list.innerHTML = items.map(item => `
      <article class="detail-card">
        <div class="detail-thumb">
          ${
            item.image
              ? `<img src="${item.image}" alt="${item.name || ''}">`
              : `<span style="font-size:30px;">🖼️</span>`
          }
        </div>

        <div class="detail-main">
          <div class="detail-name">${item.name || '-'}</div>

          <div class="detail-meta">
            <span class="chip ${chipClass(item)}">${item.label || '-'}</span>
            ${item.boostWeather ? `<span class="chip gray">${item.boostWeather}</span>` : ``}
          </div>

          <div class="info-grid">
            <div class="info-box">
              <div class="info-label">진행 시간</div>
              <div class="info-value">${getDisplayTime(item)}</div>
            </div>

            <div class="info-box">
              <div class="info-label">일정 구간</div>
              <div class="info-value">${item.startDate} ~ ${item.endDate}</div>
            </div>

            <div class="info-box">
              <div class="info-label">일반 CP</div>
              <div class="info-value">${item.cp || '-'}</div>
            </div>

            <div class="info-box">
              <div class="info-label">부스트</div>
              <div class="boost-row">
                <div class="boost-icon">
                  ${
                    item.boostIcon
                      ? `<img src="${item.boostIcon}" alt="${item.boostWeather || ''}">`
                      : `<span style="font-size:10px;">?</span>`
                  }
                </div>
                <div class="info-value" style="margin:0;">
                  ${item.boostWeather || '미입력'} / ${item.boostCp || '-'}
                </div>
              </div>
            </div>
          </div>

          <div class="strategy-box">
            <div class="strategy-label">공략</div>
            <div class="strategy-types">
              ${
                Array.isArray(item.strategyTypes) && item.strategyTypes.length
                  ? item.strategyTypes.map(type => `
                    <div class="strategy-item">
                      <div class="strategy-type-icon">
                        ${
                          type.icon
                            ? `<img src="${type.icon}" alt="${type.name || ''}">`
                            : `<span style="font-size:10px;">?</span>`
                        }
                      </div>
                      <div class="strategy-type-name">${type.name || '타입'}</div>
                    </div>
                  `).join('')
                  : `<div class="strategy-type-name" style="color:#8a98af;">공략 타입 없음</div>`
              }
            </div>
          </div>

          <div class="detail-note">${item.note || '시간이 따로 없는 항목은 기본적으로 06:00 AM ~ 10:00 PM 으로 표시됩니다.'}</div>
        </div>
      </article>
    `).join('');
  }

  renderDetailPage();
</script>
</body>
</html>
