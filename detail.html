<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pokémon GO Raid Planner | 상세 정보</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#edf3fb;
    color:#1f2f46;
  }

  :root{
    --bg:#edf3fb;
    --card:#ffffff;
    --line:#d8e3f2;
    --text:#1f2f46;
    --muted:#7486a3;

    --blue:#3567d7;
    --blue-soft:#e7f0ff;

    --purple:#7c58e9;
    --purple-soft:#efe7ff;

    --pink:#d85b85;
    --pink-soft:#ffe8f0;

    --yellow:#b88818;
    --yellow-soft:#fff1c9;

    --green:#49a66b;
    --green-soft:#e7f5eb;

    --gray:#67768f;
    --gray-soft:#f2f5fa;

    --shadow:0 14px 32px rgba(43,67,110,.08);
    --shadow-hover:0 18px 36px rgba(43,67,110,.14);
  }

  .wrap{
    max-width:1180px;
    margin:0 auto;
    padding:16px 14px 110px;
  }

  .fade-up{
    opacity:0;
    transform:translateY(10px);
    animation:fadeUp .55s ease forwards;
  }
  .delay-1{animation-delay:.05s}
  .delay-2{animation-delay:.12s}
  .delay-3{animation-delay:.19s}
  .delay-4{animation-delay:.26s}

  @keyframes fadeUp{
    from{opacity:0;transform:translateY(10px)}
    to{opacity:1;transform:translateY(0)}
  }

  @keyframes softFloat{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-4px)}
  }

  @keyframes pulseRing{
    0%{box-shadow:0 0 0 0 rgba(83,123,221,.16)}
    70%{box-shadow:0 0 0 10px rgba(83,123,221,0)}
    100%{box-shadow:0 0 0 0 rgba(83,123,221,0)}
  }

  .topbar{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:12px;
    margin-bottom:16px;
  }

  .topbar-title{
    font-size:30px;
    font-weight:900;
    letter-spacing:-.04em;
    line-height:1.05;
  }

  .topbar-sub{
    margin-top:8px;
    color:var(--muted);
    font-size:14px;
    font-weight:800;
  }

  .topbar-date{
    flex-shrink:0;
    min-height:48px;
    padding:0 16px;
    border-radius:16px;
    background:rgba(255,255,255,.92);
    border:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:13px;
    font-weight:900;
    color:#617899;
    box-shadow:var(--shadow);
  }

  .hero{
    background:linear-gradient(180deg,#ffffff 0%, #f8fbff 100%);
    border:1px solid var(--line);
    border-radius:28px;
    box-shadow:var(--shadow);
    padding:22px 20px;
    position:relative;
    overflow:hidden;
    margin-bottom:16px;
  }

  .hero::before{
    content:"";
    position:absolute;
    right:-50px;
    top:-50px;
    width:180px;
    height:180px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(104,135,255,.18) 0%, rgba(104,135,255,0) 70%);
    pointer-events:none;
  }

  .hero.shadow-theme{
    background:linear-gradient(180deg,#f5f0ff 0%, #efe7ff 100%);
    border-color:#d7c8ff;
    box-shadow:0 16px 34px rgba(98,67,168,.14);
  }

  .hero.shadow-theme::before{
    background:radial-gradient(circle, rgba(124,88,233,.22) 0%, rgba(124,88,233,0) 70%);
  }

  .hero-row{
    display:grid;
    grid-template-columns:180px 1fr;
    gap:22px;
    align-items:center;
  }

  .hero-visual{
    width:180px;
    height:180px;
    border-radius:30px;
    background:#f3f7ff;
    border:1px solid #dce6f5;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    box-shadow:0 14px 28px rgba(43,67,110,.08);
    animation:softFloat 3.8s ease-in-out infinite;
  }

  .hero.shadow-theme .hero-visual{
    background:#f4eeff;
    border-color:#d8ccff;
  }

  .hero-visual img{
    width:140px;
    height:140px;
    object-fit:contain;
  }

  .hero-badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:32px;
    padding:0 12px;
    border-radius:999px;
    background:#edf4ff;
    color:#3567d7;
    font-size:12px;
    font-weight:900;
    margin-bottom:12px;
  }

  .hero.shadow-theme .hero-badge{
    background:#efe7ff;
    color:#7c58e9;
  }

  .hero-title{
    font-size:34px;
    line-height:1.08;
    font-weight:900;
    letter-spacing:-.04em;
  }

  .hero-desc{
    margin-top:10px;
    color:#6f819e;
    font-size:14px;
    line-height:1.6;
    font-weight:800;
  }

  .hero-meta{
    margin-top:14px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  .meta-pill{
    min-height:34px;
    padding:0 12px;
    border-radius:999px;
    border:1px solid #d9e3f2;
    background:#fff;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:900;
    color:#607897;
  }

  .hero.shadow-theme .meta-pill{
    background:rgba(255,255,255,.82);
    border-color:#ddcffd;
  }

  .section{
    background:rgba(255,255,255,.9);
    border:1px solid var(--line);
    border-radius:26px;
    box-shadow:var(--shadow);
    overflow:hidden;
    margin-bottom:16px;
  }

  .section-head{
    padding:18px 18px 14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    border-bottom:1px solid #e6eef8;
  }

  .section-title{
    font-size:20px;
    font-weight:900;
    letter-spacing:-.03em;
  }

  .section-sub{
    margin-top:6px;
    font-size:13px;
    color:var(--muted);
    font-weight:800;
  }

  .section-body{
    padding:14px;
  }

  .info-grid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:14px;
  }

  .info-card{
    background:linear-gradient(180deg,#fff 0%, #fbfdff 100%);
    border:1.5px solid #dde7f4;
    border-radius:22px;
    padding:16px;
    min-height:132px;
    position:relative;
    overflow:hidden;
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }

  .info-card::after{
    content:"";
    position:absolute;
    right:-30px;
    bottom:-30px;
    width:90px;
    height:90px;
    border-radius:50%;
    background:linear-gradient(135deg, rgba(120,148,255,.12), rgba(123,99,255,.03));
    pointer-events:none;
  }

  .info-card:hover{
    transform:translateY(-3px);
    box-shadow:var(--shadow-hover);
    border-color:#c7d7ec;
  }

  .info-label{
    font-size:12px;
    font-weight:900;
    color:#7b8ca8;
  }

  .info-value{
    margin-top:10px;
    font-size:24px;
    line-height:1.2;
    font-weight:900;
    color:#24374c;
    letter-spacing:-.03em;
  }

  .info-desc{
    margin-top:8px;
    font-size:13px;
    line-height:1.55;
    color:#7183a0;
    font-weight:800;
  }

  .action-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  .action-btn{
    min-height:40px;
    padding:0 14px;
    border-radius:999px;
    border:1px solid #d7e2f0;
    background:#fff;
    color:#597392;
    font-size:12px;
    font-weight:900;
    cursor:pointer;
    transition:.16s ease;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    justify-content:center;
  }

  .action-btn:hover{
    transform:translateY(-1px);
    border-color:#c7d7ec;
    box-shadow:0 10px 18px rgba(43,67,110,.07);
  }

  .action-btn.primary{
    background:#edf4ff;
    color:#3567d7;
    border-color:#cdddf5;
  }

  .cp-panel{
    margin-top:12px;
    display:none;
    padding:14px;
    border-radius:18px;
    background:#fbfdff;
    border:1px dashed #d7e2f1;
    font-size:13px;
    color:#405674;
    line-height:1.6;
    font-weight:800;
  }

  .cp-panel.show{
    display:block;
    animation:fadeUp .24s ease forwards;
  }

  .timeline{
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .timeline-item{
    background:linear-gradient(180deg,#fff 0%, #f9fbff 100%);
    border:1.5px solid #dde7f4;
    border-radius:22px;
    padding:16px;
    display:grid;
    grid-template-columns:110px 1fr;
    gap:14px;
    align-items:start;
  }

  .timeline-date{
    min-height:64px;
    border-radius:18px;
    background:#edf4ff;
    border:1px solid #d8e6f6;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-weight:900;
    color:#3567d7;
    text-align:center;
    padding:8px;
  }

  .timeline-date strong{
    font-size:22px;
    line-height:1;
    color:#2f58ba;
  }

  .timeline-title{
    font-size:18px;
    font-weight:900;
    letter-spacing:-.03em;
  }

  .timeline-desc{
    margin-top:7px;
    font-size:13px;
    color:#70829f;
    line-height:1.6;
    font-weight:800;
  }

  .empty-state{
    background:linear-gradient(180deg,#fff 0%, #f9fbff 100%);
    border:1.5px dashed #d9e4f2;
    border-radius:24px;
    padding:34px 18px;
    text-align:center;
    color:#8193ad;
  }

  .empty-state h2{
    margin:0;
    font-size:28px;
    font-weight:900;
    letter-spacing:-.04em;
    color:#2b3d55;
  }

  .empty-state p{
    margin:12px 0 0;
    font-size:14px;
    line-height:1.7;
    font-weight:800;
  }

  .bottom-nav{
    position:fixed;
    left:50%;
    bottom:14px;
    transform:translateX(-50%);
    width:min(980px, calc(100% - 24px));
    background:rgba(255,255,255,.94);
    border:1px solid var(--line);
    border-radius:24px;
    box-shadow:0 18px 36px rgba(42,59,97,.12);
    backdrop-filter:blur(10px);
    padding:10px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    z-index:30;
  }

  .nav-item{
    min-height:64px;
    border-radius:16px;
    text-decoration:none;
    color:#6f819e;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:6px;
    font-size:12px;
    font-weight:900;
    transition:.18s ease;
    background:#f8fbff;
    border:1px solid transparent;
  }

  .nav-item:hover{
    background:#f3f7ff;
    color:#486995;
    border-color:#d6e3f3;
    transform:translateY(-1px);
  }

  .nav-item.active{
    background:#edf4ff;
    color:#3567d7;
    border-color:#cdddf5;
  }

  .nav-icon{
    font-size:18px;
    line-height:1;
  }

  @media (max-width:980px){
    .info-grid{
      grid-template-columns:1fr;
    }
  }

  @media (max-width:768px){
    .wrap{
      padding:14px 12px 120px;
    }

    .topbar{
      flex-direction:column;
      align-items:flex-start;
    }

    .topbar-title{
      font-size:28px;
    }

    .hero-row{
      grid-template-columns:1fr;
    }

    .hero-visual{
      width:100%;
      height:220px;
    }

    .hero-visual img{
      width:160px;
      height:160px;
    }

    .hero-title{
      font-size:28px;
    }

    .section-head{
      padding:16px 16px 12px;
      flex-direction:column;
      align-items:flex-start;
    }

    .section-body{
      padding:12px;
    }

    .timeline-item{
      grid-template-columns:1fr;
    }
  }

  @media (prefers-reduced-motion: reduce){
    *{
      animation:none !important;
      transition:none !important;
      scroll-behavior:auto !important;
    }
  }
</style>
</head>
<body>
<div class="wrap" id="app">

  <div class="topbar fade-up">
    <div>
      <div class="topbar-title">레이드 상세</div>
      <div class="topbar-sub" id="topbarSub">선택한 레이드 상세 정보를 표시합니다</div>
    </div>
    <div class="topbar-date" id="monthBadge">DETAIL</div>
  </div>

  <div id="detailContent"></div>

</div>

<nav class="bottom-nav">
  <a href="./index.html" class="nav-item">
    <div class="nav-icon">🏠</div>
    <div>메인</div>
  </a>
  <a href="./raid-now.html" class="nav-item">
    <div class="nav-icon">⚔️</div>
    <div>지금 레이드</div>
  </a>
  <a href="./weekly.html" class="nav-item">
    <div class="nav-icon">🗓️</div>
    <div>주간 일정표</div>
  </a>
  <a href="./monthly.html" class="nav-item">
    <div class="nav-icon">📆</div>
    <div>월간 일정</div>
  </a>
</nav>

<script>
  const DATA_URL = './raid-data.json';

  function getKoreaNow(){
    const now = new Date();
    const koreaString = now.toLocaleString('en-US', { timeZone: 'Asia/Seoul' });
    return new Date(koreaString);
  }

  function getKoreaToday(){
    const koreaNow = getKoreaNow();
    koreaNow.setHours(0, 0, 0, 0);
    return koreaNow;
  }

  function pad(n){
    return String(n).padStart(2, '0');
  }

  function toDate(str){
    if(!str) return null;
    const [y,m,d] = str.split('-').map(Number);
    return new Date(y, m - 1, d, 0, 0, 0, 0);
  }

  function toKey(date){
    return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}`;
  }

  function formatKoreanDate(date){
    const days = ['일','월','화','수','목','금','토'];
    return `${date.getFullYear()}년 ${date.getMonth()+1}월 ${date.getDate()}일 ${days[date.getDay()]}요일`;
  }

  function formatSimpleDate(dateStr){
    if(!dateStr) return '-';
    return dateStr.replaceAll('-', '.');
  }

  function inRange(date, startStr, endStr){
    const start = toDate(startStr);
    const end = toDate(endStr);
    if(!start || !end) return false;
    const t = toDate(toKey(date)).getTime();
    return t >= start.getTime() && t <= end.getTime();
  }

  function escapeHtml(value){
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function hasCpValue(item){
    return !!String(item.cp || '').trim();
  }

  function chipLabelClass(label){
    if(label === '5성') return '5성';
    if(label === '3성') return '3성';
    if(label === '1성') return '1성';
    if(label === '메가') return '메가';
    if(label === '그림자') return '그림자';
    return '기타';
  }

  function pageChipClass(label){
    if(label === '5성') return 'blue';
    if(label === '3성') return 'yellow';
    if(label === '1성') return 'green';
    if(label === '메가') return 'purple';
    if(label === '그림자') return 'pink';
    return 'gray';
  }

  function getQueryParams(){
    const params = new URLSearchParams(location.search);
    return {
      name: params.get('name') || '',
      date: params.get('date') || ''
    };
  }

  async function loadRecords(){
    try{
      const res = await fetch(DATA_URL, { cache: 'no-store' });
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const parsed = await res.json();

      if(Array.isArray(parsed)) return parsed;
      if(Array.isArray(parsed.records)) return parsed.records;
      if(Array.isArray(parsed.items)) return parsed.items;

      return [];
    }catch(error){
      console.error('raid-data.json 불러오기 실패:', error);
      return [];
    }
  }

  function getDetailItem(records, name, date){
    const filtered = records.filter(item => (item.name || '') === name);

    if(!filtered.length) return null;

    if(date){
      const dateObj = toDate(date);
      const matchedByDate = filtered.find(item =>
        item.startDate &&
        item.endDate &&
        dateObj &&
        inRange(dateObj, item.startDate, item.endDate)
      );
      if(matchedByDate) return matchedByDate;
    }

    return filtered[0];
  }

  function renderEmpty(){
    document.getElementById('detailContent').innerHTML = `
      <section class="empty-state fade-up">
        <h2>상세 정보를 찾지 못했어요</h2>
        <p>
          detail.html로 넘어올 때 <strong>name</strong> 값이 없거나,<br>
          raid-data.json 안에 해당 이름의 데이터가 없는 상태입니다.
        </p>
        <div class="action-row" style="justify-content:center;margin-top:18px;">
          <a class="action-btn primary" href="./monthly.html">월간 일정으로 이동</a>
          <a class="action-btn" href="./raid-now.html">지금 레이드 보기</a>
        </div>
      </section>
    `;
  }

  function renderDetail(item, queryDate){
    const today = getKoreaToday();
    const shadowTheme = item.label === '그림자' ? 'shadow-theme' : '';
    const displayDate = queryDate || toKey(today);

    document.getElementById('topbarSub').textContent = `${escapeHtml(item.name || '-')} 상세 정보`;
    document.getElementById('monthBadge').textContent = chipLabelClass(item.label || '-');

    document.getElementById('detailContent').innerHTML = `
      <section class="hero ${shadowTheme} fade-up">
        <div class="hero-row">
          <div class="hero-visual">
            ${
              item.image
                ? `<img src="${escapeHtml(item.image)}" alt="${escapeHtml(item.name || '')}">`
                : `<span style="font-size:56px;">🖼️</span>`
            }
          </div>

          <div>
            <div class="hero-badge">${escapeHtml(item.label || '레이드')}</div>
            <div class="hero-title">${escapeHtml(item.name || '-')}</div>
            <div class="hero-desc">
              ${
                item.label === '그림자'
                  ? '그림자 레이드이므로 상세 페이지 전체에 보라색 테마가 적용됩니다.'
                  : '선택한 레이드의 기간, CP, 부스트, 노출 범위를 한눈에 확인할 수 있습니다.'
              }
            </div>

            <div class="hero-meta">
              <span class="meta-pill">시작 ${escapeHtml(formatSimpleDate(item.startDate))}</span>
              <span class="meta-pill">종료 ${escapeHtml(formatSimpleDate(item.endDate))}</span>
              <span class="meta-pill">타입 ${escapeHtml(item.label || '-')}</span>
              ${item.boost ? `<span class="meta-pill">부스트 ${escapeHtml(item.boost)}</span>` : ``}
              ${item.boost2 ? `<span class="meta-pill">부스트 ${escapeHtml(item.boost2)}</span>` : ``}
            </div>
          </div>
        </div>
      </section>

      <section class="section fade-up delay-1">
        <div class="section-head">
          <div>
            <div class="section-title">기본 정보</div>
            <div class="section-sub">선택한 레이드의 핵심 정보를 카드 형태로 정리했습니다</div>
          </div>
        </div>
        <div class="section-body">
          <div class="info-grid">
            <article class="info-card">
              <div class="info-label">레이드 이름</div>
              <div class="info-value">${escapeHtml(item.name || '-')}</div>
              <div class="info-desc">raid-data.json에 입력된 기준 이름입니다.</div>
            </article>

            <article class="info-card">
              <div class="info-label">레이드 타입</div>
              <div class="info-value">${escapeHtml(item.label || '-')}</div>
              <div class="info-desc">
                5성 / 3성 / 1성 / 메가 / 그림자 분류 기준으로 정렬됩니다.
              </div>
            </article>

            <article class="info-card">
              <div class="info-label">진행 기간</div>
              <div class="info-value">${escapeHtml(formatSimpleDate(item.startDate))} - ${escapeHtml(formatSimpleDate(item.endDate))}</div>
              <div class="info-desc">해당 기간 내 날짜에서 자동으로 표시됩니다.</div>
            </article>

            <article class="info-card">
              <div class="info-label">선택 기준 날짜</div>
              <div class="info-value">${escapeHtml(displayDate)}</div>
              <div class="info-desc">
                monthly / weekly / raid-now 페이지에서 전달된 date 값을 우선 사용합니다.
              </div>
            </article>
          </div>
        </div>
      </section>

      <section class="section fade-up delay-2">
        <div class="section-head">
          <div>
            <div class="section-title">배틀 정보</div>
            <div class="section-sub">cp 값이 있으면 버튼으로 펼쳐서 볼 수 있습니다</div>
          </div>
        </div>
        <div class="section-body">
          <div class="action-row">
            ${
              hasCpValue(item)
                ? `<button class="action-btn primary" type="button" id="cpToggleBtn">CP 보기</button>`
                : `<span class="action-btn" style="cursor:default;">CP 미입력</span>`
            }
            <a class="action-btn" href="./monthly.html">월간 일정</a>
            <a class="action-btn" href="./weekly.html">주간 일정</a>
            <a class="action-btn" href="./raid-now.html">지금 레이드</a>
          </div>

          ${
            hasCpValue(item)
              ? `<div class="cp-panel" id="cpPanel">CP 정보: ${escapeHtml(item.cp)}</div>`
              : ``
          }
        </div>
      </section>

      <section class="section fade-up delay-3">
        <div class="section-head">
          <div>
            <div class="section-title">노출 정보 / 이동 흐름</div>
            <div class="section-sub">어느 페이지에서 표시되는지와 사용 흐름을 같이 정리했습니다</div>
          </div>
        </div>
        <div class="section-body">
          <div class="timeline">
            <article class="timeline-item">
              <div class="timeline-date">
                <strong>1</strong>
                <span>데이터</span>
              </div>
              <div>
                <div class="timeline-title">raid-data.json 에서 불러오기</div>
                <div class="timeline-desc">
                  이름, 타입, 시작일, 종료일, 이미지, CP, 부스트, showPages 값을 기준으로 각 페이지가 자동 구성됩니다.
                </div>
              </div>
            </article>

            <article class="timeline-item">
              <div class="timeline-date">
                <strong>2</strong>
                <span>노출</span>
              </div>
              <div>
                <div class="timeline-title">showPages 기준 페이지 노출</div>
                <div class="timeline-desc">
                  ${Array.isArray(item.showPages) && item.showPages.length
                    ? escapeHtml(item.showPages.join(', '))
                    : 'showPages 값이 없거나 비어 있습니다.'}
                </div>
              </div>
            </article>

            <article class="timeline-item">
              <div class="timeline-date">
                <strong>3</strong>
                <span>상세</span>
              </div>
              <div>
                <div class="timeline-title">이름 + 날짜 기준 상세 진입</div>
                <div class="timeline-desc">
                  ` + "`detail.html?name=이름&date=날짜`" + ` 형식으로 들어오면 해당 기간의 데이터를 우선 선택합니다.
                </div>
              </div>
            </article>
          </div>
        </div>
      </section>
    `;

    const cpToggleBtn = document.getElementById('cpToggleBtn');
    const cpPanel = document.getElementById('cpPanel');

    if(cpToggleBtn && cpPanel){
      cpToggleBtn.addEventListener('click', () => {
        const isOpen = cpPanel.classList.contains('show');
        cpPanel.classList.toggle('show', !isOpen);
        cpToggleBtn.textContent = isOpen ? 'CP 보기' : 'CP 닫기';
      });
    }
  }

  async function init(){
    const records = await loadRecords();
    const { name, date } = getQueryParams();

    if(!name){
      renderEmpty();
      return;
    }

    const item = getDetailItem(records, name, date);

    if(!item){
      renderEmpty();
      return;
    }

    renderDetail(item, date);
  }

  init();
</script>
</body>
</html>
