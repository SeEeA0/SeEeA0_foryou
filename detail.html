<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>상세 일정</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#edf3fb;
    color:#1f2f46;
  }

  :root{
    --bg:#edf3fb;
    --card:#ffffff;
    --card-soft:#f8fbff;
    --line:#d8e3f2;
    --line-strong:#c9d8eb;
    --text:#1f2f46;
    --muted:#7486a3;

    --blue:#3567d7;
    --blue-soft:#e7f0ff;

    --purple:#7c58e9;
    --purple-soft:#efe7ff;

    --pink:#d85b85;
    --pink-soft:#ffe8f0;

    --yellow:#b88818;
    --yellow-soft:#fff1c9;

    --green:#49a66b;
    --green-soft:#e7f5eb;

    --gray:#67768f;
    --gray-soft:#f2f5fa;

    --shadow:0 18px 40px rgba(43,67,110,.08);
  }

  .wrap{
    max-width:1120px;
    margin:0 auto;
    padding:20px 16px 110px;
  }

  .hero{
    background:rgba(255,255,255,.82);
    border:1px solid var(--line);
    border-radius:30px;
    overflow:hidden;
    box-shadow:var(--shadow);
    margin-bottom:18px;
  }

  .hero-head{
    padding:26px 28px 18px;
    border-bottom:1px solid #e4edf8;
    background:linear-gradient(180deg,#fbfdff 0%, #f6faff 100%);
  }

  .hero-title{
    font-size:30px;
    font-weight:900;
    letter-spacing:-.03em;
  }

  .hero-sub{
    margin-top:10px;
    font-size:14px;
    line-height:1.55;
    color:var(--muted);
    font-weight:700;
  }

  .hero-tags{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:18px;
  }

  .hero-tag{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:40px;
    padding:0 16px;
    border-radius:999px;
    background:#f3f7ff;
    border:1px solid var(--line);
    color:#58719a;
    font-size:13px;
    font-weight:900;
    white-space:nowrap;
  }

  .hero-tag.active{
    background:#eaf2ff;
    color:#3567d7;
    border-color:#cfe0f6;
  }

  .section{
    background:rgba(255,255,255,.82);
    border:1px solid var(--line);
    border-radius:30px;
    overflow:hidden;
    box-shadow:var(--shadow);
    margin-bottom:18px;
  }

  .section-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:18px;
    padding:24px 26px 18px;
    border-bottom:1px solid #e4edf8;
    background:linear-gradient(180deg,#fbfdff 0%, #f6faff 100%);
  }

  .section-title{
    font-size:26px;
    font-weight:900;
    letter-spacing:-.03em;
  }

  .section-sub{
    margin-top:8px;
    font-size:14px;
    color:var(--muted);
    font-weight:700;
    line-height:1.5;
  }

  .section-body{
    padding:18px;
  }

  .tiny-badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:42px;
    padding:0 14px;
    border-radius:999px;
    background:#f1f6ff;
    border:1px solid var(--line);
    color:#58719a;
    font-size:13px;
    font-weight:900;
    white-space:nowrap;
  }

  .detail-list{
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .detail-card{
    display:flex;
    gap:16px;
    align-items:flex-start;
    background:#fff;
    border:1.5px solid #dce7f4;
    border-radius:24px;
    padding:16px;
    box-shadow:0 12px 28px rgba(58,81,127,.04);
  }

  .detail-thumb{
    width:96px;
    height:96px;
    border-radius:24px;
    background:#f3f7ff;
    border:1px solid #e0e8f6;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    flex-shrink:0;
  }

  .detail-thumb img{
    width:76px;
    height:76px;
    object-fit:contain;
  }

  .detail-main{
    flex:1;
    min-width:0;
  }

  .detail-name{
    font-size:24px;
    font-weight:900;
    line-height:1.15;
    letter-spacing:-.03em;
  }

  .detail-meta{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:10px;
  }

  .chip{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:32px;
    padding:0 12px;
    border-radius:999px;
    font-size:12px;
    font-weight:900;
    line-height:1;
    white-space:nowrap;
  }

  .chip.blue{background:var(--blue-soft);color:var(--blue)}
  .chip.purple{background:var(--purple-soft);color:var(--purple)}
  .chip.pink{background:var(--pink-soft);color:var(--pink)}
  .chip.yellow{background:var(--yellow-soft);color:var(--yellow)}
  .chip.green{background:var(--green-soft);color:var(--green)}
  .chip.gray{background:var(--gray-soft);color:var(--gray)}

  .info-grid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:10px;
    margin-top:14px;
  }

  .info-box{
    background:#f6f9ff;
    border:1px solid #dde7f5;
    border-radius:18px;
    padding:12px 14px;
  }

  .info-label{
    font-size:12px;
    color:#7386a3;
    font-weight:900;
  }

  .info-value{
    margin-top:6px;
    font-size:15px;
    color:#31435d;
    font-weight:900;
    line-height:1.35;
    word-break:keep-all;
  }

  .detail-note{
    margin-top:12px;
    color:#8a98af;
    font-size:13px;
    font-weight:700;
    line-height:1.5;
  }

  .empty-box{
    border:1px dashed #d9e4f2;
    background:#fbfdff;
    border-radius:18px;
    padding:24px 16px;
    text-align:center;
    color:#97a5ba;
    font-size:14px;
    font-weight:800;
  }

  .quick-grid{
    display:grid;
    grid-template-columns:repeat(3,minmax(0,1fr));
    gap:14px;
  }

  .quick-card{
    background:linear-gradient(180deg,#fff 0%, #f9fbff 100%);
    border:1.5px solid var(--line);
    border-radius:22px;
    padding:14px 16px;
    display:flex;
    align-items:center;
    gap:14px;
    text-decoration:none;
    color:inherit;
    transition:.18s ease;
    min-height:96px;
  }

  .quick-card:hover{
    transform:translateY(-2px);
    border-color:#bfd1ea;
    box-shadow:0 12px 28px rgba(62,85,131,.08);
  }

  .quick-icon{
    width:52px;
    height:52px;
    border-radius:16px;
    background:#f3f7ff;
    border:1px solid #dce6f4;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    flex-shrink:0;
  }

  .quick-title{
    font-size:16px;
    font-weight:900;
    letter-spacing:-.02em;
  }

  .quick-desc{
    margin-top:5px;
    color:var(--muted);
    font-size:12px;
    line-height:1.45;
    font-weight:700;
  }

  .bottom-nav{
    position:fixed;
    left:50%;
    bottom:14px;
    transform:translateX(-50%);
    width:min(1180px, calc(100% - 24px));
    background:rgba(255,255,255,.92);
    border:1px solid var(--line);
    border-radius:26px;
    box-shadow:0 18px 36px rgba(42,59,97,.12);
    backdrop-filter:blur(10px);
    padding:10px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    z-index:30;
  }

  .nav-item{
    min-height:68px;
    border-radius:18px;
    text-decoration:none;
    color:#6f819e;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:6px;
    font-size:13px;
    font-weight:900;
    transition:.18s ease;
    background:#f8fbff;
    border:1px solid transparent;
  }

  .nav-item:hover{
    background:#f3f7ff;
    color:#486995;
    border-color:#d6e3f3;
  }

  .nav-item.active{
    background:#edf4ff;
    color:#3567d7;
    border-color:#cdddf5;
  }

  .nav-icon{
    font-size:20px;
    line-height:1;
  }

  @media (max-width:1100px){
    .quick-grid{
      grid-template-columns:1fr;
    }
  }

  @media (max-width:768px){
    .wrap{
      padding-bottom:120px;
    }

    .hero-head,
    .section-head{
      padding:22px 20px 16px;
    }

    .section-body{
      padding:16px;
    }

    .hero-title{
      font-size:26px;
    }

    .section-title{
      font-size:22px;
    }

    .section-head{
      flex-direction:column;
      align-items:flex-start;
    }

    .detail-card{
      flex-direction:column;
    }

    .detail-thumb{
      width:88px;
      height:88px;
    }

    .detail-thumb img{
      width:68px;
      height:68px;
    }

    .info-grid{
      grid-template-columns:1fr;
    }
  }
</style>
</head>

<div class="wrap">

  <section class="hero">
    <div class="hero-head">
      <div class="hero-title" id="pageTitle">상세 일정</div>

      <div class="tiny-badge" id="detailBadge">DETAIL</div>

    <div class="section-body">
      <div class="detail-list" id="detailList"></div>

  </section>

  <section class="section">

          </div>
        </a>
      </div>
    </div>
  </section>

</div>

<nav class="bottom-nav">
  <a href="./index.html" class="nav-item">
    <div class="nav-icon">🏠</div>
    <div>메인</div>
  </a>
  <a href="./raid-now.html" class="nav-item">

</nav>

  function pad(n){ return String(n).padStart(2,'0'); }

  function toDate(str){
    const [y,m,d] = str.split('-').map(Number);
    return new Date(y, m - 1, d, 0, 0, 0, 0);
  }

  function toKey(date){
    return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}`;
  }

  function getDayKor(day){
    return ['일','월','화','수','목','금','토'][day];
  }

  function formatKoreanDate(date){
    return `${date.getFullYear()}년 ${date.getMonth()+1}월 ${date.getDate()}일 ${getDayKor(date.getDay())}요일`;
  }

  function getDisplayTime(item){
    return `${item.startTime || DEFAULT_START} ~ ${item.endTime || DEFAULT_END}`;
  }

  function inRange(date, startStr, endStr){
    const t = toDate(toKey(date)).getTime();
    const s = toDate(startStr).getTime();
    const e = toDate(endStr).getTime();
    return t >= s && t <= e;
  }

  function getItemsForDate(date){
    return [
      ...raidRanges.filter(item => inRange(date, item.startDate, item.endDate)),
      ...weekendShadow.filter(item => inRange(date, item.startDate, item.endDate)),
      ...oneDayEvents.filter(item => item.date === toKey(date))
    ];
  }

  function getQueryDate(){
    const params = new URLSearchParams(location.search);
    const dateStr = params.get('date');
    if(!dateStr) return '2026-04-01';
    return dateStr;
  }

  function renderDetailPage(){
    const dateStr = getQueryDate();
    const date = toDate(dateStr);
    const items = getItemsForDate(date);

    document.getElementById('pageTitle').textContent = `${formatKoreanDate(date)} 상세 일정`;
    document.getElementById('detailTitle').textContent = `${date.getMonth()+1}월 ${date.getDate()}일 일정`;
    document.getElementById('detailBadge').textContent = `${date.getMonth()+1}.${date.getDate()}`;
    document.getElementById('pageSub').textContent = `${formatKoreanDate(date)} 기준으로 포함되는 레이드, 레이드 아워, 이벤트, 커뮤니티 데이, 그림자 일정을 자세히 보여줍니다.`;

    const list = document.getElementById('detailList');

    if(!items.length){
      list.innerHTML = `<div class="empty-box">해당 날짜에는 등록된 일정이 없습니다.</div>`;
      return;
    }

    list.innerHTML = items.map(item => `
      <article class="detail-card">
        <div class="detail-thumb">
          <img src="${item.image}" alt="${item.name}">
        </div>

        <div class="detail-main">
          <div class="detail-name">${item.name}</div>

          <div class="detail-meta">
            <span class="chip ${item.type}">${item.label}</span>
            ${item.weather ? `<span class="chip gray">${item.weather}</span>` : ``}
          </div>

          <div class="info-grid">
            <div class="info-box">
              <div class="info-label">진행 시간</div>
              <div class="info-value">${getDisplayTime(item)}</div>
            </div>

            <div class="info-box">
              <div class="info-label">일정 구간</div>
              <div class="info-value">
                ${
                  item.date
                    ? item.date.replaceAll('-','.')
                    : `${item.startDate.replaceAll('-','.')} ~ ${item.endDate.replaceAll('-','.')}`
                }
              </div>
            </div>

            ${
              item.cp
                ? `
                  <div class="info-box">
                    <div class="info-label">일반 CP</div>
                    <div class="info-value">${item.cp}</div>
                  </div>
                  <div class="info-box">
                    <div class="info-label">날씨부스트 CP</div>
                    <div class="info-value">${item.boostCp}</div>
                  </div>
                `
                : `
                  <div class="info-box">
                    <div class="info-label">표시 기준</div>
                    <div class="info-value">이벤트 / 특별 일정</div>
                  </div>
                  <div class="info-box">
                    <div class="info-label">기본 시간 규칙</div>
                    <div class="info-value">${DEFAULT_START} ~ ${DEFAULT_END}</div>
                  </div>
                `
            }
          </div>

          <div class="detail-note">${item.note || '시간이 따로 없는 항목은 기본적으로 06:00 AM ~ 10:00 PM 으로 표시됩니다.'}</div>
        </div>
      </article>
    `).join('');
  }

  renderDetailPage();
</script>
</body>
</html>
